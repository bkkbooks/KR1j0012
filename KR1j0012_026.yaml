body:
  text: 欽定四庫全書爾雅翼卷二十六宋羅願撰釋蟲三蠭蜜蠭果臝蠆蚊蝱蚤蝨螻蝍蛆蠭蠭種類至多其黄色細腰者謂之穉蜂腰間極細僅相聨屬天地之性細腰純雄大腰純雌純雄謂蜂純雌龜鼈之屬也列子亦曰純雌其名大腰純雄其名穉蜂言無雌雄而自化故淮南子以蜂之類為貞蟲言其無欲也博物志以為蜂無雌取桑蟲或阜螽子抱而成已子今細腰蜂作房在小樹上及人家簷下房皆倒懸其綴著處必以漆房中各有子如粟稍長如蛹能動逐時飼之久則封之生翼而出其穉者復孚卯則増房益多其在大木上者蜂與房皆大謂之露蜂房又謂之百穿其房大者如甕小者如桶至大者如巨鍾房數百層子至石許又土蠭黑色似木蠭而大地中作房蠭之最大者螫人至死能食蜘蛛楚辭云赤蟻若象𤣥蠭若壺壺形圓大故蠭似之方言蠭大而蜜謂之壺蠭今人亦呼為胡蠭蜜蠭蜜蠭似蠭而小工作蜜說文蜜字作􅨥云蠭甘飴也蓋若鼎器焉而幂之山海經曰榖城之上足蜂蜜之廬今土木之蠭亦各有蜜北方地燥多在土中故多土蜜南方地濕多在木中故多木蜜今人家畜者質小而微黄大率腰腹相稱如蠅蟬也喜事者以窾木容數斛寘蜂其中養之開小孔纔容出入永嘉地記曰七八月中常有蜜蜂羣過有一蜂先飛覔止泊處人知輙内木桶中以蜜塗桶中飛者聞蜜氣或停不過三四來便舉羣悉至今人家所養蜂或羣逸以千百數中有大者為王羣蜂舁之從其所徃人収而養之一日兩出而聚鳴號為兩衙其出採花者取花鬚上粉寘兩髀或採無所得經宿花中不敢歸房中蜂多則復分為隊雀及蜻蛉好捕食之冬寒則割蜜今宛陵有黄連蜜則色黄而味小苦雍洛間有棃花蜜色如凝脂亳州太清宮有檜花蜜色小赤南京柘城縣有何首烏蜜色更赤各隨所採花色而性之温涼亦相近蜜脾底為蠟有蜜香氣然蜜極甘而蠟至淡獨為一異孝經援神契曰蜂蠆垂芒釋蟲曰蠭醜螸謂垂其腴腴即腹下螫毒也今細腰螫人皆復引其芒去蜜蜂螫人芒入人肉不可復出蜂亦尋死傳言尹吉甫妻取蜂去毒繫衣上以譖伯奇即此也古稱蜂蠆有毒今蜂近其房輙羣起攻人故古稱蠭起之將戰國有蠭旗軍行用之又軍行卒逢羣蜂及飛䖟多者必驚於藏伏之賊王莽時九江連率賈萌守郡不降有飛蜂附萌車為漢兵所誅晉陶侃表袁謙為高涼太守未至百餘里浦中有蜜蜂蔽日而下謙船已而皆不利洪範五行傳秦昭王時上郡大飢草木盡死蜂食田苗闗尹子聖人師蜂立君臣果臝果臝即細腰黑蜂也說文作􅝻臝俗呼為蠮螉詩言螟蛉有子果臝負之螟蛉桑蟲也果臝蒲盧也負持也箋云蒲盧取桑蟲之子負持而去煦嫗養之以成子詩義疏云螟蛉似步屈其色青細小或在草葉上土蜂取之寘木空中或書卷間筆筒中七日而成其子里語曰呪云象我而揚子雲亦云螟蛉之子殪而逢果臝祝之曰類我類我久則肖之矣唯陶隱居云今一種黑色腰甚小衘泥於人壁及器物邊作房如併竹管其生子如粟米大置中乃捕取草上青蜘蛛十餘枚滿中仍塞口以擬其子大為糧也其一種入蘆竹管中者一名果臝亦取草上青蟲詩之螟蛉有子果臝負之言細腰無雌皆取青蟲教祝便變成已子斯為謬矣造詩者乃可不察未審夫子何為因其僻耶按陶氏之說實當物理然以是疑聖人則有所不可詩第言果臝負之如國君不能有其民則為他人所取不言負去為子也猶䲭鴞云䲭鴞䲭鴞既取我子亦可謂鴞取衆鳥為子乎但說者見其負之以徃遂因為是說然詩之本㫖自不如此而箋疏及揚子雲之語疎矣蠆說文曰蠆毒蟲也象形蓋象其奮螯曳尾之形今之蠍也說者以為鼠負之大者多化為蠍葛洪方云蠍中國多此江南無也韓文公詩照壁喜見蠍或云江南舊無蠍開元初甞有主簿竹筒盛過江至今江南徃徃有之俗呼為主簿蟲蜥易能食之故蜥易一名蠍虎又為蝸牛所食先以跡規之不復去今人或為蠍螫者以蝸牛涎塗之痛立止蠍前謂之螫後謂之蠆通俗文云長尾為蠆短尾為蠍晉語申生曰雖蝎譖焉避之左傳曰蠭蠆有毒又曰已為蠆尾以令於國莊子曰其智􅉃於蠆蠍之尾然則為害甚矣今醫家謂蠆尾為蠍稍蒯通曰猛虎之猶與不如蠭蠆之致蠚嵇含謂諺曰過滿百為蠆所螫唐制三月上已日賜侍臣栁棬云帶之免蠆毒有處士之名無爵列於朝者商君謂之六蝎都人士之詩曰彼君子女卷髪如蠆鄭氏謂蠆螫蟲也尾末揵然似婦人髪末曲上卷然禮歛髪無髢而有曲者以長者皆歛之不使有餘鬢傍短者不可歛則因之以為飾故曰匪伊卷之髪則有旟先儒以為旟揚也非故卷之髪當自有揚起者爾淮南子言鄭舞者髪若結旌許氏曰屈而復舒也結旌則旟之義都人士所以刺長民者衣服之不常次章并及内外命婦之飾故曰綢直如髪如而也言髪甚綢直也次曰謂之尹吉言髪為結甚至也末曰卷髪如蠆言首飾整然矣世衰禮廢則婦人之飾相尚以奇異髽喪禮也南宮縚之母死夫子猶誨兄子以從從毋扈扈謂長大垂鬌之狀也况幽王之時褒姒以男冠化於上則婦人之髪結可知其不為墮馬髻者幾希矣冝乎事雖微而思古之長民者也索靖草書名蠆尾蚊蚊者惡水中孑孒所化噆人肌膚其聲如雷東方朔隱語云長喙細身晝亡夜存嗜肉惡煙為掌指所捫其生草中者吻尤利而足有文彩呉興號豹脚蚊子所以從文以有文也亦或從昬志其出時也或從民昬之省也又用閩越之閩蟲之在門中者大抵秋後吻輙破不能整或云更慘於末破時說文曰秦謂之蚋楚謂之蚊夏小正云丹鳥羞白鳥丹鳥螢也白鳥蚊也謂螢以蚊為羞粮則未知其審也金樓子云齊桓公卧於柏寢白鳥營營飢而求飽因開翠紗之幬進蚊子焉其蚊有知禮者不食公之肉而退有知足者㗱公之肉而退有不知足者遂長嘘短吸而食之及其飽也腹為之潰公曰嗟乎民生亦猶是矣蚊為小矣而物又附之江浦之間有麽蟲名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也或曰巢於蚊睫再乳而蚊不驚或云在蚊翼下每生九卵伏成九子俱去而蚊不知惟黄帝容成神視氣聴形若嵩山之阿而聲若雷霆此所以極小大之分也古者謝章詔板用蚋脚書亦一書之體蝱蟁從民省聲蝱從甿省聲考民則有害於人若蝱傷牛馬亦田甿之患也蝱有數種商浙以南江嶺間有大木蝱長大緑色殆如次蟬咂牛馬或至頓仆蜚蝱狀如蜜蜂黄黑色又一種小者名鹿䖟大如蠅齧牛馬亦猛三䖟所食同故說苑曰蠧喙仆柱蚊䖟失牛古語摶牛之蝱不可以破蝨言才有分能大者不必能細也好聚於牛馬之尾楚語曰譬之如牛馬處暑之既至䖟䗽之既多而不能掉其尾蓋大曰䖟小曰䗽處暑七月節牛馬之氣蒸欝故䖟之大小集焉尾重而不掉也牟子曰昔公明儀為牛彈清角之操伏食如故轉為蟁蝱之聲則翹尾而躡蹀然䖟亦有不食之時淮南子曰夏至而流黄澤石精出蟬始鳴半夏生蟁䖟不食駒犢鷙鳥不摶黄口許叔重以為五月微隂在下未成駒犢黄口肌血脆弱故蟁䖟鷙鳥應隂不摶食之也然則古者郊必用犢將事于四海山川則飾黄駒豈物所不傷純全至絜耶蚤蚤齧人跳蟲也緩輙失之辨之在蚤故為早暮之早其字從爪爪而得之說文作蚤韓子曰韓昭侯搔而佯亡一蚤求之甚急左右因取其蚤而殺之昭侯以此察左右之不誠也莊子曰鴟鵂夜撮蚤晝日瞋目而不見丘山考以其微而善跳䲭鵂獨能夜撮之以喻其精明如此非果有蚤撮之也說者乃謂人翦爪在地䲭鵂夜至人家撮拾視之知有吉凶輙更其家故五行書埋爪必有處所此自一說未必莊書之本㫖也今沐猴亦好為人撮蚤云淮南子云昌羊去蚤虱而人弗集者為其來蛉窮也昌羊今之昌蒲蛉窮入耳之蟲則所去之害小而所來之患大趙壹解擯賦丹鴻可殺蚤蝨蝨齧人蟲也養生論曰蝨處頭而黑麝食栢而香以明隨所處而易知生有可養之道又淮南子曰湯沐具而蟣蝨相弔大厦成而燕雀相賀以言禍福有非類而相及者東觀漢記曰馬援擊尋陽山賊上書曰除其竹木譬如嬰兒頭多蟣蝨而剃之蕩然蚤蝨無所復依書奏上大悅因出小黄門頭有蝨者皆剃之因謂之頭蝨章而應侯謂秦王曰王得宛臨陳陽夏斷河内臨東陽邯鄲猶口中蝨也王莽校尉韓威曰以新室之威而吞胡虜無異口中蚤蝨曹植著論亦曰得蚤者莫不摩之齒牙為害身也三人皆世所尊貴人也其言乃爾何故又物皆有蝨故淮南子曰牛馬之氣蒸生蟣蝨而莊子號豕蝨為濡需擇疏鬣自以為廣宫大囿奎蹄曲隈乳間股脚自以為安室利處卒與豕俱焦又虵鱗甲中亦皆有蝨云商子以小臣之害比之為蝨言微而不可不去也螻螻小蟲穴土中好夜出今人謂之土狗一名螻蛄一名碩鼠一名􅕪亦一名蟪蛄以孟夏鳴應隂之蟲其出入與蚓同時淮南子孟夏之月螻蟈鳴丘螾出盖四月隂氣始動于下故二物應之而鳴又螾亦隨出至冬則又隨盡揚雄法言所謂狐狸螻螾不膢臘也與是也螻與螾皆穴土以居冝於土者故黄帝以土徳王天下天先見大螻大螾黄帝曰土徳勝故其色尚黄其行則土然說文解螭云若龍而黄北方謂之地螻則未知黄帝時所見為何等也此物有神異故干寶記龎氏常祠螻蛄王逸九思云螻蛄兮鳴東茅􅝺兮號西以其應隂而鳴比小人也有五能而不能成其伎一飛不能過屋二縁不能窮木三泅不能渡谷四穴不能覆身五走不能絶人按荀卿稱螣蛇無足而飛梧鼠五技而窮謂鼯鼠飛生者爾說文稱鼫為五技之鼠則已别是鼠之一類而崔豹古今注又以此螻一名鼫鼠者當之三者不同未知孰是今螻翅小而短不能覆背飛去皆不逺又穴土而居常露於外以今所見則五技殆謂此也金中螻頂金最為上以六兩為一垜有卧螻蛄穴云夏小正三月􅕪則鳴蝍蛆蛇物之慘毒者螣蛇又蛇之神者而蝍蛆能制之故曰螣蛇游霧而殆於即且張揖廣雅云蝍蛆呉公也莊子曰蝍蛆甘帶司馬彪曰帶小蛇蝍蛆喜食其眼春秋考異郵曰土勝水故蝍蛆摶蛇宋均曰蝍蛆生於土蛇藏物屬於坎坎水也為隱伏也今蝍蛆忽見大蛇便縁而啖其腦或曰蛇虺見之而蟠伏蝍蛆當其前以施禁法蛇即為之開口蝍蛆入食其腸復穴其旁而出或曰大蛇過一圍者蝍蛆以氣禁之蛇即死矣蛇或遇之走匿水底蝍蛆但浮水上禁之人見有物正青大如綖者直下入水至蛇處須臾蛇浮出而死今南人入山者皆以竹管藏蝍蛆蝍蛆知有蛇之地輙動作於管中草中蛇虺無不驚竄又善嗅龍腥其生深山大枯木中者遇天將雨雲穿拂而度輙成羣争就最高處作挐空欲奮之狀今天台大木為雷所震者必有蝍蛆為雷火所燒死盖是龍惡此屬南方乃極有大者南越志云大者皮可以冒鼓肉曝為脯美於牛肉又云長數丈能噉牛里人遇之則鳴鼓然炬以逐之嶺南異物志云珠崖人每晴明見海中逺山羅列如翠屏而東西不定悉呉公也葛洪賦曰呉公大者長百步頭如車箱可畏惡屠裂取肉白如瓠稱金争買為羮脯是也而說者乃曰山東人呼蜘蛛為即且亦能制蛇郭璞以為即且似蝗大腹長角能食蛇腦許叔重又以即且為蟋蟀上蛇蛇不能動皆非也音釋蠭貞蟲淮南注無牝牡之合曰貞螫音失􅨥彌必切幂覆也亦作幎莫秋反窾音欵空也螸爾雅音俞謂垂其腴說文余足反䖟音盲蚊也果臝古火反蠮音噎螉於公反土蜂也晉慕容皝率騎出蠮螉塞煦呀句切烝也嫗威遇反禮記注以氣曰煦以體曰嫗祝職勑切詛也頭也或作呪併音餅竝也蠆且介反螯音敖蠍音歇蜥音析螫舒亦反憯音慘痛也猶與又作猶豫獸名性多疑蠚音壑亦作螫卷髪音拳曲也揵然上丘言反舉也髢音第髲也旟音余綢音儔髽側𤓰切去纚而紒曰髽縚吐刀切毋從從音緫謂太髙毋扈扈音户謂太廣鬌重垂反音與錘同蚊孑孒音吉厥噆音慘又子盍反蜹而銳反幬音儔禪幌㗱子立反麽亡果反么麽細小也睫音接伏扶富反蝱音盲蟁與蚊同蜚扶貴切一音非蝝音縁䗽以季反流黄石精出許注流黄土之精也隂氣作於下故流澤而出也石精五色之精蚤音早鴟尺夷反夜撮七括反瞋尺夷反又處辰反張也崔音眩本或作瞑撮蚤淮南子䲭夜聚蚤察分豪末許慎云鴟夜聚食蚤蝨不失也司馬本作蚉音文云䲭鵂鶹夜取蚉食崔本作爪云鴟鴞夜聚人爪於巢中也莊子音義蝨音瑟濡音儒需音須濡需謂偷安須臾之頃奎苦圭反曲隈烏回反股間也螻音樓蟪胡桂反􅕪音斛膢龍珠反又音留螭抽知反音􅍣􅝺音節泅音囚蝍蛆子余反音苴綖音延冠上覆挐女居反音帤或作拏爾雅翼卷二十六
