body:
  text: 欽定四庫全書爾雅翼卷二十七宋羅願撰釋蟲螢蜩蟻螱螓青蠅蒼蠅蜚螟蟘螢螢夜飛之蟲腹下有火腐草及爛竹根所化月令季夏之月腐草為螢又謂之丹鳥夏小正曰丹鳥羞白鳥丹鳥也者謂丹螢也白鳥也者謂蚊也其謂之鳥者重其養也凡有翼者為鳥羞者進也不盡食也此言螢食蚊蚋又今人言赴燈之蛾以螢為雌故誤赴火死然螢小物耳乃以蛾為雄以蚊為糧皆未可輕信月令則云羣鳥養羞而已豳詩稱熠耀宵行毛氏云熠耀燐也又解燐云燐螢火也蓋燐者兵死之血發為鬼火故曹植以為燐者鬼火之名非螢火說者徒以熠耀有可畏之語故以鬼火解之今曠野中螢乃甚大夏夜亂飛煌煌乃實有可畏之象故與鬼火同名後漢張讓假圭劫少帝及陳留王走小平津帝與王夜步逐螢火光行數里隋煬帝幸景華宫求螢火得數斛夜出游山而放之光遍巖谷二者均於亂亡而晉車武子好學家貧不常得油夏月則練囊盛數十螢火以夜繼日焉古今注一名暉夜景天夜光宵燭今有一種蟲如蛆尾亦帶火但無翼不飛名為蛆螢說文明堂月令曰腐草為蠲馬蠲也准南曰腐草化為蚈馬蚿也周書時訓大暑之日腐草為螢腐草不為螢穀實鮮落萬畢術螢火却馬蜩蜩蜋蜩螳蜩舍人云皆蟬方言楚謂蟬為蜩宋衛謂之螳蜩陳鄭謂之蜋蜩秦晉謂之蟬是蜩蟬一物方俗異名耳霓寒蜩郭璞曰寒螿也似蟬而小青赤引月令寒蟬鳴與詩鳴蜩不同者夏小正云五月螳蜩鳴七月寒蟬鳴是其異也二月鳴者名寧母似寒螿而小七月鳴者名蛁蟟色青考工記以旁鳴者蜩霓屬蟬鳴在脅淮南子曰蟬無口而鳴飲而不食三十日而蛻記曰范則冠而蟬有緌范蜂也爵鷃蜩范皆人君燕食所加庶羞荀子曰耀蟬者務在明乎火振其樹而已說者謂南方人照蟬取而食之莊子曰仲尼適楚出於林中見痀僂者承蜩猶掇之也論衡曰復育轉而為蟬枯蟬一名伏蜟董仲舒曰齊王之后怨王而死變為蟬故名齊女禮冠飾附蟬取其清髙飲露而不食也本草蚱蟬生楊柳上詩曰菀彼柳斯鳴蜩嘒嘒是形大而黑所謂馬蜩今夏中鳴者比衆蟬最大蚱蟬聲也又如蜩如螳言歡譁也毛氏曰螳蝘也舍人曰三輔以西為蜩梁宋以東謂蜩為蝘楚地謂之蟪蛄楚辭云蟪蛄鳴兮啾啾是也陸璣疏云螳一名蝘虭字林虭或作蟟青徐人謂之螇螰然則螳蝘亦蟬之别名耳楚辭蟬寂寞而無聲王逸注云螳蜩斂翅而伏藏也郭璞贊曰蟲之精潔可貴惟蟬蟻蟻大者俗呼馬蚍蜉夏小正十二月𤣥駒賁𤣥駒蟻也書蟻裳色𤣥蟻知將雨易林震之蹇蟻封穴户大雨將集齊桓公北征孤竹無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而下有水抱朴子曰蟻有兼弱之智關尹子曰師戰蟻置兵蟻通作蛾記曰蛾子時術之晉語曰蚋蛾蜂蠆皆能害人螱螱飛蟻蟻之有翅者蓋柱中白蟻之所化也白蟻狀如蟻卵凡斬木不以時木未及燥而作室或柱礎去地不髙則是物生其中以泥為房詰曲而上往往變化生羽遇天晏濕羣隊而出飛亦不能髙尋則脫翼藉藉在地而死矣魯宣公十五年冬蝝生劉歆以為蝝螕蚍蜉之有翼者食榖為災黑眚也其意以春秋下文書饑故因云食榖顧方冬而陽不收斂蟄蟲飛揚此自應有所傷害不必食榖而後為災也又董仲舒說蝗子也說者亦多以蝝為螽螟之類失之愈逺說苑曰蠧蝝仆柱蚊虻失牛螓螓蟭蟟之小而緑色者釋蟲云蚻蜻蜻舍人曰小蟬也青青者某氏曰鳴蚻蚻者孫炎曰方言有文者謂之螓郭氏曰如蟬而小有文其顙廣而方故碩人詩曰螓首蛾睂言碩人之美也古之選女者非特取其娥媌靡曼而已蓋必合之法相焉不邇窮困不近寒陋故曰角犀豐盈螓首者即角犀豐盈之謂也髙唐賦曰骨法多竒應君之相蓋言其相貌之美足以當國君於是而不見答此詩人所為閔矣夏小正曰鳴蚻虎懸今北人亦謂之螓又閩人謂大蠅為胡螓亦螓之類青蠅青蠅古以喻讒人以其所趨甚汙終日營營而不知止又為聲以亂人聽故以比然必言止于樊棘者鄭氏以為欲其遠之常限之藩籬之外此不然也夫物之逐臭者投隙而進豈能限絶蓋室之匽必植榛棘為藩以蔽之正蠅所宜集止耳說者又以青蠅㸃白為黑㸃黑為白自昔相𫝊如此歐陽公獨以為今之青蠅所汙甚微以黑㸃白猶或有之然其微細不能變物之色詩人惡讒言變亂善惡其為害大必不引以為喻至於㸃白為黑則未嘗有之據今青蠅之行好遺矢於物上遇物之潔者則見論衡曰清受塵白受垢青蠅所汙常在練素此所謂㸃白為黑也至於循繞研上引取墨汁斯須之頃盈寸白駮矣則所謂㸃黑為白者也二者為害雖微然傷物之全亂物之正實自此始正當謹以為戒也故法言或問蒼蠅紅紫曰明視以蠅變白黑紅紫亂朱故也君子之於讒也初蓋易之至於亂之又生而後君子信讒此詩亦然故首章但云毋信讒言至其二章則已交亂在外之四國至其三章則雖同心如我二人者亦不能以相有其始輕之而不忌皆如此蠅矣漢昌邑王賀夢青蠅矢積西階東可五六石以問龔遂遂亦勸放逐左側讒人而魏何晏夢青蠅數十來鼻端驅之不去管輅亦以為鼻者天中今蠅臭惡而來集之位峻者顛輕豪者亡詩人取喻豈虛乎哉蒼蠅蒼蠅蠅之潔者雅有青蠅風有蒼蠅蒼蠅比於青蠅而大其色蒼好集几案食飲上者是也齊詩曰匪雞則鳴蒼蠅之聲假成式以為蒼蠅聲雄壯青蠅聲清聒而埤雅亦云青蠅首赤如火背若負金蒼蠅又其大者肌色正蒼今俗謂之麻蠅假氏則以青蠅與蒼蠅交互言之陸氏言蒼蠅則非今雖有麻蠅一種然比此二種絶少又蠅之小者其色自蒼今人正謂之蒼蠅不待别引且詩以齊哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道宫寢之間懷茝握蘭之所豈大於青蠅者所宜集耶蜚蜚者負盤臭蟲也亦作蜰似䗪蟲而輕小能飛生草中八月九月知寒多入人屋裏逃春秋莊公二十九年有蜚劉歆以為負蠜也性不食榖食榖為災介蟲之孽其父向則以為蜚色青近青眚也非中國所有南越盛暑男女同川淫風所生為蟲臭惡莊公將取齊淫女為夫人故蜚至天戒以為將生臭惡聞於四方也說者以為蜚中國所有非南越之蟲未詳向所說蜚誠臭蟲今所在有之草間之物不必皆因男女同濫而生也向之論似不若歆之篤然歆言食榖為災者亦為未當今負盤好以清旦集稻上食稻花田家率以蚤作掇拾置他所至日出則皆散去不可得矣既食稻花又其氣臭惡能熯稻使不蕃春秋書之當由此爾今人謂之蜚盤蟲亦曰香娘子本草云蜚蠊螟古者言螟螣蟊賊者曰食苗心螟食葉蟘食節賊食根蟊耳乃未始的言其狀惟五行𫝊稱視之不明時則有螺蟲之孽謂螟螣之類當死不死未當生而生或多於故而為災聽之不明時則有介蟲之孽螽蜚蝝之類或曰蝝螟之始生屬螺蟲之孽然則但知螟螣之為螺螽蝝之為介而已今食苗心者乃無足小青蟲既食其葉又以絲纒集衆葉使穗不得展江東謂之蟥蟲音若橫逆之橫言其橫生又能為橫災也然按蝗字通有橫音以為物雖不同皆害稼之屬也漢孔臧蓼蟲賦曰爰有蠕蟲厥狀似螟是螟為無足蟲也淮南子曰枉法令則多蟲螟蟘食葉曰蟘又曰食榖葉曰螟食苗葉曰蟘蟘之字又作螣其種類不一故曰百螣時起許氏以為百螣動股蝗屬也時起害稼動股則阜螽阜螽則今蝩之庸切顔云蟲也劉向以為介蟲之孽春秋書螽在秋者四在八月者三在九月十月者一在十二月者二惟十二月者乃是失閏之過其餘八月九月十月者蓋夏之六月七月八月也螽類羣盛故有雨螽于宋言自上而下衆多之甚故以雨言之今蝗之盛或蔽天其過河皆相銜而過亹亹不絶詩曰后妃子孫衆多言若螽斯螽斯羽詵詵兮宜爾子孫繩繩兮此之謂也說文螟蟲食榖葉者吏冥冥犯法則生螟蟘蟲食苗葉者吏乞貸則生蟘京房易𫝊曰臣安祿兹謂貪厥災蟲食根德無常兹謂煩蟲食葉不絀無德蟲食本與東作爭兹謂不時蟲食節蔽惡生孽蟲食心王充論衡曰變復之家謂蟲食榖者吏貪狼所致也蟲頭赤者武官黑者文吏按蟲頭赤身白頭黑身黃復應何官耶說文蝗螽也考工記股鳴蚣蝑動股屬音釋螢燐音吝綀音疏蛆子余反馬蠲音涓蚈音牽螢火又古奚切蚿音賢馬蚿蟲百足蜩蜋蜩夏小正𫝊曰蜋蜩者五色具螳蜩夏小正𫝊曰螳蜩者蝘俗呼為胡蟬霓音倪蛁蟟上貂下聊蛻音稅蛻皮又他外反緌音㽔系冠纓痀於禹反僂音縷掇丁活反拾也承蜩謂以膠竿黏蟬下云五六月者黏蟬時也蚱莊額切菀音鬱蝘音偃螇胡雞反螰力木反蟻魚起反蚍蜉音毗浮𤣥駒賁音奔夏小正𫝊賁者何也走於地中也古今注河內人見馬數十萬騎大如黍米以火燒之馬皆成蟻故呼蟻曰𤣥駒螱音尉蝝音緣眚所景切螓音秦蚻音札靡曼謂柔弱者列子注媌音茅美好也好而輕者謂之娥虎懸夏小正鳴蚻蚻者虎縣也縣音𤣥青蠅匽音偃駮音剝蜚音費蜰音肥䗪音柘負蠜音煩同濫盧瞰切莊子同濫而浴注浴器熯音漢螟音冥螣音特蟊音謀螺音裸蠕音軟蟘音特雨去聲絀亦作黜注蚣蝑上音嵩下音胥爾雅翼卷二十七
