body:
  text: 欽定四庫全書爾雅翼卷三十一宋羅願撰釋魚龜攝龜鼈能黿鼇鼉蟹鱟螺貝蜃蛣龜靈龜文五色似玉似金背隂向陽上隆象天下平法地槃衍象山四趾轉運應四時文著象二十八宿蛇頭龍翅左精象日右精象月千歳之化下氣上通能知存亡吉凶之變寧則伸伸如也動則著矣龜以靈著故千年之龜游於苓葉之上苓今甘草也葉圓小而有刺言龜乆而神靈能變形大小也今人見小龜以為千歳則失之矣逸禮曰龜三千歳上游於卷耳之上龜有緑毛金綫之屬種類極多古者黄目為鬱氣之上尊漢儒以為黄者中也目者氣之清明者也言酌於中而清明於外今禮圖但為人目而黄之禁中尊乃作龜形其上方悟黄目者乃龜也若為人目而黄之黄乃目病爾前賢之説如此然古者又多作饕餮形於器之上饕餮亦黄目則未知其審爾淮南子曰清水宜龜故禹貢九江納錫大龜大業拾遺記曰梁郡有清泠淵水面濶二里許即衛平得大龜之處論衡引孔子曰龍食於清游於清龜食於清游於濁魚食於濁游於清丘上不及龍下不為魚中止其龜歟淮南子曰觀九鑚一許氏曰九九天一龜也公羊𫝊龜青純千歳之龜青髯明于吉凶説文龜頭與它頭同天地之性廣肩無雄龜鼈之類以它為雄龜甲邊也天子巨尺有二寸諸侯尺大夫八寸士六寸周書伊尹請正西以神龜為獻攝龜十龜三曰攝龜郭氏曰小龜也腹甲曲折解能自張閉好食蛇江東呼為陵龜盖今之呷蛇龜是也小狹長尾腹下横折見蛇則呷而食之多在陸地亦能登木甚腥臭乃言療蛇毒以其食蛇故也按大腰純雌細腰純雄故龜與蛇為牝牡龜之性妬或遇雌蛇相趂鬭噬力小者或至斃然既相交而復相噬理之不可曉者一名􅦄龜一名蠳龜抱朴子曰南人帶蠳龜之尾以辟蛇考是其事此龜在十龜之數然陶隠居言用以卜則吉凶正反未知其審陳無宇之卜母病而龜焦臧氏卜信僣而僣吉非此龜也耶瑇瑁龜類也出廣南身似龜首觜如鸚鵡腹背甲皆有紅㸃斑文大者如盤應劭曰雄曰瑇瑁雌曰觜蠵又有􅔢鼊其形如笠四足縵胡無指其甲有黒珠文采如瑇瑁可以飾物今人謂之鼊皮又􅡷􅠦與􅔢鼊相似伊尹請正南以瑇瑁為獻鼈鼈卵生形圓而脊穹四周有帬在易離為鼈為蟹為龜以其骨在外肉在内也至考工記則以外骨為龜之屬内骨為鼈之屬以鼈外有肉縁比龜為内骨爾一名神守陶朱公養魚之法以六畆地為池求懷子鯉魚長三尺者二十頭牡鯉四頭以二月上庚日納池中至四月納一神守六月納二神守八月納三神守所以納鼈者魚及三百六十則蛟龍為之長而將魚飛去納鼈則魚不復去按此以六神守守鯉乃不可曉淮南子曰鼈無耳而目不可以瞥精於明也豈絶其一原視得精專而善司察歟又道家以鼈為厭豈厭之使不得靈歟淮南子曰蛟龍伏寢於淵而卵剖於陵許氏曰蛟龍鼈類豈蛟龍得其類則不去也古者言龜蛇相為牝牡今鼈與蛇亦相須深沙穴中往往多有蛇與鼈同處者鼈暮出取食跡在沙上蛇輙出為泯滅之人伺知之往往反以是得之周禮天官鼈人以時簎魚鼈龜蜃凡貍物春獻鼈蜃秋獻龜魚莊子亦稱公閱休冬則擉鼈于江今人乃有以蝦釣者淮南子曰魚鼈不動不擐脣喙是亦釣也崔豹古今注烏賊一名河伯白事小史龜一名黒衣督郵鱉一名河伯從事盖皆因其象似者以為名如古稱清江使者東海波臣之屬周書王㑹長沙鼈能能鼈之三足者山海經曰從山上多三足鼈今呉興郡陽羡縣君山上有池池中出三足鼈盖自是一種故魁下六星兩兩而比者曰三能取此象也昔晉侯寢疾夢黄能入于寢門以為厲鬼子産稱堯殛鯀于羽山其神化為黄能以入于羽淵說者亦以為三足鼈若從賢能之能讀之則能乃獸名熊屬鹿足不當入淵中也今祭禹廟不以鼈及能白盖兩避之王子年拾遺記乃稱鯀自沉於羽淵化為𤣥魚𤣥魚與黄能音相亂傳寫文字鯀字或魚邊𤣥也説文又稱蜮似鼈三足以氣射害人豈亦能之類耶江賦有鼈三足有龜六眸黿黿鼈之大者濶或至一二丈天地之初介潭生先龍先龍生𤣥黿𤣥黿生靈龜靈龜生庶龜凡介者生於庶龜然則黿介蟲之元也天地之性細腰純雄大腰純雌故龜鼈之類以蛇為雄列子亦云純雌其名大腰純雄其名穉蜂今黿亦大腰乃復以鼈為雌故曰黿鳴鼈應蜀都賦曰其深則有白黿命鼈是也白是其類之異者故九歌河伯之章云乗白黿兮逐文魚白黿豐背而有力乗之以見其安文鰩有翼而善飛逐之以見其輕周穆王巡狩東至九江亦稱駕黿鼉為梁驅八駿過之其懸感殆未可臆度如晉毛寳過江白龜載之而度是亦異矣卵大如雞鴨子一産三百枚人亦掘取以鹽淹之古者楚人獻黿於鄭靈公其臣食指動以為必甞異味是古亦不常有也黿好自曝其腹於江岸漁人伺其便接竹以釣掣之倉卒不能自反為人所制月令季夏命漁人伐蛟取鼉登龜取黿蛟有兵衛故伐之龜靈可尊故登之黿鼉取之而已其在星象自婺女八度至危十六度曰𤣥枵之次一曰天黿齊景公濟河黿銜左驂以入砥柱之上流古冶子潛行逆流百步順流九里得黿而殺之左操馬尾右掣黿頭鶴躍而出鼇鼇巨龜也𤣥中記云列子稱渤海東大壑中有岱輿員嶠方壺瀛洲蓬萊五山其山高下周旋三萬里仙聖之所往來而五山之根無所連著常随潮上下往還不得蹔峙帝命禺彊使巨鼇十五仰首而戴之迭為三畨六萬歳一交焉五山始峙而不動龍伯之國有大人一釣而連六鼇合負而趣歸其國灼其首以數焉於是岱輿員嶠二山流於北極沉於大海仙聖之播遷者巨億計按大荒經北極之神名禺彊靈龜為之使今使鼇戴山必命禺彊又灼其首以卜則鼇之為龜無疑者然所負之山以三萬里而所負之期以六萬歳此所以極巨細脩短之辨也天問曰鼇戴山抃何以安之抃者兩手相擊也言鼇以首戴山儻用前兩手相擊則山上之仙聖何以安乎列仙𫝊曰鼇負蓬萊山而抃滄海之中鼇之性好抃樂故今稱好樂者為鼇頭又女媧斷鼇之足以立四極亦豈以其抃故耶説文海大鼈也鼉鼉狀如守宫而大長一二丈灰五色背尾皆有鱗甲如鎧能吐霧致雨力尤酋健善攻碕岸夜則出邊岸人甚畏之聲亦可畏性嗜睡目常閉大者自嚙其尾極難死人於穴中掘之百人掘即須百人牽一人掘亦須一人牽不然終不可出其老者多能為鬽梁周興嗣常食其肉後為鼉所噴便為惡瘡其肉云白如雞其皮堅厚宜以冐鼓詩云鼉鼓逢逢李斯亦云樹靈鼉之鼓是周秦皆以冐鼓也又鼉枕可為用勝於魚枕鼉水族本草謂之鮀魚是也周書王㑹曰㑹稽以􅥜蟹蟹八跪而二敖八足折而容俯故謂之跪兩敖倨而容仰故謂之敖字從解者以随潮解甲也殻上多作十二㸃深燕脂色如鯉之三十六鱗其腹中虛實亦應月淮南子曰蛤蟹珠龜與月盛衰以臍大小為雄雌雄曰蜋螘雌曰博帶此據廣雅云廣韻則云䱺雄蟹也其種類甚多蝤䗋大者長尺餘兩强八月能與虎鬭擁劒一螯大一螯小以大者鬭小者食其大而有虎斑文随波堙淪者名虎蟳小如蟚蜞殻白見潮欲來出穴舉螯迎之者名招潮随潮退殻潮退徐行泥中者名攤塗在蠣殻中為蠣取食者名蠣奴又有蟚蜞倚望倚望如彭蜞青色進輙舉兩螯以望竭朴沙狗蘆虎之屬大抵皆蟹之族蟹始穴於沮洳秋冬之交稻熟時必大出各執一穗以朝其魁然後從其所之晝夜觱沸望江而奔既入于江則形質大於舊自江復趨海如赴江之狀入海益大海人亦異其稱謂矣或曰持稻以輸海神今腹内八月有芒長寸許者此稻芒也開腹中猶有海水春秋外𫝊曰呉稻蟹不遺種月令亦曰介蟲敗榖然則持稻穗是其常惟至於敗榖與不遺種然後為異漁人取者即江與海之道緯蕭承流而障之竭朴大於蟚螖黒斑有文章以大螯障目屈小螯食沙狗似蟚螖壤沙為穴見人則走不可得蘆虎似蟚螖兩螯正赤不可食數丸似蟚蜞競取土作丸滿三百而潮至皆南海之物也今岳陽蟹大而殻少軟漁人得之以為厭故諺曰網中得蟹無魚可賣近歳始珍食之周書王㑹海陽大蟹禮庖人共祭祀之好羞注謂若荆州之䱹魚青州之蟹胥考工記仄行蟹屬今人謂之旁蟹鱟鱟形如惠文亦如便面惠文者秦漢以來武冠也侍中中常侍則加金璫貂蟬之飾謂之趙惠文冠便面古扇也背黒而穹張敞所用以拊馬者今號温涼扇大抵鱟色青黒十二足足長五六寸悉在腹下舊説過海輙相負於背髙尺餘如帆乗風遊行今鱟背上自有骨髙七八寸如石珊瑚者俗呼為鱟帆又其衆如􅑉栰名鱟􅑉大率鱟善候風故其音如候也其相負則雌常負雄雖風濤終不解故號鱟媚失雄則不能獨活漁者取之必得其雙故呉都賦云乗鱟黿鼉同罛共羅乗言相乗也亦古語以偶為乗如乗禽乗鴈之屬腹中子無數如麻子或云亦罅裂而生未知其審今閩浙重鱟子醬其珠如粟南人或帶或磨飲之云利市殻可以為冠次於白角亦屈以為杓轑釜輙盡又取其尾為小如意蠃蠃附殻而行種類甚多生水田中者差大惟食青泥生溪澗中者絶小食苔而絜淮南子曰古者民茹草飲水采樹木之實食蠃蛖之肉時多疾病毒陽之害於是神農乃始教民播種五榖甞百草之滋味水泉之甘苦然至成周時祭祀猶供之職在鼈人所謂蠯蠃蚳是也鄭氏以蠃為螔蝓然郭氏解爾雅蚹蠃螔蝓乃以螔蝓為蝸牛則非所當供鄭自以為常蠃耳古又以為飾當夏至之日隂氣萌作恐物不楙故歴代各以所尚為門户飾以難止惡氣夏后氏金行作葦茭言氣交也商人水徳以螺首謹其閉塞使如蠃也周人木徳以桃為梗言氣相更也漢兼用之或曰公輸般見蠡出頭潛以足畫之蠡引閉其户終不可開因傚之設于門户欲使閉藏當如此固宻也今門户猶以蠃為鋪首古之遺制蠃之為量小故𫝊曰以蠡測海言不能極其量也外國多吹蠃林邑蠻吹之以即戎其生日南漲海中者大如斗可為酒杯又有鸚鵡螺形如鳥觜云見之者不利以為杯則謂之鸚鵡杯今閩海中有紅螺㣲紅色亦可為杯香螺揜可雜甲香鈿螺光彩可飾鏡背蓼螺味辛如蓼紫背螺紫色有斑㸃號砑螺即紫貝是也相貝經赤電黒雲謂之紫貝螺亦視月而盈虧故論衡云月毁於天螺消於淵蠃古字通於蠡今惟作螺貝古者貨貝而寳龜周則有泉至秦廢貝而行錢故釋魚於貝之名色尤詳而古者貨賂貢賦賞賜凡屬於貨者字皆從貝也至王莽反漢猶以貝四寸八分以上至寸二分為五品故有大貝牡貝么貝小貝之名不盈六分不得為貨今大貝出日南漲海中可以為酒杯盖貝之在水者即蠃之小者也今此物等既不復為貨晉宋間猶以飾軍容服物盖魯頌稱戎服之盛有貝胄朱綅則以貝為飾舊矣東方朔稱齒如編貝盖用以為飾必編之故也今但髰頭家用以飾鏡帶耳大者為珂黄黒色其骨白可以飾馬盖此等飾非特取其容兼取其聲故說文􅩏貝聲也書大貝在西房詩錫我百朋散宜生得大貝百朋獻於紂荀子東海有紫紶漢文時南越獻紫貝江賦曰紫蚢如渠蜃蜃大蛤也冬月雉入水所化盖雀入淮為蛤雉入海為蜃比雀所化為大故稱大蛤也上古之世剡耜而耕摩蜃而耨摩其殻使利以去苗穢後世耒耜耰鉏之用備故但薦其味且以為飾天官鼈人掌取互物以時簎魚鼈龜蜃凡貍物春獻鼈蜃秋獻龜魚盖以杈刺泥中搏取之地官掌蜃則掌歛互物蜃物以共闉壙之蜃祭祀共蜃器之蜃共白盛之蜃盖天官薦其味地官致其用闉壙之蜃則未施椁前先施蜃灰於椁下以禦濕盖天子之禮春秋宋文公始厚葬用蜃炭是也蜃器之蜃鄭司農以為蜃可以白器令色白盖謂以灰飾之云爾至後鄭解鬯人山川四方用蜃則以蜃為漆尊畫為蜃形盖以蚌名含漿有尊之象則與先鄭所說蜃器不同蜃雖無可觀然其吐氣象樓臺海中春夏間依約島溆常有此氣所為畫者當兼取此氣以為飾如其餘尊罍畫雲雷之比儻特畫之而已不用以為飾則掌蜃之職不當歛而共之特司農以為白器令色白者亦似未當盖剸殻錯入器中合為文彩如今所謂螺鈿器之類禮佩刀天子玉琫而珧珌士珕琫而珧珌許叔重以為珧蜃甲所以飾物珕蜃屬是裁其甲為飾也器既以蜃飾名蜃其所薦以祭社者肉亦名脤所謂歸脤以交諸侯之福者也白盛之蜃則飾牆使白鄭氏稱東萊謂之义灰以其义取得之今猶以為粉飾面謂之蛤粉又有珠可取然則一微物肉可以薦殻可以飾器灰可闉壙飾牆壁又有珠為用多矣故齊景公置祈望之官以守鹽蜃專百姓之利不特鼈人以時取之而已然蜃即蛤也後鄭乃引蚌含漿以為說而郭氏解爾雅復以蚌含漿為蜃蜃小者珧珧即小蚌則轉與蛤不相類唯陳藏器稱車螯是大蛤一名蜄與古説合而今之説者别以蜃為龍蛇之類有耳有角背鬛皆紅則與古異學者所不道山海經臯水東注激女水其中多蜃珧周書王㑹東越海蛤且甌文蜃説文蛤有三皆生於海千歳燕化為􅧳秦謂之牡厲又云百歳燕所化魁􅧳一名復累老服翼所化脩為螷圜為蠇蛣蛣蚌也長一寸廣二分大者長二三寸腹中有蟹子如榆莢合體共生時出取食復入殻中一名璅蛣江賦曰璅蛣腹蟹水母目蝦㣲物之相為用有如此者何必齧甘之獸迭望之民乎抱朴子曰伐木而寄生枯芟草而兎絲萎川蟹不歸而蛣敗桑木見斷而蠧殄然則蛣盖恃蟹以為命不可一日無也漢㑹稽鄞縣有鮚埼亭埼曲岸也中多此物故以為名然南越志稱蟹子合體共生俱為蛣取食似是二蟹而顔師古以為有一小蟹在腹中則為不同海物異名記謂此為蠣奴又北户録稱海上有小蟹大如錢腹下又有小蟹附之如榆莢名曰蟹奴然則附蛣者名蠣奴附蟹者名蟹奴皆附物而為之役故以奴名之段成式又言寄居蟲殻似蝸一頭小蟹一頭螺蛤也寄在殻間常候螺開出食螺欲合遽入殻中則小蟹又有附螺者至陳藏器解寄居蟲附螺與叚同但不言是蟹又云南海有一種似蜘蛛入螺殻中負殻而走亦呼寄居以此知物産之不可窮盡也說文漢律㑹稽郡獻鮚醬音釋龜注如占切它俗作蛇攝龜音輙十龜神龜靈龜攝龜寳龜文龜筮龜山龜澤龜水龜火龜詳見爾雅呷呼甲切吸也􅦄烏郎切郭景純江賦注初寧縣多􅦄龜形薄頭啄似鵞指爪蠳纓南都賦其水蟲則有蠳龜鳴虵抱朴子曰蠳龜噉蛇注觜蠵上音資下弋規反􅡷􅠦音迷麻江賦注與􅔢鼊相似形大如䕠生乳海邊白沙中肉極好中啖􅔢古侯切鼊音壁鼈帬裙肉縁俞絹切詳見周禮疏瞥匹蔑切過目也又目醫也一曰瞥然暫見貍莫皆切擉測角切禮作簎擐音患貫也能囊來切三能周禮春官司中注三階也能音台鼇連著直畧切禺强禺與隅同列子注神仙傳曰北方之神山海經大荒之中有神人面鳥身曰禺强合負趣歸合并而負之趍走以歸其國畨音翻以數焉數所據切鑚其骨以為占卜之具也抃音卞女媧音𤓰列子注古天子風姓鼉鎧音愷甲之别名碕音奇曲岸也鬽或作魅逢逢音蓬鼓聲蟹䱺户來切蝤䗋猶牟蟚螖彭滑好羞上所報切注雖非常物進之孝也䱹側雅切蟹胥息徐反劉音素蟹醬也鱟音候􅑉音牌大桴栰音伐乘鱟去聲罛音孤轑釜音牢撓也漢楚元王傳陽為羮盡轑釡注以勺轉釡令為聲蠃與螺同轢蛖音厖蠯薄佳反又父幸反蚳直其反蛾子螔蝓上音夷下音由又音俞蚹音附難乃多反鈿音電砑音訝碾也貝博盖切朱綅音侵絳綫也珂丘何切􅩏蘇果切注紶音刼蚢音岡蜃音腎又時刃切蛤音閤簎勑角反貍音埋杈音义搏音博闉猶塞也白盛注盛猶成也謂飾牆使白剸㫖兖切細割也琫并孔切佩刀飾也珕禮記註音如厲生蠣之屬脤音蜃珧音姚􅧳今文作蛤且甌本作東甌注蠇與蠣同蛣音結一音挈璅本作𤨏鄞音垠爾雅翼卷三十一
