body:
  text: 欽定四庫全書爾雅翼卷六宋羅願撰釋草蘋芡䔖􅙛蘧蔬鳬茨薯藇芋蒻薑葑葖堇藜藋蘋蘋蓱其大者蘋葉正四方中拆如十字根生水底葉敷水上不若小浮萍之無根而漂浮也故韓詩曰沈者曰蘋浮者曰薸薸音瓢即小萍也蘋亦不沈但比萍則有根不浮游爾五月有花白色故謂之白蘋吕氏春秋曰菜之美者崑崙之蘋萍焉陸璣詩義疏曰可糝蒸為茹又苦酒淹以就酒采蘋之詩大夫妻所以承先祖共祭祀故采蘋於南澗之濱又采藻菜於行潦而享之鄭箋曰問蘋藻者於魚湆之中是鉶羮之芼古者婦人將嫁三月教以四德教成之祭牲用魚芼之以蘋藻蘋藻水物與魚相宜如㑹膳食者魚則宜苽皆水物所以明婦順也亦蘋之言賓藻之言澡柔順潔清取以為戒左傳曰茍有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公蘋之極大者則有實楚王渡江有物觸王舟其大如斗而赤食之而甘孔子以童謡決之曰萍實也雖皆萍之類然實蘋矣非無根者所能生也又天問曰靡蓱九衢言其枝葉分為衢道猶今言花五出六出也靡蓱九衢異方之物故特奇偉今浮萍三衢蘋雖大四衢而已九衢而大於蘋則亦大蘋非特萍也又本草稱水萍亦謂此物陶隱居云非今浮萍子此三事皆得萍名而實蘋也故詳著之使覽者無惑焉說文薲大萍也芡芡雞頭也幽州人謂之鴈頭葉如荷而大葉上蹙衄如沸有芒刺兼有觜若雞鴈之頭又名鴈喙實內有米圓白如珠久食宜人說者曰與小兒食不能長大故駐年或曰芡實蓋溫平耳然食之必枚食而細嚼足以致上池之津故能益人猶如馬齧短草則肥恱今芡與菱皆水物而性異芡華向日菱華背日其陰陽向背不同故損益亦不同也周禮亦以為加籩之實龔遂為渤海太守勸民冬益蓄果實菱芡淮南子曰雞頭已瘻許叔重以雞頭為水中芡愈頭之疾案上下文狸頭愈鼠雞頭已瘻虻散積血斫木愈齲此類之可推者詳書本意皆謂此禽蟲平日所啄食故能治此病類可推尋雞頭似不謂此然或當亦能已瘻爾此物水草陂澤多有陶隱居乃云此即今蒍子形上花似雞冠故名雞頭雞冠乃陸草長五六尺幹葉皆紅其華正紅狀如雞冠何預芡耶莊子雞壅疏云雞頭草也服之延年韓文公詩鴻頭排刺芡陳士良云有軟根名䓈菜䔖䔖生水中實兩角或四角一名芰古者嘉籩之實菱芡㮚脯䔖芡㮚脯再言之者兩設之盛禮乃用焉楚令尹屈到嗜芰且死以為屬及祥將薦而屈建去之其說引祭典君大夫士庶人有牛羊豚犬魚炙之差籩豆脯醢則上下共之不羞珍異不陳庶侈於是乎有羊饋而無芰薦君子曰違而道蓋籩豆脯醢雖上下所共然以多少為差則珍異庶侈者非大夫所宜昔者季武子聘晉晉侯享之有加籩辭曰寡君猶不敢請徹加而後卒事則非屈到所宜薦明矣芰以為加籩則為貴者所珍用以接糧則為賤者所食朱厲事莒穆公不見識焉冬處於山林食杼栗夏處洲澤食菱藕以愧穆公菱葉覆被水上其花黃白色其實餌之可以斷榖古者洲澤之利與民共之吳楚之風俗當菱熟時士女相與采之故有采菱之歌以相和為蘩華流蕩之極招魂云涉江采菱發陽阿陽阿者采菱之曲也淮南曰欲學謳者必先徴羽樂風欲美和者必先始於陽阿采菱許叔重曰陽阿采菱樂曲之和一曰陽阿古之名俳善和者蓋采菱者衆所共故取節奏宜和為曲以與衆樂之風俗通曰殿堂象東井形刻為荷菱荷菱皆水物所以厭火也又昔人取菱花六觚之象以為鏡離騷曰製芰荷以為衣兮集芙蓉以為裳蓋芰葉雜遝荷葉博大有為衣之象而芙蓉若可緝者也古者士服𤣥衣纁裳屈原恐進而遇禍故退修初服初服則士服耳芰荷緑色有𤣥之象芙蓉朱色似纁故反離騷曰襟芰茄之緑衣被芙蓉之朱裳也原之始而結茞貫薜也已曰願依彭咸之遺則然此佩之小者又皆陸草衣者身之章也用以自表而皆取水物焉則其從彭咸也審矣彭咸商之介士不得其志投江而死者也至王褒九懷云紅采兮騂衣翠縹兮為裳則與此取象不類子虛賦外發夫容䔖華說文楚謂之芰秦謂之薢茩􅙛􅙛海薻郭璞曰藥草也一名海蘿如亂髮生海中按陶隱居稱海薻生海島上黑色如亂髮而大少許葉大都似藻葉陳藏器則有馬尾藻大葉藻二種之辨馬尾藻生淺水如短馬尾細黑色大葉藻生深海中及新羅葉如水藻而大爾雅云綸似綸組似組正謂二藻也夫綸組東海有之蓋綸乃有秩嗇夫所帶紏青絲綸楊子所謂五兩之綸半通之銅者也組綬也海中草生采理有象之者因以名云然則馬尾藻為綸大葉藻為組矣馬尾藻細黑色與陶郭所謂亂髮者相符然吳都賦叙水草有江蘺海苔綸組紫菜石帆水松之屬其類甚多江蘺似亂髮海苔亦云狀如亂髮則水草之似髮者蓋已多此既以海藻為名當如常藻而稍異大葉藻其是歟海人取大葉藻正月深海底以繩繫腰沒水下刈得旋繫繩上五月已後當有大魚傷人不可取也然本草稱海藻一名藫而釋草藫石衣􅙛海藻相異既云主結氣癭瘤則又是大葉藻云一名藫者非也蘧蔬出隧蘧蔬郭氏曰蘧蔬似土菌生菰草中甜滑今江東啖之菰蔣草也江南呼為茭草根久盤厚則夏月生菌菌即謂之菰菜利五臟雜鯉為羮吕氏春秋曰菜之美者越駱之菌則古者重之久矣荆楚嵗時記九月九日事中稱菰菜地菌之流作羮甚美鱸魚作膾白如玉一時之珍張季鷹在洛忽思吳中鱸魚菰菜請假而反斯之謂也此明亦用菰菜芼鱸羮今說者或云翰所思是蓴菜恐不然爾說文曰菰葑也葑即謂此菌然非詩所謂葑菲者陳藏器乃云菰葑上如菌葑是菰根歲久浮水上者今菰首亦佳蔬可食别見苽中鳬茨鳬茨生下田中苗似龍鬚而細根似指頭黑色可食名為鳬茈當是鳬好食之爾又有一種根苗似鳬茈而白亦生下田中葉有兩岐如燕尾又如翦刀開白花三出名為茈菰本草云藉姑今人亦謂之翦刀草其生陂池中者高大比於荷蒲然其味稍苦不及鳬茈之美茈菰種水中一莖收十二實嵗有閏則十三實今黃楊嵗長一寸遇閏年則否牡丹者遇閏嵗花輒小以此知先王之正時歸餘於終非意之也鳬茨在爾雅一名芍漢長安有蓮芍說者讀為輦酌未必不以此地生蓮與芍而名之也東觀漢記曰王莽末南方枯旱民多餓羣入野澤握鳬茨而食之薯藇山海經曰景山北望少澤其草多薯藇郭璞曰根似芋可食今江南人單呼薯語或有輕重耳按薯藇二字或音如儲余范蠡計然曰儲餘本出三輔白色者善是也或音如署預本草署預味甘溫是也唐代宗諱預故呼署藥至本朝又諱上字故今人呼為山藥一名山芋秦楚名玉延鄭越名土薯今近道處處有根既入藥又復可食人多掘食之以充糧異苑曰若欲掘取默然則獲唱名便不可得人有植之者隨所種之物而象之古者因藥物之性分為君臣佐使以相攝故其合和有一君二臣三佐五使或一君三臣九佐使至如諸芝使署預署預復使紫芝豈所謂兩賤相使者耶芋芌說文曰大葉實根駭人故謂之芌徐鍇曰芌猶驚辭故曰駭人又曰齊謂芌為莒按孝經援神契曰仲冬昴星中收莒芋陶隱居乃云種芋三年不採成梠芌然則芌之與莒本同末異耳卓王孫有云吾聞岷山之下沃野下有蹲鴟至死不饑詳其始意本謂壤土肥美粒米狼戾鴟鳶下啄因蹲伏不去耳而前世相承謂蹲鴟為芋言蜀川出者形圓而大狀若蹲鴟云芋或訛作羊故南朝有謝人饋羊者以蹲鴟為言顔之推記之以訓子孫唐開元中蕭嵩奏請注文選東宫衛佐馮光進解蹲鴟云今之芋子即是著毛蘿蔔嵩聞大笑又芋之大者前漢謂之芋魁後漢書謂之芋渠渠魁皆言大也廣志又言有君芋車轂芋等凡四種大如瓶葉如繖蓋緗色紫莖長丈餘易熟長味芋之最善者也有百果芋畝收百斛又有百子芋凡為十四種而本草唐本注有青芋紫芋白芋等凡六種青芋毒多須灰汁易水煮熟乃堪食紫芋正爾蒸煮食之白芋等兼肉作羮大佳野芋大毒不堪噉也翟方進為丞相時奏壞鴻隙大陂民追怨之而為歌言壞陂之後五榖不登但為下澤飯豆羮芋食之薄者也而袁安為陰平長時年饑租入不畢安聽使輸芋曰百姓饑困長何得食榖先自引芋吏皆從之汝南薛包歸先人冡側種稻芋稻以祭祀芋以充饑而蜀李雄克成都衆甚饑餒乃將民就榖於郪掘野芋而食之則芋之利厚矣蜀都賦稱瓜疇芋區汜勝之書區種芋法區收三石博物志曰野芋食之殺人家芋種之三年不收後旅生亦不可食此即陶隱居所謂梠芋也本草芋一名土芝蒻蜀都賦曰其園則蒟蒻茱萸劉淵林曰蒟蒟醬也緣木而生其子如桑椹熟時正青長二三寸以蜜藏而食之辛香溫調五藏又解蒻云蒻草也根名蒻頭大者如斗其肌正白以灰汁煮則凝成可以苦酒淹食之蜀人珍焉則是蒟與蒻為二物而本草蒻頭味辛搗碎以灰汁煮成餅五味調和為茹食生吳蜀一名蒟蒻是蒟蒻為一物耳今人相㳂亦呼蒟蒻又有班杖苗相似至秋有花直出生赤子根如蒻頭毒猛不可食崔豹古今注乃云為班杖不知食之漢書南粵食唐䝉蜀拘醬顔注云子又不長二三寸薑說文曰䕬禦溼之菜也春秋運斗樞曰璇星散為薑舉無失德逆時則薑有翼辛而不臭薑生於陰故蜀都賦曰甘蔗辛薑陽蓲陰敷宋玉曰薑桂因地而生不因地而辛女因媒而嫁不因媒而親古者諸侯燕食所加三十一物有牛鹿田豕爵鷃蜩范菱椇棗栗之屬而終於薑桂而孔子亦不徹薑食言齊雖禁葷物薑辛而不臭故不徹去之非特齊也喪有疾飲酒食肉必有草木之滋焉以為薑桂之謂也南都賦曰蘇蔱紫薑拂徹羶腥蓋去羶腥之最紫薑者紫色之薑而上林賦又有茈薑張揖則以茈薑為子薑云魏志倭國有薑不知為滋味而梁代裴子野言從來不食薑或譏之云孔稱不徹裴乃不嘗又何異也吕氏春秋和之美者陽朴之薑招搖之桂越駱之菌吳孫權使介象買蜀薑作虀管子曰五位之土羣藥安生薑與桔梗小辛大䝉葑谷風曰采葑采菲無以下體毛氏曰葑須也菲芴也下體根莖也箋云此二菜蔓菁與葍之類也皆上下可食然其根有美時有惡時采之者不以根惡時并棄其葉據鄭此注則以葑為蔓菁之類菲為葍之類耳至解桑中曰爰采葑矣沫之東矣則曰葑蔓菁禮記坊記注亦云葑蔓菁也陳宋之間謂之葑陸璣云葑蕪菁幽州人或謂之芥方言曰蘴蕘蕪菁也陳楚謂之葑齊魯謂之蕘關西謂之蕪菁趙魏之部謂之大芥蘴與葑字異而音同則葑也須也蕪菁也薞蕪也蕘也芥也七者一物也蔓菁南北通有之北土種之尤多四時仍有春食苗夏食心秋冬食根菜中之最有益者塞北并汾河朔間燒食其根呼為蕪根猶是蕪菁之號昔漢桓帝永興中令災傷郡國皆種蔓菁以助民食劉備歸曹公公使覘之閉門將入種蔓菁而諸葛亮所止令軍士獨種蔓菁者取其才出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回則易尋而採之五也冬有根可斸而食六也三蜀江陵之人今呼為諸葛菜蔓菁根葉及子乃是菘類與蘆蔔全别陶隱居言其子與蘆蔔子相似兼言小葷故說者疑江表不産注失其真耳有人將菘菜北種初一年半為蕪菁二年菘種都絶將蕪菁子南種亦二年都變其子亦隨色變大率菘子黑蔓菁子紫赤大小相似蘆蔔子黃赤而大又不圓也亦梗長葉瘦高者為菘葉闊厚短肥而庳及梗細者為蕪菁荆楚嵗時記十一月採經霜蕪菁葵等雜菜乾之為鹹菹有得其和者並為金叉色菹既甜脆汁亦酸美呼其莖為金叉股醒酒所宜也急就章曰老菁蘘荷冬日藏詩曰我有旨蓄亦以御冬蓋此之謂也按禹貢荆州包匭菁茅孔氏曰菁以為菹吕氏春秋亦曰菜之美者具區之菁則菁之見貴舊矣然說者或以菁茅為茅之名而言老菁冬藏者為韭花云今蔓菁園中無蜘蛛是其所畏也南都賦秋韭冬菁注廣雅曰韭其華謂之菁葖葖蘆萉爾雅釋曰紫花菘也俗呼溫菘似蕪菁大根一名葖俗呼雹葖一名蘆蔔今謂之蘿蔔說者曰紫花菘溫菘皆南人所呼吳人呼楚菘廣南人呼秦菘方言曰蕪菁紫者謂之蘆蔔劉盆子在長安掖庭中宫女幽閒掘庭中蘆蔔根食之隋張威為青州刺史遣家奴於人間鬻蘆蔔根坐廢於家即此也昔有婆羅門僧東來見食麥麵者云此大熱何以食之及見食中有蘿蔔曰賴有此以解之耳自此相傳食麵必食蘿蔔談苑曰江東居民嵗課種藝初年種芋三十畝計省米三十斛次年種蘿蔔三十畝計益米三十斛可知蘿蔔消食也久服亦澀榮衛令人髮早白其嫩葉可為生菜陶隱居乃云其根可食葉不中噉故說者至疑江左不産云堇齧苦堇釋曰可食之菜也郭云今堇菜葉如栁子如米汋食之滑者本草唐本注云此菜野生非人所種俗謂之堇菜葉似蕺花紫色本草云堇汁味甘說者以為堇苦而言甘者古人語倒猶甘草謂之大苦也觀綿之詩言沮漆之間土地肥美則曰周原膴膴堇荼如飴堇荼皆苦菜也地既饒美其所生菜雖有性苦者皆甘如飴則此地將可居矣是堇得地味亦甘也內則曰棗栗飴蜜以甘之堇荁枌榆免薧滫瀡以滑之脂膏以膏之言養老者懼其腸澀故用此物調和飲食荁亦堇類冬用堇夏用荁廣雅曰夏荁秋堇滑如粉是也士虞禮則曰夏用葵冬用荁鄭注云荁堇類也乾則滑夏秋用生葵冬春用乾荁此蓋隨文解之故不同三十國春秋曰劉殷曽祖母王氏盛冬思堇殷入澤中慟有堇生焉得斛餘又後魏書崔和為平昌太守性鄙吝其母季春思堇惜錢不買二人用心不同如此堇久食令人身重懈墯又令人多睡廣雅曰堇藋也今三輔之言猶然未知同異藜藜菜之微者也故韓子曰堯之王天下也糲粱之食藜藿之羮莊子曰孔子窮於陳蔡間七日不火食藜羮不糝糝米糝也言其絶糧雖藜羮中不辦有糝又曽子以蒸藜不熟出其妻季路食藜藿之實而為親負米於百里之外物雖微矣聖賢多食之山海經曰秦山有草焉名曰藜如荻可以為菹郭璞曰為治也毛詩北山有萊義疏曰萊藜也莖葉皆似王芻今兖州蒸以為茹謂之萊案藜乃蒿蓬類故月令則藜莠蓬蒿並興淮南子曰藜藿之生蠕蠕然日加數寸不可以為櫨棟楩柟豫章之生也七年而後知故可以為棺舟藜者人所習識秦山治菹之草名適同耳又爾雅葥王蔧釋曰此則藜之科大為樹可作掃彗者一名葥一名王蔧一名王帚江東呼落帚按藜亦可以為杖原憲杖藜應門是也藋拜蔏藋釋曰亦似藜而葉大者名拜一名蔏藋莊子云藜藋柱宇是也左傳云蓬蒿藜藋按爾雅有灰藋子炊為飯香滑葉心有白粉似藜心赤莖大堪為杖亦殺蟲人食為藥不如白藋也按今灰藋絶似苜蓿但苜蓿苗葉紅可愛而灰藋則苗葉上微白如灰色為異耳而廣雅以藋為堇淮南子曰藜藋蠕而長日加四寸不可以為櫨棟又曰蔐苗類絮而不可為絮黂不類布而可以為布音釋蘋糝桑感切說文以米和羮共本或作供湆去急反汁也筥居吕反方曰筐圎曰筥錡其綺反三足釡茨衄女六反瘻音漏頭腫也一曰久創時冗切亦作腫虻音盲齲驅雨切齒病蒍韋委切注䓈弋菙切䒞也古今注羊捶切廣韻音役注燕人呼芡䔖杼神吕切橡也朱厲事見說苑莒穆公有臣曰朱厲附云云莒公以難死朱厲附往死之徴羽樂風許注徴南方火羽北方水五音正樂樂風者上以風化下下以風刺上故謂之風和去聲芰茄下音加縹敷沼切青黃色注薢茩上音皆下音狗徒南切綸音鰥張華云綸如宛轉繩組音祖有秩嗇夫漢書鄉有三老有秩嗇夫嗇夫掌獄訟有秩郡所置秩百户皆紏青絲為綸以帶佩之蘧蔬上巨俱切下山俱切隧音遂一名出隧一名蘧蔬菌音窘蔣音將葑芳用切菰根也鳬茨茈音疵芍都了切薯藇上音儲又音署下音余又音預芋郪七稽反音與雌同縣名在廣漢蒻音弱蒟音矩薑蓲許于切賦注引太𤣥經曰陽蓲萬物言陽氣蓲照生萬物也陰敷薑生於陰也鷃音晏鴽也蜩音條蟬也范音犯蜂也蔱音殺一作榝似茱萸出淮南葑音封菲音匪芴爾雅音勿注菲芴即土瓜葍音福蘴音豐蕘音饒薞音孫葖他勿切蘆爾雅音羅萉爾雅音蒲北切蔔一音服蘆蔔一名來服言來牟所服也又蒲北切與萉蔔音同堇音謹齧五結切爾雅釋齧一名苦堇汋煮也音芍又土角切蕺菜名爼及切荁音桓免音問草木新生者薧苦老切乾也滫思酒反溲也瀡音髓滑也膏之去聲藋徒弔切藜糲力葛反米粗者之稱蠕如兖切動也楩鼻綿切柟奴含而鹽二切葥音箭彗音遂藋徒弔切注黂爾雅音扶刃切枲實也爾雅翼卷六
