body:
  text: 欽定四庫全書爾雅翼卷一宋羅願撰釋草黍稷稻梁麥牟麻菽秬秠苽黍禾屬而黏者也以大暑而種故謂之黍從禾雨省聲孔子曰黍可為酒禾入水也然則又以禾入水三字合而為黍不但從雨而已黍以大暑而種故農家以三月上旬為上時四月上旬為中時五月上旬為下時然月令仲夏之月農既登黍矣天子以雛嘗黍羞以含桃先薦寢廟為鄭說者以為黍非新成直是舊黍蓋以鄭解孟秋所登之榖為黍稷故以仲夏為未熟若其未熟何得言登且所謂舊黍者自去歲孟冬與彘併食數月於此矣豈待今而後嘗耶黍固有早晚其晚者不妨至孟秋始熟故庶人秋乃薦黍此天子之禮自重其先熟者而嘗薦之耳故蔡雍以為今之蟬鳴黍亦猶十月穫稻而天子所嘗乃九月熟者謂之半夏稻亦其類也黍之秀特舒散故說者以其象火為南方之榖詩亦云芃芃黍苗以此也又云彼黍離離彼稷之苗者黍大體似稷故古人併言黍稷今人謂黍為黍穄行役之人有憂於內則有不察於外故於此或不能辨也黍有赤黍黑黍黑黍已別見虋稱赤苗恐是赤者其類有黏不黏如稻之有粳糯其不黏者以為飯黏者別名秫以為酒說文秫稷之黏者即謂此也月令造酒命大酋秫稻必齊蓋以此秫與稻之糯為酒北人謂秫為黃米亦謂之黃糯釀酒比糯稻差劣黍之為物黏而香故凡香之馨馥黏之䵒皆從之又古人作履黏以黍米謂之黎其雪桃亦用黍以黍黏去桃毛也孔子先食黍以黍為五榖之先考桃為五果之下故捨不用耳黍又搗以為餳謂之餦餭楚辭曰粔籹蜜餌有餦餭言以蜜和米麵煎熬作粔籹又有美餳衆味甘具也及屈原死楚人以菰葉裹黍祠之謂之角黍稷稷者五榖之長故陶唐之世名農官為后稷其祀五榖之神與社相配亦以稷為名以為五榖不可遍祭祭其長以該之稷所以為五榖長者以其中央之榖月令中央土食稷與牛五行土為尊故五榖稷為長又古者號稷為首種孟春行冬令則雪霜大摰首種不入蔡雍以首種為麥以麥常隔歲而種故以為首而鄭康成以為稷者蓋以考靈耀云日中星鳥可以種稷是一歲之初所先種者唯稷况又孟春正種稷之時而云首種不入即是極寒種不入土不待歲收然後為入也稷又名齊或為粢故祭祀之號稷曰明粢而言粢盛者本之故諸榖因皆有粢名小宗伯所謂辨六齍之名物與其用是也杜子春又欲讀酒正五齊皆為粢以禮運有粢醍在堂意以粢榖為醍則餘四齊亦皆以粢榖為之然破五齊從一粢於義不可故後鄭但以為齊者以度量節作之更讀禮運粢醍為齊此說之不同者也稷又名為穄吕氏春秋曰飯之美者有陽山之穄髙誘曰關西謂之糜冀州謂之䵖說文􅓱穄也廣雅曰䵖穄也穆天子傳曰赤烏之人獻穄百載見今人皆謂之穄然則稷也粢也穄也特語音有輕重耳大抵塞北最多如黍黑色稗有二種一黃白一紫黑紫黑者芑有毛北人呼為烏禾今人不甚珍此惟祠事用之農家種之以傋它榖不熟為糧耳稻稻米粒如霜性尤宜水故五榖外別設稻人之官掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以涉揚其芟作田而漢世亦置稻田使者以其均水利故也古者之於榖菽與苴以食農麥以接續至於食稻衣錦則以為生人之極樂以稻味尤美故也稻一名稌然有黏有不黏者今人以黏者為糯不黏者為粳然在古則通得稻稌之名說文曰稻稌也沛國謂稻曰糯粳稻屬或作粳是則直以糯為稻耳若鄭康成注周禮稌粳也則稻是粳然要之二者皆稻也故泛勝之云三月種粳稻四月種秫稻字林云糯黏稻也粳稻不黏者今人亦皆以二榖為稻若詩書之文自依所用而解之如論語食夫稻則稻是粳月令秫稻必齊則稻是糯周禮牛宜稌則稌是粳豐年多黍多稌為酒為醴則稌是糯又稻人之職掌稼下地至澤草所生則種之芒種是明稻有芒有不芒者今之粳則有芒至糯則無是通得稱稌稻之明驗也然說文所謂沛國謂稻曰糯至郭氏解爾雅稌稻乃云今沛國稱稌不知說文亦豈謂此稌訛為糯耶將與郭自異義也又有一種曰秈比於粳小而尤不黏其種甚早今人號秈為早稻粳為晚稻蘇氏云粳一曰秈亦未盡也又今江浙間有稻粒稍細耐水旱而成實早作飯差硬土人謂之占城稻云始自占城國有此種真宗聞其耐旱遣以珍寶求其種始植于後苑後在處播之按國朝㑹要大中祥符五年遣使福建取占城禾分給江淮兩浙漕并出種法令擇民田之髙者分給種之則在前矣粱粱今之粟類古不以粟為榖之名但米之有孚殼者皆稱粟今人以榖之最細而圓者為粟則梁是其類內則曰飯黍稷稻粱白黍黃粱稰穛說者曰下言白黍則上是黃黍下言黃粱則上是白粱今粱有三種青粱殼穗有毛粒青米亦微青而細於黃白米也夏月食之極為清涼但以味短色惡不如黃白粱故人少種之亦早熟而收少作餳清白勝餘米黃粱穗大毛長殼米俱粗於白粱而收子少不耐水旱食之香味逾於諸粱人號為竹根黃白粱穗亦大毛多而長殼粗扁長不似粟圓米亦白而大其香美為黃粱之亞古天子之飯所以有白粱黃粱者明取黃白二種耳今人大抵多種粟而少種粱以其損地力而收穫少耳然古無粟名則是以粱統粟今粟與粱功用亦無別明非二物也粱比它榖最益胃但性微寒其聲為凉蓋是亦借凉音如許叔重說黍大暑而種則以黍從暑粱從涼其義一也古食醫㑹膳食之宜則犬與粱相副先儒以為犬味酸而溫粱甘而微寒亦氣味相成也粱食之美者故稱膏粱之性難正以其養厚而易驕若歲凶則大夫無故不食粱又喪禮沐尸君沐粱大夫沐稷士沐粱粱貴故君用之士亦用者大夫近君則嫌於同士去君逺則不嫌於同也然士喪禮言士沐稻與喪大記之文頗異故解者以沐粱為天子之士沐稻為諸侯之士又以為差次而上則天子當沐黍至於飯含之米與飯餘之粥說者以士喪禮三者文皆相續故以為用米同然則君與士亦皆粱也又有熬榖與魚臘皆錯於棺旁所以惑蚍蜉使不向棺士喪禮熬黍稷各二筐君與大夫按喪大記雖有四種八筐三種六筐之文而無其物故釋者云四種八筐者黍稷稻粱各二筐三種六筐者黍稷粱各二筐蓋漢承秦滅學所存者士禮故但推士禮以至於天子未必皆可據豫因粱而及之麥麥者接絶續乏之榖方夏之時舊榖已絶新榖未登民於此時乏食而麥最先熟故以為重董仲舒曰春秋於它榖不書至無麥禾則書之以此見聖人於五榖最重麥與禾也因說武帝勸關中種麥而明堂月令亦有仲秋勸種麥之文其有失時行罪無疑凡以接續所賴懼民不以為意耳又禾下即種為稍勞故鄭司農注稻人稱今時謂禾下麥為荑下麥言芟荑其禾於下種麥又注剃氏云俗間謂麥下為夷言芟夷其麥以其下種禾豆則是卒歲之間無曠土閒民此惰農所難故勸之麥比他榖獨隔歲種故號宿麥說者亦或以為首種傳曰秋昏虛星中可以種麥說文曰麥芒榖秋種厚薶故謂之麥麥金也金王而生火王而死小麥生於桃二百四十日秀秀後六十日成蓋秋種冬長春秀夏實具四時之氣自然兼有寒溫熱冷故小麥微寒以為麯則溫麵熱而麩冷其地暖處亦可春種至夏便收然比秋種者四氣不足故有毒河渭以西白麥麵涼以其春種缺二時氣使然也麥既備有四時之氣而說文以麥為金者特以其金王而生又遇火而死鄭注月令則云麥實有孚甲屬木黍秀舒散屬火麻實有文理屬金菽實孚甲堅合屬水稷五榖之長屬土此據明堂月令四時與中央所食為說養生家則以為麥心之榖養心氣心病宜食是又以為南方之榖皆各自為義然麥性微寒以為金則許氏之說優矣古稱髙田宜黍稷下田宜稻麥今小麥例須下田故歌有曰髙田種小麥終久不成穗若大麥則不然詩所謂青青之麥生於陵陂者謂大麥也已別具於牟中古者朝事之豆有麷蕡先儒以麷為熬麥許叔重以為煮麥又小麥屑皮謂之麩小麥屑之核謂之䵀麥核屑十斤為三斗者謂之麥末謂之麵麥甘鬻謂之麮餅􅯅謂之黂若䴭䴳䃺麥若搗謂之䴾堅麥謂之麧又相謁食麥謂之䬯陳楚之間謂之餥楚人謂之飵秦人謂之䭡䭓牟牟者周所受瑞麥來牟也一作牟又作􅓿即今之大麥說文云牟大也蓋生於杏二百日而秀秀後五十日而成孟子曰牟麥播種而耰之其地同樹之時又同勃然而生至於日至之時皆熟矣此牟之候也吕氏春秋曰孟夏之昔殺三葉而獲大麥其始蓋后稷受之於天故詩曰貽我來牟又曰於皇來牟劉向以為釐牟麥也始自天降此皆以和致和獲天助也然則來牟一物唯廣雅以牟為大麥來為小麥按說文云來周所受瑞麥來牟一來二縫象芒束之形天所來也故謂行來之來說文以此解來則來牟不應為二物然則來牟為大麥明矣后稷憂勤萬民天賜之麥蓋使其麥豐稔則謂之貽我來牟爾不必雨之種也然古今雨粟事亦甚多安知其始不如此乎雖然后稷所植多矣而獨言此者以其至艱書曰暨稷播奏庶艱食鮮食今麥早種則蟲而有節晚種則穗小而少實又為性多穢一種之終歲不絶耘鋤之功此所以為艱食歟方言曰䴭䴳牟䴽䵆䴹麴也自關而西秦豳之間曰晉之舊都曰䴭齊右河濟曰䴳或曰牟北鄙曰䴽麴其通語也蓋大麥以為麴還得牟之本名䴽是小麥為之䴽細餅麴也䵆有衣麴也大麥宜為飯又可為酢其蘖可為餳麻麻實既可以養人而其縷又可以為布其利最廣然麻之屬總名麻別而言之則有實者別名苴而無實者別名枲子夏喪服傳曰苴絰者麻之有蕡者也牡麻者枲麻也蕡即實也牡即無實之名也然此類亦通名麻枲故或以蕡為枲實蓋假借言之爾麻實有文理故屬金為西方之榖明堂月令秋則食麻與犬秋氣既涼又向寒無害故食當方之榖牲而至仲秋則又以犬嘗麻先薦寢廟也若豳風則九月菽苴蓋食農夫者不嫌於晚耳麻實既謂之蕡故古者朝事之籩熬麻麥以實之謂之䵄蕡又麻於植物中最為多子故詩稱桃之夭夭有蕡其實言桃花色既盛又結子之多如麻子然以况室家之相宜而其繼嗣繁衍者如此說文亦云萉枲實或作則音雖異而意同後世說本草者或以蕡為牡麻之華則與詩雅所說大異麻華亦自古人所貴故九歌云折疏麻兮瑤華將以遺兮離居說者曰麻華色白故比於瑤此華香服食可致長年故以為美將以贈逺則是華亦可用特不可為蕡耳又有檾者亦麻類有實音如頃畝之頃說文引詩衣錦檾衣蓋禮所謂衣錦尚絅褧惡其文之著者字或作檾作苘又作犬迥切則通於褧顈要皆此布之衣也又胡麻亦有實本生大宛一名油麻一名狗蝨一名方莖淳黑者名巨勝亦曰一葉兩莢為巨勝或曰莖圓名胡麻莖方名巨勝又說角作四稜者名胡麻八稜者為巨勝俗云必夫婦同種即生而茂盛道家以為飯陶隱居言八榖之中胡麻最為良以詩黍稷稻粱禾麻菽麥為八榖而引董仲舒云禾是粟苗麻是胡麻按胡麻大宛之種張騫得之以歸詩人所稱豈應近捨中國之苴而逺述大宛之巨勝此說非是又以其胡物而細故別謂中國之麻為漢麻亦曰大麻菽菽豆也其類最多故九榖之中居其二又古人說百榖以為粱者黍稷之揔名稻者溉種之捴名菽者衆豆之捴名三榖各二十種為六十疏果之實助榖各二十凡為百榖然豫以為榖之種類每物不下十數亦何假疏果而後為百耶廣雅曰大豆菽也小豆答也豍豆豌豆䝀豆也胡豆豇䝄也角謂之莢葉謂之藿巴菽巴豆也又廣志曰種小豆一歲三熟味甘白豆粗大可食剌豆亦可食秬豆苗似小豆紫華可為麵生朱提建寧胡豆有青有黃者此亦其大略也然大豆以二月中旬種者為上時至三四月則費子小豆以五月為上時上伏中伏次之蓋秋而成故八月之雨謂之豆花雨吕氏春秋曰得時之菽長莖而短足其莢二七以為族多枝數節競葉繁實菽榖之薄者故豳風九月叔苴采荼薪樗食我農夫叔苴榖之微者荼菜之苦者樗薪之惡者故以食農夫明俗之勤儉而民方以為樂亦猶孔子云啜菽飲水盡其歡斯之謂孝不假於物之豐也漢書曰今嵗饑民貧卒食半菽言軍中無糧以菽雜他榖食之亦貧乏之義也然菽於用甚多故羞籩之實糗餌粉餈皆稻米黍米所為合蒸則曰餌餅之則曰餈以其黏著故搗粉熬大豆以為表餌言糗餈言粉蓋互相足此後鄭之義先鄭則別以粉為豆屑所不同也又以為豉楚辭曰大苦鹹酸辛甘行說者曰大苦豉也言取豉汁調以鹹酢椒薑飴蜜則辛甘之味皆發而行又以為粥說云共工氏有不才子以冬至日死為疫鬼畏赤小豆故冬至日以為粥厭之嵇康養生論云豆令人重說者以為啖豆三年則身重而行止難常食令人肥肌粗燥定公元年十月隕霜殺菽先儒以為菽草之難殺者言殺菽知草皆死秬秬黑黍也古者薦籩有白黑形鹽白為熬稻黑即秬也至藏冰則用黑牡秬黍以享司寒蓋此倣其方之色亦以為酒謂之秬鬯既芬香調暢矣若將用則鬯人以鬯酒入鬱人鬱人得之築鬱金草煮之以和此酒則謂之鬱鬯故鬯人掌共秬鬯而鬱人和鬱鬯以此也既實之於彝先祭未殺牲之前則以圭瓉璋瓉挹此酒灌地灌地以求神謂之祼將圭瓉者以圭為杓柄璋瓉則以璋為柄圭璋皆美玉而鬱正黃色故詩曰瑟彼玉瓉黃流在中祭祀之可觀者也故禮曰周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶薌臭鬱與鬯皆隂而玉為陽物圭璋又東南陽方之玉故假之嫌於無陽至蕭與黍稷皆陽物又發之以火不假隂者不嫌於無隂也鬯無所不用故春祠夏禴秋嘗冬蒸追享朝享至於社壝禜門廟及山川四方皆有祼事王齊又以鬯酒給淬浴所謂凡王之齊事共其秬鬯者也天子適諸侯必舍於其祖廟則使介執鬯以禮於鬼神所謂凡王弔臨共介鬯者也大喪又以此沃尸使之香所謂大喪之大渳設斗共其釁鬯者也至其用於賔客者上公則使宗伯攝酌圭瓚而祼王拜而送爵又攝酌璋瓚而祼后拜而送爵賔乃酢焉號為再祼而酢侯伯一祼而酢子男一祼不酢又所謂諸侯為賔灌用鬱鬯者也若諸侯則天子賜之圭瓚然後為鬯未賜圭瓚則資鬯於天子故先儒說王度記天子以鬯諸侯以薰者謂未得圭瓚之賜則用薰得賜自用鬱耳故自詩書所載召虎及晉文侯仇皆嘗受秬鬯圭瓚之賜惟文公重耳獨言秬鬯一卣不言圭瓚者圭瓚自與秬鬯相副不言可知也古者尊以彝為上卣為中罍為下故祭祼皆用彝酢皆用罍而賜皆用卣所為賜之者將使以天子錫命之意告其始祖當賜之時雖實之於卣至其祭自陳之於彝也若既賜之後得自為鬯故又有諸侯相朝灌用鬱鬯之禮古以此禮為重禮官之屬六十肆師次宗伯固以築鬻祼將為職而鬱人鬯人者乃遂以下士次之孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可以不傳于子孫是以富貴無常不如是則王公其何以戒懼民萌其何以勸勉至歎魯之微則曰禘自既灌而往者吾不欲觀之矣祼者先王之盛禮聖人所觀商之國已亡而其遺臣乃相與行禮於周之庭魯雖未亡而先王之禮已去此所為歎息也然先儒言鬯猶有不同者皆言釀秬為酒便謂之鬯至祭則以鬱合之而盧氏乃言取草芬芳香者與秬鬱合釀之成為鬯蓋惑於禮緯鬯草生庭及王度記鬯薰芝蘭之屬蓋鬱既專用以和酒故其後遂謂之鬯草亦事之宜若始釀秬中已有鬯則鬯人一官自足何必令鬯人共秬鬯而鬱人和鬱鬯耶先王以鬱為香物久則失其芬芳故至時旋取以和鬱則色香俱新潔芬香調達故肆師職言及祼築鬻大賔客涖筵几築鬻則祭之入鬱在臨祼之時而賔客入鬱在已陳筵几之後其序可見矣此亦新尊潔之之義也子榖秬黍漢書律厯志度者分寸尺丈引所以度長短也本起黃鍾之長以子榖秬黍中者一黍之廣度之九十分孟康曰子北方北方黑謂黑黍也顔師古曰子榖猶言榖子耳中者不大不小也言取黑黍榖子大小中者率為分寸也秠釋草曰秬黑黍秠一稃二米是秬與秠之所以異者在此然則秠必不黑秬必不一稃二米也而鄭氏釋春官鬯人既云秬如黑黍一稃二米則是以秠之狀雜之於秬郭氏解釋草又云秠亦黑黍則是又以秬之色雜之於秠秬既欲兼秠之狀秠又欲兼秬之色凡物之所以紊亂不復可推究者由此故也郭氏又引漢和帝時任城生黑黍或三四實實二米得黍三斛八斗以顯二米者為黑黍且任城所生漢之異事厯世所未有詩歌后稷降播乃民事之常如必待任城所生而後降之則沒世不可待矣至唐說者又言今上黨民間黑黍或值豐歲往往得二米者但稀闊而得之不以充貢耳以此附成郭氏之說且后稷所降既謂之種何得以豐歲偶有一二為說若皆以豐歲言之則禾有同頴麥有兩岐又可待以為種耶按今百榖之中一桴二米者唯麥為然捨麥未有二米者說文解秠亦云一稃二米詩曰誕降嘉種維秬維秠天賜后稷之嘉榖也而解來字云周所受瑞麥來牟一來二縫秠與來牟皆后稷所受於天皆一稃二米則是秠者正此來牟爾但生民臣工所稱不同來牟又為釐牟古者來釐丕三字相通故方言貔陳楚江淮之間謂之猍北燕朝鮮之間謂之􅲆關西謂之貍彼雖說獸亦以一名通三音然則此禾亦然來猶也秠猶􅲆也釐猶貍也要是一物鄭志自以所解鬯人不合釋草之文故答張逸併以秠稃皆解為皮且云爾雅重言以曉人然則不唯二物相混而秠但得為秬之皮轉失實矣豫詳而論之苽苽者蔣草也生水中葉如蔗荻江南人呼為茭草刈以飼馬甚肥其生兩浙下澤者根既相結歲久則并土浮於水上土人謂之葑田刈去其葉便可耕植其苗有莖梗者謂之菰蔣至秋則為此米大抵葑是其根苽是其葉耳古者食醫㑹六榖六牲之宜則牛宜稌羊宜黍豕宜稷犬宜稻鴈宜麥魚宜苽釋者以為牛味甘平羊甘而熱稻與黍苦而溫豭酸而牝苦稷以甘濟之皆甘苦相成犬酸而溫粱甘而微寒鴈甘而平大麥酸溫小麥如粱亦氣味之相成者魚族甚多寒熱酸苦兼有而云宜苽者或同是水物相宜豫按禮經古者婦人將嫁教成而祭之則牲用魚芼之以蘋藻是以水物相從也又今菰中生菌如小兒臂爾雅謂之蘧蔬者以芼鮒為羮則開胃而去酒毒是物自有相宜者至他物不皆爾是以常豆之葅水土之和氣其醢陸産之物加豆陸産其醢水物至如明堂月令所食麥與羊菽與雞稷與牛麻與犬黍與彘及內則蝸醢而苽食雉羮麥食脯羮雞羮析稌犬羮兔羮皆不一一與食醫合但倣之而已又說者以食醫既有麥苽則舂人所共齍盛之米當亦兼有二物而喪禮熬榖君四種八筐則天子當加麥苽為六種十筐亦其理宜也此米一名雕胡故宋玉賦云為臣炊雕胡之飯烹露葵之羮又枚叔七發云楚苗之食安胡之飯摶之不解一啜而散或曰安胡亦雕胡也古人以為美饌今飢歲猶採以當糧然不知貴西京雜記云漢太液池邊皆是雕胡紫蘀緑節蒲叢之類菰之有米者長安人謂為雕胡葭蘆之未解葉者謂之紫蘀菰之有首者謂之緑節其實雕胡之名由來已久矣菰首者菰蔣三年以上心中生臺如藕至秋如小兒臂大謂之茭首本草所謂菰根者也可蒸煮亦可生食其或有黑縷如墨點者名烏鬱或云別種非也但是植之黑壤歲久不易地汙泥入其中耳以潘水漚則去之此菰首之不臧者也其菰葉荆楚俗以夏至日用裹黏米煮爛二節日所尚一名糭一名角黍子虛賦東蘠雕胡張揖曰東蘠實可食雕胡菰米也曹子建七啓曰芳菰精稗音釋黍穄音祭虋音門酋子由反酒熟曰酋大酋酒官之長秫音述許羊切今作香户吳切䵒尼質切餳除盈切飴也粔其吕切籹音汝餦餭音張皇稷六齍音粢謂六榖黍稷稻粱麥苽五齊音劑謂泛醴盎緹沉醍音體糟床下酒赤色䵖音撁􅓱忙皮切稗旁封切稻瀦畜敕六反澮寫如字以列祿計反田之畦㽟也㽟音劣舍水後鄭為止舍之舍芟雕銜切開遂舍水於列中因涉之揚去前年所芟之草而治田種稻稌音吐粳或作粳俗作粳汜音帆漢有汜勝之撰書十八篇言種植之事稼下地周禮注以水澤之地種榖也謂之稼者有似嫁女相生芒種章勇反稻麥也秈音仙粱稰思吕反穛側角反熟穫曰稰生穫曰穛食醫上音嗣沐音木淅飯米取其潘以為沐也含胡暗反熬音敖煎也錯音措設也蚍蜉音毗浮麥剃音替除草薶音埋藏也麷芳充芳鳳二切熬麥也蕡音墳枲實也按周禮籩人朝事之籩其實麷蕡鄭司農云朝事謂清朝未食先進寒具口實之籩鄭𤣥謂祭宗廟薦血腥之事䵀蘇果切直隻切煮煮麮丘據切釋名煮麥曰麮空谷切䴭音才䴳户八切䃺音磨䴾昨何切麧胡沒切䬯女兼切餥非尾切飵在各切䭡䭓上烏困切下五困切牟雨粟上玉遇切音哭䴳于八切䴽音脾䵆音䝉䴹胡瓦切酢醋麻絰徒結切麻在首腰皆曰絰萉房未切大宛音鴛西域國名菽豇胡江切豍方迷切豌於丸切朱提上音殊下音匙屬益州地産銀苴音疽糗起九切搗熬榖也餈音茨厭益涉切禳也當也秬祼音灌瓚才旱切瓉之言贊進也以進於神􅡒與爇字同禴音藥或作礿追享朝享周禮注謂禘祫也在四時之間故曰間祀追享謂追祭遷廟之主以事有所請禱朝享謂朝受政於廟春秋傳曰閏月不告朔猶朝于廟朝直遙反壝以醉切委土為壇墠所以祭也禜音泳祭國門也淬七內切洗浴舍去聲停也介鬯周禮疏天子所往停在諸侯之廟祝致辭告廟介使則致此鬯於神前曰介鬯弔臨周禮鬯人注以尊適卑曰臨春秋傳曰照臨敝邑力鴆切渳音弭杜子春讀為泯以秬鬯浴尸使之香斗所以沃尸設斗依注音主釁鬯上音徽以鬯徽尸為莊飾義酢音昨卣夷周切又音酉卣中尊謂犧象之屬築煮下音煮築香草煮以為鬯肆師周禮注肆猶陳也肆師佐宗伯陳列祭祀之位及牲器粢盛秠音丕爾雅孚鄙切苽古胡切蔣音將葑方用切豭古遐菌音窘芼莫報切蝸音螺脯析乾牛羊肉析稌上之列切楚苗文選注楚之苗山出禾可為食搏音團以手團之也啜穿劣切嘗也潘音翻淅米汁漚於姤切糭作㺯切爾雅翼卷一
