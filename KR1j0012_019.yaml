body:
  text: 欽定四庫全書爾雅翼卷十九宋羅願撰釋獸二虎虪甝豹貔貙獌熊羆豺狼犴類猩猩狒狒猛氏角端桃拔虎虎大寒之月始交七月而生性至猛烈雖遭逐猶復徘徊顧步其傷重者輒跑踍作聲而去聽其聲之多少以知其去之近逺率鳴一聲者為一里靠嵓倚木而死終不僵仆其摶物不過三躍不中輒捨之其食物值耳輒止以為觸其名名耳故也嘗傷人者耳輒有缺若鋸夜視以一目放光一目看物獵人候而射之目光墮地得之如白石或曰即虎魄也又知衝破能畫地以卜今人有畫物上推其竒偶者謂之虎卜懸其鼻於户令人生男故古者胎教欲見虎豹勇摯之物虎子才生三日則有食牛之氣其不能摶噬者輒殺之為墮武也古者出國用虎節又敔亦為虎形背上為二十七齟齬擊之以止樂字說曰虎西方之獸故敔為伏虎二十七齟齬者三九之數也陽成於三變於九之長尺十之數也陽三九而以隂十勝之所以止樂案淮南稱天一地二人三三三而九九九八十一人應九九八十一之數馬應八九七十二之數犬應七九六十三之數彘應六九五十四之數猿應五九四十五之數麋鹿應四九三十六之數虎應三九二十七之數蟲應二九一十八之數故曰三九二十七七主星星主虎虎故七月而生虎應二十七故敔為虎形二十七齟齬也亦虎嘯而風生風生而萬籟皆作虎伏而風止風止而萬籟皆息故止樂用虎爾漢舊儀乘輿帶七尺斬蛇劒履虎尾絇履方言虎陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳或謂之於䖘自關東西或謂之伯都漢書云於釋虪虎一物也以色别之則黃質黑章者無異名竊毛者謂之虦貓白者為甝黑者為虪此物同而别者也虪亦有斑但以淺色為質深色為章耳海內東北經幽都之山黑水出焉其上有黑鳥黑蛇黑豹黑虎黑狐蓬尾此虪之所聚而孟山獸多白狼白虎鳥多白雉白翟兩山之間而鳥獸各以其毛色相從理之不可曉者然虪尤猛今野人言三虎之别黃虎竊人羊豕多方窺伺得之黑虎所見無不取白虎坐食而已不甚摶殺或云黃是其幼弱者黑者適壯白者則老矣此亦理之近者也郭氏稱晉永嘉中秭歸縣檻得黑虎狀如小虎而黑色深者為斑此豈偶得其小者爾未可全據也甝虎西方之獸白西方之色文質皆應其方故古者祭祀之禮以白琥禮西方白言其色虎言其形也禮西方者以其物享之之義也然白虎不常有故郭氏但引漢宣帝時南郡獲白虎為驗司馬相如稱般般之獸白質黑章為大瑞而世之說者又以白虎為騶虞許氏解淮南子稱騶虞白虎黑文食自死之獸日行千里騶虞之色雖與山海經所說不合然漢儒大抵皆以為白虎又其言白虎性仁食自死之獸瑞應圖曰仁而不害今白虎不甚摶殺坐食而已或云虎之老而仁者有合於仁如騶虞之義此先儒之所為說歟周書王㑹曰般吾白虎晉宋時正旦元㑹設白虎尊於殿庭蓋上施白虎若有能獻直言者則發此尊飲酒蓋杜舉之遺式欲令言者猛如虎無忌憚也豹豹似虎圜文有數種有赤豹山海經舂山多赤豹詩赤豹黃羆陸璣疏云尾赤而文黑謂之赤豹有𤣥豹山海經幽都之山有𤣥虎𤣥豹王㑹篇屠州黑豹有白豹别名貘淮南曰軍正執豹皮以正其衆豹尾車周制也象君子豹變以尾言者謙也古者軍正建之漢大駕屬車八十一乘作三行尚書御史乘之最後一乘縣豹尾豹尾以前皆為省中周禮射以皮飾侯詩羔裘豹飾楚豹舄瑣語范獻子獵遺其豹冠貔貔豹屬猛獸出貉國詩獻其貔皮曲禮前有摯獸則載貔貅陸璣云貔似虎或曰似熊一名執夷一名白狐遼東人謂之白羆郭璞贊云書稱猛士如虎如貔貔蓋豹屬亦曰執夷白狐之云似是而非貙貙似虎而五爪釋獸言似貍郭氏注子虛賦稱似貍而大其注爾雅云今山民呼虎之大者為貙然舊說云貙畏虎虎畏羆則貙不當大於虎力能食鹿以立秋日殺物故漢儀立秋日郊禮畢始揚威武乃祠先虞告以烹鮮天子御戎路白馬朱鬛躬執弩射牲牲以鹿麛斬牲於郊東門載獲車馳駟以薦陵廟名曰貙劉劉殺也貙於時殺物故以應之於是而賜武官肄兵習孫吳兵法六十四陳名曰乘之所以為武也又謂之貙膢風俗通曰嘗新始殺食曰貙膢揚子法言曰若牛羊用人則狐狸螻蚓不膢臘也歟膢之殺狐狸為多與臘日取螻蚓皆盡物者故云爾田獵之禮象獸而動漢之貙劉猶周之表貉也貙既五爪有人之象博物志稱江漢有貙人能化為虎蜀都賦所謂皛貙氓於葽草者也唐李肇國史補云俗言四指者天虎也五指者人虎也而吳都賦注乃言貙虎屬能化為人與前說反聞之虎化為人惟尾不化須燒尾乃成人好著紫葛衣足無踵貙是虎類或云貙人能化為虎或云貙虎屬能化為人辭亦相備此亦莊子程生馬之論也獌獌獸之長者一名蟃蜒以其長故從曼從延雲夢有之子虛賦所謂其下則有白虎黑豹蟃蜒貙犴是也郭璞曰蟃蜒大獸似狸長百尋案說文獌狼屬也引爾雅貙獌似狸獌狿既是狼屬又復似狸又與貙犴同稱則其形質當不甚相懸正使身長不應八百尺孫愐說獌雖同郭氏之語至說狿則云獌狿大獸名長八尺夫以狼貙狸犴之類而其長八尺則已竒而可駭矣八尺正當一尋郭氏稱百尋者蓋見西京賦云巨獸百尋是為曼延故云爾漢武帝作蛇龍曼延之戲多作水陸蟲獸如熊虎猿狖怪獸大雀白虎行孕海鱗變龍罔不畢有以此獸尤竒故特取之又百倍其長為百尋以為戲玩故薛綜云作大獸長八十丈也郭氏秖據此為說不原物之本狀耳然此戲包物甚多獨名曼延者以其形模自然竒怪又增之令極長最為可玩故主名之又謂之曼衍之戲校獵賦云斫巨狿熊熊類大豕人足黑色春出冬蟄輕捷好緣髙木見人自投而下亦以革厚而筋駑用此自快故稱熊經鳥伸今養態者亦日捶之以為不捶則有病獵者刺其革不可得入隨即有膏膜之古稱能白此膏之在背者也寒月則有暑月則無淮南子曰無角者膏而無前有角者脂而無後無角者熊豕之屬肥從前起者也有角者麋羊之屬肥從後起者也又方冬蟄時唯自舐其掌故其掌特美烹之難熟晉靈公殺宰夫之胹熊蹯不熟者而楚成王見圍請食熊蹯而死以其難熟冀有外救也古以熊配虎為旗又皆以為王射之侯又以皮為冠執罼者冠之謂之旄頭乘輿之出則前旄頭而後豹尾蓋乘輿黃麾內羽伏班弓前左罼有罕執罼者冠熊皮冠謂之旄頭而豹尾者則取象於豹之尾也必取熊豹者蓋熊於山中行數十里悉有跧伏之所必在山嵓枯木中山民謂之熊館惟虎出百里外即迷失道路熊出而不迷故開道者首熊以出焉豹之為物往而能反故廣志曰狐死首丘豹死首山豹往而能反故殿後者尾豹以入焉王㑹篇不屠何獻青熊異苑東土呼熊為子路說文能熊屬足似鹿能性堅中故稱賢能而彊壯稱能傑也漢鍾旋以銅篆作蹲熊及盤龍辟邪羆羆似熊黃白文長頭髙腳猛憨多力能拔木關西呼曰貑羆蓋羆乃熊類古之言熊者率與羆連言之如稱如熊如羆維熊維羆非熊非羆趙襄子射熊又射羆是也今獵者云熊有兩種豬熊其形如豬馬熊其形如馬各有牝牡問以羆則云熊是其雄羆即熊之雌者羆為尤猛或曰羆大於熊蓋熊為羆之雄而稱熊猶羖為羭之牯而稱羖兕為犀之牸而稱兕也蓋皆相類而為牝牡猶麋與鹿交鰌與魚遊然其脂如熊白而粗理不如熊白美也柳宗元羆說稱鹿畏貙貙畏虎虎畏羆羆之狀被髮人立絶有力而甚害人則羆之力非熊比矣韓奕稱韓土之樂稱有熊有羆有貓有虎叙所多有者耳而終章言獻其貔皮赤豹黃羆又皆猛獸之罕得者此所以異而書也陸機云貔遼東人謂之白羆又云羆有黃羆有赤羆禹貢梁州貢熊羆狐狸是中國常貢此追貊之國自以所有而獻所謂各以其所貴寶為摰如犬戎氏以白狼白鹿獻穆王也王㑹篇東胡黃羆成王時獻此獸周禮穴氏掌攻蟄獸各以其物火之謂熊羆之屬冬藏者燒其所食之物於穴外以誘出之故熊羆皆從火羆又加罔也後鄭解羅氏蠟則作羅襦引火田之事以為今俗放火張羅其遺教說者以為漢之俗間在上放火於下張羅承之以取禽獸是周禮之遺教淮南子散宜生得𤣥豹黃羆青犴白虎文皮千合以獻於紂豺豺似狗牙如錐足前矮後髙而長尾其色黃瘦健今人稱豺狗霜降之日殺獸四面陳之世謂之祭獸月令季秋之月豺乃祭獸戮禽蓋鱗屬則獺正月祭魚羽屬則鷹七月祭鳥毛屬則豺九月祭獸戮禽古者禽獸之别大曰獸小曰禽亦曰四足而毛曰獸二足而羽曰禽今豺乃狗類不應捕二足羽物應以大小為别爾先儒以為祭與戮者禽獸皆殺之但獸則殺而又陳禽則殺之而已不以為祭又曰禽獸初得皆殺而祭之後得者殺而不祭詳戮禽之文在祭獸之後則是當祭之時擇大獸而祭之後乃方殺戮餘禽而食如云鷹乃祭鳥用始行戮祭即是殺而不食不應又有戮而不食之事也其祭世以為祭天而魏蔣濟云豺獺自祭其先不祭麒麟然則亦非祭天也豺能為聲故楚穆王豺聲而令尹子上知其忍人也其肉酸不宜食蓋食虎者虎見而畏之且能却物魅食豹令人志性粗肉消則定食豺消人脂肉損人神精劉子曰鹿形似馬而迅於馬豺形似犬而健於犬國有千金之馬而無千金之鹿家有千金之犬而無千金之豺以犬馬有用而豺鹿無用也世傳狗者豺之舅豺遇狗輒跪如拜狀獵者不殺豺以豺為同聲又南方惡豺向人作聲以為不祥說文漢律能捕豺貀購百錢狼狼貪猛之獸聚物而不整故稱狼藉又稱粒米狼戾周禮王及五等諸侯之出皆有執鞭趨辟者號條狼氏條滌也謂滌除狼扈道上者狼好積聚故楚語曰令尹問蓄聚積實如餓豺狼焉是也狼猛而敏給能自顧其後淮南子曰鴟視而狼顧賈誼曰失時不雨民且狼顧周公居東逺則四國流言近則王不知而不失其聖故以狼跋胡疐尾比之股中有筋大如雞子又筋滿身如織絡之狀盜不可辨者焚狼筋以示之則為盜者變栗無所容或曰郎巾者菌之類非此獸之筋也其鳴能小能大善為小兒啼聲以誘人去數十步雖善用兵者不能免也還之詩曰並驅從兩肩兮肩者獸三歲也次章曰並驅從兩牡兮牡者獸之父也末章曰並驅從兩狼兮狼謂此也然則前兩章肩與牡為何獸曰皆狼也爾雅曰狼牡貛牝狼其子徼絶有力迅獸三歲曰肩揔羣獸子之名則徼亦肩矣末章言牝狼則前言牡者狼之牡也始章從狼之子次章從其牡又末章從其牝然則牝固猛於牡何為先牡後牝蓋鳥之類雄鷙於雌獸之類牝猛於牡以乳護其子非可得犯也是以羆為熊之牝而羆猛於熊狼為貛之牝而狼名獨著而虎猛者稱乳虎蓋其類也古者君子左取狼為裘又食其肉禮記狼臅膏是也狼腸直故作聲諸竅皆沸邊庭候望設狼烟以其直上風吹不斜也今馬之駿者溺皆射前足鷹鷂醜其矢不墜皆橫激而去若箭其俊猛者尤逺蓋是氣烈所發爾故古者矢之為字通用弓矢之矢田俅子曰有神手牽白狼口銜金鈎而入湯庭王褒曰宣王得白狼而夷狄賔犴犴胡地之野犬也似狐而小或云狐犬謂狐與犬合所生也字通於犴古者獄從兩犬謂爭訟之所以犬守之而狴犴又獄名狴獸也犴即此胡犬也蓋其防間過禮如犬之義故揚雄法言曰狴犴使人多禮乎言不能使人多禮但使不犯足矣犴古以為裘玉藻所謂麛裘青犴褎絞衣以裼之者蓋自狐青裘豹褎麛裘青犴褎羔裘豹飾狐裘皆裼犬羊之裘不裼不盡飾也然則犴雖犬而與犬異矣又以為射侯而喪車漆車以為􅍜蓋王之喪車五乘木車青素車白薻車黃駹車赤漆車黑犬鹿淺然犴之類大率象其色星禽家言犴是猛獸能食獅子虎豹今獄中所畫獸首是其象故曰犴獄云中車疏考類萬物之化有不可致詰者莊子稱白鶂之相視眸子不運而風化蟲雄鳴於上風雌應於下風而風化類自為雌雄故風化彼或以色或以聲獨類不待色聲假於風而已說者以類為萬物之類猶如草蟲異種而同類者然萬物之類蓋多矣猿猵狙以為雌麋鹿之交鰌魚之遊彼非其類且有之同類安足言也類蓋鳥獸之名列子曰亶爰之獸自孕而生曰類河澤之鳥視而生曰鶂併鶂而言之則莊子之所謂也然以山海經論之類有二種其一則獸之生亶爰山者如貍而有髮其名曰師類如列子之所說其一則帶山之鳥如烏而五采文其名曰竒類此亦四方之異氣也猩猩猩猩小而好啼山海經曰人面豕身能言語郭氏曰今交趾封溪縣出猩猩狀如貛㹠聲似小兒啼海內南經曰猩猩知人名其為獸如豕而人面在舜葬西周書王㑹曰都郭國獻之若黃狗而人面也又海內東北經有青獸人面名猩猩能言張華博物志曰猩猩若黃狗人面能言蓋古文言猩猩者皆如此一以為豕身一以為狀如貛㹠一以為若黃狗郭氏贊曰厥狀似猴號音若嚶後世之談猩猩者以為若婦人被髮但足無膝常羣行遇人則以手自掩其形好飲酒著履人有取之者置酒以斗石許而作履相連猩猩始見必大罵曰誘我也輒能知誘者之姓名及其祖先并道之乃絶走逺去既去不能忍已而復來稍稍相勸染指於酒而嘗之躡履而試之已而又去去而復來厥態如初既而不能忍則連臂號泣相與就醉躡履而為人所禽故淮南云猩猩知往而不知來以能知誘之者為知往不知被禍為不知來而吳都賦曰猩猩啼而就禽也然則其狀大抵皆如人與狒狒不甚相逺荀卿曰今夫猩猩形相亦二足無毛也既言二足而又言無毛則去人不逺矣今人謂之野人然而不知禮故曰猩猩能言不離禽獸萬畢術日歸終知來猩猩知往歸終神獸狒狒狒狒如人被髮迅走食人蓋人面紅赤色長脣大口能作人言如鳥聲自知生死舊說反踵獵者言無膝睡常倚物黑身有毛大者長丈許力負千鈞行疾如風左手操管自笑笑即上脣掩目或曰見人則笑或曰其初得人喜而笑則上脣覆其額移時而後食之人因為筒貫於臂上待其見執即抽手從筒中出鑿其脣於額而擒之或曰以釘釘著額任其奔馳候其死而取之髮極長可為髲其血可染緋張衡元圖曰梟羊喜獲先笑後愁郭璞贊曰狒狒怪獸被髮握竹獲人則笑脣蔽其目終乃號咷反為我戮一名亦作􅢈一名􅏈􅏈一名梟羊嘄陽一名山􅏈俗謂之山都北方謂之土螻周成王時州靡國嘗獻之其後不常獻而常有今交廣南康山中有之吳都賦其上則􅏈子長嘯其下則梟羊麡狼又言􅍛􅍛笑而就格則終篇而三及之每說異名莫知其同異然狒狒可謂異獸者矣王㑹篇云􅢈􅢈淮南曰山出嘄陽水生罔象木生畢方井生獖羊人怪之聞見鮮而識物淺也陳藏器云出西南夷如猴宋孝建中進雌雄二頭命工圖之飲其血令人見鬼上林賦射遊梟郭璞曰梟羊也羽獵賦羂嘄陽猛氏上林賦鋋猛氏郭璞曰今蜀中有獸狀如熊而小毛淺有光澤名猛氏疑有闕誤角端角端似豬或云似牛角在鼻上可作弓說文角端獸也出胡休多國續漢書鮮卑有角端牛以角為弓宋符瑞志曰角端日行萬八千里又曉四夷之語明聖在位明達方外幽逺之事則奉書而至此乃異物非以角為弓者端當作貒桃拔西域𫝊烏弋有桃拔一名符拔似鹿長尾一角者或為天鹿兩角者或為辟邪一名扶拔漢章帝時月氏獻之和帝時安息獻之形似麟而無角鄧州南陽縣北有宗資碑旁有兩石獸鐫其膊一曰天祿一曰辟邪天祿閣亦因獸立名靈帝鑄天祿蝦蟆宋符瑞志天鹿者純靈之獸五色光耀同明王者道備則至音釋虎跑音庖踍許交反墮武淮南子注墮廢也武威之也敔音語齟齬或作鉏鋙不相當也擽音轢於䖘音烏竇虪式六又音育竊毛爾雅竊淺也虦音殘又音棧貓音苗甝音含般般音斑豹豹尾後漢輿服志注豹尾之內為省中列小學漢官篇曰豹尾過後罷屯解圍貔婢支反貉音陌摯音至䝗許求反載音戴本亦作戴謂舉於旌首以警衆貙椿俱反音與攄同劉膢並龍珠反揚子注膢八月旦也今河東俗奉以為大節祭祀先人螻蚓上音樓下與蚓同揚子注以申韓刑名如牛羊之用人則人之亡也何可久乎其趍死猶狐狸螻蚓不過乎螻臘之候表貉貉師祭也音陌於所立表之處祭造軍法者禱氣勢之增倍貙氓注貙人也皛胡了切文選注當為拍普格反葽於堯反盛也程莊子云程生馬嘗觀文字注秦人謂豹曰程余至延州人至今謂虎豹為程蓋言蟲也方言如此抑亦舊俗也筆談獌音萬蜒音延犴音汗胡地野犬也又音岸狖余救反熊熊經鳥申莊子音義經如字李古定反若熊之攀樹而引氣也申如字若鳥之頻呻也捶之纍反擊也胹音而煮熟蹯音煩罼音畢說文田罔也許旱反說文网也天子出有罕車网也又云罕大旗為罔今俗謂網旗蔡雍獨斷曰前驅有九旒雲罕後漢輿服志注武王伐紂百夫荷罕旗以先驅跧阻頑反首去聲注鐘旋旬宣反周禮鳬氏為鍾鐘懸謂之旋旋蟲謂之幹注旋屬鍾柄所以懸之旋蟲有蹲熊盤龍辟邪蹲音存坐也踞也羆憨呼談切癡也貑音家羭音俞黑羝羖音古羊牡曰羖鰌音秋陸佃云鰌今泥鰌似鱔而短無鱗以延自染難握與魚為牝牡追貊上都回反戎狄國名詩其追其貊蠟通作䄍音乍索也襦細密之羅讀為襦有衣袽之繻汝俱反或音須周禮注豺獺音撻水狗魅音媚注貀女骨切亦作豽貍屬蒼黑無前足善捕鼠狼趍辟上七須反下婢亦反條狼上音滌五等公侯伯子男獾音歡徼爾雅音亦牡名獾牝名狼其子名徼絶有力者名迅孫炎曰迅疾也臅音觸內則注狼臆中膏也田俅子漢藝文志有田俅子三篇蘇林曰俅音仇犴音岸褎亦作袖絞户交反蒼黃之色裼音錫玉藻注君衣狐白裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也九裼衣象裘色射侯大射有干侯干五旦反音犴薻車杜子春讀為華薻之薻駹音龎􅍜莫歷反周禮注以皮為覆笭韻書作幭詩韓奕淺幭注覆軾也然果然也駹車然􅍜漆車犴􅍜類鶂五歷反草蟲按莊子音義云方之物類猶如草土異種而同類也蟲作土猿猵狙以為雌猿音袁猵篇面反李音偏狙七餘反狙一名獦牂似猿而狗頭喜與雌猿交也獦音葛雌音妻一音如字亶爰山海經亶音蟬山多水無草木不可以上有獸其狀如狸而有髦名曰類自為牝牡食者不妬猩猩所庚反狒狒音翡與同髲平義反山􅏈許歸反嘄陽淮南子注山精也麡才兮反墳羊國語作羵羊注云雌雄不成者也淮南子注土之精也畢方木之精也狀如鳥青色赤腳一足不食五榖淮南注罔象國語注龍神獸罔象食人一名沭腫注羂工犬反猛氏鋋小矛也市延反桃拔月氏下音支西域國名膊普各反爾雅翼卷十九
