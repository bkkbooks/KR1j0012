body:
  text: 欽定四庫全書爾雅翼卷二十三宋羅願撰釋獸六羜羒牂羭羖羍􅘻豝豵䑕鼷鼯鼷鼢羜羔者羊子之總名其别有四羜者五月生羔也􅧌者六月生羔也羍者七月生羔也䍮者羊未卒歲也而釋畜但載未成羊羜郭氏云俗呼五月羔為羜盖謂羔已生及五月者爾而說文稱五月生羔則似謂仲夏所生按齊民要術稱正月生羔為上種十一月十二月生者次之母既含重膚軀充滿草雖枯亦不羸瘦母乳適盡即得春草是以極佳八月九月十月生者雖值秋肥然比至冬暮母乳已竭春草未生是故不佳其三月四月生者草雖茂美而羔小未食常飲熱乳所以亦惡五月六月七月生者兩熱相仍惡中之甚然則羔以五月生者乃是不美古稱肥羜以速諸父不應用此但當是生及五月者爾然伐木之詩諸父用羜羜者小羊諸舅用牡牡乃大牛禮隆殺不同者羜乃食禮意親而禮數牡乃享禮意重而禮厚所以待諸父與諸舅各有所宜也禮記曰羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也禮之所謂稱者皆如此羒羒者吳羊白羝也羝是牡羊之總名而羒乃吳羊之羝者古者大率多只言羝易曰羝羊觸藩羸其角詩曰取羝以軷漢書匈奴徙蘇武於北海上無人處使之牧羝且云羝乳乃得歸専牧羝而望其乳示武以不得反猶秦之要燕丹以烏白頭而馬生角也羊性好羣而呉羝謂之羒反從分者盖羝性好抵觸齊民要術畜牧之法大率十羊二羝以為羝少則不孕多則亂羣尤取其無角者恐其抵觸以傷胎也然則雖羣也而宜分之羊之有羒羭亦猶木之有枌榆其物相類但當以色為别盖羒為白羝枌亦白榆則猶羒也羭為黑羝榆不能白則猶羭也色白有辨之義故皆從分色黑有不辨之義故皆從俞又今榆者北方有之故古稱榆塞而江南有刺榆無大榆是南方於羊則有羒而無榆於木則有枌而無榆又相類也枌白榆唐韻文牂羊牡羒牝牂廣雅曰呉羊牡一嵗曰牡䍮三嵗曰羝其牝一嵗曰牸䍮三嵗曰牂詩曰牂羊墳首三星在罶盖牡羒牝牂墳猶羒也幽王之時西戎東夷之亂盖始於褒姒而其禍遂連於中國詩人傷之於其末章窮而反本故言牂羊羒首喻婦人而為男子之事猶武王數紂稱牝雞之晨矣三星在罶三星昏姻之星在罶則非其所矣又以歎夫褒姒也牂羊為喪裘之賤者淮南子曰晉文君大布之衣牂羊之裘韋以帶劒威立于海内字說曰犅以乘而不逆為剛牂以承而不隨為臧所謂牂牂言小狠也牂柯者以能入為柯所入為牂欲小狠焉盖牛之性順犅能牡而猶有順性故為乘而不逆羊性狠牂雖牝而猶有狼性故為承而不隨案牂止是牝羊而詩正義欲合墳大首之義稱為牝小羊夫呉羊三嵗稱牂則非小矣五行傳有羊禍說者曰易剛而包柔為離離為火為目羊上角下􅕭剛而包柔大目而不精明視氣毁故有羊禍羭歸藏曰兩壺兩羭郭氏以為羭黑羝引以解夏羊牡羭之義案呉羊則白夏羊則黑而陶隱居稱羊有三四種最以青色者為勝次則烏羊其䍲羺羊及虜中無角羔其乳髓肥好不及都下者今江南以東羊白而豕黑江南以西羊黑而豕白古者為裘則用白者故羔羊之詩曰羔羊之皮素絲五紽是因羔羊之色而用絲也然黑羊自為食之美者故左傳曰專之渝攘公之羭盖諸侯無故不殺牛以羊為食大夫無故不殺羊以犬豕為食羭者公之美食故羭又訓美若專嬖驪姬則將有變竊君之美禄有喪羊之患故易稱刲羊喪羊者皆如此也渝訓變羭以類相從則亦有變之義羭老而為猿列子曰老羭之為猿是也羖羖本夏羊牝者之名以呉羊白夏羊黑今人便以牂羖為白黑羊名羖羊之角主明目安心益氣輕身辟鬼魅虎狼療疥蟲蠱毒結氣止寒洩其角為用最大而詩云由醉之言俾出童羖盖羖之美在角今使出無角之羖羊脅以無然之物猶言而無實不為用也昔秦穆公嘗以五羖之皮贖百里奚號五羖大夫羖為角音又為古音詩以羖與語協韻是也羖在今世但為黑羊之名不取牝義而音又通於牯故本草羖羊條注稱牯羊牯乃牡之名羖音同於牯而稱為羊之牯猶兕音同於牸而稱為犀之牸也羖既通於牯為牡則羭反當為牝故字說取之張湛列子注亦云羭牝羊也字說曰夷羊謂之羒而夏羊謂之羖則由中國之道無分也處之有宜而已夷羊謂之牂而夏羊謂之羭則由中國之道非特承上以為臧有可否之義焉以羖合羒言之以羭合牂言之是以羖為牯羭為牝也不用釋畜夏羊牡羭牝羖之文矣羍羍七月生羔也羊之類易繁一嵗之間母既生子子復生孫孫又生子號為一嵗三生詩曰誕彌厥月先生如達箋云達羊子也后稷之在其母終人道十月而生如達之生言易也盖婦人之生首子其産多難而姜嫄又因履武而感其事尤異夫感異而孕者其生亦異故禹母脩已感石而生禹坼胷而出契母簡翟吞燕卵而生契副背而出今其事類此宜乎有坼副災害而今也生之之易乃如羊子之易則周人所以尊而頌之也羊比於六畜為易生又繁息之物故獨比之猶􅊵吐而生子生之易者故産育謂之娩亦嬎乃􅊵子之名也薛綜荅韋昭曰羊子初生達小名羔未成羊曰羜大曰羊長㓜異名以羊子初生之易故以比后稷生之易也說文亦云羍小羊也從羊大聲讀若逹與說文七月生羔不合當考盖達是七月之羊說者以七月之羊已為成長不當始述其初生之易故更之云初生為達言猶未成羔也然詩既稱先生乃謂首生羊半嵗以上正其首出之時故以其首生之易比達不以達為羊子而比子也則說文之說通矣􅘻􅘻豕四蹢皆白􅘻豕之躁者詩曰有豕白蹢烝涉波矣月離于畢俾滂沱矣豕之性能水牧豬之所必在水草之交故瀦從豬以豬所食息也天將久雨則豕進而涉水波白蹢尤其躁進者故先進焉月離于畢亦將雨之候役者之病惟雨故東山歎零雨其濛今二兆並見則大雨必矣役久病于外者所為歎也在十二少皆配十二支故已象虵豕象亥史晉師伐齊以己亥為三豕是也今既豕又從亥者盖北方之卦水洊至為習坎􅘻豕為水之畜又應於水為能充其類故在物從豕在氣從亥亥者六隂俱盛嫌於無陽論道者惡之故卦以六隂稱龍月以六隂稱陽在物則指事而已六隂氣類相應不嫌於習故從豕而又從亥也豝豝牝豕也凡六畜之屬皆見於釋畜惟豕見於釋獸以豕者通田豕之名故别異之詩曰彼茁者葭一發五豝于嗟乎騶虞豝牝豕也射牝何足以為仁案說文稱豝牝豕一曰二嵗能相把拏也然則豝牝豕之小者故又謂之小豝二章則彼茁者蓬一發五豵盖豕生三為豵豵亦豕子也言雖取害稼之物然亦必待其成淮南子言先王之政魚不長尺不得取彘不朞年不得食今皆一嵗二嵗之豕所以為仁也夫田豕害稼古者迎虎而食之騶虞所發止於害稼之類又所以為仁也必言一發而五者盖騶虞樂官備之詩天子以備官為節王之所向一發而中臣下從之五豝見中其備如此是詩也與吉日之詩畧同吉日之詩曰發彼小豝殪此大兕其序亦云能慎微接下無不自盡以奉其上焉豝一發而五自豝而至兕皆備盡之道也古者田獵大獸公之小禽私之豝小禽也盖吉日之臣自豝而殪大兕不私於已所以為奉上騶虞之君止於豝而已亦不私於已所以為仁也其言小豝又有以見豝豵之相類也雖然王田不取羣今一發而取五者田不取羣當是謂㒺罟之事惡其盡取此射而以藝得之不傷於仁亦孔子釣弋而不綱之義也字說曰豝所謂婁豬巴猶婁也豵豕生三子謂之豵生二則謂之師生一則謂之特郭氏以為豕生子常多故别其少者之名豵从從義猶從也羣以從母有約從之義蘇秦說韓王稱寧為雞尸毋為牛從尸主也一羣之主所以將衆者從從物者也隨羣而徃制不在我者也豵之从從亦牛從之義然在爾雅稱三為豵而召南稱一發五豵者盖詩所稱不特一豕之子又凡稱三者皆自三以徃不特為少者立名且其序曰天下純被文王之化則庶類蕃殖豕既生子常多而又蕃殖於此而言豵則豵為自三以徃之名審矣說文又以小豚為豰生三月為豯生六月為豵或曰一嵗為豵二嵗能相把拏為豝三嵗豕肩相及為豜其說豵與爾雅不同然皆小豕之名故詳著之鼠鼠盗竊小蟲夜出晝匿穴蟲之黠者其種類至多穴於寢廟畏人故也然管仲稱社束木而塗之鼠因徃託焉燻之則恐燒其木灌之則恐敗其塗此鼠所以不可得殺者以社故也以喻君之左右鼠則一耳惟其所處故太倉之鼠飽食而不驚厠下之鼠穢食而畏人李斯所以發憤也好自揚弄其鬚禾稼成時輙相率竊取覆藏之以為冬儲人或掘之得數斗許及橡栗百果皆類此得則奪其一嵗之蓄詩稱相鼠以刺人之無禮者今河東有大鼠能人立交兩脚於頸上或謂之雀鼠韓退之所謂禮鼠拱而立者也相鼠有皮又有齒有體皮外飾也故象人之有儀齒有時以齧有時以止在易艮為鼠故齒象止體者百體之動也說文體字云緫十二屬也盖鼠為十二屬之首又好摩弄其髭相時而進故體象禮呂氏春秋曰周鼎著鼠令馬履之為其不陽也闗尹子曰師拱鼠制禮鼷鼷鼠類之最小者或名甘鼠又名甘口鼠食物當時不覺痛世傳云亦食人項肥厚皮處亦不覺古稱美疢不如惡石夫疢何有美者盖特不覺其痛是以於疢言美恙之字從羊鼷鼠為甘鼠也郭氏謂有螫毒小鼠盖即此俗人諱為此所嚙云衰病之證春秋成公五年正月鼷鼠食郊牛角改卜牛又食其角定公十五年正月鼷鼠食郊牛牛死哀公元年正月鼷鼠食郊牛劉向以為鼠小蟲性盗竊鼷又其小者也牛大畜祭天尊物也角兵象在上君威也小小鼷鼠食至尊之牛角象季氏乃盗竊之人將執國命以傷君威而害周公之祀也改卜又食天重語之也而董仲舒直以為養牲不謹是亦盡矣夫牛有力之畜何至為鼷所食盖將祭之犧皆繫于牢設楅衡以制其角故鼷得而制之鼷之小而牛死焉則食者非一鼠矣凡人猶諱其嚙以為衰病之證况大祀之犧乎鼷穴甚小故淮南曰塘漏若鼷穴一墣之所能塞也本草說鼷鼠云此蟲極細不可卒見則是蟲之極小者耳非鼠之類也漢書社鼷不灌屋鼠不熏顔氏曰鼷小鼠鼯鼯與伏翼皆鼠類而爾雅在釋鳥中以其有肉翼也鼯狀如小狐翼大率如服翼翅尾項脅毛紫赤色背色蒼艾腹下黄喙頷雜白脚短爪長尾三尺許好暗夜行飛且乳亦謂之飛生聲如人呼食火煙能從高赴下不能從下上高東呉諸郡皆有之又謂之梧鼠荀子曰梧鼠五技而窮謂能飛不能上屋能縁不能窮木能游不能渡谷能穴不能掩身能走不能先人雖多技能皆有窮極也鼯既飛走且乳故將娩者持其皮毛則易生今鼯鼠來近人處夜鳴人輙忌之以為旁里當有死者伏甑聴其聲以為能得所呼死者之名云一名夷由一名鸓又名飛蠝又名鼺鼠詳其性乃食煙火獨為不可曉然西域復有火鼠在烈火中人取其毛緝之號火浣布此又何也張揖曰飛蠝飛鼠也其狀如􅊵而鼠首以其􅏋飛山海經曰丹熏之山有獸焉其狀如鼠而􅊵首麋耳其音如嘷犬以尾飛名曰耳鼠鼵鳥鼠同穴之中渭水出焉其鳥為鵌其鼠為鼵鼵如人家鼠而短尾鵌似鵽而小黄黑色入地三四尺鼠在内鳥在外在隴西首陽縣孔氏尚書傳云共為雄雌張氏地理記不為牝牡案此鼠在内鳥在外則似不為牝牡管子曰楚人攻宋鄭燒焫爟焚鄭地使城之壊者不得復築也屋之燒者不得復葺也令其人有喪雌雄居室如鳥鼠處穴是不為牝牡之義也然由古迄今不應二物長存儻不為牝牡則其類不續顧無得而知之又沙州記云寒嶺去大陽川三十里有雀鼠同穴之山既以此二蟲為名書傳從簡或只謂之鳥鼠山而王肅解禹貢遂稱鳥鼠同穴皆山名後之說者因以為二山可笑也鼢鼢形如鼠大而無尾黑色長鼻甚强常穿耕垣中行故郭氏云鼢鼠行地中者也陳藏器云今之鼢鼠小口尖者隂穿地而行見日月光則死深山中林木下有之盖鼢伯勞所化而又能化而為鴽季春之月田鼠化為鴽許慎云田鼠鼢鼠也鴽鶉也據迎貓食田鼠則鼠能害稼者今鼢鼠不敢見日月光則似不能害稼謂之田鼠未知其審說文云鼢地行鼠伯勞所化也一曰偃鼠故陶隱居云鼹鼠一名隱鼠一名鼢鼠而山林中有獸大如水牛者亦名鼹鼠說者以為即飲河者鼹鼠有二物異名同然莊子云鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹以鷦鷯是鳥之小者而巢深林偃鼠是鼠之小者而飲大川言雖之大處猶止於極量而反故當謂此鼢鼠不當謂如牛者也夏小正八月鴽為鼠音釋羜文與切未成羊也􅧌亡具切羍他達切䍮雉矯反音兆羝丁兮切軷音䟦將行祭名牂子唐反罶音溜大布粗布也羭音俞兩壺兩羭歸藏者成湯所作是三易之一也兩壺兩羭者齊母經瞿有之文也案彼云瞿有瞿有觚宵梁為酒尊於兩壺兩羭飲之三日然後鯀士有澤我取其魚是也爾雅注疏䍲女奚反羺奴溝反羖公戸反羍他逹反嫄音原副孚逼反娩音免子母相解嬎孚萬切􅘻胡來古來二切蹢音的蹄也豝布家切豵子公切約從音縱豰許卜切豯下雞切豜公田反鼷胡雞反楅音逼以一木横於角端一墣普木切塊也淮南又言土勝水者非以一墣塞江也鼯音吾鸓音壘鼵徒忽反音突鵌爾雅音徒鵽丁刮切爾雅注鵽大如鴿似雌雄鼠脚無後指岐尾為鳥憨急羣飛出北方沙漠地焫與爇字同熯而善反鼢扶粉反鴽音如毋無也鶉䳺之屬母音牟當作胡簟切田鼠也鼹音偃爾雅翼卷二十三
