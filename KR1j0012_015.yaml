body:
  text: 欽定四庫全書爾雅翼卷十五宋羅願撰釋鳥燕雀鶉鷸鷽鳽鸛鴗鶂比翼燕燕有兩種越燕小而多聲頷下紫巢於門楣上謂之紫燕亦謂之漢燕胡燕比越燕而大臆前白質黒章其聲亦大巢懸於大屋兩榱間其長有容匹素者謂之蛇燕古皆謂之𤣥鳥齊魯謂之乙取其鳴自呼其字乙卬首下曲與甲乙之字少異而音不同其尾歧分故物或取象燕尾尤為光澤故漢書曰燕燕尾涎涎美好之貌也以春分來秋分去開生之候其來主為孚乳蕃滋故古者以其至之日祠髙禖以請子契因是而生故詩曰天命𤣥鳥降而生商或曰契母簡翟吞乙卵而生契故契號𤣥王賜姓子氏成湯紹其祖而字天乙後代以子加乙為孔氏乙至得子則名嘉而字子孔又人及鳥生子謂之乳亦从乙从孚荆楚之俗燕始來睇夏小正二月燕乃睇有入室者以雙箸擲之令人有子皆燕乙為生子之驗然稱簡翟吞卵似不其然予按帝少皥以𤣥鳥為司分之官或者簡翟之家有娀氏之先在少皥時嘗為之尊其先故曰降契以𤣥鳥氏之出故宅殷土芒芒廣大如春秋傳所謂爽鳩氏始有齊地云耳何必吞乙卵而後為命𤣥鳥也哉秦之先女脩織𤣥鳥隕卵女脩吞之生火業燕之居甚安故古以為燕居燕享之燕然安不可懷故又有燕安酖毒之戒至其去也多藏深山大空木中無毛羽或蟄藏坻岸中郗鑒避難嶧山百姓飢饉掘蟄燕食之亦云入水為蜃蛤淮南云燕之為蛤是也今人言蜃是蛟類吐氣為樓臺伺燕栖集則食之又言龍噬燒燕水枯竭者投之立漲今人亦投以求雨人食燕者則不可以適河然則燕與蛟龍蜃蛤之氣相往來盖水類𤣥中記曰千嵗之燕户北向燕之來去皆避社又戊已日不取土以戊已字書其巢上則去之豈社主於土戊已又土位土尅水燕之所為避歟説文燕作巢避戊已春秋運斗樞曰瑤光星散為燕雀雀小隹依人以居其小者黄口貪食易捕老者益黠難取號為賔雀淮南子季秋候鴈來賔雀入大水為蛤許叔重釋之曰賔雀者老雀也栖宿人家堂宇之間如賔客也崔豹古今注亦云雀一名嘉賔其所入之水盖淮水故趙簡子云雀入子淮為蛤雉入于淮為蜃盖二物皆化於淮水中故江以鴻止而鴻从之淮以雀化而雀从焉此雀所以為隹也或云雀入海為蛤性極多欲至矄黒輒盲人至其時用目力不止者亦得雀盲之疾性不能為巢穿屋居之力能勝燕或銜艾子燕巢中燕棄去則居之召南之詩曰誰謂雀無角何以穿我屋誰謂䑕無牙何以穿我墉雀䑕善竊而好淫以喻彊暴之男屋與墉者禮之界也雀之穿屋以咮不以角鼠之穿墉以爪不以牙彊暴之男所以侵陵貞女亦不在家之有無也彼其彊暴之人既至于訟必且從而自罔曰我既有家矣不應復為此侵陵之事故貞女從而詰之曰吾誰問雀角之有無但問吾屋之何以穿而已誰問鼠牙之有無但問吾墉之何以穴而已誰問汝家之有無但問何以速我訟於獄而已盖貞信之教興則人辭簡而理盡此召伯之所化也雀之字通於爵古作飲器以為名象爵之形中有鬯酒又持之也所以飲器象爵者取其鳴節節足足也量亦取象焉其法用銅方尺而圜其外旁有庣焉其上為斛其下為斗左耳為升右耳為合龠其狀似爵以縻爵禄盖雀者啄粟之鳥量起於黄鍾之龠以子穀秬黍中者千有二百實其龠故以比云其冠服則爵弁者冕之次廣八寸長尺二寸如爵形前小後大繪其上似爵頭色其色赤而㣲黒若雀頭然或謂之緅盖纁而再染以黒者王之䘮車漆車雀飾亦是此色春秋運斗樞曰瑶光星散為雀異苑魏肇初生冇雀飛入其手占者以為封爵之祥鶉鶉鳥之淳者其居易容其欲易給竄伏淺草之間隨地而安故言上世之俗曰鶉居而鷇食也尾特秃若衣之短結傳稱子夏貧衣若懸鶉又今有郭公鳥者名襤褸鳥襤褸亦衣短秃之名意相類也列子言蛙化為鶉淮南云蝦蟇為鶉聞昔至道年中秋間京師鬻鶉者積於市枚直二錢是秋雨水絶無蛙聲人有得於水次者半為鶉半為蛙又云䑕亦化鶉莊子曰吾未嘗好田而鶉生於穾司馬彪云穾東北隅一曰東南隅鶉火之地故生鶉也詩言鶉之賁賁以刺衛宣姜公子頑賁賁者徤鬬之貌鶉性雖淳然特好鬭今人以平底錦囊養之懷袖間樂觀其鬬大率食粟者不過再鬭食穄者尤耿介一鬬而已物之小而健無若此者然鵲雖處髙彊彊然不失其類鶉雖處下賁賁然而無慕於髙髙下各得其所以言人之不如也賁如虎之賁駒之賁皆彊猛之象天文東方朱鳥之次有鶉名説者以為東方蒼龍七宿有角有亢有尾南方朱鳥七宿有喙有嗉有翼而無尾取象於鶉予以左傳考之有鶉之賁賁天䇿焞焞火中成軍虢公其奔言鶉火之星其象亦賁賁然與詩言鶉鵲者相類又司馬彪以東南隅鶉火地生鶉則天文之鶉當與地之鶉相應然七宿雖無尾而其次有鶉首鶉火鶉尾又鶉號朱鳥與蒼龍白虎𤣥武神靈偉異之物並列則似不應取於此按禽經青鳯謂之鶡赤鳯謂之鶉盖鳯昻首長尾而身又赤故可以應鶉首鶉火鶉尾之象而與彼龍虎龜蛇相配鶡冠子亦曰鳯鶉火之禽陽之精也當待識者斷之鷸鷸似燕紺色生鬱林盖今之翠鳥也巢於木杪生子夷人稍徙下其巢子大未飛便取之謂之翡翠郭璞謂賈害以采説文翡赤羽雀翠青羽雀也異物志曰翠鳥形如燕赤而雄曰翡青而雌曰翠翡大於翠其羽可以飾幃帳故稱翡帷翠帳或云鳥各别異非雄雌别名也此鷸一名翠鷸則是其翠者然又名紺燕以説文考之紺深青而揚赤者也則翡盖亦翠之揚赤者通可稱鷸耶周書王會云蒼梧翡翠漢南越獻翠鳥生翠古者鷸冠飾鷸羽于頂鄭子臧好之鄭伯聞而惡之使盜殺之説者曰鷸水鳥天將雨則鳴故知天道者冠焉其冠前圓一謂之圓冠禮記曰知天者冠述知地者履絇莊子亦云冠圓冠者知天時履句屨者知地形緩佩玦者事至而斷此魯國之儒服也哀公嘗以此號於國中曰無此道而為此服者其罪死而魯之敢服者惟一丈夫耳問以國事千轉萬變而不窮然則固非子臧之所冝服也漢天地五郊明堂育命舞樂人服之亦天道所係此建華冠也術氏冠亦謂之鷸冠象鷸鳥形畫鷸羽為飾紺色司天文者冠之盖術氏即鷸音之轉爾然建華冠後漢輿服志以為鷸冠明所施用用鷸飾前圓術氏冠前亦圓吳制差池邐迤四重趙武靈王好服之漢不施用獨有其圖爾又乃畫鷸其義似迂逺音即近鷸未敢臆斷也鷸韋昭以為翠鳥張晏以為赤足黄文以其毛飾冠顔師古以謂鷸大鳥即戰國䇿所謂啄蚌者翠鳥自有鷸名而此飾冠者非翠鳥也字學家稱翠鷸似燕紺色生鬱林知天將雨故知天文者冠然古者以毛飾羽如翠被翠旍之類乃獨取於似燕者此術氏冠云紺色則亦翠廣志翡色赤翠色紺當待識者詳之鷽鷽山鵲也似鵲而有文彩長尾觜脚赤又謂之雗字説曰善鬭謂之雗非不健也然尾長故飛不能逺譬諸強學務末勝本則其出入亦不能逺今人皆養之以鬭其在籠中亦能揚其米以誘雀雀至捕而食之又能傚鷹鷂之聲其字從學未必不以此説文雗鷽山鵲也知未來事鳥也孫愐唐韻云雗鵲鷽别名又解鳱字云鳱鵲鳥名知未來事噪則行人至鵲或作䧼䧼鄭氏注大射儀云鵠鳥名射之難中以中為雋是以於侯取名引淮南子鳱鵠知來所謂正者亦鳥名齊魯之間名題肩為正正鵠皆鳥之㨗黠者按淮南稱乾鵠知來而不知往猩猩知往而不知來説者以為巢避風為知來卵為兒童所捕則不知往也猩猩能知捕者之名則為知往竟遭網罟則為不知來又淮南云夫鵲先識嵗之多風也去髙枝而巢扶枝大人過之則探其鷇嬰兒過之則挑其卵知避逺難而忘近患則是直謂鵲耳然此山鵲亦云知來又雗鵠名同於乾鵲則似是山鵲爾顧古人皆以鵲解之未知其審釋器云象謂之鵠角謂之觷犀謂之剒玉謂之雕取四鳥之名不知其故今鳩似山鵲謂之鷽鳩子虚賦注鵠水鳥也其鳴聲鵠鵠云鳽鳽似鳬而脛髙有毛冠江東人養之以厭火災又謂之交精説文謂之鵁鸕精目精也鸕猶矑也言其目精交也禽經曰旋目其名䴉方目其名鴋交目其名鳽觀其眸子命名之義備矣上林賦曰交精旋目説者曰今荆郢間有水鳥大於鷺而短尾其色紅白深目目旁毛皆長而旋此其旋目乎鳽巢於喬木鶵未能飛皆䘖其母翼以飛周禮職方氏揚州荆州其畜冝鳥獸先儒謂鳥獸孔鸞鵁鶄犀象之屬盖鳽雖㣲禽毛羽可尚是以與孔鸞犀象同列為南方所冝珍禽竒獸矣蜀糜竺家當有火厄收鵁鶄數千頭養池渠中以厭火或曰羽毛之類非禦烈火之物盖其焚自陽燧旱燥而生以方諸厭之鵁鶄之音與方諸相亂爾然古今厭火盡用水物如漢宫殿脊作蚩魚形又號屋仰為井皆畫水藻蓮芰之屬鵁鶄亦水禽或自能厭火未可知爾李衛公言鵝能警盜鵁鶄厭火孔雀辟惡唐明皇遣宦官詣江南取鵁鶄鸂䳵置苑中倪若水諌縱散之鸛鸛似鴻而大長頸赤喙白身黒尾翅别名黒尻皁裙負釜背竈皆以尾翅黒為名也木上作巢大如車輪卵如三升杯泥其巢一傍為池含水滿之畜魚其中稍稍以哺其子故楊震有鸛衘三鱣魚墮講堂以為升進之象也巢中水有礐石養之故不竭得之者可為藥用性好旋飛古者有鵞鸛之陣今江淮謂羣鸛旋飛為鸛井惟鶴亦然其旋飛必以風雨鸛是好水之鳥知天將雨則長鳴而喜詩曰鸛鳴于垤婦歎于室天之將雨則蟻封土為垤而鸛又鳴其上則零雨其濛者至矣此思婦之所為歎也然見人探其子則徑捨去能致數十里旱以其羣飛激雲雲散雨歇故也禽經曰鸛生三子一為鶴鳩生三子一為鴞言萬物之相變也易之中孚九二鳴鶴在陰上九翰音登于天説者以為鸛者别於鶴也震為鶴陽鳥也巽為鸛陰鳥也鶴感於陽故知夜半鸛感於陰故知風雨鸛生鶴者巽極成震極陰生陽之謂也今人通呼鸛為鸛鶴説文則以鳴于垤者為雚雚小爵也與毛詩説異鴗鴗天狗郭氏云小鳥也青似翠食魚江東呼為水狗今此鳥穴土為巢嘗冬月啟其穴横入一尺許生雛其中其咮皆紅項下白亦來人家陂池中竊魚食之今人謂之翠碧鳥又謂之魚狗或曰小者為魚狗大者名翠奴亦有斑白者俱能水上取魚其尾亦可為飾其肉治骨鯁性所冝爾鶂鶂水鳥也説文曰鶃字或作鷊作作鷁善髙飛能風能水古者天子舟首象鷁所以厭水神淮南云龍舟鷁首如是古矣上林賦櫂鷁牛首漢人舡首猶畫青雀穆天子傳乗鳬舟龍舟注猶今呉之青雀舫盖其遺制其交則雄鳴上風雌鳴下風而孕故莊子以鶂為風化風化者自上風以靡物有類於君師之化黄帝之謁廣成必從下風以此也然鶂既能風矣而春秋書風有六鶂退飛何哉盖廣川之鳥獸常預避其災是鳥將進遇風而退未必為風所排也特其相接而過宋都襄公以為祥故其辭布於諸侯事適然耳如海鳥爰居止於魯東門之外二日賴展禽一言魯人不復以為異則不復告也説者廼曰五石六鶂之辭不設則王道不亢矣夫視之則隕察之則石徐而察之則五此其設辭之先後與孟子所謂繋馬千駟者何異視之則六察之則鶂徐而察之則退飛此與晉史三豕渡河者何異遣辭適有冝爾又安取王道哉説者泥於此則白馬非白馬黄馬驪牛三之論紛然起矣且夫六者吾不知其為退飛之數耶或者如五鳩九扈為鶂之名耶禽經曰鳥六曰鶂然則六鶂之説古未有考者比翼南方有比翼鳥焉不比不飛其名謂之鶼鶼狀似鳬青赤色一目一足一翼相得乃飛張司空以為一青一赤在參嵎山則是二鳥異色者昔成周為王會則巴人獻之與孔鸞鳯鳥之屬偕陳於庭後王徳薄不能及逺則此貢遂絶世徒傳誦以為四方之異氣云爾及齊桓公稱霸而欲封禪管仲度桓公不可窮以辭乃設之以事曰古之封禪鄗上黍北里禾所以為盛江淮間一茅三脊所以為藉也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉桓公為是而止盖鄗上即鎬京周天子之都黍固不可得北里衛地時方為狄所據江淮之茅則荆楚不貢已久至興召陵之師責以王祭而僅共命然情猶不服故師復進次于陘而欲貢之於封禪益知其不可也比目之魚不知何國所貢要亦淮夷吳越之類而當時蠻夷大國有不服齊者至於比翼所出巴人之國則在楚之西廹近楚先是魯桓公九年巴子使韓服告于楚請與鄧為好楚子使道朔將巴客以聘於鄧盖楚以強嘗役屬之齊安能出其貢物耶若夫物之不召而自至者則固不待言此桓公所以遂止耳此鳥世所希見然不為異至晉王嘉記事乃稱成王時燃丘國獻之狀如鵲而多力厯百有餘國十有餘年而至洛邑又云銜南海丹泥巢崑岑𤣥木者可知其誕也字書一名山海經崇吾山有鳥狀如鳬一翼一目相得乃飛名曰蠻爾雅曰南方管仲乃云西海其説異也瑞應圖王者徳及髙逺則至音釋燕𤣥鳥之乙烏轄切説文作乙甲乙之乙於筆切説文作乙其尾岐分説文作涎涎徒見切髙禖下音梅月令注燕以施生時來集人堂宇而孚乳嫁娶之象也媒氏之官以為候髙辛氏之世𤣥鳥遺卵娀簡吞之而生契後王以為媒官嘉祥而立其祠焉變媒言禖神之也契息列反睇音悌夏小正二月來降乃睇睇者眄也眄者視可為室者也雀小隹音錐黠胡八切咮音晝鳥口庣音祧不滿之貌緅音鄒青赤色鶉居鷇食鷇口豆切莊子音義鶉居謂無常處也鷇食言仰物而足也穾音杳賁賁音奔嗉音素鳥吭容食處焞徒門切又他門切鷸以聿切賈音古冠述莊子鷸冠注尹必反徐音述本又作麷音同韻書述通作術説苑知天道者冠鉢絇或作句履句莊子音義句音矩徐俱反李云方也邐迤上力紙切下移爾切廣韻邐迤連接與鷸字同翠旍旍與旌同鷽説文胡角切雗侯幹切鳱古安切䧼古沃切正音征鷇口豆切鳥子欲出者鵠觷剒雕爾雅注鵠音斛觷音嶽剒音錯郭云謂治其樸俱未成器有此四名也鳽古賢切䴉音儇鴋音紡鵁音交鶄音精陽燧音遂金也取金杯無縁者熟摩令熱日中以當日下以艾承之則燃得火方諸陰遂大蛤也熟摩拭令熱月盛時以向月下則水生以銅盤受之下水數滴淮南子注厭之於涉切鸂音溪鵣音敕鸛尻丘交切鱣音善音譽毒石出漢中蠶食而肥鼠食而死鴗説文力入切鶂午的切鷊鷁與鶂字同櫂直孝切與棹同牛首池名扈音户九扈農桑候鳥扈民不婬者也扈止也謂止民使無過時比翼比上聲並也鄗通作鎬合老切漢郊祀志許各反藉才夜反盛音成陘音刑音蠻爾雅翼卷十五
