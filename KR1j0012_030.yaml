body:
  text: 欽定四庫全書爾雅翼卷三十宋羅願撰釋魚鯨鯢鰐鰩鮫蝦虴蜮蜎蛭科斗蝸牛蟾蜍鯨鯨海中大魚也其大橫海吞舟穴處海底出穴則水溢謂之鯨潮或曰出則潮下入則潮上其出入有節故鯨潮有時江賦曰介鯨乘濤以出入春秋左氏傳曰古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝按崔豹古今注稱鯨大者長千里小者數丈一生數萬子常以五六月就岸生子至七八月導從其子還大海中鼓浪成雷濆沫成雨水族驚畏一皆逃匿莫敢當者其雌曰鯢大者亦長千里蓋鯨鯢有力能驅食小魚故以喻夫強曓而凌弱者如獸之有猰㺄如蟲之有長蛇如鳥之有鴟梟然京觀之喻不取於彼而獨言鯨鯢者蓋鯨鯢導從數萬子跋扈大海中有渠魁之義且其死也彗星應之而出吳都賦所謂鰴鯨輩中於羣犗欃槍曓出而相屬是也王者之行戮亦除舊布新之義故以鯨鯢言之鯨從京京大也亦京觀之義歟不唯水族畏之而已海畔之獸有蒲牢者大聲如鐘而性畏鯨食於海畔鯨魚或躍蒲牢輒鳴故鑄鐘欲聲大者作蒲牢形其上斫撞為鯨形天子出則擊之故因謂鐘之撞為鯨魚東都賦曰發鯨魚鏗華鐘是也晉武帝時吳郡臨平岸崩出一石鼓擊之不鳴張華請以蜀桐作魚形扣之聲徹十里豈鼓亦有蒲牢狀耶三輔舊事清淵北有鯨魚刻石為之長三丈鯢鯢者鯨之雌亦長千里吳都賦曰長鯨吞航修鯢吐浪言其為患同也説文以鯨為海大魚或從京鯢刺魚也則似異類然或各即其異者而言之未可知爾魏武四時食制曰東海有魚如山長五六里謂之鯢時死岸上膏流九頃異物志曰鯨鯢或死於沙上得之者皆無目俗言其目化為明月珠詳此等大魚似不為物所制然屢有死者蓋形體既大易至於碭而失水也隋書倭國有如意寶珠其色青大如雞卵夜則有光云魚眼精今海中有鮣魚長三尺許無鱗身中正四方如印扶南俗云諸大魚欲死鮣魚皆先封之然則自有時耳鄧析子曰釣鯢者不於清池池之清淺者不應有鯢也鰐鰐魚南海有之四足似鼉長二丈餘喙三尺長尾而利齒虎及鹿渡水鰐擊之皆中斷以尾取物如象之用鼻往往卷取人家所畜羊豕食之其多處大為民害亦能食人既飽浮出水上若昏醉之狀今虎食人後亦復肉醉蓋其類也土人伺其醉殺之其生子則出沙上乳之卵如鶩卵亦有黃白可食人有得鰐者斬其首而乾之琢去其齒旬日間更生如此者三乃止吳都賦曰烏賊擁劒􅔢鼊鯖鰐涵泳乎其中潮州舊多韓愈移文祭之一夕雷雨皆逺徙是亦靈矣鰐又作咸平中陳堯佐捕得戮之圗其形為贊鰐大者數丈或玄黃或蒼白似龍而無角類蛇而有足睅目利齒見之駭人卵化山谷間大率為鰐者十二三餘或為黿或為龜説文似蜥易長一丈水潛吞人即浮出日南鰩文鰩魚出南海大者長尺餘有翅與尾齊一名飛魚羣飛水上海人候之當有大風吳都賦云文鰩夜飛而觸綸是也西山經曰鰩魚狀如鯉魚身鳥翼蒼文白首赤喙常從西海遊於東海以夜飛音如鸞見大穰鮫鮫出南海狀如鱉而無足圓廣尺餘尾長尺許皮有珠文而堅徑可以飾物今揔謂之沙魚大而長喙如鋸者名胡沙性良而肉美小而皮粗者曰白沙肉強而小有毒南人皆鹽為脯刮皮去其沙翦以為鱠可寄千里食味之珍者至用為器物之飾則從古以然伊尹請令正東苻婁仇州之屬以魚皮之鞞鮫利劒為獻鞞刀削也盾也荀子史記曰寢兕持虎鮫韅彌龍所以養威又詩象弭魚服衛夫人乘魚軒楚人鮫革犀兕以為甲鞈如金石宛如巨釶慘如蜂蠆輕利僄遫卒如飄風漢乘輿佩刀黃金通身貂錯半鮫魚鱗金漆錯雌黃室諸侯王黃金錯環挾半鮫黑室公卿百官皆純黑不半鮫明以此為貴也至黃門虎賁則以白珠鮫為􅝑口之飾以其近君也今人亦以飾刀靶之屬以其皮有珠故水中織綃泣而出珠者亦謂之鮫人任昉述異記曰南海中有鮫人室水居如魚不廢機織其眼能泣泣則出珠木玄虛海賦所謂天琛水怪鮫人之室是也鮫一名䱜謂之鮫䱜魚惟吳都賦既有鮫又有鱕䱜故釋者以背上有甲珠文堅強可以飾刀口為鑢者為鮫其有橫骨在鼻前如斤者為鱕䱜東人謂斧斤之斤為鱕此魚所擊無不中斷者然則鮫是白沙鱕䱜是胡沙也要是一類特彼以鼻上有斧為異耳又有出入䱜子常隨母行驚則從口入母腹中尋復出或曰子朝出求食暮還入母腹腹中容四子頰赤如金甚健網不能制俗呼河伯健兒鮫既世所服用人多識者特其音與蛟龍之蛟同先儒解者或有差互淮南子曰一淵不二蛟許叔重以為蛟者魚之長其皮有珠今世以為刀劒之口者是也一説魚二千斤為鮫是以二物為一物也皮有珠飾刀劒者是鮫䱜之鮫滿二千斤為魚之長是蛟龍之蛟蝦蝦多鬚善遊而好躍其字從假物假之而逺者今水母不能動蝦或附之則所往如意荀卿曰假輿馬者非利足也而致千里假舟楫者非利水也而絶江河水母之假於蝦亦其類釋魚以鰝為大蝦郭氏云出海中長二三丈鬚長數尺今青州呼蝦為鰝音豐鎬之鎬按廣中有紅蝦杯出潮州潘州縣南巴縣大者長二尺土人多理為杯或扣以白金轉相餉遺亦謂之蝦頭杯又古人有以其鬚為簪杖者晉時南陽滕修為廣州刺史人有言蝦鬚長丈者不之信其人後至東海取鬚長四丈四尺封以寄之今閩中五色蝦長尺餘具五色梅蝦梅雨時有之蘆蝦青色相傳蘆葦所變白蝦青蝦各以其色泥蝦相傳稻花變成多在田泥中一名苗蝦蝦性好遊今診脈者有雀啄蝦遊之屬以為惡候又海中有蝦姑狀如蜈蚣云管蝦虴虴生東海正白濛濛如沫又如凝血從廣數尺方圓生氣物也有智識無腹藏無頭目處所故不知避人衆蝦附之隨其東西虴以蝦為目無蝦則浮沉不常得兩蝦附其下泛水如飛矣蝦見人則驚虴亦隨之而沒故曰蝦動虴沉江賦曰璅蛣腹蟹水母目蝦也蓋虴一名水母又曰鮓魚又名樗蒲魚今浙人通呼蝦虴又名海靻食之俗云潮之來也虴隨之而來羣蝦擁之若竹槎然槎者藩籬障塞之名也故謂之槎潮退則蝦棄之陸故為人所獲或曰在海中不淨海神惡焉驅與人食之博物志但云從廣數尺方圓物類相感志云大者如牀小者如斗蜮蜮一名短弧一名射工一名溪毒生江南山溪水中甲蟲之類也長一二寸有翼能飛口中有橫物如角弩如聞人聲以氣為矢激水以射人隨所著處發瘡中影者亦病而瘡不即發病如大傷寒不治殺人或曰見人則以氣射人去二三步即射所中什六七死冬月蟄澗谷間大雪時索之此蟲所在其雪不積氣起如蒸掘之不過入地一尺則得也詩曰為鬼為蜮則不可得以况隂中人者春秋魯莊公十八年秋有蜮榖梁傳曰一有一亡曰有蜮射人者也劉向以為蜮生南越越地多婦人男女同川淫女為主亂氣所生故聖人名之曰蜮蜮猶惑也在水旁能射人近射妖也天戒莊公勿取齊女將生淫惑篡弒之禍劉歆則以為蜮盛暑所生非自越來説者又言水弩狀如蜣蜋尾長四寸即弩也見人影則射南越志云水弩四月一日上弩射人影至八月卸弩此云弩在口彼云弩在尾差不同顔師古以為短狐即射工亦呼水弩當是一物而説文稱蜮似鱉三足以氣射害人孫愐亦稱蜮短狐狀似鱉含沙射人陸璣毛詩疏亦云蜮短狐一名射影如龜三足江淮水皆有之在岸影見水中投人影則殺人故曰射影南方人欲入水先以瓦石投水中令濁乃入或含細沙射人入人肌其瘡如疥則蜮乃是三足鱉鯀所化為能者與甲蟲有異姑兩存之蜎蜎蠉井中小蛣蟩赤蟲一名孑孒此郭氏説也今水中小赤蟲無足其細如縷長二三分細沙中有穴如針孔俗呼沙蟲莊子井蛙之喻以還虷蟹與科斗莫吾能若虷謂此物後鄭注考工記刺兵欲無蜎云蜎亦掉也謂若井中蟲蜎之蜎言若此蟲之蜎蜎擾擾然則此蟲亦好動矣若孑孒則化蚊者其大小長短略與此相類而物色不同淮南子曰孑孒為蚊許叔重曰孑孒結蠆水上到跂讀廉二字疑豫按説文孑無右臂也一曰單也健也孒無左臂也一曰孑孒短也今孑孒春秋間積水惡濁則生之其身既短好聳腰而上羣浮水際遇人暫下其行一曲一直獨以腰為力若人無臂然又終朝不已若甚健者故有孑孒之名孒又音吉孒音厥又九勿切或為蛣蟩字異而音義同俗又名釘倒蟲即許氏到跂之義也經日稍久則蛻而為蛟足有文彩白黑相間慘於常蚊葛稚川之書曰蠛蠓之育於醯醋芝檽之産於木石蛣蟩之滋於汚淤翠蘿之秀於松枝非彼四時所創匠也言皆因物成形自無而有耳段成式云水蛆南方溪澗中多此蟲長寸餘色黑夏深變為虻螫人甚毒此類長寸而為虻則又大豫别而論之蛭水中蟲入人肉者為蛭爾雅一名蟣其讀如祈今人呼水蛭大者長尺呼馬蛭亦呼為馬蜞蜞即古語蟣也又别其所生有石蛭草蛭泥蛭之異並能傅著人及牛馬股間咂其血甚者入肉中産育為害耘者尤以為苦楚惠王食寒葅而得蛭因遂吞之腹有疾而不能食懼膳夫得罪有仁人之言是夕也惠王之後而蛭出其久病心腹之疾皆愈論衡曰蛭食血之蟲惠王殆有積血之疾故食食血之蟲而疾愈也而陶隱居亦以為蛭能去結積雖曰隂祐亦物性兼然古法有以此啖瘡者卒求之不可得崔知悌令兩京無處預養之以備緩急一名馬蟥余嘗遊野廟廟中繪后稷母踐巨人迹及生稷棄之及岐嶷種樹長乞榖種於神農神農使馬皇載榖種賜之乃畫水蛭無數為可嗤也又有一種細而長亦入人肉曵之輒斷俗呼爛蜞假成式云科斗科斗蝦蟇子也蝦蟇曵腸於水際草上纒繳如索日見黑點漸深至春水時鳴以聒之則科斗皆出謂之聒子古所謂鸛影抱蝦蟇聲抱者也頭圓色黑始出有尾而無足稍大足生而尾脫或曰月大盡生前兩足小盡生後兩足故卞彬譏令史咨事云科斗唯唯羣浮暗水唯朝繼夕聿沒如鬼言其出沒不常也亦自相啖齧伺其前者銜其尾隨其上下而頓掣之則前者尾斷而死矣今俗謂之蝦蟇臺亦謂之蝦蟇黏山海經胡中其水多活師爾雅則謂之活東崔豹古今注云一名懸針一名玄魚以其狀如魚其尾如針又併其頭尾言之則似斗也然崔言聞雷則尾脫而腳生此為未盡皆腳具而尾始脫耳古有科斗篆取象於此魯恭王壞孔子舊宅於壁巾得孔子先人所藏古文虞夏商周之書及傳論語孝經皆科斗文字是時去秦未逺而孔安國以為科斗書廢已久時人無能知者遂以伏生所傳定其可辨者更以𨽻古字按字源云庖犧氏獲景龍作龍書炎帝因嘉禾作穗書蒼頡變古文寫鳥迹作鳥迹篆少昊作鸞鳳書取似古文髙陽作科斗書云又今人作粉餌象科斗形謂之斗蝸牛蝸牛似小螺白色生池澤草木間頭有兩角行則出驚則縮首尾俱能藏入殼中盛夏日中則自懸樹葉下往往升髙涎沫既盡隨即稿死一名蝸蟲以其有兩角故以牛名三蒼云蝸小牛螺也俗謂之蝸牛又蝸字有瓜戈二音故魏隱者焦先自作一瓜牛廬瓜即蝸也為廬舍圓而小如蝸牛之殼云蝸牛之殼乃是區量中之最小者故戴晉人説梁王以國於蝸之左右角者曰蠻氏觸氏怒而相攻伏尸百萬逐北旬有五日而後反以梁王無以異於蠻氏蠻傷也為觸所傷此所以極區內大小之見也一名螔蝓音移臾一名陵蠡一名土蝸一名附蝸螔蝓入三十六禽又是四種角之例營室之精云尚書大傳曰巨定螺鄭玄曰巨定澤也螺蝸牛也今按內則蝸醢而苽食豈謂是耶中山經曰青要之山實惟帝之密都北望河曲禹父所化也是多倮纍蒲盧倮纍者蝸牛也又有一種無殼者其形稍大人家濕處多有之云是蝸牛之老者蟾蜍蟾蜍者蝦蟇之類釋魚鼁􅖚蟾諸注云似蝦蟇居陸地而説文云圥鼀詹諸也其鳴詹諸其皮鼀鼀其行圥圥又云􅖚􅠴詹諸也詩曰得此􅖚􅠴言其行􅠴􅠴韓詩薛君亦曰得此戚施戚施蟾蜍喻醜惡也則衛宣公之可惡甚矣今之蚵蚾背上礧礧好伏牆隂壁下者五月五日得之謂之辟兵為物絶夀乃云有千歲者古稱月中有蟾蜍故春秋運斗樞曰紀乖政則蟾蜍月精四頭感翔河圗曰蟾蜍去月天下大亂淮南子曰月照天下食於詹諸許叔重以為詹諸月中蝦蟇食月夫日月之食莫有知其審者故聖人書日有食之言若有物食之者而不知其名云爾闕疑之義謹重之至也後世詩人皆祖叔重之説以為蝦蟇所食然按張衡靈憲云羿請不死之藥於西王母常娥竊之以奔月遂託身於月是為蟾蜍然則詹諸蓋常娥之别名非蛙黽之類也顧無得而考之梓人以脰鳴者蛙黽屬蟈氏去蛙黽焚牡蘜以灰灑之則死以其煙被之則凡水蟲無聲齊魯之間謂蛙為蟈黽耿黽也蟈與耿黽尤怒鳴為聒人耳去之牡蘜蘜不華者月令云蘜有黃華是牝蘜也壺涿氏除水蟲以炮土之鼓驅之以焚石投之水蟲狐蟈之屬漢元鼎五年秋蛙蝦蟇鬭蛙似蝦蟇而長腳其色青越勾踐軾怒蛙漢以蛙供祭宗廟音釋鯨介鯨介大也文選注鰴音輝魚有力者猰貐音軋愈獸名出南海外虎文龍爪食人犗騬牛也騬以陵切欃槍上楚銜切下丑庚切鯢鯨與鯨字同碭音蕩鮣一刃切魚如印鰐擁劒吳都賦注蟹屬從廣二尺許有爪其螯偏大大者如人大指長二寸餘色不與體同特正黃而生光明常忌護之如珍寶利如劒故曰擁劒其一螯尤細主取食出南海交趾􅔢鼊上古侯切下音壁龜屬其形如笠四足縵胡無指其甲有黑珠文采如玳瑁可以飾物肉如龜肉肥美可食涵泳上音含賦注南楚謂沉為涵泳潛行也注睅合版切説文大目也左傳睅其目注出目也鰩遙鮫鞞補鼎切瞂伐刀削音肖刀室也通作鞘盾食尹切寢兕謂武士寢處於甲胄者也持虎謂以虎皮為弓衣武士執持者也鮫韅下呼見切韅馬服之革蓋蒙鮫形徐廣曰以鮫魚皮為之彌龍上如字又讀為弭末也謂金飾衡軛之末為龍首也鞈音夾堅貌宛如巨釶釶音啻荀子本文作宛如巨鐵釶注宛地名屬南陽徐廣曰大釶曰巨方言云自關而西謂之矛吳揚之間謂之釶言宛地出此剛鐵為矛也慘如蜂蠆言其中人之毒僄遫僄輕也匹妙切下與速同言楚人之趫捷錯七各切金塗也􅝑匹燒切通俗文曰刀鋒曰􅝑靶布訝切琛丑林切鱕甫袁切又音煩䱜賦注甫亦切玉篇倉合切又音錯鑢良據切錯銅鐵也蝦鰝乎老切扣音口金飾器口虴除架切沫末蛣去吉切海靻之列切柔革槎鉏加切蜮音域能奴來切蜎狂兖切蠉香兖切還虷上音旋下音寒跂音企孑説文無右臂也居桀切又音吉孒無左臂也居月九勿二切蠛亡結切蠓亡孔切檽乃豆切淤音飫又音於濁水中泥也蛆子魚切虻陌庚切蛭音質蟥音黃科斗抱音曓韻作菢鳥伏卵也蝸牛戴晉人梁國賢人惠施薦之於魏王區量上音謳左傳豆區釜鍾四豆為區豆即古斗字附蝸爾雅作蚹螺蚹音附螺音螺蝸醢蝸與螺同苽音孤倮纍與蜾螺同蟾蜍上爾雅音占下常如切或作蜍鼁爾雅音去􅖚爾雅音秋鼀七宿切􅠴音施蚵音何蚾薄碑切礧音磊本草注皮上多䨾磊蛙或作蛙蟈古麥切注炮土之鼓瓦鼓也炮步交切圥圥力竹切音六按鼁字爾雅音去淮南謂之去蚊蓋以其居陸地得名爾雅翼卷三十
