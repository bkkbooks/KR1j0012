body:
  text: 欽定四庫全書爾雅翼卷二十二宋羅願撰釋獸五牛騋駵騵騧馵駥魚驢騾駃騠閭駝牛牛大牲也牛件也件事理也象角頭三封尾之形又牛為大物天地之數起於牽牛故物從牛牛為物大可以分故半從八從牛牛之名色特牛謂之犅牛父謂之特子謂之犢吳人謂犢曰牛羊無子謂之㹗一嵗謂之㸬三嵗謂之犙四嵗謂之牭騬牛謂之犗純色謂之牷駮謂之犖白黑雜毛謂之牻㹁黃白色謂之犥駮如星謂之黃牛虎文謂之黃牛黑脣謂之犉白脊謂之犡又謂之㸹長脊謂之㹔白牛謂之世本胲作服牛黃帝臣也宋景文公云古者牛惟服車書曰肇牽車牛易曰服牛乘馬漢趙過始教人用牛代耕而王弼注易云牛稼穡之資是不原漢始牛耕之意余按古稱牛耕非特王弼之說也其來舊矣太史公律書曰東至牽牛牽牛者言陽氣牽同萬物出之也牛者冒也言地雖凍能冒而生也牛者耕殖種萬物也淮南子曰殺罷牛可以贖良馬之死莫之為也殺牛必亡之數許叔重以為牛者所以殖榖榖者民之命是以王法禁殺牛民犯禁殺之者誅故曰必亡之數太史淮南博通古義其書皆不在趙過後又古人制名冉耕字伯牛其造書也曰犂耕也㹃兩壁耕也一曰覆耕種也字皆從牛則耕之以牛尚矣山海經曰稷後曰叔均是始作牛耕郭氏曰用牛犂也漢武帝用趙過代田之說用耦犂二牛三人且稱曰代田古法也后稷始甽田則過之法亦有由來矣景文之說未之盡也牛畜之有力而順者說者云牛但有豎瞳而無橫瞳見一物輒長造天故童子得而制之新論曰馬稱驊驑驥騄牛譽郭椒丁櫟古者犧尊以牛為名然亦不盡畫牛故淮南子曰百圍之木斬而為犧尊鏤之以剞􅕻雜之以青黃華藻鏄鮮龍蛇虎豹曲成文章新序鄒穆公曰百姓飽牛而耕騋馬八尺以上為龍七尺以上為騋六尺以上為馬騋减於龍而愈於馬亦馬之良者騋宜於牝故釋畜稱騋牝驪牡𤣥駒􅒁驂蓋言以騋為牝以驪為牡而生𤣥駒則謂之裊驂也騕裊古良馬之名裊驂取名於此則其良可知衛文公乘狄之敗始建城市而營宮室得其時制百姓說之國家殷富其末章稱騋牝三千亦以騋者牝之良利以生駒云爾春秋左氏傳稱元年革車三十乘季年乃三百乘與此不同者蓋馬特居四之一騋牝三千則當有牡一千革車不用牝純用牡馬牡馬一千為車二百五十乘取成數故曰三百乘爾然則牝馬不用耶曰邦國六間馬四種謂道馬戎馬田馬駑馬也革車用牡馬一千之外有牝三千足以供道馬田馬駑馬三種之數故凡馬四千匹分為四種衛國於衰亂之後始復備諸侯之儀故詩人美而稱之駵駵赤馬黑鬣明堂月令五時駕馬而駵處其二春蒼龍秋白駱冬鐵驪夏用赤駵中央用黃駵中央寓於季夏故所用物同而以色之淺深者為之别也古者駵非所貴故淮南子曰旁光不升俎駵馼不入牲以其犛也牲而犛且不可用而况天子法天象地為車服以順時授民者而何取夫駵哉且而欲應四時耶則馬固有純色者矣騂也黃也翰也皆馬之純也棄而不用駵與駱皆犛也而顧取之何也月令乃秦呂不韋所作秦人自其舊時自言以水德王故冬之鐵驪以純黑應其德而蒼乃水德所生又近於黑故不以為嫌至於夏之宜用騂中央之宜用黃秋之宜用翰皆與其服色違逺兩者不可兼也故以馬之體應時令而選其鬣與所尚之德合者以厭之是以夏則棄騂而用赤駵中央則棄黃而用黃駵秋則棄翰而用駱此其為秦而設昭昭矣不然是三時者馬之體色皆與其鬣有異冬之所駕曷不取夫雒之白身黑鬣者而特用夫驪之純耶此以知其㫖矣騵騵駵馬而白腹者也武王伐紂用之詩曰牧野洋洋檀車煌煌駟騵彭彭蓋武王嘗以是勝紂故檀弓論三代之制夏后氏戎事乘驪殷人戎事乘翰周人戎事乘騵說者以為三代乘馬各從正色周不純赤用白腹者為上周下商因武王所乘遂為一代成法然按列女傳趙津女稱昔者湯伐夏左驂牝驪右驂牝駹而遂放桀武王伐商左驂牝騏右驂牝䮲而遂克紂至于華山之陽則牧野所乘與此異色又詩止稱駟而此有左右驂詩言騵而此驂騏䮲不應傳聞有異蓋詩所陳謂牧野清明之日至其逐紂至華陽或當驂此等爾騧黃馬黑喙曰騧宋明帝以騧字旁似禍改作唐太宗有拳毛騧缺文馵後左足白曰馵案釋畜馬之四足白皆有名前右足白曰啓左白曰踦後右足白曰驤左白曰馵凡陽靜而隂躁馬之力其左不如右强啓者開也前右足白則為開道踦者閉也公羊傳曰相與踦閭而語閉一扇一人在內一人在外廣韻居綺切前左足白則為閉驤者騰也後右足白則為驤馵者繫也後左足白則為馵蓋獸之白皆為躁故詩稱有豕白蹢以為豕之躁者而易震卦為馵足又為作足作者作動也史稱隋文帝騧馬脊有肉鞍行則先作弄四足然則馵雖以色稱又為繫馬之名亦以其好動而馵之爾馵既躁馬好動故秦人備兵甲以討西戎征伐不休國人矜其車甲必先言駕我騏馵而後乃言四牡孔阜四馬既間爾阜與間未足矜也其材之富可知矣此以見文王育材之盛也言德之儉則其養之也以其所愛及其所不愛則僖公之牧馬是也一章良馬則有驈有皇有驪有黃二章戎馬則有騅有駓有騂有騏三章田馬則有驒有駱有駵有雒四章駑馬則有駰有騢有驔有魚蓋始者牧夫驈黃之純色浸至騅駓之間色以及於驒駱之不純不得已而及於驔魚之驚畏驔魚猶養之則其德之儉可知矣此有以見僖公之善牧馬也相馬之說曰馬目欲得黃又欲光而有紫豔若目小而多白則驚畏驚畏者馬之大病故其序尤在後然漢武帝得西域之駿蒲梢龍文魚目汗血之馬充於黃門以魚目為名豈此類耶驢驢似馬而長耳其毛龎褐不甚駿異九懷云驥垂兩耳中坂蹉跎蹇驢服駕無用日多驢既低小而又不甚駿故稱蹇焉則為無用甚矣一名為衛或曰晉衛玠好乘之故以為名始自漢靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為笑樂於是公卿貴戚轉相放效至乘輜軿以為騎從互相侵奪價與馬齊說者以為驢遲鈍之畜致逺上下山谷野人之所用耳何有帝王君子而驂服之乎是胡服之妖也性能旋磨及䭾負故袁淑九錫云負磨回衡迅若轉電是也率以午及五更之初乃鳴說者云音隨時興晨夜不默仰契𤣥象俯協漏刻應更長鳴毫分不忒是其事也其聲醜惡乃獨有好之者王粲好驢鳴魏文帝臨其喪使赴客皆作驢鳴又晉王濟好之孫楚哭之為之作聲而形體皆似人之嗜好不同有如此者或所無處其鳴亦能駭虎顧久習其伎則殺之矣其子案說文别名􅐒騾騾者馬牝驢牡所生似驢而健於馬舊非中國所産故漢書以為胸奴奇畜也馬力在前髆驢力在後髀騾力在腰騎乘者隨其力所在而進退之騾股有鎖骨故不能生其狀大骨若臼而口小小骨若杵而頭大小臼口銜大杵頭故不可出此騾所以不滋息然馬生一騾其賈過馬逺矣漢元康中龜兹王絳賓娶烏孫公主女自以尚漢外孫樂漢衣服制度歸倣而作之外國胡人皆曰驢非驢馬非馬若龜兹王所謂騾也言其不純一爾晉令乘傳使遭喪聽乘騾車騾車者犢車裝而馬車轅駃騠說文曰騾驢父馬母也駃騠馬父驢母也故傳稱駃騠生三日而超其母言其過於驢爾周書伊尹令正北以駃騠為獻古者人君所乘以為珍駕蘇秦相燕人惡之於燕王燕王按劒而怒食以駃騠言其信蘇秦之篤激於譖者之言反以珍駕殺而享之以示與之無愛也桑御史言孝武皇帝時平百越以為囿圃却羌胡以為苑囿是以珍怪異物充於後宮騊駼駃騠實於外廏然則自古貴之矣又一名䳮崔豹古今注云驢為牝馬為牡則生騾馬為牝驢為牡則生䳮蓋今之人以此類為馲􅦢亦與䳮音相符然玉篇稱馲􅦢驢父牛母則與崔及今說異今蜀中騾乃有馬與牛合而生者皆牛為牡馬為牝故今川廣皆産騾生於廣者蹄輕産於蜀者蹄重以大武之遺體也此實四類然古今說者但有騾及䳮駃騠二類之名驢父牛母自當從古說附于䳮篇牛父馬母亦以俗而謂之騾爾識者詳之也宋符瑞志又有趹蹄者后土之獸自能言語王者仁孝則來禹治水而至閭閭如驢一角或曰如驢而岐蹄古者大射於太學以為受算之器名之為中鄉射記曰君國中射則皮樹中於郊則閭中於竟則虎中大夫兕中士鹿中髤中前跪鑿背容八算釋獲者奉之先首蓋皆刻木為之狀如此等獸而伏鑿其背以盛算前足跪者象獸教擾受負也周官有服不氏掌教擾猛獸顧獸有堪受負者有不合受負者若今駝受負則四足俱屈然則取於皮樹閭虎兕者當亦與鹿同意也閭之為物罕見唯周書王㑹篇北唐戎貢以閭閭似隃冠不知隃冠之為何物而北山經縣罋之山其獸多閭麋郭氏曰閭即䍱也似驢岐蹄角如羚羊一名山驢說者言山驢以為山羊之類大如鹿皮堪靴用兩角大小如山羊一邊有蹙文又疏慢者為山驢則雖岐蹄而不一角而皮樹者人面獸形又獸之異者今儀禮皮樹一作繁豎駝駝外國之奇畜背有兩封如鞍其足三節色蒼褐負物至千斤日行三百里凡欲摏載輒先屈足受之所載未盡其量終不起古語謂之槖他槖囊也他負荷也今云駱駝蓋槖音之轉性能知水源自燉煌往外國者多乘之涉流沙千餘里中無水時有伏流處駝獨知之遇其處輒停不進以足踣地掘之常得泉又青海西北有流沙數百里夏有熱風傷斃行旅風將至老駝預知之引項而鳴聚立以鼻口埋沙中人見則知之以氊壅蔽口鼻而避其患穆天子傳曰天子飲于文山之下文山之人獻牥牛二百以行流沙郭氏云駝也胸奴每嵗龍祠走馬鬭槖駝以為樂事蘇秦說楚威王稱燕代槖駝良馬必實外廏是戰國時已入中國矣其卧腹不帖地屈足漏明者曰明駝能行千里古樂府云明駝千里足送兒還故鄉多誤作鳴字唐天寶間嶺南貢荔枝楊貴妃使明駝使馳賜安祿山明駝使日馳五百里取若馳足之捷云明駝亦或作鳴駝凡駝糞為煙直若狼煙鄴中記銅駝如馬形長高一丈足如牛尾長二尺脊如馬鞍在中陽門外夾道相向漢書大月氏國出一封槖駝顔師古曰脊上有一封封言隆高若封土今俗呼為封牛伊尹朝獻商書正北以槖駝為獻漢有牧槖令丞牧養槖他郭璞贊曰駝為奇畜肉鞍是被迅騖流沙顯功絶地潛識泉源微乎其智駝鳴曰漢舊儀云諸侯王黃金璽槖他鈕音釋牛尾古文件徐錯曰若言物一件二件也封高起也犅古郎切㭘杏切㹗徒刀切說文注牛羊無子也㸬音具犙山含切三嵗牛牭思二切騬市陵切犗加敗切牷疾緣切駮犖上甫角切下力角切牻莫江切㹁力薑切犥普沼扶表普橐三切普耕切達胡切犉而純切㸹力拙切㹔居良切犡音厲說文洛帶切五角切白牛也胲古才切初學記黃帝臣能駕牛罷音疲叔均山海經后稷播百穀稷之孫叔均是始作牛耕㹃非尾切讀若匪甽古文畎字廣尺曰畎剞居蟻切注巧工鈎刀也􅕻九忽九月二切許注􅕻所以刻鏤之具也青黃采色之飾也華藻華文也鏄今之金鏄也鮮明好也龍蛇虎豹者刻尊彛為蟠龍伏虎之狀故曰曲成文章也鎛布各切說文鎛鱗也鍾上橫木上金華也騋洛哀切裊奴烏切騕音窈馬四種周禮校人天子十二間馬六種邦國六間馬四種象路駕道馬田路駕田馬田田獵也駑馬給宮中之役駵音留驪力知反純黑色旁光淮南注胞也俎豆之實惟肩髀兩脅胞不得升駵駁不入牲者犧牲以純色也犛音毛翰白色馬也易曰白馬翰如胡旦反又音寒駱音洛白馬黑鬣雒音駱黑身白鬣騵音原䮲音黃騧古華切馵之喻切踦爾雅音欺蹢都歷切驈户橘切驪馬白跨皇黃白騅音佳倉白雜毛駓符悲反黃白雜毛騂赤黃色騏青黑色驒徒河切青驪驎駰音因隂白雜毛騢音遐彤白雜毛驛音簟豪在骭而白魚二目白似魚目驢輜軿音緇屏輕車也一曰婦人車以其有屏蔽故曰軿磨去聲䭾音駝􅐒音蒙騾與螺同髆音博龜兹音丘慈國名在焉耆西南耆音支駃古穴切騠音提又丁奚切音陌馲陟格切􅦢莫百切閭竟音境謂與鄰國君射釋獲得也射以中為獲髤音休周禮注漆赤多黑少䍱以余切駝踣蒲北切牥甫防切良牛名注􅕫乙轄切鈕女久切爾雅翼卷二十二
