body:
  text: 欽定四庫全書爾雅翼卷十七宋羅願撰釋鳥五鳬鷖鶩鵝鴈鷀鵜鶖鶬鷺鷫鷞鴛鴦屬玉昆雞脊令鳬鳬似鴨而小長尾背上有文今江東亦呼為鸍陸璣云大小如鴨青色卑腳短喙水鳥之謹願者也而說文解几字云鳥之短羽飛几几也讀若殊詩曰將翱將翔弋鳬與雁唐陸龜蒙稱冬十月視穫于甫田夜間有聲類暴雨而疾至者一夕凡數四明訊其氓曰鳬鷖也其曹蔽天而下蓋田所當之禾必竭穗而後去江之南不能弋羅常藥而得之􅽽􅶡塗枝叢植于陂一中千萬膠而不飛然則江南蓋未嘗弋也然聞今江南大陂湖中其取鳬者亦皆以網植兩表於水相去甚逺中綴網焉以舟自前驅而逐之率一獲千百輩則又與龜蒙說異矣鳬所在必賊粱食古人亦養之鄒穆公有令食鳬雁必以粃無得以粟於是倉無粃而求易於民二石粟而得一石粃故郭氏解方言稱今江東有小鳬其多無數俗謂之冦鳬冦鳬善飛王充論衡曰日月一日一夜行二萬六千里與冦鳬飛相類故王喬以尚方所賜舄假形於鳬自葉縣朝京師焉吳地志曰石首魚至秋化為冦鳬鳬頭中猶有石也方言曰野鳬甚小而好沒水中者南楚之外謂之鸊鶙說苑魏文侯嗜晨鳬常以晨飛也南越志有松鳬棲息松間周書王㑹鳬羽為旌漢佽飛在上林苑中結矰繳弋鳬雁嵗萬頭鷖鷖鷗也一名水梟海物異名記曰鷗之别類羣鳴喈喈隨潮往來謂之信鳬南越志曰在潮海中隨潮上下常以三月風至乃還洲嶼頗知風雲若羣飛至岸渡海者以此為候鳬鷖之詩稱神祗祖考安樂之引鳬與鷖蓋水鳥滅沒浩蕩似不可羈而又善别風雲不妄飛集然誠得其道有可馴之理蓋鳬水鳥之謹願者而鷗又可狎海上之人有好鷗鳥者每旦之海上從鷗鳥逰鷗鳥之至者百數而不止其父使取而玩之明日之海上鷗鳥舞而不下誠僞之不可掩也如此程氏曰犬吠屠人世傳有物隨之非也此正如海上鷗爾詩以鳬鷖之馴為神祗祖考安樂之驗夫鳬鷖鳥爾何足以知神之安樂者蓋古者祭義通於物理故自樂之一變而致羽物及川澤之示以至六變各有所致羽物既與川澤之示相應則所以美神祗祖考之安樂者比之鳬鷖亦其理宜也其稱在涇以下亦有次序蓋涇大川沙少水說文曰沙水少而沙見渚小洲其外有水而已潨水之髙者亹者山絶水水鳥戲廣浮深者也今自涇而沙自沙而渚渚而潨潨而亹流益狹勢益髙而鳬鷖在焉此以見其安而樂之也周禮王后五輅安車用鷖總蓋總著馬勒直兩耳與兩鑣以繒為之鷖者其色青黑如鷖而謂之安車則亦若詩之鳬鷖安樂之義爾然鷗亦有白者不専於青黑山海經𤣥股國其人食鷗鶩鶩庶人以為摯而工商摯雞鶩取其不逺徙雞取其不失時各有宜也曲禮則以為庶人之贄匹鶩能羣居不失其匹者蓋其别名又謂之木言質木也又以為冠淮南子載武王克商之後乃去其瞀而載之木解其劒而帶之笏許叔重以為瞀被髮也木鶩鳥冠也知文者冠鶩然則非特取其質木又以文采見取矣鶩初無文古稱知天文者乃冠鷸鷸是翠鳥而鶩首亦深緑今謂之鴨頭緑豈亦可雜取為冠耶然鶩性終質木故古稱刻鵠不成猶類鶩以言刻鵠而脛短猶不失為鳬鶩以喻慕淳厚者而不至猶為謹勑之士云爾鶩無所不食易以蕃息今江湖間人家養者千百為羣暮則以舟斂而載之其雄尾有毛翹起如鈎大率皆雌鳴乘雄與他畜異出水則捨卵於舟中其生子多者不暇伏則以牛矢嫗而出之或不接而食飽者亦能生伏大抵不長耳孟子稱五母雞二母彘言一雞將五雌以此為率多寡得所則易蕃今養鶩者並以一嵗再伏者為種其多寡如雞之數然古人貴雞而賤鶩春秋𫝊曰公膳日雙雞饔人竊更之以鶩是也一謂之鴨禽經曰烏鳴啞啞鸞鳴噰噰鳯鳴喈喈皇鳴啾啾雉鳴鷕鷕雞鳴咿咿鶯鳴嚶嚶鵲鳴唶唶鴨鳴呷呷鵠鳴哠哠鵙鳴嗅嗅蓋自雞以下大抵象其聲而為之名又具足鴽謂之蹼鴨謂之跗雞謂之跖鷹謂之骹謂之鵰謂之上林賦煩鶩庸渠郭璞曰煩鶩鴨屬庸渠似鳬灰色雞腳一名章渠鵝鵝與雞鶩皆家禽然二物為摯而鵝獨否者古人以為鵝性頑而傲蓋迫之而愈前抑之而愈卬似不入於禮亦其體大難用也鵝鳴自呼陳仲子言鶂鶂者語之轉耳吐乳於水中然其子飲者終不雜小而淺黃色者尤可喜性絶警每更必鳴可以警盜故禽經亦曰鵝見異類差翅鳴也又養之園林則蛇皆逺去亦主溪毒射工之類舊說唯食榖稗草菜不食生蟲或言蒼鵝食之白者不食故主毒以蒼者為良主渴以白者為勝夫羽毛異於外而食性隨以不同此苻朗所以食肉而能知皂白之處也古唯祈雨用之它祭亦希一名舒雁某氏以為在野舒翼飛逺者按鵝名舒雁鶩名舒鳬乃是比之鳬雁而舒遲豈當更能舒張其翼耶鵝既兼有雁名而方言自關以東謂雁為鴚鵝南楚之外直謂之鵝是雁又假鵝以為名矣內則言物之不可食者舒雁翠鵠梟胖舒鳬翠雞肝雁腎鴇奧鹿胃翠謂尾肉胖謂脅側薄肉奧脾肶謂藏之深奧處而鵝鶩所去皆翠則同禽經曰郤近翠者能步郤近莆者能擲郤腳也鵝鶩腳皆近翠故相人者以鵝鶩之步宜貴也雍之南多熟鵝毛為被取項腹軟毛蒸治之如稻畦納之其溫軟不下綿纊且宜小兒衣中云野鵝曰駕鵝雁鴻雁乃一物爾初無其别前章已盡之至詩注乃云大曰鴻小曰雁雁曷為有小者按淮南鴻烈云雁乃兩來仲秋鴻雁來季秋候雁來候雁比於鴻雁而小故說詩者推鴻雁為鴻而别以此為雁也今北方有白雁似鴻而小色白秋深乃來來則霜降河北謂之霜信蓋白露降五日而鴻雁來寒露五日而候雁來候雁之來在霜降前十日所以謂之霜信也唐杜甫詩曰故國霜前白雁來蓋謂此爾古者執贄雖用鴻雁然當亦通用此小者故春秋曹伯陽好田弋曹鄙人公孫彊獲白雁獻之漢武帝太子昏得白雁於上林以為贄即此物也今月令及周書乃不復有鴻雁候雁之别月令則云八月鴻雁來九月鴻雁來賔周書則曰白露之日鴻雁來寒露之日又來既是一種何得前後不齊如此似不應爾許叔重注二雁則以為仲秋時候之雁從北漠中來過周雒南至彭蠡季秋時候之雁從北漠中來南之彭蠡以為八月來者其父母也是月來者蓋其子也羽翼稚弱故在後耳而賔字讀聨下句謂之賔雀不取來賔之義今淮南乃並作候雁此當有所據鷀鷀水鳥色深黑鈎喙善沒水中逐魚亦名盧鷀蒼頡篇曰似鶂而黑盧與鷀皆黑色故名說文曰兹黑也從二𤣥春秋𫝊亦曰何故使吾水兹也老則頭翼漸白或曰白黑自是兩種又有一種頭如蛇其頸頗長冬月毛羽落盡棲溪岸水上卒遇人不能去則自擲入水泅沒如常時性不卵生吐雛至八九月與兔相似隋書倭國水多陸少以小鐶挂鸕鷀項令入水捕魚日得百餘頭今蜀中尤多臨水居者多畜養之以繩約其吭才通小魚其大魚不可得下時呼而取出之乃復遣去指顧皆如人意有得魚而不以歸者則押者喙而使歸比之放鷹鸇無馳走之勞而利有差厚漁者養數十頭日得魚可數十斤然魚出咽皆鯹涎不美出水之後好自張其趐就石上暴之或云峽人謂為鬼烏然峽人乃事烏為鬼非此物也上林賦針疵鵁盧針疵似魚虎而蒼黑色鵁頭鳥盧盧鷀也南都賦鷫鷞鵾鸕鵜鵜水鳥今之鵜鶘形似梟而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊好羣飛若小澤中有魚便共抒水滿其胡而棄之水盡魚見乃共食之故一名鴮鸅鴮鸅猶汙澤也汙抒水也又戽斗亦抒水器也鴮汙戽三字同音其義一也淮南曰鵜胡飲水數斗而不足俗呼之為淘河或言其胡能盛水以養魚或曰身是水沫惟臆有肉如拳昔人竊肉入河化為之故名逃河禽經曰淘河在岸則魚沒沸河在岸則魚出莊子曰魚不畏網而畏鵜鶘曹詩曰維鵜在梁不濡其翼彼其之子不稱其服鵜之於魚勤矣出入泥塗翕受渾濁相與竭澤而後有得今乃集於梁之上因人以飽曽咮翼之不濡可謂幸矣猶之彼其之子焉必有賢勞奔走之效而後宜其服今何戈與祋他人為之而赤芾至於三百此所以為譏也魏黃初中嘗有鵜集靈芝池文帝識之曰此詩人所謂汙澤者也曹詩刺共公逺君子近小人今豈有賢智之士處于下位否則斯鳥胡為而至哉詩既以為貪而無功之物故後人祖而用之王逸九思云鵠竄兮枳棘鵜集兮帷幄在梁集池猶不可况帷幄耶眺以道云黃河多淘河之屬曰漫畫者常以觜畫水求魚有曰信天緣者常開口待魚鶖鶖秃也狀如鶴而大長頸赤目其毛辟水毒丹陽鄱陽皆有之詩白華曰有鶖在梁有鶴在林鶖貪戀之鳥也故進造于梁鶴髙潔之鳥也故退棲於林以喻褒姒申后之進退云爾北史後魏明帝時考獲鶖鳥於宫內遂養之崔光以為此詩所謂有鶖在梁者魏黃初中鵜暫集而去猶以為戒况叨餮之禽必資魚肉菽麥稻梁之養豈可留意於醜形惡聲哉鶖尤好啖蛇大者頭髙八尺善與人鬭一名扶老鶬鶬鴰也關西呼為鴰鹿山東通謂之鶬鄙俗名為錯落錯落者亦言鶬聲之急耳又謂之鴰捋鴰鹿鴰捋皆象其鳴聲也子虛賦以弋下雙鶬為遊獵之盛而楚辭以煎鴻鶬為異味解楚辭者曰鶬鶴也然則鶬蓋鶴之類豈以其色蒼遂謂之鶬耶淮南子鳳皇曽逝萬里之上鴻鵠蒼鶴莫不憚焉則蒼鶴之為鶬必矣𤣥鶬長足羣飛天之將霜先知之而鳴不過旬日而下霜矣物類相感志然則鶬之警霜猶鶴之警露也裴瑜注爾雅言鶬麋鴰是九頭鳥今謂之鬼車鳥秦中天隂有時作聲聲如力車鳴或言是水雞過說者曰此鳥昔有十頭能收人魂氣為天狗齧去其一至今滴血不止遇其夜過或滴汙物上者以為不祥人家皆滅燭呼犬以去之然按夫子與子夏所見稱竒鶬九首當是今九頭鳥但九首者既稱竒鶬則非常鶬可知也不當以解麋鴰劉騊駼𤣥根賦一足之夔九頭之鶬鷺鷺水鳥潔白而善為容其集必飛舞而下頭上有長毛數十枚長尺餘毿毿然與衆毛異欲取魚則弭之其翅背上皆有長翰毛江東人取以為接䍦名白鷺縗亦曰白鷺蓑或以紅鶴毛間之魯頌曰振振鷺鷺于飛鼓咽咽醉言歸說者以為客有鷺之容耳隋樂志云建鼓商所作又棲翔鷺於其上不知何代所加或曰鵠也取其聲揚而逺聞或曰白鷺鼓精也或曰皆非也詩云振振鷺鷺于飛鼓咽咽醉言歸言古之君子悲周道之衰頌聲之息飾鼓以鷺存其風流未知孰是隋志之說云爾考按梓人之職裸者羽者鱗者以為筍虡蓋振古如此則所謂建鼓之鷺安知非商世所有陳風亦曰坎其擊鼓宛丘之下無冬無夏值其鷺羽坎其擊缶宛丘之道無冬無夏值其鷺翿翿或為纛羽與翿皆筍虡之所懸則鼓上之有鷺舊矣說詩者乃以鷺羽為舞者之翳而訓值為持不知值者蓋亦植立之義又曰振鷺于飛于彼西雍說者以西雍為澤按西雍當是置禮樂器之所蓋大雅言於論鼓鍾必於辟雍之地以在西故曰西雍而春秋傳則云西辟樂備是辟雍西雍西辟皆樂器之所在也大射儀建鼓在阼階西南書亦云大貝鼖鼓在西房則西雍振鷺之飛為鼓上之鷺明矣鼓常在西振鷺在鼓之上有飛之象耳建鼓以木貫而載之下有跗又說者以鷺為鼓精者古今樂録言吳王夫差時有雙白鷺飛出鼓中而入雲故有是名猶㑹稽雷門之鼓相𫝊有鶴飛入其中鼓鳴聞洛陽後破鼓鶴遂飛去亦其類也後世有鼓吹曲亦以朱鷺為首孔穎逹曰楚威王時有朱鷺合沓飛翔而來舞舊鼓吹朱鷺曲是也或言朱鷺是漢曲說樂府者亦以為因飾鼓以鷺而為曲之名此則非也飾鼓以鷺而不朱朱自因瑞耳禽經曰朱鳶不攫肉朱鷺不吞鯹鷫鷞鷫鷞水鳥蓋雁屬也歸藏曰有鳬鴛鴦有雁鷫鷞西京賦亦曰鳥則鷫鷞鴰鴇駕鵝鴻鶤上春候來季秋就溫南翔衡陽北棲雁門則鷫鷞之為雁類審矣髙誘注淮南云長脛緑色其形似雁鷞又作霜禽經曰摯好風好雨爽好霜鷺好露然是鳥也以季秋就溫似是避霜今乃稱好霜者蓋當霜之候飛鳴而來有似好之如白雁以霜前至謂之霜信摯鳥好風名為晨風也鷫鷞大體當類雁而段成式乃云狀如燕稍大足短趾似鼠未嘗見下地常止林中偶失勢控地不能自振又起上凌青霄出涼州則與此水鳥者異又說文稱五方神鳥焦明鳳皇之屬其在西方者曰鷫鷞禽經述鳳五種亦稱白鳳謂之鷫皆名適同耳古者良馬多取於飛鳥之名以况輕迅故馬有肅爽者唐成公以獻楚子唐開元中獨以驌騻馬當御名蓋取此鴛鴦歸藏曰有鳬鴛鴦有雁鷫鷞蓋鳬屬也雄名為鴛雌名為鴦雌雄未嘗相捨飛止相匹人得其一則其一思而死古者明王交於萬物有道則詩人以此託興其首章曰鴛鴦于飛畢之羅之二章曰鴛鴦在梁戢其左翼蓋畢羅此鳥必於其飛之時至其在梁也不掩其不備所謂戢其左翼者凡鳥翼左掩右為雄右掩左為雌雌視雄以為進止今是雄者戢翼而無驚遽之虞則其配可知矣此物蓋相須為命尤在於交之有道也崔豹古今注曰謂之匹鳥禮記曰庶人之摯匹解者以匹為鶩正以鳬鷖水鳥之類多相匹爾凡鳥多好以頸相勾如張平子思𤣥賦云鳴鶴交頸雎鳩相和其歸田賦曰王雎鼓翼鶬鶊哀鳴交頸頡頏關關嚶嚶又說文雊雄雉鳴也雷始動雉鳴而雊其頸雊從句聲是鳴鶴王雎鶬鶊與雉皆交頸唯此鳥尤甚其大如鶩其質杏黃色頭戴白長毛垂之至尾尾與翅皆黑今婦人閨房中飾以鴛鴦黃赤五彩首有纓者乃是鸂䳵耳然鸂䳵亦鴛鴦之類其色多紫李白詩所謂七十紫鴛鴦雙雙戲亭幽謂鸂䳵也臨海異物志鸂䳵水鳥毛有五色食短菰其在溪中無毒氣說文作溪􅠃屬玉屬玉水鳥似鴨而大長頸赤目紫紺色似鵁鶄漢以名觀昆雞昆雞似鶴說文作鶤黃白色長頷赤喙九辨曰鵾雞啁哳而悲鳴公孫乘月賦鵾雞舞於蘭渚謝惠連雪賦對庭鵾之雙舞淮南曰鉗旦大丙之御過歸雁於碣石軼鶤雞於姑餘許叔重謂鶤雞鳳皇之别名考穆天子𫝊鶤雞飛八百里郭璞曰即鵾雞也脊令脊令水鳥大如鷃雀長腳長尾尖喙背上青灰色腹下白頸下黑如連錢故杜陽人謂之連錢飛則鳴行則搖不能自舍詩以喻兄弟相救於急難唐明皇時有鶺鴒十數集麟德殿廷木翔棲浹日魏光乘作頌以為天子友悌之祥音釋鳬父俱切鸍音施爾雅沈鳬也几几是俞切鳥短羽而飛殊市朱切粃本作秕不成粟也鸊鶙上步覔切下大兮切佽音次文選注似飛掌弋射繳之若切生絲縷也鄭𤣥曰結繳於矢謂之矰矰髙也鷖鳥兮切示巨支切潨音悰亹音門鑣甫驕反馬銜繒疾陵切鶩瞀韻書音茂又音牟並訓目不明也按淮南子載武王太公問答大意謂伐紂之後務欲息兵以禮讓移風俗故有去瞀載木解劒帶笏之說瞀疑當通作鍪音牟胄也去瞀載木乃棄武尚文與下文義協而叔重訓瞀為被髮未詳其義嫗於遇反伏扶富反啞啞於加反喈喈古崔反鴽音如鴿也鷕鷕以沼反蹼補木反咿咿於低反跗方于切嚶嚶於耕反跖之石反唶唶音即骹音㪣呷呷呼甲切音菘鷂屬也哠哠胡告反鶪圭覔切嗅嗅古閴反五利五栗二反鵝鶂午的反鴚音歌鴇音保奧於六反脾扶移反昌私反藏去聲莆音甫納當作衲鴐音加鴈公孫彊其良反哀七年鷀音慈泅音囚浮行水上也吭音杭咽也咽音煙鯹通作腥魚臭鴢音窈鵜音題抒音序鸅音澤鴮汙戽並荒故反沫音末何去聲祋東外反芾音弗鶖本作音秋鶬音蒼鴰音括捋郎活反鷺毿毿蘇含切弭音救息也縗音崔喪衣建鼓上居萬反一名植鼓謂植木而旁懸鼓所以召集號令振音真舉也裸力果反筍息允反虡音巨樂器所縣橫曰筍植曰虡植直吏反又時力反翳於計反鼖音墳大鼓跗方于反夫差下楚宜反鷫鷞上音肅下音雙鴇音保駕音加鶤通作鵾禽經作雨按張華注風禽鳶類越人謂之風伯飛翔則大風雨一足鳥一名商羊字統曰商羊一名雨天將雨則飛鳴孔子辨之於齊庭也鷫鷞鳥名其羽可為裘以辟寒鷫鷞飛則隕霜露禽鶴也露下則鶴鳴屬玉觀去聲漢書宣記曰行幸長楊宫屬玉觀服䖍曰以玉飾因名焉西都賦屬玉之館鉗旦大丙淮南注二人太乙之御也一說古得道之人以神氣御隂陽軼音迭又音逸自後過前曰軼姑餘山名在吳脊令上音鯽下音靈爾雅翼卷十七
