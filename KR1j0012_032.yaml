body:
  text: 欽定四庫全書爾雅翼卷三十二宋羅願撰釋魚蛇蝮枳首蛇螣蛇巴蛇蜥蜴蝘蜓蛇蛇字古但作它耳從蟲而長象冤曲垂尾形上古草居患它故相問無它乎今之字傍加蟲而變其音又蛇行迂曲考工記以為紆行之屬故退食委蛇亦用蛇字草居常飢每得食稍飽輒復蛻殼冬輒含土入蟄及春出蟄則吐之其圓重如鐵石謂之蛇黃雖復草居人家時有之故諺云一畝之地三蛇九鼠也今貓能禁之又人家畜鵝者蛇亦不至聞捕蛇者云蛇稍大者則易禁以其耳目開利習於禁架也小者瞢然則往往難禁其種類至多惟烏蛇性善不噬物而白花蛇有毒生於蘄州今蛇死目皆閉惟蘄州者目開若生舒蘄兩界間者則一開一閉此理之不可曉者故人以此為驗云後漢南陽郡隨縣古隨國其西有斷蛇丘即銜珠之蛇也蜦蛇屬黑色潛于神淵能興風雨或從戾淮南子曰犧牛粹毛宜於廟牲其於以致雨不若黑蜧蝮蝮蛇之最毒者短形反鼻錦文亦有與地同色者柳子曰目兼蜂蠆色混泥塗著足斷足著手斷手不爾合身糜潰又善伺人聞人咳喘步驟輒不勝其毒捷取巧噬肆其害七八月毒盛時齧木以泄其氣木即死又吐口中涎沫於草木上著人身瘇成瘡卒難主療名曰蛇漠瘡衆蛇之中此獨胎産並陳藏器聞之淮南子曰蝮蛇不可為足虎豹不可使緣木蝮在母胎時其毒氣發作母腹裂乃生假成式云凡禽獸必藏匿形影同於物類也是以蛇色逐地茅兔必赤鷹色隨樹淮南王書曰蝮蛇蠚生又一種狀如蝮而短有四腳能跳來齧人名為千歲蝮枳首蛇中央有枳首蛇枳首者岐頭蓋兩頭也大如指一頭無目無口然兩頭俱能行一名越王蛇亦名越王約髮亦名越王弩弦舊云見之令人不利然孫叔敖殺而埋之亦無他此未可信也今生寧國者黑鱗白章長盈尺人家庭檻中動有數十同穴又豫所見夏月雨後有蛇如蚯蚓大但身有鱗蜿蜒而行其尾如首不纎殺亦號兩頭蛇則不足為異明矣天問曰中央共牧后何怒王逸以為牧草名也中央之州有岐首之蛇爭食牧草之實自相齕齧以喻夷狄相與忿爭君上何故當怒之乎韓非亦稱蟲有螝者一身兩口爭食相齕遂相殺也螝非螝蛹之螝乃古虺字蓋謂此蛇耳然爾雅以為中央之異氣今東南多有者蓋彼四方皆極荒逺此比之為中爾又今此蛇皆以越王為名則不獨在中央也會最又云渾夕之山嚚水出焉有蛇一首二身名曰肥遺見則大旱山海經云六足四翼而管子亦曰涸澤之精名曰蟡一首兩身以其名呼之可使取魚鱉此兩蛇皆一首二身又與枳首相反因類附著之嶺表録異曰兩頭蛇嶺外多此類時有如小指大者長尺餘腹下鱗紅皆錦文一頭有口眼一頭似蛇而無口眼云兩頭俱能進退謬也昔孫叔敖見之不祥乃殺而埋之南人見之為常其禍安在哉天問雄虺九首螣蛇螣蛇龍類有鱗無足能興雲霧而遊其中其行千里因風而化淮南子曰蛟龍伏寢於淵而卵剖於陵螣蛇雄鳴於上風雌鳴於下風而化成形精之至也甘戊曰螣蛇遊於霧露乘於風雨而行非千里不止然則暮託宿鰌鱣之穴所以然者何也用心不一也二説不同蓋淮南子説其風化之時則其感至精甘戊言其乘遊之時則用心不一各有所主今卜筮者得螣蛇輒以為疑滯不決蓋亦足以見螣蛇之趣操云又淮南子稱上古聖人考服駕應龍驂青虬前白螭後奔蛇説者以為奔蛇即騰蛇皆瑞應之物乃知前古蓋嘗為用矣郭氏所注淮南云蟒蛇者蟒蓋奔字之誤亦有時以蛻故仲長統詩云飛鳥遺迹蟬蛻亡殼騰蛇棄鱗神龍喪角是也巴蛇巴者食象之蛇其字象蜿蜒之形中有一説者以為一所吞也其長千尋青黃赤黑海內南經曰巴蛇食象三歲而出其骨君子服之無心腹之疾言取所出象骨而佩服之在犀牛西今南方蚺蛇長十丈亦能吞鹿鹿消盡乃自絞於樹則腹中之骨皆穿鱗甲間出養瘡時肪腴甚美或以婦人衵服投之則蟠不能起其膽亦止心腹之痛又倭國有獸如牛名山鼠彼有大蛇亦吞此獸蛇皮堅不可斫蓋巴類也今常蛇啖一蛙輒疈塞宛轉尋即蛻而巴乃獨吞象逮三歲始出其骨巨細之不同蓋如此出其骨當亦自鱗甲中不須復蛻也天問曰靈蛇吞象厥大何如古稱堯使羿斷修蛇於洞庭許叔重以為修蛇大蛇吞象之類洞庭南方澤名近巴陵説巴陵者以為巴之死其骨為陵此地至今往往多大蛇豈其種裔耶按今嶽陽郡獄之側巍然而髙草木翳鬱者人指以為巴蛇積骨之處城外嘗有巴蛇廟已而廢又有象骨山以為象暴骨之所其旁有湖曰象湖蜥蜴蜥蜴似蛇而四足長五六寸生草澤中爾雅蠑螈蜥蜴蝘蜓守宫四名轉相解至陶隱居以為其類有四種形大純黃色者名蛇醫其次似蛇醫而小形長尾見人不動者名龍子小而五色尾青碧可愛者名蜥蜴形小而黑喜緣牆壁者名蝘蜓則與今所見似同按説文及字林及崔豹古今注並以蠑螈為蛇醫而説文又云在壁曰蝘蜓在草曰蜥易蜥易守宫也方言亦云守宫秦晉西夏謂之守宫或謂之蠦􅫢或謂之蜥易其在澤中者謂之蜥蜴南楚謂之蛇醫或謂之蠑螈按此諸文則在草澤者名蠑螈蜥蜴在屋壁者名蝘蜓守宫也蜥蜴古語今人多從方言名易蜥蜴與虺見人則走故詩曰哀今之人胡為虺蜴也其狀既如龍故禱雨用之古法求雨坊巷各以大甕貯水插柳枝泛蜥蜴使青衣小兒環繞呼曰蜴蜥蜴蜥興雲吐霧降雨滂沱放汝歸去此亦象龍致雨之義也曹叔雅異物志曰魚跳躍則蜥蜴從草中下稍相依近便共浮水上而相合事竟魚還水底蜥還草中云其蛇醫或名蛇師或云蛇舅母舊説蛇體有傷此蟲輒銜草傅之故有醫之號或曰口常含雹蛇若有病則以雹療之今蛇遇冬入蟄含土為圜至春出蟄土堅如鐵石謂之蛇黃蓋毒烈之氣聚蓄所為蛇醫以雹治蛇病似協於理説文榮蚖以注鳴者釋考工記者則以為榮原胸鳴馬融以為胃鳴干寶本以為骨鳴揚子曰龍蟠于泥蚖其肆矣蝘蜓蝘蜓似蜥蜴灰褐色在人家屋壁間狀雖似龍人所玩習故淮南云禹南濟於江黃龍負舟禹視龍猶蝘蜓龍亡而去比之蝘蜓言不足畏揚子云執蝘蜓嘲龜龍蓋陋之也一名守宫又名壁宫東方朔射覆辭云臣以為龍又無角謂之為蛇又有足跂跂脈脈善緣壁是非守宫即蜥易蓋言此也説者以為飼以朱砂以其血點宫人如赤志終身不滅交接便脫漢武帝嘗用之故名守宫按説文蜥易之易象形祕書説日月為易象隂陽也則經隂陽一交而變易似有此理然所謂守宫者亦以其常在屋壁間有守之之象如鳥有澤虞者常在田中俗呼為護田鳥之類不必塗血而後為守也舊説蛇醫龍子蜥蜴三者並不螫人蝘蜓乃聞螫人必死然未聞有中之者特善捕蝎春秋考異郵曰土勝水故守宫食蠆宋均曰守宫生於土蠆藏物屬於坎坎水也俗號蝎虎又一種色似此而能入水按毛詩正義名水蜥蜴蛇它本作他湯何切彼之稱也蟲吁鬼切委蛇音於移委曲貌蜦音倫又音戾蜧音戾蝮芳福切讀若反覆之覆蠚音壑枳首蛇纎殺下去聲螝蛹之螝爾雅音龜蠶所變者蟡於為切似蛇又音詭螣音騰鰌七田切鱣市演切巴蛇蚺音髯衵音日女人近身衣也疈芒逼切蜥蜴音析亦蠑音榮螈音原蝘音偃蜓徒典切蠦力胡切􅫢直連切雹薄各切注鳴音咮蝘蜓跂跂巨支切行貌爾雅翼卷三十二
