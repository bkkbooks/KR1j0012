body:
  text: 欽定四庫全書爾雅翼卷八宋羅願撰釋草芙蕖鬱瓜瓠匏枲葛雞齊蓷檾菺荍牛蘄苜蓿臺莎稗稂莠芙蕖荷芙蕖其莖茄其葉蕸其本蔤其華菡蓞其實蓮其根藕其中的的中薏李巡曰芙蕖其總名也别名芙蓉郭璞曰蔤莖下白蒻在泥中者今江東人呼荷華為芙蓉北方人便以藕為荷亦以蓮為荷蜀人以藕為茄或用其母為華名或用根子為母葉號此皆名相錯習俗傳誤失其正體者也毛詩義疏曰芙蕖莖為荷其葉未發為菡蓞已發為芙蕖其實蓮青皮裏白子為的的中有青長三分如鈎為薏語曰苦如薏者也的五月中生生噉脆至秋表皮黑的成可食可磨以為飯輕身益氣令人强健又可為糜周書曰魚龍成則藪澤竭藪澤竭則蓮藕掘宋時太官作血䘓庖人削藕皮誤落血中遂散不凝醫乃用藕療血多效葉可裹物漢鄭敬為新遷功曹與同郡鄧敬折芰為米以荷為肉齊師伐梁以糧運不繼調市人餽軍建康令孔奐以麥屑為飯用荷葉裹之一宿之間得數萬裹古詩有魚戲蓮葉間魚戲蓮葉東魚戲蓮葉西魚戲蓮葉南魚戲蓮葉北今人言池中養蓮者莖葉茂密魚動輒損鱗不得遂長古今注一名水芝一名澤芝一名水花管子曰五沃之土生蓮鬱鬱鬱金也其根芳香而色黃古者釀黑黍為酒所謂秬者以鬱草和之則酒色香而黃在器流動詩所謂黃流在中者也周禮有鬱人掌祼器凡祭祀賔客之事和鬱鬯以實彞而陳之又有鬯人掌共秬鬯而飾之先儒以為鬱者築鬱金煮之以和鬯酒鬱草名為草若蘭十葉為貫百二十貫為築以煮之鐎中停於祭前鬯謂不和鬱者釀黍為酒芬芳條暢於上下也其祭社禜門共秬鬯雖云無鬱亦尸所飲以灌地其汁下入於地其氣上升於天故云條暢於上下然則黑黍為酒謂之鬯加鬱則為鬱爾然秬鬯亦是兼鬱之通名故鄭注汁獻涗于盞酒云秬鬯者中有煮鬱和以盎齊說苑云鬯者百草之本也上暢於天下暢於地無所不暢故天子以鬯為贄說文解鬯字云以秬釀鬱草芬芳攸服以降神也又解鬱字云鬱鬯百草之華逺方鬱人所貢芳草合釀之以降神鬱今鬱林郡也然則自常言之鬯亦可以兼鬱自鬱與鬯對言之則當致其辨爾晉左九嬪鬱金頌曰越自殊域厥珍來尋瓜瓜古人以紀時故遣戍者稱瓜時而往及瓜而代大戴禮夏小正五月乃瓜乃瓜者治瓜之辭也瓜也者始食瓜八月剝瓜蓄瓜時也周詩則以七月為食瓜之候蓋夏之五月也詩云中田有廬疆埸有瓜是剝是葅獻之皇祖曽孫壽考受天之祐蓋薦瓜之重如此故天子樹瓜華不斂藏之種而為天子削瓜者副之巾以絺副析也既削又四析之乃橫斷之而巾覆焉為國君者華之巾以絺華中裂之不四析也為大夫纍之纍倮也謂不以巾覆士㚄之不中裂但橫斷去㚄而已庶人齕之不橫斷也瓜祭則上環食中棄所操古之用瓜者其嚴如此周詩瓜無所出之地至秦漢間東陵侯種瓜長安城東而美故謂之東陵瓜又謂之青門瓜其後以遼東廬江燉煌之種為美而瓜州大瓜如斛御瓜也故名其州曰瓜其它瓜名尚多說文曰寙懶也草木皆自豎立唯瓜瓠之屬卧而不起似若懶人常卧室故字從宀荆楚之俗七月七日牽牛織女㑹乃設瓜果於庭中有喜子網於瓜上則以為得巧以織女主瓜云瓠瓠匏之甘者詩甘瓠纍之古者王政瓜瓠果蓏植於疆埸正月可種瓠六月可畜瓠八月可斷瓠作菑詩云斷壺瓠中白膚所謂張蒼肥白如瓠者也可以飼豕致肥其瓣可以作燭致明其葉又可為菜詩所謂幡幡瓠葉采之亨之是也然與匏不異但當以大小長短甘苦為間爾然古今亦通言惠子稱魏王貽我大瓠之種世有種大瓠法鑿坎方廣四五尺先糞其地及生擇取四本每兩本相近處各以竹刮去半皮併而封之俟其活除去一穗又復取此兩大本相併復去一穗如前法蓋四本同發一穗自然易大及著子獨留兩枚如此則一斗之種變為一石此魏惠王大瓠法也周禮鬯人禜門用瓢齎注謂取甘瓠割去柢以齊為尊匏河汾之寶有曲沃之懸匏焉鄒魯之珍有汶陽之孤篠焉良工取以為笙崔豹古今注曰匏瓠也壺盧匏之無柄者也瓠有柄曰懸瓠可為笙曲沃者尤善秋乃可用用則漆其裏匏在八音之一古者笙十三簧竽三十六簧皆列管匏內施簧管端通典曰今之笙竽以木代匏而漆殊愈於匏荆梁之南尚存古制南蠻笙則是匏其聲甚劣則後世笙竽不復用匏矣匏既為樂器又以為飲器詩酌之用匏孔子稱繫而不食者良以待其堅而為用故也詩稱匏有苦葉濟有深涉說者徒以為苦葉之生乃濟深之候按叔嚮稱苦匏不材於人共濟而已注佩匏可以度水魯叔孫賦匏有苦葉必將涉矣是苦匏可刳以涉水鶡冠子曰賤生於無所用中流失船一壺千金壺即匏也其性浮得之可以免沈溺故當失船之時其直千金也此亦如天竺涉水帶浮􅌩之類又孔子稱匏瓜繫而不食者近世洪氏說以為天之匏瓜星天官星占曰匏瓜一名天雞在河鼓東匏瓜繫而不食猶言南箕不可簸揚北斗不可以挹酒漿也按楚辭王褒九懷稱援匏瓜兮接糧曹植洛神賦曰歎匏瓜之無匹兮詠牽牛之獨處阮瑀止欲賦曰傷匏瓜之無偶悲織女之獨勤則古稱匏瓜皆謂星爾枲有實為苴無實為枲麻與麥互相為候麥黃種麻麻黃種麥蓋夏日至之時麥熟而種麻者以至日前十日為上時至日為中時至後為下時諺曰夏至後不沒狗或答曰但雨多沒槖駝蓋雨多則頓盛矣種枲太早則剛堅厚皮多節晚則皮不堅寧失於早不失於晚詩曰藝麻如之何橫從其畝按韓鄂四時纂要云種麻熟耕地從橫七遍已上生則無葉是藝麻欲熟之驗故以比娶妻者欲其告父母熟思而行之也管子曰五沃之土其陽則安植之五麻若高若不下擇疇所其麻大者如箭如葦大長以美其細者如雚如蒸欲有與各大者不類小者則治揣而藏之若衆練絲葛葛絺綌草也國風曰葛之覃兮施于中谷維葉莫莫是刈是濩又曰葛生蒙楚蘝蔓于野旄丘之葛兮何誕之節兮葛生山澤間其葛延盛者牽其首以至根可二十步釋丘云前高則旄丘之葛蓋誕濶矣此言雖同根一體然相去差逺其緩急不相應也故曰叔兮伯兮何多日也黎之望於衛亦如此矣吳都賦蕉葛升越弱於羅紈禹貢卉服注云草服葛越葛花藤皆可醒酒去酒毒漢江都王建傳云繇王閩侯遺建荃葛注筌細布也字本作絟葛即今之葛布也雞齊雞齊一名鹿藿一名黃斤今之食葛非為絺綌者也其生延蔓甚者其蔓首至根可二十步人皆掘食之生食甜脆亦可蒸食有粉今江南人凶嵗則掘取以禦凶荒大抵南康廬陵者最勝多肉而少筋甘美然當取入土深大者或又曰入土五六寸以上者名葛脰服之令人吐以有微毒也其花藤皆可醒酒而去酒毒服方寸匕飲酒不知醉博物志曰野葛食之殺人家種之三年不收後旅生亦不可食吳都賦食葛香茅注云食葛蔓生與山葛同根特大美於芋也蓷萑蓷郭璞曰今茺蔚也葉似荏方莖白華華生節間全似杜天麻而不生橫枝中谷有蓷之詩一章暵其乾矣二章暵其修矣三章暵其濕矣此燒剃行水之序也鄭氏解季夏之月燒剃行水以為剃謂迫地芟草也欲稼萊地先剃其草草乾燒之至此月大雨流水潦畜於其中則草死不復生而地美可稼也說文又稱耕暴田曰暵然則暵其乾者先暴之也暵其修者火燒之修修然也暵其濕者水浸之也此即周禮剃氏掌殺草夏至日而剃之如欲其化也則以水火變之者也夫暴雖猛猶可蘇也焚雖烈猶可蘖也復加之以水則生意盡矣每變愈甚此所以興夫日以衰薄者也張衡東京賦稱秦之暴也如剃氏之芟草既藴崇之又行火焉彼特以為君民之譬而猶惡之况施之夫婦之際耶雖然草之遇此者多矣而獨言夫蓷者蓋蓷一名益母曽子見之而悲詩人之託此亦其窮而反本氓之詩色衰相棄則歎兄弟之不知竹竿適異國而不見答則歎父母之相逺此所以獨感於益母歟檾檾枲屬高四五尺或六七尺葉似苧而薄實如大麻子今人績以為布及造繩索說文云檾枲屬引詩衣錦檾衣或作檾又作苘音與頃畝之頃同又云褧檾也引詩衣錦褧衣示反古作顈音犬逈反而字書苘或作莔然則檾檾苘褧顈莔一物也今詩用此褧字說者引玉藻禪為與褧同以為衣裳用錦而上加襌縠焉以為庶人之妻嫁服則與許氏說異中庸曰衣錦尚絅惡其文之著也本草有莔實圖經云花黃實殼如蜀葵子黑菺菺戎葵郭氏曰今蜀葵也似葵華如木槿然今蜀葵非一種有深紅淺紅有紫有白莖皆相似其開花自本以漸至未盛夏次第開敷光彩可觀惟黃者特異葉大而衢深有如龍爪黃花紫心六瓣而側今人亦謂之側金盞收以傅瘡腫之屬大抵作器皿多倣此凡草木從戎者本皆自逺國來古人謹而志之今戎葵一名蜀葵則自蜀來也如胡豆謂之戎菽亦自胡中來戎者胡蜀之總名耳其來之始今不復知蜀羌髳自商時已通中國矣荍荍荆葵也蓋戎葵之類比戎葵葉俱小故謝氏曰荍小草多華又翹起也花似五銖錢大色粉紅有紫文縷之一名錦葵大抵似蘆蔔華故陸氏云似蕪菁花紫緑色可食微苦是也亦其文采相錯故陳風男子恱女比之曰視爾如荍言如戎葵之葉小而可愛也此與戎葵異類故釋草菺戎葵郭氏曰今蜀葵也似葵華如木槿又曰荍芘芣郭氏曰今荆葵也似葵紫色則戎葵與蜀葵荍與荆葵其所來各不同本草蜀葵中云小花者名錦葵一名戎葵功用更强則是以此雜之蜀葵中而又反得戎葵之名矣崔豹古今注又云荆葵一名戎葵一名芘芣似木槿而光色奪目有紅有紫有青有白有黃莖葉不殊但花色有異耳一曰蜀葵其說戎葵蜀葵之狀可也混荊葵芘芣之名於內者非也然今人亦通呼此為錦蜀葵則從其類比附之爾又今有一種葉纎長而多缺如鋸花小如錦葵而極紅每以夜半開至午則連房脫落謂之川蜀葵亦云朝開暮落花牛蘄牛蘄今謂之馬蘄似芹葉細鋭可食菜也生水澤旁苗似鬼針菾菜等花青白色子黃黑色似防風子蓋其子甘辛而芳故古人云野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦以踈矣此猶彌子瑕之事衛君忘其口而念我者也養生論曰榆令人暝今牛蘄炒食亦令人得睡然醫方不專食之但用以作飲食與蘹香及佛誓國所生時羅等並同大小芳香皆相似但蘹香時蘿扁牛蘄長舊說曰牛蘄香似橘皮而無苦味釋草一名茭苜蓿苜蓿本西域所産自漢武時始入中國史記曰大宛有苜蓿漢使取其實來於是天子始種苜蓿離宫别觀旁盡種蒲陶苜蓿極望漢書西域傳亦曰罽賓國有目宿大宛馬耆目宿武帝得其馬漢使采蒲陶目宿種歸天子益種離宫館旁然不言所攜來使者之名博物志曰張騫使西域得蒲陶胡葱苜蓿蓋以漢使之中騫最名著故云然而述異記亦曰張騫苜蓿園在今洛中按今苜蓿甚似中國灰藋但藋苗葉作灰色而苜蓿苗端常有數葉深紅可愛今人謂之鶴頂草秋後結實黑房纍纍如穄故俗人因謂之木粟其米可為飯亦有可以釀酒者晉華廣免官為庶人武帝登凌雲臺見廣苜蓿園阡陌甚整依然感舊此物雖出西域今人家羅生等蒿蓬矣而陶隱居乃云長安中有苜蓿園北人甚重此江南人不堪食之以無味故也外國復别有苜蓿草以療目非此類也然按此物即是自外國來又為茹甚軟美不知隱居何以言此臺臺者莎草可為衣以禦雨今人謂之蓑衣詩雅言得賢為邦家立太平之基凡言八物以臺為首蓋禦雨之具雖至微然非平日預知其所在蓄以待乏則一旦欲用索之而不得故特宜先備亦猶賢者之不可不預蓄也越王勾踐棲於㑹稽之上求謀士退吳者大夫種進對曰臣聞賈人夏則資皮冬則資絺旱則資舟水則資車以待乏也夫雖無四方之憂然謀臣與爪牙之士不可不養而擇也譬如蓑笠時雨既至必求之今君王既棲於㑹稽之上然後乃求謀臣無乃後乎是古者蓄蓑笠以備患比之賢者之待難矣臺蓋賤者所服都人士述衣服之制蓋此詩所述皆儉狐裘黃黃黃狐不足貴臺笠緇撮臺笠止雨緇撮通貴賤始冠之服充耳琇實琇雖美而石垂帶而厲帶長而已傷今人之不遵郊特牲曰黃衣黃冠而祭息田夫也野夫黃冠黃冠草服也狐裘黃衣以裼之黃黃謂此大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也臺笠謂此蠟禮自伊耆氏始蓋已久矣然猶存其衣服之制謹而不敢變可謂衣服不二從容有常矣此所以傷不復見古之人也毛氏云臺所以禦暑笠所以禦雨箋云臺夫須也以臺皮為笠毛氏知臺笠為二物但獨言笠禦雨未當鄭氏則言臺皮為笠夫臺但可以為衣不可為笠古稱臺笠蓑笠自謂臺與笠爾不必以臺笠緇撮之語必欲合為一物也越語所謂簑笠已見上文又齊語曰今夫農時雨既至脫衣就功首戴茅蒲身衣襏襫韋昭曰茅蒲簦笠也茅或作萌萌竹萌之皮所以為笠則笠不用臺為可知又曰襏襫蓑薜衣也則襏襫以莎草為之今人作笠亦多編筍皮及箬葉為之其臺為衣編之若甲毶毶而垂故雨順注而下然或藉而卧則不能隔雨山海經曰三危之山有獸其豪如被蓑郭氏亦云蓑皮雨草衣則莎但可為衣不可為笠明矣臺一名曰夫須蓋匹夫所須莎莎莖葉都似三稜根若附子周匝多毛大者如棗近道者如杏人許謂之香附子一名雀頭香合和香用之招隱云青莎雜樹兮薠草靃靡說文以為青薠似莎者然則薠與莎相似但以大小為異爾陶隱居以為古人詩多用之而無識者河中府有緑莎㕔晏元獻公庭莎記曰是草耐水旱樂延蔓雖拔心隕葉弗之絶也子虛賦薜莎青薠張揖曰莎鎬侯也顔師古曰即今青莎稗孟子曰五榖者種之美者也茍為不熟不如稊稗稊與稗二物也皆有米而細小故莊子曰道在稊稗言比於榖則微細而不精道亦在焉又曰若稊米之在太倉亦言小也爾雅稊苵釋曰稊一名苵似稗之穢草布生於地而稗則生下澤中故古詩曰蒲稗相因依汜勝之書曰稗水旱無不熟之時又特滋盛易得蕪穢良田畝得二三十斛宜種之以備凶年又稗中有米熟時可搗取炊之不減粢米又可釀作酒武帝時令典農種之一頃收二十斛斛得米三升大儉可磨食之蓋稗遇水旱無不熟而五榖則有熟不熟之時以此不熟方之於稗則為不如耳草之似榖可以養人者甚多博物志稱蒒草實生海洲上食之如大麥從七月熟民斂至冬乃訖或曰禹餘糧言禹治水棄其餘糧化而為此本草稱東薔子虛賦云東蘠張揖曰實可食生河西苗似蓬子似麥可為飯河西人語曰貸我東薔償爾田粱又米可為飯生水田中苗子似小麥而小四月熟久食不飢爾雅所謂皇守田者也狼尾草子作黍食之令人不飢爾雅所謂盂狼尾者也又有蒯草子亦堪食如粳米又蓬草子作飯無異粳米儉年食之此皆五榖之外可以接糧者故附著之稂稂惡草也與禾相雜故詩人惡之古者以飼馬魯仲孫它馬餼不過稂莠謂此也釋草稂童粱郭璞以為莠類說文云禾粟之米生而不成者謂之蕫蓈或從禾從良而陸璣亦云禾粟秀為穗而不成則嶷然謂之童粱今人謂之宿田翁或謂之守田也按詩稱稼之茂美繼之以不稂不莠去其螟螣及其蟊賊則稂莠以下皆是害稼者孔氏正義云稂莠苗既似禾實亦類粟鋤禾除非類莠既别是一物則稂亦當是一物故郭璞云莠類蓋未能的知其物故稱其類耳而許叔重陸璣以為禾之不成者則是亦禾而已何至與莠並稱乎按本草有狼尾草子作黍食之令人不饑似茅作穗生澤地廣志曰可作黍引爾雅盂狼尾今人呼為狼茅子然則此物似是稂爾稂既有實如黍故能亂苗又莠今謂之狗尾草稂名狼尾則以相類爾雅疏解盂狼尾亦云草似茅香今人亦以覆屋而鄭解下泉浸彼苞稂云稂當作凉凉草蕭蓍之類蓋特取下章浸蕭蓍為言去之益逺莠莠者害稼之草說文但云禾粟下生莠而已考亦不言何物詩人以來特惡之故齊詩曰無田甫田維莠驕驕又曰維莠桀桀言田廣而人力不至則莠生其中氣象驕桀陵出苗上也故孔子曰惡莠恐其亂苗也莠既惡物故言之不美者謂之莠言先儒不適言何物唯韋昭解魯論云莠草似稷無實又韋曜問答云甫田維莠今何草答曰今之狗尾也然後此物方顯今之狗尾草誠似稷而不結實無處不生左傳鄭公孫揮過伯有氏其門上生莠子羽曰其莠猶在乎以喻伯有不能久存晉明帝時王如舉兵作亂令人種禾禾悉變莠已而軍敗商書曰若苗之有莠戰國䇿曰幽莠之幼也似禾音釋芙蕖茄古遐切蕸何加切蔤美筆切蒻音弱䘓音勘鬱鐎中子遙反又似消反溫器三足而有柄禜音詠汁獻上之十反下注讀為莎素何反涗舒鋭反盞莊産切盞酒盎齊也煮鬱和秬鬯以盞酒摩娑涕之出其香汁因謂之汁莎盎烏浪反瓜瓜華郊特牲注華果蓏也又詔以天子樹瓜蓏而已戒諸侯以蓄藏藴財利也為于僞反副普逼反絺勑宜反析星厯反華胡瓜反綌去逆反粗葛纍力果反㚄音帝齕恨沒反去起吕反上環注頭忖也忖本又作刌寸本反寙音眠宀音眠瓠蓏魯果切說文在木曰果在地曰蓏埸音亦菑音緇耕地反草曰菑一音栽植物地中謂之菑注瓢齎瓢謂瓠蠡齎杜讀為粢鄭讀為五齊之齊禜門用之注祇音帝匏篠先鳥切細竹也枲音徙如雚與雀字同音丸揣楚委切量也一曰捶之也管子注欲有施與則以麻之大而類也細麻既治揣而藏之故若練絲葛濩胡郭反施以豉反刈魚廢反蘝音亷卉許貴反葛越王月反文選注草布也一音活蓷萑蓷他回切茺齒戎反蔚音尉暵音漢剃音替暴步卜切檾音頃禪音單縠胡谷切菺音肩荍音翹芘芣音毗浮牛蘄音芹菾音甜瞑莫定切翕目也苜蓿罽賓上居例切國名居葱嶺南藋徒弔切臺裼思歷反袒而有衣曰裼伊耆下巨夷切古天子號蠟音乍索也合聚萬物索饗百神也簦音登襏襫上音撥下施隻切蓑薜國語注音避毶毶蘇含切箬音若莎靃音髓隨風披敷稗苵大結切蒒音師音罔蒯苦怪切茅類稂音郎莠羊九切適音的主也幽莠夏小正有莠幽陳翥謂葽也爾雅翼卷八
