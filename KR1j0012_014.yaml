body:
  text: 欽定四庫全書爾雅翼卷十四宋羅願撰釋鳥鳲鳩隹鳩雎鳩鷑鳩鶌鳩鸜鵒反舌倉庚斫木子嶲鶪鴇鸚鵡鳲鳩鳲鳩一名鴶鵴詩注秸鞠說文秸又名布榖江東呼穫榖又呼撥榖又呼郭公以此鳥鳴時布種其榖似鷂長尾牝牡飛鳴翼相摩拂月令云鳴鳩拂其羽是也取其骨佩之冝夫婦又善養其子有均一之德故少皥氏以為司空詩序稱德如鳲鳩乃可以配焉鳩之字從九蓋與鷹鷂更相化禪列子曰鷂之為鸇鸇之為布榖布榖久復為鷂也又曰一變而為七七變而為九九變者究也乃復變而為一一者形變之始若鷂七者再變若鸇九則變之道究窮將復為一故若鳩此鳩所以從九也布榖復為鷂則九復變為一之道也說文云七陽之正也從一微陽從中邪出也九陽之變也象其屈曲究盡之形蓋物窮則反本故復為布榖也夏小正曰正月鷹則為鳩五月鳩為鷹月令仲春鷹化為鳩其目猶如鷹故曰陽和布氣鷹化為鳩至於有識猶憎其目又許叔重曰鷹化為鳩喙正直不鷙摶也一說曰鳩蓋一巢而九鳥者詩曰鳲鳩在桑其子七兮又名􅬹鷜布榖好鳴之鳥故謂之鳴鳩月令所謂鳴鳩拂羽者今布榖為然小宛之詩曰宛彼鳴鳩翰飛戾天許叔重曰鳴鳩奮迅其羽直掣上飛入雲中者是也鳩亦子之多者今鳩四時有子鴿每月有子隹鳩隹鳩孝鳥故少皥氏以為司徒一名祝鳩又名䳕鳩似班鳩而臆無繡采又頭有贅物之拙者不能為巢才架數枝往往破卵無巢不能居天將雨則逐其雌霽則呼而反之今人辨其聲以為無屋住云䳡既孝鳥故養老之杖倣之漢仲秋之月縣道皆按户比民年始七十者授之以玉杖餔之糜粥八十九十禮有加賜玉杖長尺端以鳩鳥為飾鳩者不噎之鳥也欲老人不噎古之養老祝鯁在前祝噎在後以為養老之備此所以取鳩而又名鳩為祝鳩也周禮羅氏獻鳩以養國老王子年記少皥時事稱帝子與皇娥泛於海上以桂枚為表結薰茅為旌刻玉為鳩置於表端則鳩杖之起亦逺矣此云刻玉玉杖亦其類也琴操曰舜耕厯山思慕父母見鳩與母俱飛鳴相哺食感思作歌今之青䳡雎鳩雎鳩鵰類今江東呼之為鶚好在江渚山邊食魚故詩云關關雎鳩在河之洲也鶚鳥之摯者故曰鷙鳥纍百不如一鶚淮南子曰狐不二雄神龍不匹猛獸不羣鷙鳥不雙姜后稱雎鳩之鳥猶未嘗見其乘居而匹遊故先儒稱摯而有别少皥氏以為司馬主法制鄭康成則云摯之言至也謂王雎之鳥雌雄情意至然而有别揚雄羽獵賦云𤣥鸞孔雀翡翠垂榮王雎關關鴻鴈嚶嚶羣娛乎其中噍噍昆鳴張衡思𤣥賦云天地烟煴百卉含葩鳴鶴交頸瞗鳩相和處子懷春精魂回移其歸田賦云仲春令月時和氣清原隰鬱茂百草滋榮王雎鼓翼倉庚哀鳴交頸頡頑關關嚶嚶以相和而交頸言之則蓋嘗乘居而匹遊矣烏在論其有别耶且后妃之意方將樂得淑女與其君子相與如雎之相為顧豈暇言其别淮南子曰關雎興於鳥而君子美之為其雌雄之不乖也鹿鳴興於獸君子大之取其見食而相呼也則古之說詩者與此異矣然則何以言關雎樂而不淫曰后妃之意樂得賢女以配君子則不淫之義自顯矣陸璣疏雎䧱大小如鴟深目目上骨露幽州人謂之鷲揚子雲許叔重皆曰白鷢似鷹尾上白鷑鳩鷑鳩者隼也見隼章鶌鳩鶌鳩春來冬去備四時之事故少皥以為司事之官似山鵲而小短尾青黑色多聲今江東亦呼為鶻鵃鸜鵒鸜鵒似鵙而有幘飛輒成羣多聲字書謂之哵哵鳥一作雊或曰身首皆黑惟兩翼皆有白㸃飛則見如字書之八云性好淫其行欲則以足相勾往往墮者相連而下故從勾從欲字說云尾而足勾焉是也山海經衡山鳥多鸜鵒而性又不踰濟故春秋有鸜鵒來巢書以為異劉向以為鸜鵒夷狄穴藏之禽來至中國不穴而巢陰居陽位鸜鵒白羽旱之祥也穴居而好水黑色為主急之應也說者以為鸜鵒今中國皆有然但在濟西不踰濟耳春秋以為魯所常無故異而書之而劉向以為夷狄禽未喻其意又此鳥本亦巢居不皆穴處書巢者著其居木孚乳不即去也此說甚長荆楚之俗五月鸜鵒子毛羽新成取養之以教其語五月五日剪舌俗謂之花鵒今有一種灰色好穿屋瓦下以居號瓦鵒反舌反舌春始鳴至五月止能變其舌反易其聲以效百鳥之鳴故名反舌又名百舌淮南子曰人有多言者猶百舌之聲人有少言者猶不脂之户謂多言而不得其要徒為譊譊耳不脂之户則以難於啓閉故也反舌所以五月無聲者陽氣極於上陰氣起於下百舌無陰故無聲其有聲則為異周書時訓曰芒種之日螳蜋生又五日鵙始鳴又五日反舌無聲反舌有聲佞人在側春秋保乾曰江充之害其萌反舌鳥入殿此其驗也以月言之則如此以嵗言之則少陰少陽司天子午寅申之嵗羽蟲則靜說者以為諸黑色有羽翼者胡越燕百舌鳥之類反舌今人多畜養者而風土記以祝鳩為反舌則非其類又蔡雍謂反舌蛙也今謂之蝦蟇其舌本前著口側而末向內故謂之反舌引易通卦驗博勞鳴蝦蟇無聲為證然蝦蟇五月中得水適當聒人耳何反無聲或蝦蟇舌性自然不必為反舌也故鄭氏不取倉庚倉庚黃鳥而黑章齊人謂之摶黍秦人謂之黃栗流幽冀謂之黃鳥一名黃鸝留或謂之黃栗留一名黃鶯而爾雅有皇黃鳥倉庚商庚鵹黃楚雀之名二月而鳴夏小正云二月有鳴倉庚鵙者績之候倉庚者蠶之候故詩稱倉庚喈喈采繁祁祁又稱伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲按禽經稱鶯鳴嚶嚶則詩所言鳥殆謂此故後人皆以鶯名之此鳥之性好雙飛故鸝字從麗又曰鸝必匹飛鵙必單棲而東山之末章以比之子于歸者也出谷遷喬之事未見其驗今荆州每至冬月於田畝中得土堅圓如卵者輒取以賣破之則鶯在其中無復毛羽蓋以土自裹伏而土堅徑候春始生羽破土而出然則出谷遷喬之事恐當似此矣說文離黃倉庚也鳴則蠶生斫木鴷斫木口如錐長數寸常斫枯木取其蠧故以名云此鳥有大有小有褐有斑褐者是雌斑者是雄又有青黑者大如鵲頭上有紅毛如鶴頂生山中土人呼為山啄木然以青者為主故黃帝內經太陰司天羽蟲不成謂丑未之嵗也說者以為羽蟲謂青緑色者則鸚鵡鴷鳥翠碧鳥之類諸青緑色之有羽者也嵗乘金運其復甚焉此乃六氣五類有相勝制者也其飛好極深逺故相傳以為雷公採藥吏所化此與帝女為精衛蜀王為子巂竊肉者為逃河相類斫木易識之鳥而許叔重解淮南子仲春之月倉庚鳴一說以為斫木非也此鳥喙端有鈎嘗見其啄啄不止頃之摯翼不能去若負痛者使人視之啄在木中力脫之遂死蓋平時得蟲則以鈎取之此時無蟲鈎誤著木不能去也子巂子巂出蜀中今所在有之其大如鳩以春分先鳴至夏尤甚日夜號深林中口為流血至章陸子熟乃止農家候之太史公曰昔自在古厯建正作於孟春於時氷泮發蟄百草奮興秭鴂先􅗍􅗍即鳴也其鳴聲若歸去故爾雅為巂說文為子巂太史公書為秭鳺髙唐賦為秭歸禽經為子規徐廣為子􅨼字雖異而名同也亦曰望帝亦曰杜宇亦曰杜鵑亦曰周燕亦曰買名異而實同也離騷曰恐鵜䳏之先鳴兮使百草為之不芳鵜䳏音弟桂一作鷤鴂或以為此物或以為百勞或又以為巧婦按此稱鵜䳏先鳴即前所謂秭鳺先􅗍者也此物以芳時最先鳴然一發其聲次日視之則梨菊之頴皆截然萎折數寸莫知其故然則古人蓋忌其口鳴之早也若伯勞以仲夏時鳴豈復有芳草耶蓋鵜即秭之訛䳏即鳺字或轉而為南蠻鴂舌之鴂則冝其以為伯勞也而巧婦一號鸋鴂故又轉而益逺皆不可用也今人亦惡先聞以為當有離别其産子於百鳥之巢鳥或從而哺之亦下人家竊蠶或又以為見者冝於蠶云其名望帝者蓋蜀王望帝淫其相妻慙亡去化為此鳥蜀人聞其鳴皆起曰望帝自漢許叔重已有此說望帝一名杜宇故蜀都賦云鳥生杜宇之魄謂此也唐杜甫詩曰我見獨再拜重是古帝魄雖感時之言亦蜀之遺俗也蜀中尤多故雲安有縣名姊歸袁嵩以為屈原姊女􅎐聞原放逐亦來歸喻令自全鄉人冀其見從因以名縣縣北有原故宅宅之東北有女嬃廟云按原楚之近族所謂昭屈景者其放逐又自在汨羅之間其姊何用歸蜀且其字從禾非姊妹之姊正自蜀鳥所多以為縣名耳又杜詩所謂雲安有杜鵑者閩中記曰子規自呼為謝豹陶嶽零陵記曰思歸樂狀如鳩而慘色三月則鳴其音云不如歸去鶪鶪似鶷鶡而大一名伯趙又名伯勞易通卦驗云博勞性好單棲其飛翪其聲嗅嗅夏至應陰而鳴冬至而止故帝少皥以為司至之官而夏小正五月鴂則鳴月令仲夏有鶪始鳴豳詩則云七月鳴鶪蓋豳地寒晚物從其氣其鳴為將寒之候故八月載績常候此也時訓云鶪不始鳴號令壅逼髙誘以為夏至後應陰而殺蛇乃磔之棘上而始鳴今俗云鶪在林間鳴蛇於其下蟠結不動飛去則伸其所踏枝可鞭兒令速語以其當萬物不鳴時而能鳴故以類求之又能療繼病繼病者母有娠而乳子使子得疾如痁淮南鴻烈曰男子植蘭美而不芳繼子得食肥而不澤情不相與往來也蓋情在腹中之子故於所乳之子為情不往來所以病而不澤也世傳伯竒化為鶪豈亦母所不愛為此耶然少皥已有伯趙氏豈待伯竒而後有姑廣異聞爾鴇鴇者今之獨豹也以鴇為豹聲之訛耳鴇亦水鳥似鴈而無後指上林賦曰鴻鷫鵠鴇駕鵝屬玉交精旋目煩鶩庸渠針疵鵁盧羣浮乎其上是也鴇羽之詩言君子下從征役不得養其父母以喻鴇之集于苞栩苞棘苞桑蓋水鳥而木棲既失其常是又無後指尤非所以自託於木者可謂不得其所矣段成式云鴇遇鷙鳥能激糞禦之糞著毛悉脫今鵰之毛能落衆羽然其鷙烈足以服羽族此類之可推者鴇乃水鳥不以鷙稱而鷙鳥為之落羽此類之不可推者鸚鵡鸚鵡能言之鳥其狀似梟青羽赤喙足隴右及南中皆有之然南鸚鵡小於隴右飛則千百為羣俗忌以手觸其背犯者多病顫而卒名鸚鵡瘴禮曰鸚鵡能言不離飛鳥淮南子曰鸚鵡能言而不可使長得其所言而不得其所以言也然有三種大抵五色者尤慧白者次之青者為下其足指前後各二郭璞贊云四指中分行則以觜特為羽族異故字從武武者足跡說者以為似小兒腳指也又名鸚䳇吳志云鳥名鸚䳇未聞鸚父字說曰嬰兒生不能言母教之言已而能言以言此鳥之能言類是也亦其舌似小兒故能委曲其音聲以象人爾又鳥目下瞼眨上唯此鳥兩瞼俱動如人目蓋羽蟲之能人言者必有人形之一端今秦中有吉了鳥毛羽黑大抵如鸜鵒然有兩耳如人耳而紅此與鸚鵡之人舌人目何異然吉了生秦中其音聲差重濁如秦人語不若鸚鵡之輕清云音釋鳲鳩上音尸鴶音戞鵴音菊鷂音耀鸇之然切邪與斜同不正也􅬹魯甘切鷜音縷隹音錐鳥短尾者揔名䳕音忙皮切浮粥也睢鳩上七胥切乘居上去聲娛音虞噍噍昆鳴噍與啾同子由切昆同也烟煴易作絪緼天地氣也頡頏上户結反下户郎反飛而上曰頡飛而下曰頏鷲音就蟨居月切鷑音立爾雅音及鶌居勿反注鶻鵃上音骨下竹交切又音昭鸜鵒下音浴哵哵音八反舌譊譊莊子乃交切鵙公覔切蛙或作蛙倉庚伏扶富切鳥抱子斫木鴷音列子嶲爾雅音規鳺居隨反買下音詭鷤音題鴂音决鸋音寧女􅎐私俞反鶪圭覔反鶷胡達切鶡何葛切其飛音宗爾雅疏竦也不能翺翔逺飛但竦翅上下而已其聲嗅嗅詩疏引陳思王惡鳥論作鶪鶪故以其音名云磔陟格切鴇音保鴐音加煩鶩音木鴨屬庸渠郭璞曰似鳬灰色而雞腳一名章渠針疵上音針下音資說文作􅰌鴜張揖曰似魚虎而蒼黑色鵁盧張揖曰鵁鴢頭鳥盧鸕鷀也鴢音杳又音柪鸚鵡顫音戰四支寒動也使長知丈切許慎注長主也知效人言不能自為長主之言也瞼已再反眨側洽切目動也爾雅翼卷十四
