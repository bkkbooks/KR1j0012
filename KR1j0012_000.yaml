body:
  text: 欽定四庫全書經部十爾雅翼目録小學類一訓詁之屬卷一釋草黍稷稻粱麥牟麻菽秬秠苽卷二蘭蕙蕳薰草江離杜若茝杜衡蘼蕪卷施菉竹女蘿兔絲卷三芍藥芝菊荃藝龍萱薜荔款冬卷耳芣苡陵苕射干木堇燕支卷四藍葴巵茈草茹藘艾薺蕨薇葵蔞蘩蒿蔚蕭卷五韭蔥薤蒮茖葝葫蒚􅭹莪萍藻荇茒芹卷六蘋芡菱􅙛蘧蔬鳬茨薯藇芋蒻薑葑葖堇藜藋卷七蘦芐菋參薚蓍茨烏喙門冬顛棘蘘荷活莌蓼蘇荏芥卷八芙蕖鬱瓜瓠匏枲葛雞齊蓷榮菺荍牛蘄苜蓿臺莎稗稂莠卷九釋木檜樅榛楛檿柳桐棘椇梧梓棟榖六駮并閭卷十梅杏桃李櫻桃棗栗樝梨橘柚橙柿梬柀卷十一楙椒榝檔槐柟楚楓樞栘卷十二柞櫟豫章櫧檆木蘭樺茶椐棎楊梅石榴漆桂盧橘離支仁頻椰竹箭卷十三釋鳥鵬鳳鸞孔雀鶴雞雉鷩烏鵲卷十四鳲鳩隹鳩雎鳩鷑鳩鶌鳩鸜鵒反舌倉庚斫木子雟鵙鴇鸚鵡卷十五燕雀鶉鷸鷽鳽鸛鴗鶂比翼卷十六鷹隼雕鶡梟鵩鴆服翼蚊母戴鵀卷十七鳬鷖鶩鵝鴈鷀鵜鶖鶬鷺鷫鷞鴛鴦屬玉昆雞鶺鴒卷十八釋獸麟狻麑騶虞豸夔貘騊駼六駮馼犀兕象卷十九虎虪甝豹貔貙獌熊羆豺狼犴類猩猩狒狒猛氏角端挑拔卷二十鹿麋麕麈􅕱麝麢猴猿玃􅛊蜼卷二十一犛羱豪獺鯪鯉兔貂蟨彚貓貍狐貉窮奇檮杌叨餮卷二十二牛騋駵騵騧馵駥魚驢騾駃騠閭駝卷二十三羜羒牂羭羖羍􅘻豝豵鼠鼷鼯鼵蚡卷二十四釋蟲蠶蠢春原蟓蜀蝤蠐尺蠖蛅蟖蟫蚰蜒蚓卷二十五莎雞蜉蝣蟋蟀螳蜋蜱蛸青蛉蜣蜋蜘蛛蠨蛸胡蝶卷二十六蜂蜜蜂蜾裸蠆蚊虻蚤蝨螻蝍蛆卷二十七螢蜩蟻螱螓青蠅蒼蠅蜚螟蟘卷二十八釋魚龍鯉鱣鮪魴鱮鮒鱒鱧鰷鯊卷二十九鱖䲅鯼鮆鮧鱓鰌鱖鯞比目王餘烏鰂卷三十鯨鯢鰐鰩鮫蝦虴蜮蜎蛭科斗蝸牛蟾蜍卷三十一龜攝龜鱉能黿鼇鼉蟹鱟螺貝蜃蛣卷三十二蛇蝮枳首蛇螣蛇巴蛇蜥蜴蝘蜓臣等謹案爾雅翼三十二卷宋羅願撰元洪焱祖音釋願字端良歙縣人孝宗時為鄂州守焱祖字潛夫亦歙縣人官休寧縣尹是書卷端有願自序及王應麟序後有方回及焱祖跋語應麟序謂以淳熙庚午刻之郡齋而其所為玉海藝文志內乃失載蓋偶踈也焱祖後跋稱釋草八卷凡一百二十名釋木四卷凡六十名釋鳥五卷凡五十八名釋獸六卷凡七十四名釋蟲四卷凡四十名釋魚五卷凡五十五名今按之全書名數皆合惟謂獸七十四名今書乃有八十五疑原跋字畫有誤或後人有所附益非復焱祖舊本矣其書考據精博在陸佃埤雅之上應麟序稱其即物精思體用相涵本末靡遺非溢美也乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀爾雅翼羅願自序惟宋十一世淳熙改元孝宗朝甲午歲羅子次爾雅翼羅子願字端良徽州歙縣人爾雅十九篇郭璞釋曰爾近也雅正也言可近而取正也翼謂編次此書所以羽翼爾雅並行於世也定著五萬餘言論語曰詩三百一言以蔽之曰思無邪左傳趙簡子稱子大叔遺我以九言此以一句為一言漢東方朔誦二十二萬言此以一字為一言今云五萬餘言者以字計也乃論古初造化始專專俗作端説文物初生之體也上象生形下象根萬彚芒忽並生其間芒音荒忽本作芴有無也莊子亂體有無也莊子芒乎芴乎萬物職職皆從無為出民生如標枝鹿豕為羣標上聲一音杓又去聲言木抄之枝無心在上也枝一作校音效莊子天地篇自以為一物不自貴珍有聖人者立桀出其倫使同類相收異類區分正名百物毛羽介鱗周官大司徒之職辨其山林川澤丘陵墳衍原隰之名物毛物貂狐貒貉之屬羽物翟雉之屬介物龜鱉之屬鱗物魚龍之屬貒它丸切又它畔切圜首方趾自別為民大戴禮曽子天圓篇曰天之所生上首地之所生下首注人首圓足方因繫之天地乃佃乃漁乃刊乃焚易繫注陸佃以羅鳥獸水漁以罔魚鱉刊通作刋書隨山刋木孟子益烈山澤而焚之選百羞百榖以為常珍周官內饔選百羞醬物珍物以俟饋羞出於牲及禽獸以備滋味揚泉物理論曰梁者黍稷之總名稻者溉種之總名菽者衆豆之總名三榖各二十種為六十蔬果之實助榖各二十凡為百榖味其辛毒俾相君臣淮南子云神農嘗百草之滋味一日而七十毒程子曰若小毒亦不當嘗若大毒一嘗而死矣安得生其所以得知者自然視色嗅味知得是甚氣作此藥使可攻此病古者因藥物之性分為君臣佐使以相攝故其合和有一君二臣三佐五使或一君三臣九佐使沈括曰君為藥雖衆主病者在一物其他則節級相為用靈智以為畜猛暴服循畜音嗅禮運四靈以為畜故飲食有由也麟鳳龜龍謂之四靈暴音暴周禮服不氏掌養猛獸而阜蕃教擾之注教習使之馴服異物著之鼎別姦與神遂超萬物莫之與鄰號名三才與天地均裁制萬品皆由於人左傳昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入山林川澤不逢不若物患既去其利畢陳患去如周公驅虎豹犀象而逺之利陳如虎豹之皮為侯與為裘犀兕為甲象以飾輅而為笏智者用其實因既其文有所著作假之而論故詩首關雎春秋感麟易八卦始畫仰天俯地窮鳥獸之文書契因之是生典墳禮觀象作服贄死生之物以明卑尊吹竹聽鳳為樂本原漢志黃帝使伶倫制十二筒聽鳳鳴其雄鳴為六雌鳴亦六比黃鍾之宫而皆可以生之是為律本魯論貴多識譏五榖不分聖有所不語亦有所常言子不語怪力亂神雅言詩書執禮此結上文意謂異物神姦固聖所不語易書詩春秋禮樂皆假物而論則聖所常言也至王會紀逺物則多異聞周書王會解篇所記雜物奇獸皆四夷逺國各齎土地異物以為貢贄篇名王會者王城既成大會諸侯及四夷也唐太宗時逺方諸國來朝者甚衆服裝詭異顔師古請圖以示後作王會圖自王會以下不敢上紊聖經故於過脈處下一至字先生作文不茍如此離騷志潔唯掇其芳芬王逸章句曰行清潔者佩芳德屈平以清潔一介自處故楚辭取象於草木之芳潔者無所不備不若爾雅博洽雅馴起於漢世學者自為顓門欲輔成詩道廣托旁穿萬物異名始著于篇先師説之義多不鮮由古學廢絶説者無所旁緣郭璞序曰若乃可以博物不惑多識於鳥獸草木之名者莫近於爾雅爾雅蓋興於中古隆於漢世雖注者十餘然猶未詳備愚按爾雅之作經傳莫言其人及時世郭氏以為興於中古者經典通謂伏羲為上古文王為中古孔子為下古中古蓋指周公時言邢昺疏有曰釋詁一篇蓋周公所作釋訓以下或言仲尼所增子夏所足其説皆不足信故羅公斷定以為起於漢世專門之學為輔成詩道而作也郭氏雖曰興於中古然亦云蓋以疑之朱文公曰爾雅是取傳注以作後亽却以爾雅證傳注趙岐説孟子爾雅皆置博士在漢書亦無可考風土不同各據所偏夾漈鄭氏曰物之難明者為名之難明也名之難明者謂五方之名既已不同而古今之言亦自差別江南之産踰北而遷考工記云橘踰淮而北則為枳鸜鵒不踰濟貉踰汶則死此地氣然也汶毛氏音岷陸德明音問誤至其語音亦不相沿楚語虎為於菟蠻名魚為娵隅東漢書注零陵南康人呼蜼音餘建平人呼蜼音贈遺之遺又音余救反皆土俗輕重不同鄭人命死鼠擬於璵璠璵音餘璠音煩按類要載尹文子曰鄭人謂玉未琢者為璞周人謂鼠未臘者為璞周人謂鄭賈人曰欲買璞乎鄭賈曰欲之出璞示之乃鼠也因謝不取六書之相假鱓則為鱣漢書楊震傳冠雀銜三鱣魚注冠音貫即鸛雀也鱣音善韓子云鱣似蛇臣賢案續漢及謝承書鱣字皆作鱓然則鱣鱓古字通也鱓魚長者不過三尺黃地黑文故都講云蛇鱓卿大夫之服象也郭璞云鱣魚長二三丈音知然反安有鸛雀能勝二三丈乎此為鱣音善明矣物亦固有難識不可泛觀惡莠亂苗豫章須七年𫐠異記曰豫章生七年而後與衆木異非好古博雅身履藪澤孰能究宣野人能別之不能見於傳鄭氏曰儒生家多不識田野之物農圃人又不達詩書之旨二者無由參合遂使鳥獸草木之學不傳至謂梟女匠魚罟為荃詩鴟梟郭云鴟類陸璣疏云似黃雀而小其喙尖如錐取茅秀為窠以麻紩之如刺襪然縣著樹枝或曰巧婦或曰女匠陸説蓋誤周易王弼明象曰得魚忘荃廣韻筌者魚笱也從竹莊子作荃注香草可以餌魚愚按罟字疑當作笱六駁以為馬不可駕牽秦風隰有六駁六駁本名其皮青白駁犖逺而望之似六駁之獸因以為名其木則梓榆也毛直以為獸之六駁則與苞櫟棣檖不相類故陸不從謂芍藥無香説芳草者初不識蕙與蘭鄭詩贈之以勺藥毛萇云香草陸璣云無香氣蓋醫方但用其根陸不識其華故云無香蕙蘭説見翼中羅子疾之乃探其原因爾雅為資略其訓詁山川星辰爾雅有釋詁釋訓釋山釋水釋天略謂闕而不述研究動植不為因循周官大司徒之職以土會之法辨五地之物生生音性動物謂毛鱗羽介裸植物謂皂膏核莢叢注云天覆地載地有五等所生無過動植及民耳觀實於秋玩華於春俯瞰淵魚仰察鳥雲列子注察見深淵之魚淮南子鳥飛於雲又大戴禮烏魚皆卵魚遊於水鳥飛于雲山川皋壤遇物而欣莊子外物篇曰山林與皋壤與使我欣欣然而樂與注山林皋壤未善於我而我樂之此為無故而樂也與音余有不解者謀及芻薪農圃以為師釣弋則親用相參伍必得其真農圃釣弋四字本論語易參伍以變荀子曰窺敵制變欲伍以參趙廣漢傳參伍其賈以類相凖蓋紀數之法以三數之則遇五而齊以五數之則遇三而會參伍者前後多寡更相反覆以不齊而要其齊此書之成為雅羽翰其涵如海其負如山韓文海涵地負其稱物小義炳而寬易繫曰其稱名也小其取類也大注所稱物名多細小若見豕負塗之屬雖是小物而喻大事是所取義類而廣大也不強所不知義無不安宇中所有目擊而存莊子目擊而道存擊動也郭云日裁往意已達指毛命獸見末知根古之命獸皆以其毛色命之如馬驪白雜毛曰駂黃白雜毛曰駓隂白雜毛曰駰凡此皆指毛以命之也草木之根未易察識觀於柯葉可以知之如葉大有毛為白术葉細小為赤术松葉柏身為樅柏葉松身為檜凡此皆見末以知根也可用閎覽虞悅性情玩化無窮以觀我生率是佐時人主以裁成通之于六籍疑義以明千世之下與雅並行後有子雲君山之儔乃知其精揚雄作大玄法言時人皆忽之惟桓談以為絶倫君山談字也韓文後有楊子雲必好之矣雅道復顯功亦宏矣郭序爾雅云豹鼠既辨其業亦顯此云復顯者言其書行於千世之下當與爾雅同功而復顯也王應麟後序右爾雅翼三十有二卷歙羅公願端良撰惟大學始教格物致知萬物備於我廣大精微一草木皆有理可以類推程子曰一草木亦皆有理不可不察但於一事上窮盡其它可以類推卓爾先覺即物精思體用相涵本末靡遺先覺指下文周程邵朱四先生水華庭草玩生意以自怡周子有愛蓮説程氏遺書明道先生曰周茂叔窗前草不除去問之云與自家意思一般朱子贊云庭草交翠雞雛觀仁乾坤具梅枝程子曰觀雞雛可以觀仁朱子曰凡物皆可觀此偶見雞雛而言耳小小之物生理悉具又曰初與嫩底便是蓋當時飲啄自如未有爭鬭侵陵之患便是仁也二程語録早梅冬至以前發方一陽未生然則發生何也其榮其枯此萬物一箇隂陽升降大節然逐枝自有一箇榮枯分限不齊此各有一乾坤也巨而苞萬彚乎觀物纖而析衆芳乎楚辭邵康節皇極經世書十二卷觀物篇六卷朱子作楚辭集注辨證約不膚陋博不支離蓄德致用一原同歸彼謏聞者誤荔挺杜若不識蟹蜞顔氏家訓載月令云荔挺出鄭玄注馬薤也説文荔似蒲而小根可為刷廣雅云馬薤荔也髙誘注吕氏春秋云荔草挺出也然則月令著荔挺為草名誤矣江陵嘗有一僧面形上廣下狹劉縚呼為荔挺法師縚親講禮名儒尚誤如此小説舊聞宋謝朓詩云芳洲采杜若貞觀中醫局求杜若度支郎乃下坊州令貢州司判報云不出杜若應由謝朓詩誤也太宗聞之大笑判司改雍州司法度支郎免官彭蜞似蟹而小蔡謨初渡江見之曰蟹有八足加以二螯既食方知非謝尚曰卿讀爾雅不熟幾為勸學死騶牙重常徒語怪而麃鳻售欺史記建章宫後閣重櫟中有物出焉其狀似麋以聞武帝詔東方朔視之朔曰所謂騶牙者也逺方當來歸義而騶牙先見其齒前後若一齊等無牙故謂之騶牙其後一歲胸奴渾邪王果來降索隱曰此朔以意自立名而偶中也以有九牙齊等故謂之騶牙猶騶䛴然也王充論衡第十三卷别通篇第三十八禹益並治洪水禹主治水益主記異物海外山表無逺不至以所聞見作山海經董仲舒覩重常之鳥劉子政曉二負之尸皆見山海經故能立二事之説使禹益行地不逺不能作山海經董劉不讀山海經不能定二疑愚按今山海經無有鳥名重常者惟劉子政二負事見注中或者漢時山海經本未至脫簡董仲舒見其全王充時亦未泯而今已亡此簡也然騶牙重常二事可謂怪矣麃顔師古曰鹿屬形似麞牛尾一角音蒲交反郊祀志漢武帝郊雍得一角獸若麃然謂之麟史記封禪書曰獲一角獸蓋麟云蓋疑辭也鳻本作鶡漢書注音芬鳻鶡字通用鶡雀大而色青出羌中俗謂鶡雞宋景文音介以為雀黃霸傳鶡雀飛集丞相府霸以為神爵議欲以聞張敞奏霸挾詐偽以姦名譽霸甚慙售欺謂妄以麃為麟以鶡為神爵也矧編絶簡脫之餘舄虎魚豕栁卯荄兹舄古鵲字陸佃云舄通為舄履之舄古人居欲如燕行不欲如鵲故借為鵲字所以為行戒也殷氏子抄曰舄九寫而為烏虎三寫而為帝言書之轉易如此佩觽集曰帝成虎魚成魯三豕當為己亥皆字誤也吳志虞翻傳注古大篆卯讀當為栁古栁卯同字宋景文筆記亦謂卯本栁字後借為辰卯之卯沈存中筆談劉字從丣音酉從金如柳駵留皆從丣非卯字也詩言采其茆音卯徐音栁毛氏曰茆本作􅛄從寅卯之卯案其字從草從申丣之丣音酉音義與栁同乃􅛄也非鳬葵之茆諸儒音釋互用誤矣愚按韻書卯為春門酉為秋門丣乃一卯閉門象也漢書蜀人趙賓好小數書以為箕子明夷箕子者萬物方荄兹也至於菉緑桋荑毛公解衛詩分緑竹為二物曰緑王芻也竹萹竹也郭云今呼鴟腳莎即菉蓐豆萹竹似小藜赤節好生道旁可食陸璣草木疏則以為草之莖葉似竹而青合緑與竹為一草洪容齋隨筆謂漢書下淇園之竹以為楗衛詩又有籊籊竹竿以釣于淇之句所謂緑竹豈不明甚若鴟腳莎菉豆安得云猗猗青青哉此則直以緑為色竹為今笋生之竹朱子詩傳亦然詩隰有把桋注桋赤梀也本亦作荑音夷愚按脂韻有桋荑二字注桋木名莁荑藥名並音夷又齊韻亦有桋荑二字注桋女桑也荑初生草也詩手如柔荑自牧歸荑易枯楊生稊是也並音題此二字字同而音義不同如此梀山革切玉篇云赤梀木也薠蘋薺茨詩采蘋項氏曰白蘋水生似萍青蘋陸生似莎相如賦薜莎青薠毛氏謂青薠似蘋而大屈原九歌登白薠兮騁望朱文公注薠音煩一作蘋非是薠草秋生今南方湖澤皆有之似莎而大鴈所食也愚按九歌中四句上言登白薠兮騁望下言鳥何萃兮蘋中一薠一蘋本不相亂而注或亂之非也詩牆有茨説文作有薺薺茨古通用嚴氏曰詩有二茨如茨如梁福祿如茨為蓋屋之茨牆有茨楚茨皆蒺藜也蘋蓱萊棗詩鹿鳴食野之蘋毛云蘋蓱也孔疏云蓱是水中草非鹿所食愚按爾雅蘋有二種一云蘋蓱其大者蘋此水生之蘋也一云蘋藾蕭今藾蒿也此陸生之蘋即鹿所食埤雅亦以鹿食之蘋為水中之蓱蓋承毛氏之誤東漢馮衍遺田邑書曰外無桃萊之利李賢注云案謝息得桃邑萊山萊字似棗文又連桃後李者以桃棗易明桃萊難悟輒改萊為棗衍集文作萊或故作棗展轉乖僻為謬矣愚按謝息為孟孫守郕邑季孫與之桃辭以無山與之萊柞事見昭七年熊能螭離韓文羽窟無底幽黃能集注能有兩音奴來切者三足鱉也奴登切者熊屬足似鹿者也堯殛鯀于羽山其神化為黃能以入于羽淵國語作黃能音賢能之能東海人祭禹廟不用熊白及鱉為饌疑鯀化為二物則兩音亦可通用螭音摛離音醨漢書相如上林賦蛟龍赤螭文頴曰龍子為螭張揖曰赤螭雌龍也如淳曰螭山神也獸形師古曰許慎云離山神也字則單作螭形若龍字乃從蟲此作螭別是一物既非山神又非雌龍龍子三家之説皆失之蟲音許尾反鵠鶴鷻鶉雜糝而紛披陳涉世家燕雀安知鴻鵠之志史記音義云鴻鵠音紅鶴鴻鵠一聳千里自是一鳥名鸞鳳之屬非鴻鴈與黃鵠也漢書司馬相如子虛賦弋白鵠連駕鵝雙鶬下玄鶴加師古注鵠水鳥也其鳴聲鵠鵠鵠音胡沃反玄鶴黑鶴也鶴壽滿二百六十歲則色絶黑愚按鴻鵠音紅鶴則鵠鶴疑為一物賦四句既言鶴又言鵠自為二物然莊子鵠不日浴而白陸德明音義直云鵠又作鶴並胡洛切則是一物陸佃埤雅有鶴又有鵠今翼中謂鵠即鶴音之轉鶴之外無所謂鵠詩小雅四月匪鶉匪鳶鶉徒丸切毛氏曰鶉雕也説文作鷻鄘國風鶉之奔奔音純䳺鶉鳥此二字字同音異兩物也諼萱導䆃夆蜂嚶鶯訓義之參差詩焉得諼草言樹之背諼忘也説文從草憲又作萱作萱俱以况袁為翻傅會程泰之又謂古詩字本作萱自唐明皇改古文代以今字乃訛萱為諼耳導亦作䆃顔氏家訓曰相如封禪書䆃一莖六穗於庖犧雙觡共抵之獸此導訓擇光武敕郡國異味不得有所獻詔云非徒有豫養導擇之勞是也而説文云䆃是禾名引封禪書為證無妨自當有禾名䆃非相如所用也禾一莖六穗於庖豈成文乎縱使相如鄙拙強為此語則下句當云麟雙觡共抵之獸不得云犧也觡音格周頌小毖莫豫荓蜂毛傳云荓蜂􅠺曳也從旁牽挽使離正道茾甹夆蜂音義同愚按文公詩傳茾使也蜂小物而有毒者也蜂為蜂蝶之蜂則與下文辛螫義協毛説非也􅠺尺制反曳以制反詩伐木丁丁鳥鳴嚶嚶注兩鳥聲正文與注皆未嘗及黃鳥自禽經稱鶯鳴嚶嚶白樂天作六帖類入鶯門中又作詩每用之於是詩人例用遷鶯求友事雖宋之碩儒如舒王山谷亦所不免要皆承襲唐人之誤東皋雜録緗素雜記辨之甚詳芑有菜草粟之別詩有三芑薄言采芑菜名豐水有芑草名維穈維芑白梁粟把有梓栁檵之殊名之相混詩有三把將仲子母折我樹把栁屬也南山有臺有把湛露在彼把棘山木也即梓把也宫室之良材枤杜北山言采其把四月隰有把桋四牡集于苞把枸檵也即今枸把檵音計獸則蛭蜩蝦蛤上林賦蛭蜩蠷蝚漢書注如淳曰蛭音質張揖曰蛭蟣也蜩蟬也師古曰方言獸屬而引蛭蟣水蟲又及蜩蟬乖於事類如説非也文選注引山海經曰不咸之山飛蛭四翼飛蛭音翡窒不咸乃肅慎氏之國有此獸郭璞曰蛭蜩未聞上林賦格蝦蛤孟康曰獸名蝦音遐蛤音閣愚按蛭蜩蝦蛤四字皆從蟲而獸類乃有此二名也草則鱉虻虉隼詩及爾雅説文皆云蕨鱉也孰氏曰江西謂之虌草木疏云周秦曰蕨齊魯曰虌俗云初生似鱉腳因以名焉鄘風載馳陟彼阿丘言采其虻陸云今藥草貝母也陳風卭有旨虉疏云綬草隼朱惟切詩大車傳菼隼也愚按鱉從黽虻從蟲虉隼並從鳥而草類乃有此四名也女摰之與榛異鳴蛭之雚與異校諸經而多違春秋傳曰女摰不過栗説文榛木也果實也今果實字通作榛者非詩東山鸛鳴于垤説文作雚鄭氏曰水鳥也將隂雨則好水長鳴而喜也爾雅別有鸛鷒之鳥如鵲短尾射之銜矢射人玉篇作音歡非鳴垤者鷒音團小大同稱有鯤有麑國語魯宣公夏濫於泗淵里革斷罟而棄之曰魚禁鯤鮞獸長麑䴠韋昭注鯤魚子也鮞未成魚也鹿子曰麑麋子曰䴠按此則鯤麑皆為小物也如莊子所謂北溟大鯤化鵬如西域師子曰狻猊亦作麑則皆大物此四者名同物異所謂小大同稱也新雉之木以為草廣韻雉字內有剃字音直凡切注云辛剃辛夷別名又音替甘泉賦列新雉於林薄乃書辛為新書剃為雉李善注辛夷也一名辛矧服虔曰香草也雉夷聲相近愚按楚辝露申辛夷死林薄兮此甘泉賦語所本也九歌曰辛夷楣兮藥房王逸注辛夷香草以作户楣惟朱文公注辛夷樹木連合抱高數仞其花初發如筆北人呼為木筆乃知服王二注皆誤以木為草類苑紀鸒斯鸒音豫詩辨彼鸒斯注鵯鶋也錢氏引孔疏曰此鳥曰鸒而云斯者語辭猶蓼彼蕭斯菀彼栁斯以劉孝標之博學而類苑鳥部乃立鸒斯之目是不精也愚按楊子云頻頻之黨甚於鸒斯則承誤久矣爾雅亦作鸒斯惟邢疏本毛傳以斯為語辭藝文志劉類苑一百二十卷注闕則其書亡久矣王會芣苡伊尹書盧橘荒異物其誰咨周書王會篇康民以稃苡其實如李食之宜子詩周南采采芣苡陸璣疏云馬舄草一名車前王肅引王會為據王基駁之以為王會所記皆四夷逺國貢物非周南婦人所得采是芣苡為馬舄之草非西戎之木上林賦盧橘注應劭引伊尹書曰箕山之東青鳥之所有盧橘夏熟晉灼曰盧黑也愚按蘇子瞻詩以盧橘為枇杷張嘉甫嘗辨其非矣西漢藝文志有伊尹五十一篇注湯相娵隅以音變烏啄以字迷世説郝隆為桓公南蠻參軍作詩云娵隅躍清池桓問何物答曰蠻名魚為娵隅桓公曰何得作蠻語筆談陸龜蒙作藥名詩云烏喙蠧根回乃是烏喙非烏啄也又斷續玉琴哀乃是烏喙非斷續也堯韭舜榮儷句為嬉堯韭昌蒲也舜榮即詩舜華木堇也梁元帝玄覽賦始用之蓋戲借堯舜二字為對李羣玉詩又以堯韭對禹糧豆逼莫解顔氏家訓曰吾在益州與數人同坐初晴日晃見地上小光問左右此是何物有一蜀竪就視答曰是豆逼耳相顧愕然不知所謂命將取來乃小豆也窮訪蜀土呼粒為逼時莫之解吾云三蒼説文此字白下為七皆訓粒通俗文方力切衆皆歡悟荇蓴曰莧葵謂誤以荇為莧以蓴為葵也顔氏家訓曰詩參差荇菜爾雅云荇接余也先儒解釋皆云圓葉細莖隨水淺深今是水悉有之劉芳具有注釋而河北俗人多不識之博士皆以差參者是莧菜呼人莧為人荇可笑之甚世有蔡朗諱純既不涉學遂呼蓴為露葵菜承聖中一士大夫聘齊齊主客郎李恕問梁使曰江南有露葵否答曰露葵是蓴問稻何草而謂羊蹲鴟世説簡文見田稻不識問是何草左右答是稻簡文還三日不出云寧有賴其末而不識其本愚按簡文諱昱晉元帝少子謝安稱為惠帝之流或以為梁簡文者非顔氏家訓江南有一權貴讀誤本蜀都賦注解蹲鴟芋也乃為羊字人饋羊肉答書云損惠蹲鴟舉朝驚駭候氣廢葭莩候氣見東漢律厯志宋白續通典載晉律厯志陽泉記云取河內葭莩為灰或云以竹莩灰漢書音義云莩蘆裏白皮也楊雄又云莩亦只竹膜也北史載信都芳算厯玄妙機巧精微每一沉思不聞雷霆之聲也丞相倉曹祖珽謂芳曰律管吹灰術甚微妙絶來既久吾思所不至卿試思之芳留意十餘日便報珽云吾得之矣然終須河內葭莩灰祖對試之無驗後得河內灰用術應節便飛餘灰即不動也為時所重竟不行用故此法遂絶愚按古人候氣用灰必有微妙之術如祖珽所言吹灰之法在當時已稱久絶降及後世則又廢絶可知所以廢者由無其人而其術不傳亦以律管之分寸不的故也議樂昧秬秠宋皇祐初置詳定大樂局范鎮上書論樂略曰按詩誕降嘉種維秬維秠許慎云秠一稃二米今秬黍皆一米又權衡起於黍而黍未真臣固知聲音不可得而和也請權罷局俟真黍至然後為樂或有能辨蒲盧表枸把別象膽與駮而問天雞中庸蒲盧鄭注以為果裸夏小正傳謂蜄筆談以為蒲葦朱子從之筆談藥議枸把陜西極邊生者髙丈餘大可作柱葉長數寸無刺根皮如厚朴甘美異於它處者千金翼云甘州者為真葉厚大者是大體出河西諸郡其次江池間埂上者實圓如櫻桃全少核暴乾如餅極膏潤有味宣和中順州進枸把羣臣當賀莫能為此表者綦崈禮叔厚為學官擬為之或以轉達遂取用之其起聫云靈根夜吠變異質於千年驛騎朝馳薦聖人之萬壽又有云驗西河之遺法蓋推服餌之良詢南丘之故封厥有延長之益能致飛仙之變化更傳伏犬之精英又有云疑彼舐鼎之留形宛若結芻而取象特用工狗字也又云天心垂佑上符所屬之辰徽廟生於戌而狗屬戌也一時流傳名譽大振叔厚維州人事見樓攻愧所作綦北海文集序本草圖經云象膽不附肝隨月左諸肉間淳化中上苑一馴象斃太宗命取膽不獲使問徐鉉鉉曰當在前左足既而剖之果得又問其故鉉曰象膽隨四時春在前左夏在前右今其斃在春故知左足也愚按酉陽雜爼云象膽隨四時如龜無定體又云熊膽春在首夏在腹秋在左足冬在右足以此知不獨象膽能轉也劉原父奉使契丹時順州山中有異獸如馬而食虎豹遼人不識以問曰此所謂駮也為言其形狀聲音皆是遼人嘆服楊文公談苑淮南張佖知舉進士試天雞㺯和風詩佖但以文選中詩句出題未曽詳究也有進士白試官云爾雅天雞有二未知孰是佖大驚不能對亟取爾雅檢釋蟲有螒天雞小蟲黑身赤頭一名莎雞一名樗雞釋鳥有䮧天雞赤羽逸周書曰文䮧若綵雞成王時蜀人獻之江東士人深於學問有如此者螒䮧並音汗指不勉之善取騶虞竊脂蘇子由古史序曰古之帝王皆聖人也其於為善如水之必寒如火之必熱其於不為不善如騶虞之不殺竊脂之不榖不學而成不勉而得朱文公深喜此語數稱之騶虞見詩注竊脂桑扈也見爾雅注然洽通之彥猶蒟醬失對謬剝棗於豳詩蒟醬者蒟音矩廣蜀皆有之實草類也蜀中者緣木而生子如桑椹熟時正青長二三寸以蜜藏而食之劉淵林注蜀都賦云爾廣中者蔓生葉似王瓜而厚大味辛香實似桑椹皮黑肉白其苗為浮留藤取葉合檳榔食之唐注本草西戎亦時時持來細而辛烈本草云溫無毒主下氣溫中破痰積其功效如此然唐蒙所見謂來自牂牁則廣生殆蜀本也淳熙末孝宗間為大臣言昔漢武感蒟醬而開南越想其味極美朕欲問蜀中士大夫其味如何周益公對曰想不過如今之醬耳此事載於史册益公在近世朝臣中號該博者而謬誤乃爾豈不甚可笑哉劉禹錫補注本草謂渝瀘等州出焉今瀘州乃無之蓋蒟醬之味全類蓽撥而蓽撥辛烈尤甚世人惟貴蓽撥而不用蒟醬故士大夫鮮有知者耳出建炎以來朝野雜記乙集卷十二王荆公説詩剝棗者剝其皮而進之養老故也古注音朴讀為剝皮之剝非也集中已有奏狀乞刪改蓋騖逺略近躐高忽卑孰知爾雅附于經多識是資諸儒箋釋角立墨畦歆炎樊李文學犍為爾雅邢昺疏載郭氏言作注者十餘家陸德明敘録犍為文學注二卷劉歆注三卷孫炎注三卷樊光注六卷李巡注三卷惟此五家而已郭氏言十餘者典籍散亡未知誰氏犍為文學姓名不傳墨畦謂翰墨畦徑景純之後顧謝沈施東晉郭璞字景純為爾雅注又為贊注今行於世景純之後有顧野王謝嶠沈璇施乾四家陸音邢疏分轡並馳唐國子博士陸德明名元朗以字行撰爾雅音義三卷邢昺杜鎬等爾雅疏十卷咸平四年上鮒演以小絫矩疊規孔子八世孫鮒字子魚仕陳勝為博士著書二十一篇名曰孔叢子第十一篇為小爾雅廣詁第一廣言第二廣訓第三廣義第四廣名第五廣服第六廣器第七廣物第八廣鳥第九廣獸第十跬量衡宋咸注曰經傳字義有所未暢繹而言之於爾雅為小焉按夾漈藝文略楚孔鮒撰小爾雅一卷有李軌解唐楊炯少室山銘重規疊矩揖廣憲博劉續陸埤張揖字稚讓清河人魏大和中為博士作廣雅四卷隋祕書學士曹憲用張揖之説附以音釋撰博雅十卷易廣為博者避煬帝諱唐貞觀中諌議大夫劉伯莊撰續爾雅一卷唐藝文志注闕宋陸佃字農師著埤雅二十卷朝公武讀書志謂佃王安石客而其學不專主王氏愚按髙氏緯略曰爾雅注今所傳者郭璞孫炎耳所謂樊光李巡注沈璇集注已不可復見郭璞有爾雅圖江灌有爾雅圖贊皆為奇書張揖既作廣雅劉伯莊又有續爾雅草木蟲魚該括無盡選中諸賦惟郭璞特著上林賦張揖又注之他人不及其精確也其他所謂孝經爾雅石經爾雅蜀爾雅蕃爾雅小爾雅皆自成一書爾按蜀爾雅李商隱撰郭璞爾雅圖十卷江灌圖贊二卷斟酌羣言嚌醇擩醨嚌才詣切嘗也擩音乳取物也唐文藝傳擩嚌道真理無窮書有賾未窺夫浩倉槃物化育亡崖班固賓戲皓蒼師古曰皓皓天也元氣浩汗故曰皓天其色蒼蒼故曰蒼天浩倉古通用槃轉也賈誼賦大專槃物專讀曰鈞鄒陽傳注陶家名模下圓轉者曰鈞言其形制器大小以比之於天益不殫名𨽻首難遍稽張平子西京賦曰伯益不能名𨽻首不能紀李善注引列子北海有魚名鯤有鳥名鵬大禹行而見之伯益知而名之夷堅聞而志之世本曰𨽻首作數宋均曰𨽻首黃帝史山經所有恢詭譎奇按越絶書禹治水巡行天下所厯山川命伯益記之遂為山海經南山經第一西山經第二北山經第三東山經第四中山經第五并海外內大荒經通為一十八卷漢劉歆所定也地員九十物草十二襄管子地員篇房玄齡注員位也土地高下水泉深淺各有其土上土三十物種十二物中土三十物種十二物下土三十物種十二物凡土物九十其種三十六凡草土之道各有榖造注謂此地生某草某榖造成也又云或高下各有草土葉下於􅡿即鬱也􅡿下於莧莧下於蒲蒲下於葦葦下於雚雚下於蔞蔞下於荓荓下於蕭蕭下於薜薜下於萑萑下於茅凡彼草物有十二襄注葉亦草名惟生葉無莖在鬱之下襄謂草上下相重次也考工記卻行紆行之屬考工記注卻行蚓衍之屬紆行蛇屬鴻烈庶鳥庶魚之類萬專千岐淮南子鴻烈解曰飛龍生鳳皇鳳皇生鸞鳥鸞鳥生庶鳥凡羽者生於庶鳥又蛟龍生鯤鯁鯤鯁生建邪建邪生庶魚凡鱗者生於庶魚按淮南王名安厲王長子也與蘇飛李尚左吳田由雷被伍被魯昌等八人及諸儒大山小山之徒共講論道德而著此書號曰鴻烈者鴻大也烈明也以為大明道之言也物物而察必研其幾匪淹綜沉潛貫璣組絲鮮克鉤索幼眇甄剖是非後漢元帝紀窮極幼眇幼音要眇通作妙精微也淵哉若人如五總龜淵哉若人出漢書揚雄傳此借以指羅公殷踐猷傳學賀知章號五總龜謂龜千年五聚問無不知筆為鉏耒乃藝乃災覽故考新揆敘物宜根極六藝氷渙昔疑囊括百家抉廋擲玼玼音疵玉中石一曰玉病也豈惟傳騷説詩亦解頥謂羅公著翼有傳騷説詩之功也解頥見匡衡傳纂次有典則班馬可追為雅忠臣翼之以飛纂與撰同唐書顔師古傳杜征南顔祕書為左丘明班孟堅忠臣杜預注左傳師古注漢書也本立言之志欲率是佐時陶冶旁薄卬贊範圍中和位育與物春熙羅自序云率是佐時人主以裁成匪衒豹鼠之辨以貽蟲魚譏爾雅豹文鼮鼠者郭云鼠文彩如豹漢武帝得此鼠孝廉郎終軍知之賜絹百匹郭序爾雅云豹鼠既辨其業亦顯愚按漢書終軍傳無此事亦未嘗為孝亷郎不知郭注何所本而云爾也文選任彥升為蕭楊州薦士表有曰鼮鼠有必對之辨竹書無落簡之謬李善注引摯虞三輔決録注曰竇攸舉孝廉為郎世祖大會靈臺得鼠如豹文熒熒光澤世祖異之以問羣臣莫能知者攸對曰鼮鼠也詔問何以知之攸對曰見爾雅詔案祕書如攸言賜帛百匹按李善所引如此則豹鼠之辨乃竇攸非終軍明矣終軍傳但有對一角獸奇木事以郭之博洽豈亦不考而冇所誤耶不然李善之注何為不取郭説摰虞字仲治才學通博晉武帝世舉賢良拜中郎注三輔決録郭璞渡江後名始顯竹書落簡事見束晳傳鼮音廷韓退之詩爾雅注蟲魚定非磊落人入國問喬木誦其文為師昔者朱子稱經緯縝密惜其先萎朱文公稱羅公文有經緯細密欲為願附名集後又云羅端良止此可惜蓋公年四十九而卒小集僅傳知此者希公有鄂州小集五卷行世然僅文之什一此指爾雅翼謂其書未傳知之者少也歲甲午書成逮庚午九十七載出若有期咸淳庚午王公知徽州自今顯行式永厥垂繇是進大學之道學者葆之朝公武讀書志謂爾雅乃訓詁之書置于小學之首今此書為爾雅之翼故欲學者由小而進於大也先是公之從曽孫裳録藏家楹訪求得其書則前大學博士方君回也識卷後而刋于郡者浚儀王應麟也此篇凡有五節大學始教至一原同歸為一節首明濓洛諸大儒格物之學彼謏聞者至躐高忽卑為一節備述傳記訓義之訛孰知爾雅至甄剖是非為一節厯敘爾雅諸家因言格物之不易淵哉若人至貽蟲魚譏為一節推本羅公次翼之志而贊美之入國問喬木以下為一節蓋喜得其書而刋布之又勉學者進於大學之道以終首章之意
