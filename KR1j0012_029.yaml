body:
  text: 欽定四庫全書爾雅翼卷二十九宋羅願撰釋魚鱖䲅鯼鮆鮧鱓鰌鱖鯞比目王餘烏鰂鱖鱖魚巨口而細鱗鬐鬛皆圓黃質黑章皮厚而肉緊特異常魚夏月盛熱時好藏石罅中人即而取之又其斑文尤鮮明者雄也稍晦昧者雌也漁者以索貫一雄置之溪畔羣雌來齧曵之不捨掣而取之常得十數尾説者以為昔仙人劉憑常食石桂魚今此魚猶有鱖名恐即是也能食小魚今人以為凡牛羊之屬有肚故能嚼魚無肚不嚼譙讓之譙鱖獨有肚能嚼山海經曰鱖魚大口而細鱗有斑彩考淮南曰魚無耳而聽䲅䲅今之河豚狀如科斗腹下白背上青黑有黃文眼能開能閉觸物輒嗔腹張如鞠浮於水上一名嗔魚今人取之者亦多作鐵須如理絮耙置水中觸而浮則取之或云以橄欖木為棹撥著魚皆浮出此其性之所畏也味至美然有毒小獺及大魚不敢啖也烹者必覆蓋蒙密忌炱煤落其中雜以橄欖荻牙煮之令過熟其身無鱗頭無腮故肝最毒舊言心肝及頭毒於野葛又云肝及子入口爛舌入腹爛腸今浙人習之者亦不甚忌正爾啖之耳大抵海中者大毒江中者次之其出有時率以冬至後來每三頭相從號為一部諺云得一部典一袴言烹和所用多也今江隂得之最早率以冬至日輒有之故説者解易信及豚魚或以為即此物蓋中孚十一月冬至之卦此魚應之而來是信之著者也䲅又作鮭假成式鮭音如鞋浙人所常御故有鮭菜鮭珍之語又一名鯸鮐吳都賦所謂王鮪鯸鮐者其音如胎魯頌所謂黃耉台背未必不謂老人背若此魚色亦猶黎老之如凍梨耳然昔或謂此魚為鯸鮧魚又謂之鶘夷魚則與今之鰋魚所謂鮧者相亂蓋鰋魚之鮧亦有題夷二音故也是以漢書貨殖傳鮐鮆千斤説者讀鮐為夷顔監以為非唯失於訓物亦不知音矣但解為海魚則顔之意當謂此河豚不欲音夷與彼鰋相亂耳鹽鐵論萊黃之鮐鯼鯼出南海首中有石如棊子一名石首南人名為鮝其出有時臨海異物志曰石首小者名趥水其次名春來石首異種也又有石頭長七八寸與石首同初學記蓋其來以春故以春來名之江賦所謂鯼鮆順時而往還是也初出水能鳴夜視有光服其石能下石淋魚鱗色甚黃如金和蓴菜作羮謂之金羮玉飯薧而食之名為鮝炙食之主消瓜成水蓋是猶藉鹽味耳春秋外傳曰黿鼉魚鱉莫不能化韋昭曰化謂蛇成鱉黿石首成􅝶之類也􅝶即鴨字吳地志曰石首魚至秋化為冠鳬冠鳬頭巾猶有石也釋魚魚枕謂之丁魚腸謂之乙魚尾謂之丙皆謂魚之骨體有似篆字其頭中骨如丁字可作印今此魚别有骨則異云説文鮸魿出薉邪頭國䲐鯜䰽䱡鯊鱳出樂浪潘國一曰䱡魚出江東有兩乳鰅皮有文出樂浪東暆神爵四年初捕收輸考工周成王時揚州獻鰅吕氏春秋魚之美者東海之鮞本草陳藏器餘有牛魚頭如牛海鷂魚似鷂有肉翅生東海海豚魚形如豚生大海中石鮅昌侯鯕鯤鰍鼠尾地青鯆魶魚並生南海鮆鮆刀魚也長頭而狹薄其腹背如刀刃故以為名大者長尺餘可以為鱠與石首魚皆以三月八月出故江賦云鯼鮆順時而往還也周禮鱉人掌取互物以時簎魚鱉龜蜃凡貍物鄭司農以為互物有甲㒼胡者貍物自貍藏於泥中者皆曰龜鱉之屬故後鄭云貍物亦謂鱴刀含漿之屬也釋魚稱鮤鱴刀蚌含漿蓋鄭以鮤為鱴刀蚌為含漿與郭氏注意同孫氏則以為刀魚與鱴别也凡物之情乃有不可曉者説文曰鮆飲而不食淮南子曰鱣鮪水入口若露而死鮆小魚也飲而不食固已為異鱣鮪之大生與水俱乃食而不飲尤可怪也史之記鮐鮆千斤鮿千石鮑千鈞亦比千乘之家三十斤為鈞百二十斤為石鮿三十斤鮑百二十斤乃比鮐鮆一斤物價之相什百如此鮿膊魚也鮑𩸆魚也南山經曰浮玉之山北望具區中多鮆魚鮧鮧魚偃額兩目上陳頭大尾小身滑無鱗謂之鮎魚言其黏滑也一名鯷魚此魚及鰌鱓之類皆謂之無鱗魚食之蓋不益人孟子稱緣木求魚不得魚今鮧魚善登竹以口御葉而躍於竹上大抵能登髙其有水堰處輒自下騰上愈高逺而未止諺曰鮎魚上竹謂是故也或曰口腹俱大者名鱯背青口小者名鮎口小背黃腹白者名鮠一名河豚今有黃顙魚與鮧相類但鮧白而彼黃爾鱓鱓似蛇而無鱗黃質黑文體有涎沫生水岸泥窟中所在有之或云荇芩根及人髮所化然其腹中自有子不必皆物化也狀既似蛇又夏月於淺水中作窟如蛇冬蟄而夏出故亦名蛇鱓荀卿子曰蟹非蛇鱓之穴無所寄託淮南子曰赤螭青虬之遊冀州也天清墬定噆味含甘步不出頃畝之區而蛇鱓輕之以為不能與之爭於江海之中後漢楊震有冠雀銜三鱣魚飛集講堂前都講亦云蛇鱓者卿大夫之服象皆謂此鱓耳然古者鱓字多假借用鱣字故後漢注直以鱣鮪之鱣解之後之説者據郭氏注爾雅則鱣長二丈又魏武四時食制鱣魚大如五斗奩長一丈餘冠雀即鸛尚不能勝其一况三頭乎且又純灰色無文章此鱣魚長不過三尺大不過三指又黃地黑文故云卿大夫之服象爾然近代詩人猶有作鱣鮪字用之者要非其義也鱓性好睡今鬻者必置鰌其中使之動撓不然往往睡死一作鱣又作鱔鰌鰌亦魚之類首尖鋭色黃黑身有漦似魚而非魚故衛史鰌字子魚然與他魚為牝牡則又所謂鰌與魚遊者也海中鰌乃有大者水經曰海中鰌長數千里穴居海底入穴則海溢為潮出穴則潮退出入有節故潮水有期今人作舟謂之海鰌船言如鰌之利水猶古舟之有鯿魚船也鰌伏於泥中見在沙中者則有文采隴西有地名魚龍出石魚掘地取石破而得之多鰌洎鮒如以漆描畫鱗鬛逼真燒之尚作魚腥魚龍古之陂澤也豈魚生其中遇岸頽塞久而土凝為石故中有魚形耶今衡州有石魚無異隴西者鱖鯞鱖鯞似鯽而小黑色而揚赤今人謂之旁皮鯽又謂之婢妾魚蓋其行以三為率一頭在前兩頭從之若媵妾之狀故以為名釋魚鱊鮬鱖鯞郭氏云小魚也似鮒子而黑俗呼為魚婢江東呼為妾魚崔豹古今注云江東謂青衣魚為婢本草孟詵云䲙魚與鯽其狀頗同味則有殊䲙是節化鯽是稷米化之其魚腹上尚有米色寬大者是鯽背高腹狹小者是䲙鱖鯞似鮒而小謂之妾魚豈䲙之訛耶比目比目魚郭氏云狀如牛脾鱗細紫黑色一眼兩片相合乃可行今水中所在有之左思作三都賦譏相如揚雄班固張衡所賦不出長安而假稱盧橘玉樹比目海若以為潤色案盧橘雖生箕山之東青鳥之所今人或以枇杷當之安知不自漢時入中國耶漢甘泉宫北岸有槐俗謂之玉樹根幹盤峙三二百年木也楊震關輔古語記曰耆老相傳咸以謂此即蜀揚雄甘泉賦所謂玉樹青蔥者然則玉樹謂此爾海若漢武帝所設以為玩飾按其辭云海若遊於玄渚鯨魚失流而蹉跎鯨魚刻石為之則海若可知潘嶽西征賦亦云武雄略其焉在近惑文成而溺五利侔造化以制作窮山海之奧祕靈若翔於神島奔鯨浪而失水此象海故設海若猶象河漢則設牽牛織女也此皆有實事並非假稱至如比目魚乃易得之物管子稱帝王盛時東海致之安知漢之盛時不嘗致而有也又漢魚龍之戲激水化為比目魚跳躍則稱投文竿出比目者或亦道此等戲爾不然賦者敷陳其事無其事而稱之前作蓋不為也比目魚其味甚美臨海異物志曰南越謂之板魚今浙人謂之鞋底魚亦謂之箬葉魚北户録乳穴魚巾有闕上林賦注魼比目魚也吳都賦罩兩魪注云左右魪一目須兩魚並合乃能遊王餘王餘長五六寸身圓如筯潔白而無鱗若已鱠之魚但目兩點黑耳博物志曰吳王江行食鱠有餘棄於中流化為魚名吳王鱠餘高僧傳則云寶志對梁武帝食鱠帝怪之志乃吐出小魚鱗尾依然今金陵尚有鱠殘魚二説相似然吳王之傳則自古矣此魚與比目不同劉淵林解吳都賦第見其稱雙則比目片則王餘遂云比目魚東海所出王餘魚其身半也俗云越王鱠魚未盡因以其半棄之遂無其一面故曰王餘則是以王餘為比目之半而郭氏解比目亦云狀如牛脾鱗細紫黑色一眼兩片相合乃得行今水中所在有之江東又呼為王餘魚亦與劉説相似豫按二物今浙中皆有之絶不相類比目乃只一目生近海處土人謂之鞋底魚王餘狀如前説今猶呼鱠殘魚又名銀魚多曓為䐹又作鮺顔色可愛自是一種非比目之半也鮺藏魚也南方謂之鱗北方謂之鮺一曰大魚為鮺小魚為鱗烏鰂烏鰂狀如算囊兩帶極長海人云秦王東遊棄算囊於海化為此魚腹中有墨見人及大魚常吐墨方數尺以混其身人反以是取之其墨能已心痛江東人或取以書契以脫人財物書迹狀如淡墨逾年字消唯空紙耳背上獨一骨厚三四分形如樗蒱子而長輕脆如通草可刻名海螵蛸此魚乃􅖂烏所化􅖂烏蓋水鳥之似鶂者今其口足并目尚存猶相似且以背上之骨驗之也又曰匹鳥化之月今九月有寒烏入水化為烏鰂唐韻云故其名為烏或曰烏鰂常自浮水上烏見以為死便往啄之乃卷取烏故稱烏賊其實烏所化又能吐墨自宜名烏云卷取烏似無是理也俗謂是海若白事小史鰂字在説文從則蓋以其有文墨可法則又為鯽從即而今之所謂鯽者乃古之所謂鮒魚其字作鰿從責今人以鯽字為鮒相去遠矣周書伊尹為四方今曰正東請令以鰂之醬為獻其無骨者名柔魚又章舉石距相類而差大音釋鱖姑衛切嚼音譙去聲䲅古迷切與鮭同鮭古迷切一音鞋鯸胡溝切鮐音台鮆前啓切刀魚名鯼子公切趥七由切薧音考乾魚鮝音想樂浪音洛狼郡名古朝鮮國薉邪古穢字貉也本朝鮮之地武帝滅之置蒼海郡注鮸眉卞切魵府吻切䲐力古切鯜七接切䰽布賴切廣韻音貝食之殺人䱡居六切鯊所加切鮫魚也鱳力各切鰅娛容切暆余攴切縣名鮞人之切鮅卑吉切䱋記冢切鰍七由切與鰌同鯆夫禹切魮父脂切鳥首魚尾音如磬鮆前啓切爾雅疏九江有之一名鮤魚一名鱴刀一名魴魚一名鮆魚互物户故切鄭司農以為有甲㒼胡龜鱉之屬簎勑角切謂以杈刺泥中搏取之杈音義㒼莫干反貍莫皆反鮤鱴刀鮤音列鱴音滅爾雅注鮆魚也亦呼為魛魚蚌步項切即蜃也一名含漿鮐台鮿音輒膊魚不鹽也漢貨殖傳鯫鮑千鈞師古注即今不著鹽而乾者鮑今之𩸆魚膊史記音義鋪洛切注𩸆於業切鹽漬魚也鮧音夷鯷大計切鱯乎化切鮠午戈午回二切鱓市演切墬地噆錯感子感子合三切鱔市演切鰌七由切漦力之仕緇二切涎沫鱖鯞音厥帚鱊聿鮬步輒比目文竿注竿以翠羽為文飾也賦作揄文竿揄亦音頭注魼丘於切魪假邁切王餘䐹音搜乾魚注鮺仄下切鱗説文徂慘切鮺也烏鰂音賊􅖂音鳥五歷剝兒切匹鳥匹當音木爾雅翼卷二十九
