body:
  text: 欽定四庫全書爾雅翼卷三宋羅願撰釋草芍藥芝菊荃芸龍萱薜荔款冬卷耳芣苢陵苕射干木堇燕支芍藥芍藥華之盛者當春暮祓除之時故鄭之士女取以相贈董仲舒以為將離贈芍藥者芍藥一名可離猶相招贈以文無文無一名當歸也然則相謔之後喻使去爾其根可以和五臟制食毒古者有芍藥之醬合之於蘭桂五味以助諸食因呼五味之和為芍藥七發曰勺藥之醬子虛賦曰勺藥之和具而後御之南都賦曰歸鴈鳴鵽香稻鮮魚以為芍藥酸甜滋味百種千名是因致其滋味也故孔子曰不得其醬不食非以備味自愛之至矣服䖍文頴伏儼輩解芍藥稱具美也或以為勺藥調食或以為五味之和或以為以蘭桂調食雖各得彷彿然未究名實之所起至韋昭又訓其讀勺丁削切藥旅酌切則并没此物之名實矣今人食馬肝馬腸者猶合芍藥而煮之古之遺法馬肝食之至毒者文成以是死言食之毒莫甚於馬肝則制食之毒者宜莫良於芍藥故獨得藥之名猶食醫掌和膳羞稱醫之類而醬又因以為名也毛萇云香草陸璣云今藥草芍藥無香氣非是也孔頴達曰未審今何草盖醫方但用其根陸不識其華故云無香氣孔又云何草今芍藥人家庭户種之翫其芳無不識者何云何草本草曰一名餘容芝芝瑞草一歲三華故楚辭謂之三秀無根而生故其字從之説文之字曰出也象草枝莖益大有所之一者地也芝生於土故宜從焉言芝者多異説唯論衡云芝生於土土氣和故芝草生最為簡要古以為香草大夫之摰芝蘭又曰與善人居如入芝蘭之室乆而不聞其芳則與之化矣今芝不香未知何故芝乃多種故方術家有六芝其五芝備五色五味分生五嶽惟紫芝最多昔四老人避秦入商洛山采芝食之作歌曰曄曄紫芝可以療飢是也古稱上藥養命中藥養性下藥治病養命則五石之鍊形六芝之延年養性則合歡蠲忿萱草忘憂治病則大黄除實當歸止痛芝之品其略有六至葛稚川則云芝有石芝有木芝有草芝有肉芝有菌芝各百許種則芝類非特六矣孝經援神契曰威喜辟兵威喜亦木芝之一也松柏之脂入地千歳化茯苓茯苓萬歲上生小木如蓮華名曰木威喜芝夜視有光持之甚滑燒之不然帶之辟兵又建木實生都廣皮如纓蛇實如鸞鳥者亦謂之芝則無所不備然大抵紫芝最多爾陶隱居獨怪今俗所用紫芝乃是朽木株上所生狀如木檽者然古人言芝蓋只如此内則人君燕食所加庶羞有芝栭蔆椇之屬庾蔚云無華葉而生者曰芝栭盧氏云芝木芝也王肅云無華而實者名栭皆芝屬芝栭春夏生於木可用為菹其有白者不堪食賀氏亦云芝木椹獨別謂栭為軟棗則多一物不合鄭氏三十一物之數然則檽椹類揔名芝矣莊子朝菌司馬亦云大芝也天隂生糞上見日則死崔云糞上芝朝生暮死簡文云欻生之芝也是菌皆得芝名太𤣥曰黄菌不誕俟于慶雲靈芝也漢藝文志有黄帝襍子芝菌十八卷菊菊季秋寒露後五日始有華華得土之正色蔡邕月令章句曰菊草名也有者非所有也黄華者土氣之所成也季秋草木皆成非榮華之時也故言菊有明它無有也周書曰菊不黄華土不稼穡是應土之驗古者王后六服有鞠衣先鄭以為黄衣後鄭云黄桑服色如鞠塵象桑葉始生引月令三月薦鞠衣于先帝告桑事盖後鄭之意以季春桑葉始生故后服色象之又薦之先帝太之屬之坐所謂告桑事也然其説不取於菊華之菊而取於麴蘖之麴又捨麴而象桑葉唯蔡邕以為菊華之色似合先鄭以鞠為黄之意今月令鞠有黄華正與鞠衣之字同又漢武帝時黄鵠下建章宫作歌曰金為衣兮菊為裳然則以菊比衣如是古矣古者茹菊故離騷有夕餐秋菊之落英至崔實月令以九月九日採菊而費長房亦教人以是日飲菊酒以禳災然則自漢以來尤盛也菊與薏花相似菊甘而薏苦所謂苦如薏者漢南陽酈縣北八里有菊水其源旁悉芳菊水極甘香中有三十家不復穿井仰飲水上夀百二十三十中夀百餘七十者猶以為夭漢司空王暢太傅袁隗為南陽太守令縣月送三十餘石飲食澡浴皆用之太尉胡廣乆患風羸常汲飲此水疾遂瘳此菊莖短花大食之甘美異於餘菊廣又收其實種之京師遂處處傳植之近世譜菊者有八十一種有黄白緗及色如桃花者又白者遇霜皆殷然終不摽落故説者疑離騷落英之語或以為爾雅落始也考然與墜露相配為文不當為始靈均盖自有意夏小正九月鞠榮而植麥荃荃昌蒲也或讀若孫音莊子音義云又一名蓀春秋運斗樞曰玉衡星散為昌蒲逺雅頌著倡優則玉衡不明昌蒲冠環孝經援神契曰昌蒲益聰生水中葉長數尺而上鋭中有脊如劒其根九節者食之仙其本芳辛每以一握為限一握則四寸切之為菹謂之昌歜或謂之昌本以實朝事之豆文王好食之豆以昌本為首魯僖公時王使周公閲來聘饗有昌歜白黑形鹽而周公以為薦五味也此盖朝事之常故郊特牲云常豆之菹水草之和氣也又可以餌魚故莊子稱荃者所以在魚得魚而忘荃或以此當之楚辭言香草皆以喻羣臣唯言蓀者喻君盖蓀於藥性為君也其曰數惟蓀之多怒曰蓀佯聾而不聞曰夫人自有兮美子蓀何以兮愁苦盖蓀能輔性治氣逆則怒非所宜能益聰則聾非所應又治小兒溫瘧身積熱不解者可作浴湯則其主人之美子宜也少司命君也而又主人之子孫有蓀之義焉蓀從孫亦主子孫之義也芸仲冬之月芸始生芸香草也謂之芸蒿似邪蒿而香可食其莖幹婀娜可愛世人種之中庭故成公綏賦云莖類秋竹葉象春檉是也沈括曰芸類豌豆作小叢生其葉極芳香秋後葉間㣲白如粉汙南人採寘席下能去蚤虱今謂之七里香老子曰夫物芸芸各歸其根芸當一陽初起復卦之時於是而生又淮南説芸可以死而復生此則歸根復命取之於芸雖卷施拔心不死蓋不足貴也洛陽宫殿簿曰顯陽徽音含章殿前各芸香一二株而已而晉宫閣名曰太極殿前芸香四畦式乾殿前芸香八畦乃知離騷所謂蘭九畹蕙百畆畦留夷與掲車盖有之也江南茹為生菜甚香古者祕閣藏書置芸以辟蠧故號為芸閣夏小正曰正月采芸二月榮芸龍龍紅草也一名馬蓼葉大而赤白色生水澤中高丈餘今人猶謂之水紅草而爾雅又謂之蘢古鄭詩稱山有橋松隰有游龍云游龍者言其枝葉之放縱也龍與荷華是隰草之偉者然所配扶蘇橋松不同按管子有五粟五沃五位五蘟五壤五浮之土謂之上土五沃之土則桐柞枎櫄秀生莖起五臭疇生蓮與蘪蕪藁本白芷然則首章言扶蘇荷華應此五沃之土也其五位曰其山之淺有蘢與斥羣木安逐條長數大其桑其松其杞其茸次章言橋松㳺龍應此五位之土也此皆土之最美者特非子都子充而狂且狡童之為見則所美非美矣淮南言水草之始海閭生屈龍屈龍生容華容華生蔈蔈生萍藻萍藻生浮草凡浮生不根茇者生於萍藻屈龍豈亦此龍草邪歛為屈縱為㳺是或一道也萱詩曰焉得諼草言樹之背諼忘也衛之君子行役為王前驅過時不反其婦人思之則心痗首疾思欲暫忘之而不可得故願得善忘之草而植之庶幾漠然而無所思然世豈有此物也哉盖亦極言其情説者因萱音之與諼同也遂命萱以為忘憂之草盖以萱合其音以忘合其義耳然忘草可也而所謂忘憂憂之一字何從出哉此亦諸儒傅㑹之語也説文曰藼令人忘憂草也引詩安得藼草又作蕿及萱而嵇叔夜養生論云合歡蠲忿萱草忘憂博物志因以為中藥之例崔豹云欲忘人之憂則贈以丹棘丹棘一名忘憂皆因解詩者之言而廣之爾又名宜男草周處風土記以為其花宜懐姙婦人佩之必生男傅𤣥賦云充后妃之盛飾兮登紫微之内庭則古之婦人盖佩之矣茍以當詩之忘草則服而佩之適所以増怨曠之思爾此草又名鹿葱鹿所食九草之數而沈約鹿葱詩云野馬不任騎莵絲不任織既非中野華無堪麕䴥食約意以為野中所無鹿不得而食之今人亦取其華為茹晏元獻公謂鹿葱花中有鹿斑文與萱小同大異開花亦不並時薜荔薜荔白芷蘪蕪椒連謂之五臭管氏之正天下也五臭所校謂之土小華之山草多薜荔薜荔狀如烏韭而生於石上食之止心痛亦縁木生在屋曰昔邪在牆曰垣衣今薜荔葉厚實而圓多蔓好敷巖石上若㒺故云㒺薜荔兮為帷也或寅縁上木古木之上有絶大者開華結實其實上銳而下平外青而中經霜則紅而甘鳥烏所啄童兒亦食之謂之木饅頭亦曰鬼饅頭其狀如餅餌中饅頭也食之𤼵瘴嶺外尤多州郡待客取以為髙飣或言嶺外郡刻木作饅頭狀言之過也雖云藤蔓枝葉勁厚如木之屬非復草也離騷云貫薜荔之落蘂王逸章句曰薜荔香草縁木而生蘂實也累香草之實執持忠信貌也薜荔雖有實然所取芳者不於實又按説文蘂花須頭㸃也則蘂乃謂此逸之意以薜荔之花小盖不可貫故以為實要之詩騷當以意逆志但貫其須蘂以見用心之精潔爾山鬼歌亦稱被薜荔兮帶女蘿逸云薜荔兎絲皆無根縁木而生山鬼亦奄忽無形故衣之以為飾古者喻物意深如此又九歌曰采薜荔兮水中搴芙蓉兮木末言責其所無必不能也至九章曰令薜荔以為理兮憚舉趾而縁木因芙蓉以為媒兮憚褰裳而濡足此皆因其所宜而任之顧不為耳薜荔芳草故楚辭特殷勤焉款冬莵奚顆涷郭氏曰款涷也紫赤華生水中盖款涷葉似葵而大叢生花出根下十一十二月雪中出花述征記曰洛水至嵗末凝厲則款冬茂悦曽冰之中盖至隂之物能反至陽故玉札畏款冬也楚辭曰款冬而生兮凋彼葉柯萬物麗於土而款冬獨生於冰下百草榮於春而款冬獨榮於雪中以况附隂背陽為小人之類至傅咸作款冬賦稱其華豔春暉既麗且殊以堅冰為膏壤吸霜雪以自濡則又賞其稟精淳粹不變於寒暑為可貴所取義各異也卷耳卷耳菜名也幽兾謂之襢菜雒下謂之胡枲江東呼為常枲葉青白色似胡荽白華細莖可煮為茹滑而少味又謂之常思菜傖人皆食之又以其葉覆麴作黄衣崔寔四民月令曰伏後二十日為麴至七月七日干之覆以胡枲故古人采之卷耳之詩后妃志欲輔佐君子求賢審官知臣下之勤勞先儒多異説盖采采卷耳職之賤者淮南子稱瞽師庶女位賤尚葈權輕飛羽許叔重曰尚主也葈者葈耳菜名也主是官者至微賤也瞽師庶女復賤於主枲之官故曰權輕飛羽觀此則主枲之官位之微者周禮顧不可考或成周以前周南之官有之不然則醢人酒人之屬也於采葈者而猶知其勤勞則凡臣下之勤勞不遺可知矣審官而至於此則所審之詳又可知矣此有以見憂勤之至也其實如鼠耳而蒼色上多刺好着人衣今人通謂之蒼耳其一名葹離騷以譬小人所謂薋菉葹以盈室是也一名羊負來博物志曰洛中有人入蜀胡枲着羊毛蜀人種之曰羊負來也陶隱居乃云昔中國無此言從外國逐羊毛中來據此物既稱胡枲必是胡物但國風爾雅所載則其來已乆而羊負來之名僅出後代則此名恐言自洛入蜀者得之亦卷耳野中所多日夕羊下多負以歸爾芣苢芣苢婦人所采今車前草是也大葉長穗生道邊喜在牛跡中生故曰車前又名當道也幽州人謂之牛舌草江東呼蝦蟆衣可煮作茹其子主易產故婦人樂有子者以為興説文乃云芣苢一名馬舄其實如李令人宜子周書所説韓詩云芣苢是木似李食其實宜子孫王肅亦引周書王㑹云芣苢如李出於西戎故王基駮云王㑹所記雜物奇獸皆四夷逺國各賫土地異物以為貢摰非周南婦人所得采是當為草不當為木也不妨西戎自有芣苢亦名馬舄宜子者爾郭氏芣苢贊亦曰車前之草別名芣苢王㑹之云其實如李名之相亂在乎疑似夫采采者芣苢耳何以知其樂有子盖采采者不已之意也薄言者不滿之辭也始曰采采而遂至於有之又從而掇捋之又從而袺襭之盖已多矣而猶曰薄言則以采之之多為未足也亦婦人樂於其事而猶愧於人之問故雖采而又采乃若不經意亦曰我姑采之而已此詩人所以深述其情也而列女傳言宋人之女為蔡人之妻既嫁而夫有惡疾其母將改嫁之女曰且夫采采芣苢之草雖其臭惡猶始於捋采之終於懐襭之浸以益親况於夫婦之道乎乃作芣苢之詩韓詩亦同此義言芣苢臭惡之菜詩人傷君子有惡疾芣苢雖臭惡猶采采而不已者以興君子雖有惡疾我猶守而不離去也辯命論曰顏回敗其叢蘭冉耕歌其芣苢則遂以芣苢比惡疾矣詳蔡人之妻或因説母引芣苢之義以自况因賦其詩不必始作於此也宋女而蔡妻何名為周南哉今芣苢亦不臭未知所謂臭惡者又何物故附著其説於後陵苕苕陵苕黄華蔈白華茇華色既異名亦不同今淩霄花是也蔓生喬木上極木所至開花其端詩云苕之華芸其黄矣鄭箋以為陵苕之華紫赤而繁華衰則黄盖非也是物雖名紫葳而花不紫又或以瞿麥根為紫葳瞿麥花紅亦非此類然則芸其黄者正自華開之色耳周室之於諸夏猶衣服之有冠冕木水之有本原盖有深根固植之義不特以其在物上而已今苕雖居高在物之上然荏弱而託於物所自恃者微矣雖華而芸黄葉而青青識者知其將不乆也故見其華則為之憂傷逮其華落而葉存則不如無生矣此華亦彌絡石壁盛夏視之如錦繡不可仰望露滴目中有失明者射干荀子勸學篇曰西方有木焉名曰射干莖長四寸生於高山之上而臨百仞之淵木莖非能長也所立者然也以為物雖微然能自處者如此春生苗高二三尺葉似蠻薑而狹長排列如翅羽故名烏翣烏蒲烏扇翣亦扇也花以六月開如萱草而小上有紅㸃人家庭砌多植以為玩或説別有花青黑而莖長似射人之執竿者此即一類然射為夜音猶漢官僕射而亦音夜爾易通卦驗曰冬至射干生後漢陳寵傳陽氣始萌十一月有蘭射干芸荔之應射干嘉物故九歎云掘荃蕙與射干兮耘藜藿與蘘荷盖荃蕙貴而藜藿賤射干生高山層城而蘘荷依隂之物今掘去嘉者而惡物則為之耘除使之茂繁以見去取之失當也古者瑞草有萐莆生於庖厨扇暑而涼今此亦有萐扇之名又蒲之字類莆豈亦此類但以自生為祥耶或曰萐莆大如扇木蓳木蓳今人植為籬易生之物也抱朴子曰夫木蓳楊栁斷殖之更生倒之亦生横之亦生生之易者莫過斯木也仲夏應隂而榮月令取之以為候其花朝開暮落一名為舜或呼為日及陸機賦云如日及之在條常雖及而不悟潘尼云朝菌者詩人以為舜華莊生以為朝菌其物向晨而結終日而殞則又以為朝菌矣詩曰有女同車顏如舜華又曰顔如舜英舜乃華之甚茂者又枝葉相當有同車之象亦如舜朝開而暮落少過時則後之矣太子忽當有功於齊之時可以取齊女於是時而不取則若日及之不可待矣木蓳作飲令人得瞑與榆同功其花用作湯代茗可以治風然茗令人不睡木蓳令人睡為異爾説文䑞艸也楚謂之葍秦謂之藑蔓地連華象形䑞則今𨽻變為舜即堯舜之舜然云蔓地則不同又華榮也讀若皇引爾雅曰華也或从艸皇作葟燕攴燕攴本非中國所有盖出西方染粉為婦人色謂為燕攴粉習鑿齒與謝侍中書曰此有紅藍北人采取其花作烟攴婦人粧時作頰色用如豆許按令徧頰殊覺鮮明匈奴名妻閼氏言可愛如燕攴也故匈奴有烟攴山西河舊事歌曰失我祁連山使我六畜不繁息失我閼氏山使我婦女無顏色今中國謂之紅藍或只謂之紅花大抵三月初種花出時日日乗凉摘取之頃一日須百人摘五月種晚花七月中摘深色鮮明耐乆不黦勝於春種者花生時但作黄色茸茸然故又一名黄藍杵碓水淘絞去黄汗更𢷬以清酸粟漿淘之絞如初即收取染紅然後更𢷬而暴之以染紅色極鮮明按崔豹所言則漢雖有紅藍然不可以為烟攴其染亦未盛今則盛種而多染謂之真紅賽蘇方木所染崔豹古今注曰今人以重絳為烟攴非燕攴花所染也燕攴花自為紅藍爾舊説赤白之間為紅即今所謂紅藍也其謂之蒨紅者即漢重絳顏色黯暗相去逺矣又為婦人粧色以緜染之圓徑三寸許號緜燕攴又小薄為花片名金花烟攴特宜粧色盖種一頃者歲收絹三百疋此千畆巵茜之類博物志曰黄藍張騫所得音釋芍藥鵽説文鳩也丁刮切芝建木纓蛇山海經建木其狀如牛引之有皮若纓黄蛇注謂牽之皮剥如人冠纓及黄蛇也栭如之反椇俱禹反檽音軟菊隗胡罪反標婢小切殷公閑切赤黑色荃歜徂感切菹臻魚切説文酢菜也芸婀娜上音舸下乃可切美貌又舒遲貌檉癡貞切豌於丸切龍蘟於謹切晦也管子五蘟之狀黒土黑菭青怵以肥芬然若灰注菭地衣也芬然壤起貌柞才各子各二切枎輔虞切㮔與杶同蘢盧功切草名馬藻又音龍管子注蘢斥並古草名數大上音朔管子注數謂速長爾雅數疾也茸管子注木名蔈芳燒切淮南子注流也無根水中草也容華美蓉草華許注茇蒲達切草根也萱痗音毎藼與萱同麕音君䴥音加薜荔上蒲計反下郎計反校管子注校謂馨烈之鋭音攘欵冬莵音兎奚爾雅作蒵音兮本草欵冬一名莵奚涷音東顆涷爾雅注欵冬也卷耳襢與袒同又陟扇反枲音徙荽音綏傖鋤庚切音與桭同吴人罵楚人曰傖晉陽秋云吴謂中州人曰傖芣苢上音浮下音以掇都奪切捋力活切袺音結襭户結反陵苕蔈匹沼反苕華葳音威荏如葚切射干上音夜翣色甲切蘘汝羊切萐所洽切莆音甫木菫下音謹菌音窘瞑莫定切翕目也葍音福藑音瓊燕攴蒨音倩或作茜爾雅翼卷三
