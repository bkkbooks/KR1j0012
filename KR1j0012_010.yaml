body:
  text: 欽定四庫全書爾雅翼卷十宋羅願撰釋木梅杏桃李櫻桃棗栗樝棃橘柚橙柿梬柀梅梅先春而華其實亦早故摽有梅為昬嫁之候古者以梅實薦饋食之籩所謂乾䕩是也蜀志曰蜀名梅為䕩大如鴈子然籩人八籩而棗㮚桃乾䕩榛實僅五物故鄭氏解引内則桃諸梅諸以為證疏者從而廣之曰䕩為乾梅則桃為濕桃又桃諸是乾者桃有乾濕梅亦應有乾濕以足八籩之數其實既酸故以為和商書所謂爾惟鹽梅左氏傳曰水火醯醢鹽梅以亨魚肉禮記則獸用梅而已詩義疏曰梅暴乾為腊羮臛韲中又可含以香口梅既為腊故又稱乾腊山海經曰雲山之上其實乾腊也管子五沃之土其梅其杏其桃其李今江南梅熟之時輒有細雨連日不絶衣物皆裛謂之梅雨説苑曰越使諸發執一枝梅遺梁王夏小正曰正月梅杏杝桃則華五月煑梅為豆實杏五果為五榖之祥而杏華又候農時四民月令曰三月杏花盛可菑白沙輕土之田又曰三月昏參夕杏花盛桑椹赤可種大豆謂之上時汜勝之書曰杏花如何可耕白沙齊民要術曰杏始華榮輒耕輕土弱土望杏華落復耕耕輒藺之故農事之候杏花昌葉而已吕氏春秋曰冬至後五旬七日菖始生菖者百草之先生者於是始耕又曰禾生於棗或楊黍生於榆大豆生於槐小豆生於李麻生於楊或荆大麥生於杏小麥生於桃稻生於栁或楊其生實又為農祥故曰梅桃杏實多者來嵗為之穰師曠占術曰杏多實不蟲者來年秋禾善五木者五榖之先欲知五榖但視五木擇其木盛者來年多種之萬不失一故五果分五行所以表五榖也又按五果之義春之果莫先於梅夏之果莫先於杏季夏之果莫先於李秋之果莫先於桃冬之果莫先於栗五時之首寢廟必有薦而此五果適丁其時故特取之杏之枝葉華果皆赤故古者鑚燧夏取棗杏之火也夏小正四月囿有見杏桃桃華之繁麗者故稱桃之夭夭灼灼其華漢二千石綬青色桃花縹三彩以為華也桃䏻去不祥桃之實在木上不落者名梟桃一名桃奴及莖葉毛皆去邪故古者植門以桃梗出冰以桃弧臨喪以桃茢典術曰桃者五木之精仙木也故厭伏邪氣制百鬼或曰東海中有度朔山上有大桃木蟠屈三千里其枝東北曰鬼門萬鬼之所出入有二神人曰神荼鬱壘主閲衆鬼之惡害人者執以葦索而用以飼虎黄帝法而象之敺除畢因立桃梗於門户上畫鬱壘執葦索焉又淮南子曰羿死於桃棓棓大杖也言為桃木所擊死由是以來鬼畏之其實桃西方之木味辛氣惡物或惡之木之不用桃猶菜之不用辛也古者出冰桃弧棘矢以除其災荆楚設之以共禦王事則其來久矣詩曰灼灼其華有蕡其實其葉蓁蓁率以喻昬姻之時韓子曰春植桃李夏得蔭其下秋得食其實春種蒺藜夏不得采其實秋得刺焉以喻所植之得人與不得其人在始而已灼灼其華以言其春葉與實以言其夏秋蓋桃者華實俱茂而又早成盖三嵗而有子諺曰頭白可種桃言可待也桃性皮横而急四年以上者冝以刀立􅟮其皮七八年即老十年即死是以冝歲常種之春秋運斗樞曰玉衡星散為桃夏小正六月煑桃桃實有毛故魯以黍雪桃禮記桃曰膽之説者以為膽擇取美者似恐亦是去毛之義疏曰桃多毛拭治去毛令色青滑如膽也李李木之多子者故从子亦南方之果也火者木之子故名若古文則木傍子為杍其華與桃尤繁密故詩云何彼穠矣華如桃李盖有女同車之詩比之舜華舜英舜並蔕之華彼以諸侯娶諸侯之女故華色相稱也何彼穠矣之詩比唐棣之華以言其反而後合若下降然故比於桃李之華則車服不同而皆華盛也春秋運斗樞曰玉衡星散為李爾雅有三種痤接慮李即今之麥李與麥同熟者為果肉厚而乾與核相離駁赤李則李之赤而有水者休無實李李實繁則有竊食之嫌雖欲整冠其下且不可猶漢廣之喬木不可休息無實則其下可休矣行人謂之行李亦或取於此潘岳賦曰房陵朱仲之李山海經邊春之山多李古者司商恊名姓商五聲之清者司商掌賜族受姓之官人始生吹律合之定其姓名至老子生於李下乃指以為姓不假吹律漢京房本姓李乃吹律改姓京氏不可曉今人論五姓但以張為商李為徴古法不復見矣管子謂黄帝使后土為李冬者李也注李獄官也越絶書言勾踐諸侯從之若果中之李櫻桃櫻桃朱實甘美飛鳥所含故又名含桃爾雅謂之荆桃其華在梅後至果熟則最先故仲夏之月以雛嘗黍羞以含桃先薦寢廟漢恵帝時叔孫通亦以為禮春有嘗果願陛下出因取櫻桃獻宗廟諸果獻由此興矣或云此果雖禽鳥所嗜然人未采鳥終不敢先食蜀都賦曰朱櫻春熟廣志櫻桃有長八分者有白色多肌者凡三種今櫻桃有大而色紫亦有如蠟色者潘岳賦三桃表櫻胡之别棗棗者束木棗束相重棘束相連東方朔以為從來來者盖戯辭也大而鋭上曰壺細腰曰邊白熟曰櫅樹小實酢曰樲實小而員紫黒色曰遵大如雞卵曰洗苦味曰蹶泄不著子曰晢味短味曰還味棗有十一名郭氏得九焉後世有紫棗𤣥棗西王母棗東海蒸棗洛陽夏白與夫雞心牛頭羊角獼猴細腰其名不可勝載古者八月剥棗大戴禮曰剥者取也其修治則曰新之曰㚄之以為饋食之籩又以為婦贄其事父母舅姑者棗栗飴蜜以甘之凶嵗亦仰焉秦饑應侯請發五苑之果蔬橡棗栗以活民孔融為東萊賊所攻城欲破其治中左承祖以官棗賦與戰士故古者百榖以為梁者黍稷之揔名稻者溉種之揔名菽者衆豆之揔名三榖各二十種為六十蔬果之屬助榖各二十凡為百榖其實晉人尤好食棗盖安邑千株棗比千户侯其人寘之懷袖食無時久之齒皆黄故養生論云齒居晉而黄謂棗故也魏文帝詔羣臣曰南方龍眼荔枝寧比西國蒲陶石蜜乎酢且不如中國凡棗味莫若安邑御棗也盧諶祭法春祠用棗油蘇秦説燕文侯曰北有棗栗之利民雖不由田作棗栗之實足食於民矣潘岳賦曰周文弱枝之棗栗栗其實下垂故从􅓒􅓒者艸木實垂􅓒􅓒然盖象形也古文㮚从西從二􅓒徐巡説木至西方戰㮚言木則凡木皆然而栗至罅發之時將墜不墜尤有戰㮚之象故天子五社西社植栗而宰我對栗社之義亦以為使民戰栗也大戴禮夏小正曰八月栗零零也者降也零而後取之故不言剥也又栗之生極謹密三顆為房其房為蝟毛其中顆褊者號為栗楔尤益人大率栗味鹹性温而冝於腎有患足弱者曰栗木下多食之至能起行其質縝密故稱玉質縝密以栗玉色黄者侔蒸栗也古者治果實之名栗曰撰之天官籩人以為饋食之豆又以為加籩之實士喪禮設豆右葅南栗東脯而女子用栗為贄以告䖍喪事虞祭則用桑木為主既練則用栗主以易之秦風阪有漆隰有栗燕秦千樹栗是其出處也秦饑應侯請發五苑之果蔬橡棗栗以活民昭王不許范子計然曰栗出三輔毛詩義疏曰五方皆有栗周秦吳揚特饒唯漁陽范陽栗甜美長味倭韓國栗大如雞子亦短味不美桂陽有栗叢生大如杼木詩又云山有嘉卉侯栗侯梅侯助辭也西京雜記稱漢上林苑中有侯栗又有侯梅此吳均之語不可取信樝樝似棃而色黄其味酢澁今人謂之榠樝一曰蠻樝後鄭注禮記云樝是棃之不臧者以其似棃而酢澁即是不臧而陶隠居以為鄭公不識樝意其不能别二物也昔人説蔕間别有重蔕如乳者為木𤓰無此者為榠樝然二物自别亦不必如此别也古者以為人君燕食所加庶羞禮記曰樝棃曰攅之盖攅去其心而食之也齊武帝幸丹陽郡晏飲王敬則執榠樝以刀子削之是去其皮也莊子曰夫柤棃橘柚果蓏之屬實熟則剥則辱大枝折小枝泄以其能苦其生者也今柤樹乃復易壤宛陵人植木𤓰者亦就此木上接之得柤之餘氣則澁而不美呂氏春秋曰箕山之東有甘樝山海經曰平丘有甘樝則是又有甘者矣又有香柤子小於榅桲而相似北土無之中都則有唯可生食甚香熟則蘇而不澁盖别是一類述異記曰江淮南人至北見榅桲香以為柤子謂此也乎管子曰五沃之土生楂棃棃果之適口者剖裂以食故古人言剖裂為剖棃又曰樝棃曰攅之盖樝棃喜為蜂所螫螫處輒不可食故鑚去之今人皆就木上大作油囊裹之棃滋長其中故益大而無傷辛氏三秦記曰漢武帝園一名樊川一名御宿有大棃如五升瓶落地則破其主取以布囊盛之名曰含消又廣志曰真定御棃脆如菱蜀都賦曰紫棃津潤是其類也棃之色多黒故稱黧黑者皆从棃言有凍棃之色也每棃有十餘子唯一子生棃餘皆生杜潘岳賦曰張公大谷之棃秣陵有哀仲家棃甚美橘橘生於江南素華丹實皮既馨香又有善味尤生於洞庭之包山過江北則無故曰江南種橘江北為枳考工記云踰淮而北為枳則有異同故橘頌云后皇喜樹橘徠服兮受命不遷生南國兮屈原比之夷齊願置以為像取其貞介似有志也禹貢揚州厥包橘柚錫貢言錫而貢之地理志曰蜀郡嚴道巴郡朐忍魚復二縣出橘有橘官又曹叔異物志交趾橘官長一人秩三百石主嵗貢御橘越人嵗多橘税謂之橙橘户吳闞澤表請除臣之橘籍是也春秋運斗樞曰璇星散為橘弓人以橘為幹又有甘橘其形似橘而圓大皮色生青熟則黄赤未經霜時尤酸霜後甚甜故名甘子生嶺南及江南上林賦曰黄甘橙楱郭璞曰黄甘橘屬而味精崔豹古今注曰甘實形如石榴者謂之壺甘其名别於此唐天寳十載宮甘結實與江劔無殊今洞庭之包山嵗貢謂之洞庭甘李衡臨終勑其子曰龍陽洲裏有千頭木奴及甘橘成嵗得絹數千匹即江陵千樹橘比千户侯之義也本草橘柚條云酸者聚痰甜者潤肺楱小橘也出武陵柚柚似橘而大其味尤酸孔安國云小曰橘大曰柚郭璞則曰柚似橙而大於橘禹貢揚州厥包橘柚錫貢橘柚皆不耐寒故包裹而致之也錫貢者須錫命而獻之言不常來也列子曰吳楚之國有大木焉其名為櫾碧木而冬生實丹而味酸食其皮汁已憤厥之疾齊州珍之渡淮而北化為枳焉則是其類子虚賦橘柚芬芳蜀都賦家有鹽井之泉户有橘柚之園廣志曰成都有柚大如斗呂氏春秋果之美者江浦之橘雲夢之柚橙橙之芳用在皮甘之甘在瓤其木似橘其葉中細如蜂腰其實稍早橙之黄時橘方尚緑其形圓大於橘而香皮厚而皺乃正黄色不若甘橘之帶赤也本草云其皮苦辛作酢醬香美盖獨冝為和故張景陽七命云燀以秋橙酟以春梅韓文公詩鵠殻攅瓌橙南都賦曰穰橙鄧橘説文橙橘屬庾闡揚都賦曰黄甘朱橙顔師古注相如賦曰橙即柚也誤矣柿柿於經乃復罕見唯内則所加庶羞三十一物中有之實黄而大味甚甘亦暴而食之説文赤實果也又有紅柿皮深紅而多水又有椑似柿而青黒生江淮南所謂梁侯烏椑之柿是也利以作漆漆與蟹性反故不冝與蟹同食其葉厚經霜乃丹色上林賦枇杷橪柿齊民要術云柿有小者栽之無者取枝於輭棗根上揷之俗謂柿有七絶一壽二多陰三無鳥巢四無蟲蠧五霜葉可翫六嘉實七落葉肥大又木中根固者唯柿為最俗謂之柿盤急就篇曰棃柿柰桃待露霜南都賦曰櫻梅山柿鄭䖍以柿葉學書梬梬今之㮕棗也結實似柿而極小其蔕四出枝葉皮核皆似柿秋晚而紅乾之則紫黒如葡萄其大小亦然今人謂之丁香柿又謂之牛乳柿子虛賦所謂樝棃梬栗者也上林賦梬棗楊梅南都賦梬棗若留蜀都賦橙柿梬楟說文曰梬棗也似柿而小崔豹古今注亦曰㮕棗葉如柿實似柿而小味亦甘美釋木云遵羊棗郭氏曰實小而員紫黒色今俗呼之為羊矢棗引孟子曰曽晳嗜羊棗按曽晳嗜羊棗而曽子不忍食羊棗若文王昌歜屈到嗜芰之類則冝為果屬然公孫丑稱膾炙與羊棗孰美又似是刲羊為飲食之名未知其審齊民要術云㮕棗冝陰地種之陽中則少實足霜色殷然後乃收早收則澁不任食内則人君燕食所加庶羞有芝栭蔆椇棗栗榛柿𤓰桃李梅杏楂棃等庾蔚云無華葉而生者曰芝栭盧氏云芝木芝也王肅云無華而實者名栭皆芝屬賀氏則云芝木椹栭軟棗盖鄭氏言三十一物先儒以為合芝栭數之乃當三十一之數故皆不用賀氏之説然栭既甘果亦安可廢柀柀似煔而異杉以材稱柀又有美實而材尤文彩釋木云柀煔盖以類相附也其樹大連抱髙數仭葉似煔其木如柏作松理而絶難長肌理細軟堪為器用古所謂文木柏堅緻有文彩而色黄銀杏色瑩白而太輭易損成跡唯柀既有文彩又勁於銀杏實良木也其木自有牝牡牡者華而牝者自實理有相感不可致詰其實有皮殻大小如棗而短去皮殻可生食亦㷶而收之可以經乆以小而心實者為佳本草木部有榧實又有彼子皆出永昌而誤在蟲部盖彼字當從木即是榧也陶𢎞景注榧實出東陽諸郡而不識彼子惟蘇恭能辨其為一物今彼子退入有名無用中矣音釋梅音老裛音浥又於怯反桃縹敷沼切青黄色裊古堯切茢音列萑苕臨力鴆切棓步項切杖也􅟮力支切解也分割也李痤徂和切駁音剥爾雅注李之無實多休李之子赤者名駁棗朿讀若刺櫅子兮切樲音二洗屑典切泄音屑還味上音旋短味也名棯棗棯音稔㚄音帝栗楔音屑倭烏禾切樝側加切榠亡零切攅之内則注攅再官切本又作鑚爾雅鑚子管切注恐有蟲故一一鑚㸔其蟲孔榅於勃切桲蒲骨切棃螫音失蟲行毒橘朐䏰上音蠢下如尹切縣名闞姓也苦監切楱且豆切柚櫾與柚同橙􅼈音攘燀音闡炊也注穰鄧漢書南陽有穰縣鄧縣酟文選注酟與沾同溢也柿椑薄雞切橪賦注音煙輭音軟梬音郢㮕如兖切楟音亭張楫曰山棃歜徂感切殷烏閑切赤黒色栭音而柀音彼煔音杉㷶皮逼切火乾也與煏字同爾雅翼卷十
