body:
  text: 欽定四庫全書爾雅翼卷二宋羅願撰釋草蘭蕙蕳薰草江離杜若茝杜衡蘼蕪卷施菉竹女蘿兔絲蘭蘭是香草之最而古今㳂習但以蘭草當之陸璣解溱洧所秉之蕳以為蕳即蘭也莖葉似澤蘭廣而長節節中赤髙四五尺漢諸池館及許昌宫中皆種之可著粉中藏衣著書中辟白魚劉次莊說樂府又引離騷秋蘭兮青青緑葉兮紫莖以為沅澧所生花在春則黃在秋則紫春黃不若秋紫之芳馥二家所說皆是蘭草一名都梁香一名水香以之解秉蕳可也何關古之所謂蘭乎豫生江南自幼所見蘭蕙甚熟蘭之葉如莎首春則茁其芽長五六寸其杪作一花花甚芳香大抵生深林之中微風過之其香藹然達於外故曰芝蘭生於深林不以無人而不芳又曰株穢除兮蘭芷覩以其生深林之下似慎獨也故稱幽蘭與蕙甚相類其一幹一花而香有餘者蘭一幹五六華而香不足者蕙今野人謂蘭為幽蘭蕙為蕙蘭其名不變於古然江南蘭只春芳荆楚及閩中者秋復再芳故有春蘭秋蘭至其緑葉紫莖則如今所見大抵林愈深而莖愈紫爾近世惟黃太史豫章人說蘭蕙合此餘皆蘭草蘭草生水傍非深林之物又稱紫莖而解以紫花皆非其理矣蘭為王者香草故夢蘭者以其有國香離騷滋蘭九畹植蕙百畝留夷揭車則畦之杜衡芳芷則雜種之又云覽椒蘭其若兹兮又况揭車與江離可知蘭之最貴而說者稱古者之摰天子鬯諸侯蕙大夫芝蘭士庶人艾則蘭何以為王者之草也蘭雖天子諸侯所服又女子之事故古者女子佩之左傳曰季蘭尸之言有齊季女佩蘭而尸祭事又燕姞夢天與蘭亦曰人服媚之文公遂與之蘭而御之內則曰婦或賜之茞蘭則受而獻諸舅姑此蘭女事故一名女蘭淮南子曰男子植蘭美而不芳繼子得食肥而不澤情不相與往來也屈平滋蘭之九畹蓋知愛芳矣而植之者非其人所以不免於萎絶也歟蕙蕙大抵似蘭花亦春開蘭先而蕙繼之皆柔荑其端作花蘭一荑一花蕙一荑五六花香次於蘭大抵山林中一蘭而十蕙故黃太史曰光風轉蕙汜崇蘭離騷蘭九畹蕙百畝以是知楚人賤蕙而貴蘭矣按離騷滋蘭九畹植蕙百畝畦留夷與揭車雜杜衡與芳芷王逸章句曰十二畝曰畹或曰田之長為畹二百四十步為畝五十畝為畦然則蘭得一百八畝蕙百畝留夷揭車合百畝則多少亦不相逺矣若以說文言之田三十畝曰畹則蘭得二百七十畝多於蕙兩倍留夷揭車各五十畝多於兩草一倍亦多少之差然言蘭者每及蕙畹蘭而畝蕙也汜蘭而轉蕙也蕙殽蒸蘭籍也蕙雖不及蘭勝於餘芳逺矣楚辭又有菌閣蕙樓蓋芝草幹杪敷華有閣之象而蕙華亦於幹杪重重纍積有樓之象云蕳蕳毛氏曰蕳蘭也陸璣曰其莖似藥草澤蘭但廣而長節節中赤高四五尺漢諸池苑及許昌宫中皆種之可著粉中藏衣著書中辟白魚蓋今之蘭草都梁香也陸氏所說皆是惟引以解左傳楚辭之蘭為非矣蘭草大都似澤蘭其澤蘭葉尖微有毛不光潤方莖紫節八月花白人多種於庭池此蘭生澤畔葉光潤其隂小紫所以一名都梁者盛洪之荆州記曰都梁縣有山山下有水清淺其中生蘭草因名都梁因山為號其物可殺蟲毒除不祥故鄭人方春之月於溱洧之上士女相與秉蕳而袚除因以淫泆韓詩云今三月桃花水下以招魂續魄袚除氛穢又周禮女巫歲時袚除舋浴鄭氏云今三月上已水上之類舋浴以香藥薰草沐浴然則用蕳可知矣曽晳曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸春浴沂水則與溱洧事類蓋人情所樂聖賢同之但詠道而歸不曰觀乎既且也荆楚之俗三月三日亦出水渚沙洲間或園宅池沼內為曲水飲不復用香草矣薰草蘭蕙之名實已詳辨之諸家說蕙乃蕙草蓋即薰草今之零陵香南越名燕草者西山經曰浮山有草名曰薰草麻葉而方莖赤華而黑實臭如蘪蕪可以已厲蓋能去惡臭令身香故古之袚除以此草熏之因謂之薰草齊得管仲三釁三浴之釁或為薰是也古稱薰蕕不同器而藏又曰一薰一蕕十年尚猶有臭以薰香而蕕臭慮為臭所奪故也未始以為蕙至王逸章句始云菌薰也葉曰蕙根曰薰陳藏器亦云薰草一名蕙草薰草為蕙蓋始於此古今稱蕙草晚莫知其說博物志乃云君子國多薰華之草薰華朝生而夕死然則蕙草之晚蓋亦謂薰又七諫曰飲菌若之朝露言此草既朝生而夕死則飲其露者尤不可遲也莊子所謂朝菌豈亦謂此耶然司馬云大芝支遁云舜華許慎云朝生暮死之蟲其說各異故不可得而一江離江離之草屈原幼時所先采蓋自其初度則固已扈江離辟芷矣然顔監以諸家義說之亦不能了郭璞曰江離似水薺張勃云江離出臨海縣海水中正青似亂髮郭義恭曰江離赤葉莫知孰是吳都賦云江離之屬海苔之類亦生臨海水中正青似亂髮以類求之張勃之言似矣然物有名同而實異者楚辭之於江離畦而種之又云江離棄於窮巷則非水物其他解者多以本草蘪蕪一名江離為說然子虛賦稱藭菖蒲江離蘪蕪上林賦又云被以江離揉以蘼蕪又不應是一物豫按博物志云芎藭苗曰江離根曰蘪蕪本草亦云蘪蕪芎藭苗也芎藭有兩種一種似芹葉一種如蛇床香氣相似用亦不殊古今說者皆云蛇床亂蘪蕪陶隱居亦云蘪蕪葉似蛇床又蜀本云蛇床似小葉芎藭然則蘪蕪江離既皆芎藭之苗此小葉如蛇床者既名蘪蕪則大葉似芹者當名江離爾蘪蕪一名江離而子虛上林說異故推而別之杜若杜若苗似山薑花黃赤子赤色大如棘子中似豆蔻有杜連白連白芩若芝之名亦一名杜衡九歌湘君曰采芳洲兮杜若將以遺兮下女湘夫人云搴汀洲兮杜若將以遺兮逺者其用物同而所贈異學者莫能說夫湘君夫人之事豫已於神姦中說之蓋二女死於湘有神奇相配焉奇相湘君也二女湘夫人也故湘君之歌稱君稱夫君其美稱也而其言女與下女者謂湘夫人也湘夫人之歌稱帝子者其美稱也而其言公子佳人逺者謂湘君也湘君則捐袂遺佩而采杜若以遺夫人夫人則捐袂遺褋而搴杜若以遺湘君此則交相歡之義矣然楚辭所用物各自有㫖不可一槩以香草言之二湘相贈同用杜若杜若之為物令人不忘搴采而贈之以明其不相忘也如伯兮願得諼草而植之背是又欲忘之而不可得也茝楚辭以芳草比君子而言茝者最多蓋茝今香白芷也一物而多名茝也芷也芳也藥也䖀也說文曰楚謂之蘺晉謂之䖀齊謂之茝故離騷有辟芷有芳芷有白芷有白茝有芬香有藥有芳嘗試論之楚辭取象於草木之芳潔者無所不備而君子比德於玉乃獨略焉王逸章句曰行清潔者佩芳德仁明者佩玉能解結者佩觽能决疑者佩玦故孔子無所不佩也詳屈平之意蓋以清潔一介自處自仁明以下有所不敢居焉故其言曰覽草木其猶未得兮豈珵美之能當以言楚之君臣於草木臭香猶未能別而况能知玉之美耶此所以有所詳有所略芷出近道下濕地處處有之可作面脂其葉名蒚麻可用沐浴故曰浴蘭湯兮沐芳古者婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑明不敢專爾杜衡西山經曰天帝之山有草焉狀如葵其臭如蘼蕪名曰杜衡可以走馬食之已癭郭氏曰帶之令人便馬或曰馬得之而健走山海經雖載異物其實皆世所有今杜衡生山之隂水澤下濕地根葉都似細辛惟氣小異俗以其似馬蹄名曰馬蹄香能香人衣體道家服之九歌山鬼章曰被石蘭兮帶杜衡杜衡之帶亦以其便馬不特香人衣體而已又其名謂之衡古者天子大輅側載睪芷所以養鼻明車上亦有香草此衡既便於馬或當亦載之衡歟又杜若亦有杜衡之名草木所以難言者以其名實相亂每每如此杜衡或只名杜釋草一名土鹵又謂之杜衡葵今俗以及已代之及已獨莖莖端四葉葉間白花有毒而無芳氣蘼蕪芎藭之苗葉為蘼蕪其葉蓋似蛇床而香故云蛇床亂蘼蕪郭璞贊曰蘼蕪善草亂之蛇床不隕其實自別以芳古人珍之魏文帝以蕙草為香燒之以薇蕪藏衣中少司命曰秋蘭兮蘼蕪羅生兮堂下緑葉兮素枝芳菲菲兮襲豫夫人兮自有美子蓀何以兮愁苦蘭有國香人服媚之古以為生子之祥而蘼蕪之根主婦人無子故少司命引之少司命主人子孫者也古詩曰上山采蘼蕪下山逢故夫案崔豹古今注牛亨問董仲舒曰將離相贈以芍藥者何答曰芍藥一名可離故將別以贈之亦猶相招贈以文無文無一名當歸也文無蓋即蘼蕪以夫當歸故下山逢之爾如藁砧刀頭之義也然今當歸自是一種非蘼蕪之類唐本注云當歸有兩種一似大葉芎藭一似細葉芎藭惟莖葉卑下於芎藭也然則古亦以蘼蕪為當歸矣卷施離騷經曰朝搴阰之木蘭兮夕攬洲之宿莽王逸章句曰攬采也水中可居曰洲草冬生不死者楚人名曰宿莽言巳旦起升山采木蘭上事太陽承天慶也夕入洲澤采取宿莽下奉太隂順地數也動以神祗自敕誨也木蘭去皮不死宿莽遇冬不枯以喻讒人雖欲困己巳受天性終不可變易也案宿莽稱宿者蓋以經歲為名猶其稱宿麥宿草也然遇冬不枯在草木尚多有之釋草曰卷施草拔心不死郭璞以為宿莽此則宿莽之堅貞異於庶草然後與木蘭去皮不死之說相為表裏此所以上采木蘭下采宿莽以明在此者非一日之好修而在彼者愈取而愈無窮也故璞又為其贊曰卷施之草拔心不死屈平嘉之諷詠以比取類雖邇興有逺㫖南越志曰寧鄉草多卷施拔心不死江淮間謂之宿莽菉毛詩菉竹作緑竹先儒皆以緑為王芻竹為萹竹說文亦曰菉王芻也引詩曰菉竹猗猗則緑與菉同本草名藎草俗亦呼淡竹葉所謂終朝采緑不盈一掬者上林賦稱香草云掩以緑蕙被以江離張揖亦以緑為此王芻又一名鹿蓐今呼鴟腳莎衛風引以為首蓋必其義有可取者不以物薄也說者以為菉之與竹所以美盛者由得淇水浸潤之以况武公道學自修之效則菉與竹嘉草也而離騷云薋菉葹以盈室兮判獨離而不服以菉及蒺藜枲耳三者皆惡草喻讒佞盈滿於側又九章曰攬大薄之芳茝兮搴長洲之宿莽惜吾不及古之人兮吾誰與玩此芳草解萹薄與雜菜兮備以為交佩王逸曰言已解折萹蓄雜以香菜合而佩之修飾彌盛也然萹蓄雜菜皆非芳草逸義非是蓋言解去萹蓄與雜菜而備芳茝宿莽為交佩爾然則菉與竹又皆惡物與衛風相反詩騷所取各有義耳竹竹萹蓄似小藜赤莖節好生道旁可食又謂之萹竹蜀本圖經云葉如竹莖有節細如叉股生下濕地其微既似竹則宜謂之竹爾衛風緑竹猗猗竹蓋謂此陸璣草木疏云緑竹一草名其莖葉似竹青緑色高數尺今淇隩旁生此色青言為緑竹按璣所說則又合緑與竹為一草未知其審然古今說者皆言淇水旁自生竹箭故古人言伐竹淇衛又曰淇衛之箭又曰下淇園之竹以為楗伐淇園之竹以為矢如此多矣蓋淇水宜竹箭自古以然又詩卒章曰緑竹如簀簀牀笫以竹為之其大堪為簀則非草也然說文引詩作菉竹韓詩作緑􅗨菉既非色而􅗨又非竹不可合為緑色之竹箭故析而解之云菉王芻􅗨萹筑也又韓詩如簀乃作如簀簀積也薛君云簀緑䓯盛如積也西京賦芳草如積亦祖此義然則淇澳自出竹箭不妨兼有菉竹二草耶女蘿女蘿兔絲其實二物也然皆附木上釋草云唐蒙女蘿女蘿兔絲郭曰別四名則是謂一物矣廣雅云女蘿松蘿也莵丘莵絲也則是兩物陸璣亦云今兔絲蔓連草上正黃赤如金藥中兔絲子是也非松蘿松蘿自蔓松上生枝正青與莵絲殊異以豫考之誠然今女蘿正青而細長無雜蔓故山鬼章云被薜荔兮帶女蘿蘿青而長如帶也何與兔絲事然兩者皆附木或當有時相蔓古樂府云南山羃羃兔絲花北陵青青女蘿樹由來花葉同一根今日枝條分兩處唐樂府亦云兔絲故無情隨風任傾倒誰使女蘿枝而來强縈抱兩草猶一心人心不如草則古今多知其為二物者博物志魏文帝所記諸物相似亂者女蘿寄生兔絲兔絲寄生木上根不著地然則女蘿有寄生兔絲上者釋草女蘿兔絲或亦此義爾兔絲龜策傳曰下有伏苓上有兔絲下有靈龜上有叢蓍考伏苓千歲松脂也兔絲因之生其上而無根吕氏春秋曰或謂兔絲無根非無根也其根不屬地伏苓是也然則兔絲蓋受氣於伏苓以生故曰伏苓掘兔絲死葛稚川乃云兔絲之草下有伏兔之根無此兔則絲不得生於上又曰兔絲初生之根其形似兔掘取割其血以和藥然則非伏苓比矣今言枸把者亦云其根久而有物如狗又云人參之下其狀如人蓋草木積久精華所成略有形象古人名物亦具有其義故伏苓亦名伏莵說伏苓者云形如鳥獸龜鱉者良又云似人龜鳥形者佳是不專似兔也又今兔絲田野墟落中甚多皆浮生藍紵麻蒿上不必皆有伏苓也一名唐蒙詩爰采唐矣以刺男女相奔期於幽逺者唐則采藥麥則采榖葑則采菜多為名以來逺適又唐尤浮游無根之物蓋逐之而不反矣音釋蘭蕳古間切著音斫滋與栽同一作蒔也揭車上丘謁反又起例切姞音吉茝昌亥切蕙荑音題初生草汜音泛蕳祓音弗舋與薰同薰草薰山海經音訓江離扈音户被也辟芷上匹亦切芷生幽辟之處故曰辟芷蘪忙皮切杜若搴音搴拔取也遺以醉切贈也遺佩遺褋之遺平聲捐音沿玦古穴反袂迷蔽反褋音蝶注襟褋襜褕事神所用茝昌亥切䖀音枵觽音攜角鋭專可以解結珵音呈佩玉也珩謂之珵相玉書云玉大六寸光自照蒿麻上音厯帨音稅佩巾也杜衡睪芷荀子側載睪芷所以養鼻也又曰代睪而食注睪未詳蓋香草也或曰睪讀為藁即所謂蘭茝本也或曰當為澤澤蘭也蘼蕪蓀音孫或作荃也全反蓀猶汝也蓋為巫之自汝也言彼神之心自有所美而好之者矣汝何為愁苦而必求其合乎卷施上音捲下與葹同搴音援取也莽莫補反阰音毗山名在楚南菉力玉反萹布緬切藎疾刃反薋音茨葹音施攬力敢反本作檻竹楗臣偃切笫咀史反􅗨冬毒切女蘿羃羃音覔爾雅翼卷二
