body:
  text: 欽定四庫全書爾雅翼卷十六宋羅願撰釋鳥四鷹隼鵰鶡梟鵩鴆服翼蟁母戴鵀鷹鷹鳥之摯者雌大雄小一名鷞鳩少氏以名司寇之官蓋鷹正月則化為鳩秋則鳩化為鷹故鷹通有鳩名在五鳩之數禽經曰鳥之小而摯者皆曰隼大而摯者皆曰鳩也季夏之月秋節將至鷹自習擊曰學習孟秋之月鷹將摶鷙殺鳥於大澤之中四面陳之世謂之祭鳥其毛色屢變無常故寅生酉就摠號為黃二周作鴘千日成蒼魏彦深賦漢郅都比蒼鷹以其尤鷙烈也韓子亦云魯連黃鷂子田巴兀老蒼廣志則云鷹一嵗為黃二嵗為撫疑三嵗為青意亦同詩曰維師尚父時維鷹揚亦鷹好揚隼好翔故以比尚父之武鷂亦其類古語曰在南為鷂在北為鷹鷹生於窟者好眠巢於木者常立雙骹長者起遲六翮短者飛急隼隼鷙鳥也古者鳥隼以為旟蓋取其鷙然古今言隼迺未有的指其物者禽經曰鳥之小而鷙者皆曰隼大而鷙者皆曰鳩獨知其小爾說文解鵻云祝鳩也思允切又去鳥从十作隼則鵻乃與隼通凡詩之翩翩者鵻皆隼也又解淮南子鳥力勝日而服於鵻禮引爾雅謂之鵧鷑秦人謂之祀祝間蠶時晨鳴人舍者鴻鳥皆畏之據許所說則是今鵶䳎爾郭氏解鵧鷑亦云小黒鳥鳴自呼江東名為烏䳎今鳥䳎小於烏而能逐烏俗言烏之舅也說者不得其真則妄以隼泥解顔師古曰隼鷙鳥即今之鴙也李善稱鷙擊之鳥通呼曰隼一曰鷂也韋昭則以隼為今之鶚云皆非也又古今解詩鵻者類引釋鳥佳其鳺鴀故遂以為祝鳩按鳺鴀是隹自音錐鑿之錐此旣从鳥自與隼通則事不相預明矣獨鷑鳩鵧鷑者是矣詩云鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母又云翩翩者鵻載飛載下集于苞栩王事靡盬不遑將父翩翩者鵻載飛載止集于苞杞王事靡盬不遑將母禽經曰鵻上無尋鷚上無常言二鳥之起不過尋丈不逺而復而王事靡盬之臣則征役不得暫息也亦鵻是農候之鳥故因不能藝稷黍而及之荆楚嵗時記稱四月有鳥如烏䳎先鷄而鳴聲云加格加格民候此鳥鳴則入田以為催人駕犁格也亦引爾雅烏䳎即鵧鳩并摯虞槐賦春宿教農之鳩然鳩與扈異又以為春扈曰鳻鶞主五土宜種木者也則誤矣淮南亦云孟夏之月以熟穀禾鴣鳩長鳴為帝候嵗盖亦謂此許叔重以為鴣鳩布穀未知孰是古之論書者言鍾繇善八分有隼尾又書訣云𨽻有擊石波八分書有隼尾波最為難作隼集陳廷劉向以為隼近黒祥鵰鵰者鶚之類土黃色健飛擊沙漠中空中盤旋無細不覩黄帝戰于阪泉之野鵰鶡鷹鳶以為旗幟穆天子𫝊青鵰執犬羊食豕鹿今鵰亦能食麞鹿之屬可謂鷙有力矣又能翱翔水上扇魚令出沸波攫而食之淮南子曰鳥有沸波者河伯為之不潮畏其誠也其毛亦能食諸鳥羽如羣錯草中有鵰毛必衆毛自落古者鵰之字作彫至籕文乃作鵰耳昔人以草木雕落必从雕者豈亦自然相感如雕羽歟羽可以為箭漢時匈奴有斗入漢地直張掖郡者生竒材木箭竿就羽漢欲得之以饒邊就即大雕也山海經曰景山多鷲黒色多力說文則云鷲黒色多子師曠曰南方有鳥名曰羌鷲黃頭赤目五色皆備禽經則云雕以周之鷲以就之言其所從摶擊之異則其說不同然則鷲乃鵰之大者耳鷲多黒色則所謂皁鵰是也詩曰肇允彼桃蟲拚飛維鳥桃蟲小鳥也鳥鵰也小毖之君於懲患之後始知天下之機蓋有自小而變為大者以求助也說文鵰鷻也籕文作鵰从鳥鷻鵰也詩曰匪鷻匪鳶李廣𫝊射鵰注一名鷲翮可以為箭羽鶡鶡似黒雉出上黨郭氏則云似雉而大青色有角漢書音義云似雉而大黄黒色鷙鳥之暴䟽者也每所攫撮應爪摧衂性尤相黨其同類有被侵者輙往赴救之其鬭大抵一死乃止曹植賦所謂雙戰隻僵者也顔師古云俗謂鶡雞昔黃帝之戰以鵰鶡鷹鳶為旗幟至周鳥隼為旟而其後有鶡冠環纓無蕤以青系為緄如雙鶡尾植左右虎賁武騎皆冠之東京賦武夫戴鶡上林賦云蒙鶡蘇蘇析羽也鶡以蘇為竒蒙覆而取之蓋以其勇於鬭兼同類相死可以厲衆故趙武靈王以表武士秦漢㳂之俗謂之大冠也鶡冠子居深山以鶡為冠漢世常用之而黃霸乃以為鳯皇故為張敞所譏覇𫝊注師古云鶡音芬字本作鵧此通用耳鳻雀大而色青出羌中梟梟者不孝之鳥爾雅梟鴟土梟劉子曰炎州有鳥其名曰梟傴伏其子百日而長羽翼既成食母而飛蓋稍長從母索食母無以應於是而死古者天子常以春解祠祠黄帝用一梟破獍梟不孝之鳥破獍食父之獸黃帝欲絶其類使百吏祠皆用之至漢武帝時亦令祠官領之如其方而漢使東郡送梟五月五日作梟羮以賜百官淮南子鼓造辟兵夀盡五月之望許叔重曰鼓造蓋謂梟一曰蝦蟆今世人五月望作梟羮亦作蝦蟆羮是食梟之驗也博之采有梟者博兼行惡道故以梟為采亦梟得之為雋故猛將謂之梟將也土梟穴土以居故曰土梟而荆楚嵗時記稱句鵒為土梟說者乃因謂為鸜鵒來巢者又云鸜鵒穴居誤矣梟今人養以致鳥後漢五行志稱衆鳥之性見非常班駮好聚觀之至於小爵希見梟者暴見尤聚蓋當時有五色大鳥衆鳥隨之時以為鳳皇故破其惑段成式云今人往往以壁間蛛為獍見其形圓而匾伏子必為子所食其實非也破獍如貙而虎眼鵩鵩似鴞不祥鳥夜為惡聲者巴蜀異物志曰小如雉體有文采行不出域若有壃服者故名鵩賈誼之遷長沙嘗集其舍自以夀不得長作賦自廣然終以不免按周官有硩蔟氏掌覆夭鳥之巢以方書十日十有二辰十有二月十有二嵗二十有八星之號縣其巢上則去之先儒以謂夭鳥惡鳴之鳥若鴞鵩日謂從甲至癸辰謂從子至亥月謂從娵至荼嵗謂從攝提格至赤奮若星謂從角至軫蓋梟鳴烏噪譆譆出出類皆能驚動人為國怪祥故設官驅之不使惑聽書十日以下則未曉其理豈嵗月日星辰五紀者夭物所畏避耶今以戊已書燕巢側則燕為去彼於號特十之二耳燕非夭鳥然於日辰猶有忌若盡書之彼夭鳥必有所避矣在國且猶覆巢敺去以為夭則入舍又可知矣此賈生之所為賦荆州記曰楚人謂之服鴆鴆毒鳥也似鷹大如鴞毛紫黒色長頸赤喙雄名運日雌名隂諧天晏静無雲則運日先鳴天將隂雨則隂諧鳴之故淮南子云暈日知晏隂諧知雨也食蝮蛇及橡實知巨石大木間有蛇虺即為禹步以禁之或獨或羣進退俯仰有度逡巡石樹為之崩倒蛇虺無脫者昔有人入山見其步法歸向其妻學之婦正織而機翩或曰取蛇虺時呼同力數十聲石起蛇出故江東人呼同力鳥或曰禁蛇之聲如以手荅腰鼓大率蛇入口即爛矢溺著石石爛如泥一說屎石則變為雌黃及生金古人以其羽翮歴酒中則能殺人國語驪姬寘鴆于酒謂之酖酒管仲曰燕安酖毒不可懐也凡鴆飲水處百蟲吸之皆死或得犀牛蘸角其中則水無毒此鳥與犀相伏今南方山川有鴆處必有犀蓋天資之以育物離騷曰望瑶臺之偃蹇兮見有娀之佚女吾令鴆為媒兮鴆告余以不好雄鳩之鳴逝兮余猶惡其佻巧心猶豫而狐疑兮欲自適而不可鳳皇既受詒兮恐髙辛之先我夫媒所仰以合夫婦也鴆既毒物又其雌雄自有好隂好晏之異其同居異志如此則宜其為人媒而告人以不好也雄鳩物之至拙者不能為巢雨則逐其匹霽則反之其為拙亦甚矣而猶惡其佻巧於是求夫和鳴如鳳皇者而託之又貪餒而受詒則髙辛之先我必矣蓋屈原之始罹憂讒人惡之至其久則雖平日所謂賢者亦皆隨俗變化而不察故始則惡服艾之盈要而其久也荃蕙化而為茅矣始也惡鵜鳺之先鳴而其久也鳳皇既受詒矣宜乎有國無人莫我知之歎而將從彭咸之所居也唐國史補曰鷣鳥千嵗為鴆愈老則愈毒同力即鴆也或言亦老而化為鴆陶隱居又言鴆鳥狀如孔雀五色雜斑髙大黒頭赤喙出交廣深山中與古所謂運日同力者别而諸家皆言只一種更無如孔雀者按吳都賦亦云白雉落黒鴆零則鴆色宜黒彼如孔雀者當别一物耳服翼蝙蝠服翼郭氏云齊人呼為蟙䘃或謂之仙鼠蓋服翼似䑕有肉翅而黒棲人家屋隙中遇夜則飛夏夜尤甚捕蚊蚋食之新序曰黃鵠白鶴一飛千里使之與燕服翼試之堂廡之下廬室之間其便未必能過燕服翼也蓋燕晝飛服翼夜動皆工於室中盤旋者然服翼肉翅而無羽故無力觸物輙墮墮則不能復起今洞谷中乃有大者羣飛殷殷如風雷述異記云荆州青溪秀壁諸山往往見乳穴穴中玉泉交流有蝙蝠千嵗體白如銀棲則倒懸或以為腦重故然此亦性之常不為異也又今人以為䑕食巴菽所化顧其類亦自相生不特化而已淮南乃云魚食巴菽而死䑕食之而肥博物志云䑕食巴豆三年重三十斤不言化為服翼然則俗說蓋未可信也蟁母鷏蟁母郭氏曰似鳥􅖂而大黃白雜文鳴如鴿聲今江東呼為蚊母俗說此鳥常吐蚊故以名云或言陳藏噐餘鳥大如雞闕黒色生南方池澤茹藘中其聲如人嘔吐每口中吐出蚊一二升李肇唐史補稱江東有蚊母鳥亦謂之吐蚊鳥夏則夜鳴吐蚊於叢葦間湖州尤甚說者又言端新州有鳥類青鶂而觜大常在池塘間捕魚而食毎作一聲則蚊子羣出其口亦謂之吐蚊鳥數說雖所在不同然要之一物爾鷏雖吐蚊然得其羽為扇迺可以辟蚊南中又有蚊子木實如枇杷熟則自裂蚊盡出而空殻矣故塞北有蚊母草嶺南有蚊母木江南有蚊母鳥三物異類而同功也淮南曰水蠆為䗓孑孒為蟁􅊵齧為螚物之所為出於不意弗知者驚知者不怪今孑孒汙水中無足蟲也好自伸屈於水上見人輙沈久之蛻為花蚊揚去蓋水蟲之變化類如此人所同知非出於不意也鷏以飛鳥而吐之莫見其成形之始斯則異矣戴鵀戴鵀似山鵲而尾短青色毛冠俱有文采如戴花勝故呼戴鵀又稱戴勝郭璞注方言曰勝所以纒絍然則勝者是後世所謂梭耳又名戴南漢書南任也楚語之轉又名戴鳻鳻者鳩之族也後漢輿服志曰上古穴居而野處衣毛而冒皮未有制度後世聖人易之以絲麻觀翬翟之文榮革之色乃染帛以效之始作五采成以為服見鳥獸有冠角􅏋胡之制遂作冠冕纓蕤以為首飾蓋勝者女之器而戴鵀之來為蠶候故婦人首飾象之蓋漢自太皇太后皇太后以下入廟之服其簪以瑇瑁為擿長一尺端為革勝蓋取此也勝亦法度之物故山海經曰西王母梯几而戴勝淮南鴻烈言夏桀之時西老折勝黃神嘯吟以為西王母折其頭上之勝為時無法度焉此鳥有織絍之象故月令降于桑則具曲植籧筐於時常在東桑言桑木潤與桑木除蟲為木之長故稱降云按鳥之出谷者稱遷唯此言降淮南子燕至亦言燕降孰知其自上而下蓋燕者求子之候戴鵀者躬桑之候婦人之於禮或恐其慢故因是鳥之來神而明之此物既春來故在陽鳥之例魏張臶時嘗有鵀巢其門隂臶告門人以為戴鵀陽鳥而巢門隂為不祥許叔重解淮南乃引詩鳲鳩在桑者解之孫炎亦云鳲鳩自闗而東謂之戴鵀且詩興一時之事則鳲鳩適在桑耳何可遂以為戴鵀耶此說之不稽者也時訓云戴勝不降于桑政教不中音釋鷞音爽鴘匹免切鷹鷂二年色骹口交切脛骨近足細處隼鵧鷑上符悲切下音及通志略云玉篇廣韻無鷑字惟有䲯字音及鵧步丁反鳺方扶反鴀方浮反鷚爾雅鷚一名天鸙亡侯切江東名曰天鷚音同綢繆之繆鳻鶞上音汾下勑倫切鵰幟音熾列子黃帝與炎帝戰于阪泉之野驅鵰鶡鷹鳶為旗幟此以力使禽獸者也拚與飜同注鷻音團鶡音曷蕤音綏賁音奔緄音衮帶也梟傴威遇反伏去聲貙敕俱反鵩硩音掣韻書音剔蔟通作簇以方版也縣音𤣥夭音妖鴞于驕反覆芳服反猶毁也陬側留反又子侯反爾雅正月為陬荼音徒十二月為荼鴆除禁反暈日淮南作暉日注鴆鳥也晏日無雲也天將晏静暉日先鳴蝮芳六切埤雅云衆蛇中蝮獨胎産生輙裂母腹娀音嵩佚音逸有娀國名佚美也謂帝嚳之妃契母簡狄也好如字雄鳩雄一作雄羽弓反黃云呼故反然則􅟾字歟佻吐雕反又吐了反又音眺詒異眉反要古腰字鷣音淫鷂也爾雅一名負雀江東呼為鷣善捉雀服翼蝙布田反蝠甫服反蟙之力反䘃亡北反殷殷上聲蟁母蟁蚊音義同鷏音田烏􅖂水鳥也似鶂而短脛腹翅紫白背上緑色音剥茹音如藘音閭舊也可以染綘䗓千公切蜻蛉蠆丑介切螫虫孑孒上音結又音吉下音厥或作蛣蟩字異而音義同俗名釘倒蟲兔齧注兔所齧草靈在其心中化為螚一說蟲名螚乃多奴來二反鼈屬戴鵀上音帶本亦作載下女今反翬音揮雉五色備翟音狄山雉也瑇瑁音代妹擿直炙反梯几注梯憑也黃神注黃帝之神傷道之衰故嘯吟而長嘆也絍女金反植直吏反槌也蘧居吕反方曰筐圓曰筥張臶音荐爾雅翼卷十六
