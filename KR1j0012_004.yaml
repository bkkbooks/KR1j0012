body:
  text: 欽定四庫全書爾雅翼卷四宋羅願撰釋草藍葴巵茈草茹藘艾薺蕨薇葵蔞蘩蒿蔚蕭藍藍者染青之草荀子曰青出於藍而青於藍言染反勝於其質菘藍其汁抨為澱堪染青蓼藍苗似蓼而味不辛不堪為澱雅作碧色爾崔實曰榆莢落時可種藍五月可刈藍故小雅曰終朝采藍不盈一襜五日為期六日不詹襜衣蔽膝也箋云期至五月而歸今六月猶不至五月者正藍之候月令仲夏之月乃云令民毋刈藍以染注云此月藍始可別引夏小正曰五月啓灌藍蓼灌謂叢生也種藍之體初必叢生藍兒長大始可分移使之稀散以言正養藍之時非刈藍之候也夫民之於利甚勤其於物也封植養長者惟恐不至茍藍於勢未可刈當分移之候豈不知養之以待其成何待上之人屑屑出令而止之乎茍如是則蓼菜之行菜茹之畦在上者不勝禁矣夫藍之禁刈必於民有私利而於隂陽或國事有不便者故禁而止之蓋自四月微隂始起為政者繼長增高毋有壞墮此月又隂陽爭死生分之月君子戒靜以待晏隂之所成則微隂未成也蓋刈藍以損生氣恐微隂不勝故也又是月班馬政遊牝別羣縶駒之月馬之為性畏新出之灰駒遇者輒死石礦之灰亦能令馬落駒刈藍以染也燒灰也暴布也三者皆有出灰之氣令而禁之者蓋為馬歟秦法棄灰於道者棄市棄灰或古法但刑重耳刈藍之禁與馬質禁原蠶同意不然蠶之再養藍之早刈聖人何留意哉藍於草中獨有禁故字從監漢楊震伯起常種藍自業又趙岐邠卿道經陳留此境人皆以種藍染紺為業藍田彌望黍稷不殖慨其遺本遂作賦一章葴藍數種總謂之藍其大葉者別名馬藍釋草云葴馬藍郭氏曰今大葉冬藍也疏云今為澱者是也凡物大於其類者多以馬名之今人言亦然蓋諸藍之類菘藍惟堪染青蓼藍不堪為澱雅作碧色故以馬藍為作澱之藍崔實曰榆莢落時可種藍五月可刈藍六月可種冬藍冬藍大藍也八月用染子虛賦曰其高燥則生葴菥苞荔薜莎青薠葴馬藍也菥似燕麥苞藨也荔馬荔薜藾蒿莎鎬侯青薠似莎而大凡此皆非佳草於用亦希何足以侈雲夢蓋古之君子觀地之所産以知其土之美惡今髙燥埤濕衆物居之則地之美富可知故自馬藍以下皆載之也本草唐本注云藍圓徑二寸許厚三四分出嶺南云療毒腫太常名此草為木藍子巵巵可染黃其華實皆可觀花白而甚香五月間極繁茂凡草木之花大抵不過五出唯巵六出大者至七出其實黃赤亦以七稜者為良即七出花所成就也經霜取之以染故染字從木字學家以為木者巵茜之流也一名木丹一名越桃上林賦謂之鮮支欲其顏色鮮明也漢世千畝巵茜此其人與千户侯等巵茜千石亦比千乘之家晉令諸宫有秩巵子守護者置吏一人或云此即西域之薝蔔花或曰薝蔔者金色花小而香西方甚多非巵也茈草釋草云藐茈草郭氏曰可以染紫一名茈䓞説文亦曰茈藐紫草蓋茈即紫也以其可染紫故名茈上林賦有茈薑司馬彪亦云紫色之薑則茈之與紫古字通爾列仙之傳商客能致紫草賣與染家本草説云其利勝藍按種藍一畝已敵榖田一頃矣而此復勝焉有以見後世末作之盛夫紫間色奪朱者也韓子曰齊桓公好服紫一國盡服紫五素不得一紫公患之用管仲言謂左右曰吾惡紫臭三日境內莫有衣紫蘇代遺燕王書曰齊紫敗素也而賈十倍然則由春秋戰國以來重之矣漢相國丞相皆秦官金印紫綬髙帝相國緑綬徐廣曰金印緑綟綬草名也以染似緑又云似紫紫綬名緺綬音瓜其色青紫綟與盩同公加殊禮特服之何承天云緺音媧青紫色綬綟紫色也字説曰綟紫也綟以䓞染故系在左紫或染或不故系在下綟人染也其為此也有戾焉或不則無戾也此而已䓞可染紫謂之茈䓞則茈言本紫䓞言所染所染戾彼而此者也茹藘茹藘染絳之草葉似棗葉頭尖下濶莖葉俱澀四五葉對生節間蔓延草木上根紫赤色今所在有八月採根説文曰人血所生故一名地血今茹藘能治血又所染亦赤蓋其類爾古者士爵辨服辨色赤而微黑如爵頭裏亦纁色士冠禮曰爵辨服纁裳純衣緇韎帶韐韎韐縕韍也士縕韍幽衡合韋為之染以茅搜因名焉説文曰茅搜染韋一入為韎詩曰韎韐有奭左傳韎韋之跗注是也其女子之染則毛氏云茹藘茅搜之染女服也鄭箋云茅搜染巾也則縞衣茹藘為婦人服矣國風曰東門之墠茹藘在阪其室則邇其人甚逺東門之栗有踐家室豈不爾思子不我即蓋茹藘女所以染也今方在阪栗者女所以為贄也今方在門則衣服贄見之物未備也時方喪亂則不待禮而相奔矣齊人謂之蒨蒨或作茜漢書千畝巵茜是也今人染蒨者乃假蘇方木非古所用艾庶草治病各有所宜惟艾可用灸百疾故名醫草歲或多病則艾生之亦天預備以救人爾荆楚之俗五月五日未雞鳴采之或曰見似人者攬而取之用灸有驗采葛懼讒之詩曰彼采葛兮一日不見如三月兮蓋葛才春莫則已可刈只三月而成此采葛者所以一日不見如三月也彼采蕭兮一日不見如三秋兮釋草蕭荻其字從秋生於春待秋三月而成此采蕭者所以如三秋也彼采艾兮一日不見如三歲兮艾以久蓄為善孟子所謂七年之病求三年之艾艾之久蓄者至三年此采艾者所以如三歲也雖然此小臣之事所謂泄栁申詳無人乎繆公之側則不能安其身者爾蕭與艾本皆香草古者天子摰鬯諸侯蕙大夫蘭士蕭庶人艾至離騷則薄之曰户服艾以盈要兮謂幽蘭其不可佩又曰何昔日之芳草兮今直為此蕭艾也蕭艾雖非惡物然要之庶人所服比之蘭蕙芳草君子所服則有間矣老人五十曰艾言其厯年之久然孟子稱人知好色則慕少艾少女亦稱艾者蓋艾者外也春秋外傳曰國君好艾大夫殆好內適子殆社稷危韋昭亦以艾為外彼好外者謂嬖臣此少艾蓋是少年外舍之婦及其有妻子則慕妻子矣妻子為內則知少艾者外也豫併及之庶氏除蠱以嘉草攻之薺薺之為菜最甘故稱其甘如薺亦應隂之物淮南以為金勝木禾木也春木王而生秋金王而死水勝火菽火也夏火王而生冬水王而死火勝金麥金也秋金王而生夏火王而死土勝水薺水也冬水王而生仲夏土王而死又其枝葉細靡通謂之靡月令孟夏之月靡草死麥秋至斷薄刑決小罪出輕繫鄭氏稱舊説云靡草薺亭歷之屬祭統曰草艾則墨謂立秋後也刑無輕於墨者今以純陽之月斷刑決罪與毋有壞墮自相違似非按經以此月物有死者故斷薄刑而鄭氏以萬物尚生故以為不宜斷然按斷薄刑決小罪出輕繫薄刑用鞭朴非墨劓之類蓋憫萬物始有死者不忍久人以狴犴故可決者決之可出者出之乃是明謹用刑而不留獄非與壞墮相違也薺既亭厯其死同時其生亦早而所主不同蓋師曠之占以薺為甘草亭厯為苦草水藻為惡草蒺藜為旱草艾為病草歲將豐或苦惡旱疫則輒有一草應而先生之唯土以稼穡作甘而薺又草之甘者故以為歲豐之候蕨蕨生如小兒拳紫色而肥詩及爾雅説文皆云蕨鱉也郭氏曰江西謂之虌草木疏云周秦曰蕨齊魯曰虌俗云其初生似虌腳因以名焉召南陟彼南山先蕨而後薇蕨薇蓋賤者所食爾今野人今歲焚山則來歲蕨菜繁生其舊生蕨之處蕨葉老硬敷披人志之謂之蕨基廣雅云蕨紫萁物性云非也基豈萁之轉耶厥其二字古皆以為助語互用或當同名以物但加草以為志爾今道路負荷轉移者皆不肯食云令人腳弱蓋見其形似拘攣之狀亦或其性自當爾未可知也名之從蕨蓋謂蹶矣薇猶禮家用之蕨不復用當知其賤薇薇垂水言生於水邊而召南之詩陟南山以采之故陸璣云山菜也莖葉皆似小豆蔓生其味亦如小豆藿可作羮亦可生食今官園種之以共宗廟祭祀又詩稱山有蕨薇而伯夷采薇於首陽山其歌曰登彼西山兮采其薇矣其後説者以為普天之下莫非王土食其土之所自出即為之臣於是不食而死文王之時歌采薇之詩以遣戍役一章薇亦作止二章柔止三章剛止作生也柔謂脆脕之時剛謂小堅忍時遣戍而有三時故先儒以為所遣有先中後輩首章則二月中旬遣之次章則三月上旬遣之三章則三月中旬遣之其到有先後各能獲捷故曰一月三捷也菜茹以柔時為美詩所謂柔則茹之剛則吐之亦以菜為喻也薇亦剛止不足食矣薇既戍役之所采故王文公曰薇微者所食也葵葵為百菜之主味尤甘滑魯漆室之女葵為馬踐知憂及國公儀休相魯食於舍而茹葵慍而拔之不欲奪園夫之利葵有赤莖白莖復有大小之異又有鴨腳葵葵子雖經歲不浥微炒令熚炸散著濕地遍踏之朝種暮生逺不過宿早種者十月末地將凍散子勞之正月末亦可五月初更種之以春者既老秋菜未生種此相接六月一日種白莖秋葵白莖者宜乾九月作葵菹乾葵蓋葵一歲凡得三輩士虞禮夏秋用生葵冬春用乾荁皆滑物道家之法十日一食葵菜所以調和五臟古者葵稱露葵又終葵一名繁露今摘葵必待露解語曰觸露不搯葵日中不翦韭各有宜也又葵性向日孔子以比鮑莊子智不如葵葵猶能衛其足曺植曰若葵藿之傾葉太陽雖不為回光然向之者誠也淮南曰聖人之於道猶葵之與日也雖不能以終始哉其鄉之誠也夫天有十日葵與之終始故葵從癸説文云揆葵也即所謂揆之以日者蔞蔞蔞蒿也説文曰蔞可以烹魚其葉似艾白色長數寸髙丈餘好生水邊及澤中正月根牙生旁莖正白生食之香而脆美又可蒸為茹江東用羮魚漢廣之詩曰翹翹錯薪言刈其蔞夫翹翹錯薪不敢斥采也言刈其蔞而已之子于歸不敢斥求也言秣其駒而已刈楚猶薪之薇者也蔞則菜耳此言無思犯禮之甚也古者芻蕘之過取以喻非禮春秋左氏傳曰羊舌鮒求貨於衛淫芻蕘者蓋芻蕘各有疆禁多取則為淫故以喻男女之非禮今錯薪猶不思冒取焉則無思犯禮可知矣蔞今古以為珍菜大招曰吳酸蒿蔞不沾薄只王逸曰蒿蘩草也蔞香草也蒿一作芼芼菜也言吳人善為羮其菜若蔞味無沾薄言其調也又曰沾多汁也薄無味也言吳人工調鹹酸爚蒿蔞以為虀其味不醲不薄適其美也蓋蔞多生於吳郭氏亦云江東用羮魚則吳人尤能調和之如後世千里蓴羮未下鹽豉之比淮南子曰煎熬焚炙調齊和之適以窮荆吳甘酸之變此遁於火也此之謂也蘩釋草曰蘩之醜秋為蒿此大略之言也又曰蘩皤蒿此指一物之言也故豫以水草之蘩為莪而皤蒿則此別説之皤蒿蓋今之白蒿也比青蒿而粗從初生至枯白於衆蒿春始生及秋香美可生食又可蒸以為菹甚益人故詩箋云以豆薦蘩菹然非水物故非召南所謂也春初此蒿前諸草生云可以生蠶蓋所以繁育庶物此物非唯生蠶又白兔食之而仙又駏驉亦食菴䕡子而仙駏驉馬類兔食繁駏驉食菴䕡物各有所宜本草又稱茵蔯蒿白兔食之仙蓋茵蔯似青蒿而背白故説者誤以白蒿説之其苗細經冬不死更因陳根而生故名茵蔯凡蘩之醜艾可灸蓍可占蕭可燎蔞莪蒿蘩通可茹啖説者別而論之蒿蒿今之青蒿荆豫之間汝南汝隂皆云菣今人呼青蒿香中炙啖者為菣人亦取雜香菜食之鹿鳴所食三物一曰蘋今藾蒿始生香可食二曰蒿蒿甚香三曰芩芩亦香草蓋草木之臭味相同有同類食之之義莊子稱今之君子蒿目而憂世之患今蒿細弱而隂潤最易棲塵故以比蒿目言世之君子眯眼塵中而憂世也蒿乃佳蔬而古者言蒿以為非美物者蓋蘩之醜秋為蒿涼秋九月枝幹益髙荒壇枉徑蕪穢不治故蒿者農惡之明堂月令違天時則藜莠蓬蒿並興管仲戒桓公封禪亦稱今鳳凰麒麟不至嘉禾不生而蓬蒿藜莠茂鴟梟羣翔而欲封禪無乃不可乎桓公為是而止然則蒿者蓋非農祥也博物志曰周時德澤盛蒿大以為宫柱名曰蒿宫蔚蒿菣郭氏曰今人呼青蒿香中灸啖者為菣又曰蔚牡菣郭曰無子者蓋牡菣三月始生七月華華似胡麻華而紫赤八月為角角似小豆鋭而長言無子者蓋今青蒿葉端皆作子如米大蔚獨無爾蓼莪之詩曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞又曰蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁蒿生子以喻母牡蒿以喻父凡人之情念其父母則因物而感今夫作詩之人望見莪之蓼蓼然而采之迫而察之則蒿也蒿有母道焉復見若莪者而采之迫而察之則蔚也蔚有父道焉興於物雖各不同然念父則及母念母則及父故皆曰哀哀父母也一説曰匪莪伊蒿蒿猶有子者匪莪伊蔚蔚則無子以見父母得我之難也今皆無報矣則有我之不如無也且蔚又治無子亦寓其意焉本草謂之馬先蒿蕭蕭今人所謂荻蕭者是也或曰牛尾蒿似白蒿白葉莖粗科生多者數十可作燭有香氣故祭祀以脂爇之為香生民詩云取蕭祭脂后稷之祭也蓋宗廟之祭薦熟之時堂上事尸竟延入户內更從熟始於薦熟時祝先酌奠於鉶羮之南訖尸未入乃取蕭染以牲腸間脂合黍稷燒之於宫中后稷之祀乃郊雖非宗廟然將郊為軷道之祭其用亦同爇之於行神之位故曰取羝以軷祭脂者即此羝之脂也蓋自后稷之時已如此故周宗廟用之昔有虞氏尚氣血腥爓祭用氣商人尚聲以聲音之號詔告天地之間周人尚臭以鬱合鬯灌以圭璋而使臭隂達於淵泉既奠然後焫蕭合黍稷羶薌爇之而使臭陽達於牆屋臭隂以水而報魄臭陽以火而報氣古人以神之道微不可搏執故求萬物之理以為同聲相應同氣相求水流濕火就燥故用百物之英華庶幾麗而留之此蕭之氣繞於牆屋則牆內乃爇蕭之地故孔子曰吾恐季孫之憂不在顓臾而在蕭牆之內也其蕭蓋甸師所供周禮甸師祭祀共蕭茅先鄭以為蕭或用莤但作縮茅解之杜子春始讀為蕭詩歲聿云莫采蕭管子葉草名下於􅡿即鬱也􅡿下於莧莧下於蒲蒲下於葦葦下於雚雚下於蔞蔞下於荓荓下於蕭蕭下於薜薜下於萑萑下於茅音釋藍抨普耕反澱音殿襜蚩占反別筆別切壞音怪墮許規切別羣注彼列切孕妊之欲上也縶注如字為其牡氣有餘相蹄齧也礦音穬暴步卜反馬質質平也主買馬平其賈葴之林切菥斯厯反苞音包荔音𨽻薜蒲計切子虛賦作薜鎬文選注作薃胡皓切藨皮表切薠音煩埤音婢卑下也巵薝音膽俗音占誤蔔鼻墨切茈草茈與紫通䓞音戾藐亡角反盩通作戾茹藘上音如下力居反純衣純與緇同靺音昧茅搜所染色也鞈音閣韠也縕音溫赤黃間色韍音弗韠也以韋為之禮記玉藻韠之言蔽韍之言亦蔽詩采菽注疏古者佃漁因衣其皮先知蔽前後知蔽後後王易之以布帛不忘本也幽衡上初糾切黑也衡謂佩玉之衡跗注上方俱切左傳注跗注戎服若袴而屬於跗與袴運墠音善阪音反艾萩音秋要音腰注庶音煮掌以藥煮去病薺王去聲草艾下音乂壞音怪墮許規反狴音陛獸名犴音岸北地野狗謂獄為犴者犬所以守也蕨攣閭員反蹶音厥與蹶同僵也薇脆音翠小耎物易斷也脕音問又音萬肥澤也佩觽音晚葵浥音邑漬也潤也又業切熚音畢炸音吒荁音丸似堇而葉大也勞之上即到反齊民要術注古曰擾今曰勞要術又曰犁欲廉勞欲再搯音恰㧓也蔞龍珠切沾音添齊和並去聲蘩皤音婆菹音疽酢菜駏驉音巨虛菴閭子虛賦注蒿也子可醫疾菴音淹蒿菣丘刃反藾力蓋反芩其今切莖如叉股葉如竹蔓生眯説文草入目中也莊子簸粳眯目音米治平聲蔚於貴切菣去刃切蕭鉶音刑三足兩耳有蓋和羮之器羝都禮反牡羊軷蒲末切祭行道之神也爓徐廉切説文湯中瀹肉也號平聲禮記疏用樂之音聲號呼告於天地之間庶神明聞之而來是先求陽之義莤通作縮莧狹澗反又刑甸反雚音貫爾雅釋雚一名芄蘭蔞龍珠切荓薄丁切馬帚也薜蒲計切萑胡官切説文薍也易為萑葦俗作雚非薍五患切陸璣云薍或謂之荻至秋堅成謂之萑爾雅翼卷四
