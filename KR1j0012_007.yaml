body:
  text: 欽定四庫全書爾雅翼卷七宋羅願撰釋草蘦苄菋參薚蓍茨烏喙門冬顚棘蘘荷活茺蓼蘇荏芥蘦蘦大苦今之甘草味甘而無毒能安和七十二種石千二百種草考故於人譬之國老不入君臣佐使之列雖非君而為君所宗以其能燮和故也詩稱山有榛隰有蘦以况西方之美人又采蘦首陽之顚以刺獻公之信讒蓋一章采蘦二章采苦三章采葑蘦甘而苦若讒者之入人必先甘而後苦而葑則甘苦相半所謂采葑采菲毋以下體下體惡而上體美者也則讒人之所以嘗試其君者無所不用矣此草蔓生葉似荷青黃莖赤有節節有枝相當然不惟葉似荷古之蓮字亦通於蘦故龜䇿列傳稱龜千嵗乃遊蓮葉之上徐廣曰蓮一作苓聲相近借字也將以龜老而神故形小而陸游以為奇若水中之蓮凡龜皆可游不足言矣又詩采苓以首陽之顚叶之豈蘦亦有蓮音耶然蘦甘而名大苦者猶牽牛有三黑㸃而名為三白㸃此蓋秦俗所㳂見禮記或素或青注芐芐者今之地黃古以為菜鉶羮用之禮記曰鈃毛牛藿羊芐豕薇考蓋物各有所宜古者祭祀賔客有大羮鉶羮大羮者太古之羮鑊中煮肉汁不調以鹽菜及五味盛之於登鉶羮者謂陪鼎膷臐膮用藿芐薇調以五味盛於鉶器蓋鉶羮以所盛器為名盛於豆則名庶羞爾皆天官亨人供之三牲所以用此者猶婦教成之祭牲用魚芼之以蘋藻各有所宜亦牛羊山陸之物藿芐山陸之菜豕近水薇垂水魚及蘋藻生水中以類求之今禮記羊芐作苦則苦菜爾考古之說方者一生咸陽川澤中黃土地者佳則名之為地黃蓋有所自又生者以水試之浮者名天黃半沈半浮名人黃沈者名地黃以沈者為良宜其以地為名而芐字又從下亦趨下之義也淮南子曰今夫地黃主屬骨而甘草主生肉之藥也以其屬骨責其生肉以其生肉論其屬骨是猶王孫綽之欲倍偏枯之藥而欲以生殊死之人亦可謂失論矣今地黃能生肌肉與淮南說異又方藥煎忌鐵器鉶羮用之未知其審菋菋荎藸郭氏以為五味今五味子是也皮肉甘酸核中辛苦都有鹹味味既具矣故其字從味且能兼養五藏也典術曰五味者五行之精仙人羡門子服之而本草直云味酸者木以酸為主又所出不同亦各偏勝如出高麗者多肉而酸甘出青冀者過酸出建平者味苦不害其兼有五味也其莖赤斑花黃白生青熟紫亦具有五色聖賢冢墓記曰孔子墓上有五味木參春秋運斗樞曰搖光星散為人參廢江淮川瀆之利則搖光不明人參不生禮斗威儀曰君乘木而王有人參生說文云人參出上黨參即參也所以名為人參者本草云如人形者有神范蠡計然亦曰狀類人者善說者曰出新羅國所貢有手腳狀如人形長尺餘或云生邯鄲者根有頭足手面目如人或曰生上黨者人形皆具能作兒啼說益侈則益誕大率生深山中近椵漆下濕潤處椵似桐而多蔭故人參生其下高麗人作人參讚曰三丫五葉背陽向陰欲來求我椵木相尋欲試上黨人參者當使二人同走一與人參含之度走三五里許其不含者必大喘含者氣息自如潛夫論曰治疾當得真人參反得蘿蔔梁阮孝緒母疾須得生人參舊傳鍾山所出孝緒躬歷幽險見鹿前引就鹿滅處視之得此草傅子曰先王之制九州異賦天不生地不養君子不以為禮若河內諸縣去北山絶逺而各調出御上黨真人參上者十斤下者五十斤所調非所生民以為患其潞州太行山所出者謂之紫團參薚蓫薚馬尾郭璞曰廣雅云馬尾蔏陸本草别名薚今關西亦呼為薚江東呼為當陸生人家園圃中高三四尺葉青如牛舌而長莖青赤至柔脆夏秋開紅紫花作朵根如蘆蔔而長如人形者有神案人參亦言如人形者有神而采艾見若似人處攬而取之用灸有驗物理乃不可勝窮易曰莧陛夬夬莧與陸皆陰類也或曰此一物即名莧陸今俗名章柳根又一名夜呼莫知其義據荆楚嵗時記三月三日杜䳌初鳴田家候之此鳥鳴晝夜口赤上天乞恩至章陸子熟乃止然則章陸子未熟以前為杜鵑鳴之候故稱夜呼蓍聖人幽贊於神明而生蓍蓍草也初不待聖人而生蓋通天之道窮物之理備物致用以為天下利故能擇物之神者用之夏商欲卜者乃取蓍龜已則棄去之以為龜藏則不靈蓍久則不神至周室之卜官常寶藏蓍龜天子蓍長九尺諸侯七尺大夫五尺士三尺蓍陽故數奇其藏蓍之器曰韇韇有二以皮為之其一從上而下韜之其一從下而上韜之少牢禮曰史西面于門西抽下韞左執筮右兼執革以擊筮將問吉凶故擊之以動其神蓍雖寶藏猶有時以易故筮人上春相筮先儒以為相謂更選擇之龜筮嵗易者歟蓋龜人以春攻龜筮人春相之故知以新易故古者國之大事先筮而後卜然魯生季友晉戰城濮皆先卜而後筮者蓋太史公所謂三代蓍龜大小先後各有所尚要其歸等耳是也春秋傳稱筮短龜長不如從長莫能得其說案龜䇿傳江南長老云龜千嵗乃遊蓮葉之上蓍百莖共一根其所生獸無虎狼草無毒螫說者曰蓍百年則百莖矣蓋龜歷年深故知來亦長蓍歷年近故知來亦短亦龜象筮數物生而後有象象而後有滋滋而後有數則龜在先筮在後短長之驗也龜筮皆靈物用既相須故生亦相附龜䇿傳又曰上有叢蓍下有神龜蓍生滿百莖者其下必有神龜守之其上常有青雲覆之固靈氣相召亦天地鬼神所保守然則其龜即周禮十龜中所謂筮龜者也龜為卜蓍為筮龜而謂之筮以其生於蓍叢也蓍之為字從耆耆者六十嵗也王充論衡孔子曰蓍之為言耆也老人歷年多而更事久似能前知然何獨六十龜䇿傳曰天下和平王道得而蓍莖長丈其叢生滿百莖方今世取蓍者不能中古法度不能得滿百莖長丈者取八十莖已上長八尺即難得也人民好用卦者取滿六十莖以上長滿六尺者即可用矣然則自其可用者而言之廣為六十莖從為六十寸故應耆爾論衡曰蓍七十嵗生一莖七百嵗生十莖漢藝文志有蓍書二十八卷蓍實服之亦聰慧先知茨茨蒺藜也布地蔓生細葉子有三角狀如菱而小刺人生道上長安最饒人行多著木屐故易以據于蒺藜言所恃傷也七諫曰江離棄於窮巷兮蒺藜蔓乎東廂東廂者宫室所嚴禮樂所在觀其所生以知治忽故瑞應圖云王者任用賢良則梧桐生於東廂今蒺藜生之以見所任之非人趙簡子曰夫植桃李者夏得其休息秋得其食焉植蒺藜者夏不得休息秋得其刺焉以言陽虎所植之非其人則與七諫義同也詩牆有茨言衛公子頑國人疾之而不可道蓋茨雖可惡依牆以生欲掃去之則恐傷牆以喻公子頑雖可疾欲道之則恐傷國體叔孫怒季孫指楹而言曰雖惡是其可去乎亦此義也正義引媒氏云凡男女陰訟聽之于勝國之社勝國亡國也亡國之社掩其上而棧其下使無所通故就之以聽陰訟明不當宣露則其社之牆亦有茨不可知爾今軍旅亦以鐵作茨以布敵路謂之鐵蒺藜或云鐵蒺藜菱角等起於隋煬帝征遼為之然六韜中已有此物考朝錯傳謂之渠答諸葛亮卒於五丈原魏人追之長史楊儀多布鐵蒺藜則其來已久烏喙烏喙今之烏頭也釋草云芨堇草郭璞云即烏頭今江東呼為堇晉驪姬譖申生置鴆於酒置堇於肉者是也非堇荁之堇說文云萴烏頭也今烏頭與附子同根春時莖初生有腦形似烏鳥之頭故謂之烏頭或曰有兩岐相合者名烏喙要之烏喙即烏頭之異名耳本草冬月採為附子春月採為烏頭博物志亦曰物有同類而異用者烏頭天雄附子一物春夏秋冬採之各異謝靈運山居賦曰三建異形而同出而說者又以烏頭烏喙附子側子輩色理形狀亦各不同而長三寸已上為天雄蓋種烏頭而不生附子側子之類經年獨長大者是也蜀人種之忌生此以為不利如養蠶而為白殭之類也廣雅則曰一嵗為萴子二嵗為烏喙三嵗為附子四嵗為烏頭五嵗為天雄蘇秦曰人之饑所以不食烏喙者以其雖偷充腹而與死同患也後魏書曰胸奴秋收烏頭為毒藥以射禽獸淮南子曰天下之物莫凶於雞毒然而良醫槖而藏之有所用也奚毒即附子漢霍顯使醫搗附子入與許后后曰我頭岑岑也藥中得無有毒是其事門冬蘠蘼虋冬郭璞曰今門冬也一名滿冬按虋冬有二其一則天門冬一名顚棘釋草所謂髦顚棘也故郭璞注顚棘云細葉有刺蔓生其一則麥門冬生山谷肥地葉如韭四季不凋根有鬚作連珠形似穬麥顆故名麥門冬四月開花淡紅如紅蓼花實圓碧如珠秦名羊韭齊名愛韭楚名馬韭越名羊蓍謝靈運山居賦曰二冬並稱而殊性潛夫論曰夫理世不得真賢譬猶治疾不得真藥也治疾當得麥門冬反得蒸穬麥已不識真合而飲之疾以寖劇而不知為人所欺也山海經曰條谷之山其草多芍藥虋冬顚蕀髦顚蕀釋曰一名商棘廣雅云女木也考郭云細葉有棘蔓生按本草天門冬一名顚勒道家方云天門冬一名顚棘在東嶽名淫羊藿在中嶽名天門冬在西嶽名菅松在北嶽名無不愈在南嶽名百部在京陸山阜名顚勒雖處處皆有其名各異其實一也張華博物志云莖間有刺而葉滑者名曰郤休一名顚棘根以浣縑素白越人名為浣草似天門冬而非也凡服此先試浣衣如法者便非天門冬按此說則顚棘刺而滑可浣衣與天門冬異而圖經曰天門冬春生藤蔓大如叉股高至丈餘葉如茴香極尖細而踈滑有逆刺亦有澀而無刺者其葉如絲杉而細散皆名天門冬是滑而有刺者亦門冬也蓋兩者皆門冬而有刺者别名顚棘耳棘即刺也列仙傳赤松子食天門冬齒落更生細髮復出甘始服之在人間三百餘年杜紫微服之御妾多子日行三百里蘘荷蘘荷宜在林木陰下種之故古人云蘘荷依陰時藿向陽言各有所宜也葉似初生甘蔗根似薑牙其葉冬枯其根為菹亦可醬中藏古之為味者雜用膾炙切蘘荷以為香是為珍味大招曰醢豚苦狗膾苴蒪只苴蒪即蘘荷也蘘荷有白有赤神農經書白蘘荷今人乃呼赤者為蘘荷白者為覆葅說文曰葍蒩葉同一種爾於人食之赤者為勝藥用白者中蠱者服其汁並卧其葉即呼蠱主姓名亦主諸溪毒沙蝨輩人家種之辟蛇又有預知子傳云取二枚綴衣領上遇蠱毒物則聞其有聲當便知之故名預知子若行蠱毒之鄉食飲不可知非仗此何以愛身栁子厚種白蘘荷詩庶氏有嘉草攻禬事久泯炎帝垂靈編言此殊足珍活莌離南活莌今通脫木也山海經名寇脫考生山側高丈許葉如萆麻花上有粉莖中有瓤輕白可愛女工取以飾物按此物為飾不知起自何世漢王符潛夫論固已譏花采之費至梁宗凛記荆楚之俗四月八日有染絹為芙蓉捻蠟為菱藕亦未有用此物者今通行於世矣亦用蜜藏食之今俗謂之通草按通草作藤蔓大如指其莖稈大者徑三寸每節有二三枝枝頭出五葉夏秋開紫花或白花白花結實如小木瓜核白瓤黑食之甘美南人謂之燕􅦣亦云烏􅦣非此類也蓼薔虞蓼郭氏云即蓼之生水澤者也蓼類甚多有紫蓼赤蓼青蓼馬蓼水蓼香蓼木蓼等紫赤二蓼葉小狹而厚青香二蓼葉相似馬水二蓼葉俱濶大上有黑㸃諸蓼花皆紅白子赤黑木蓼一名天蓼蔓生葉如柘花黃白子皮青滑其最大者名蘢已見别章中蓼者妨稼之草故詩曰以薅荼蓼荼蓼朽止黍稷茂止然於調和有用故內則云膾秋用蓼鶉羮雞羮鴽釀之蓼釀謂切雜之也漢尹都尉書有種芥葵蓼韭葱諸篇而長沙定王故宫有蓼園周頌曰未堪家多難豫又集于蓼蓼辛物故以為多難之喻越王苦思報吳卧則以蓼楚辭曰蓼蟲不知徙乎葵菜言蓼辛葵甘蟲各安其故不知遷也而魏文子曰蓼蟲在蓼則生在芥則死非蓼仁而芥賊也本不可失南都賦蓼蕺蘘荷蘇蘇桂荏郭氏曰蘇荏類故名桂荏說者曰以其味辛而形類荏故名之葉下紫色而氣甚香今俗呼為紫蘇煮飲尤勝取子研汁煮粥良長服令人肥白身香亦可生食與魚肉作羮沙州記曰乞佛虜不識五榖唯食蘇子南都賦曰蘇蔱紫薑拂徹羶腥今蘇有數種皆是荏類白蘇方莖圓葉不紫亦甚香實亦入藥魚蘇似茵蔯大葉而香吳人以煮魚者一名魚􅫟其生山石間者名山魚蘇又有水蘇一名雞蘇或言雞蘇水蘇是兩種又有假蘇者亦以香氣似蘇故名蘇說者云假蘇即荆芥或曰假蘇葉鋭而圓非荆芥也荏荏陶隱居云荏狀似蘇而高大白色不甚香其子研之雜米作糜甚肥美下氣補益江東人呼為䔡以其似蘇字但除禾邉也笮其子作油煎之即今油帛及和漆所用者服食斷榖亦用之名為重油蓋江東以荏子為油北土以大麻為油又其言名為䔡似是蘇中魚蘇耳蕭炳云有大荏形似野荏高大葉大於小荏一倍不堪食人收其子以充油絹帛其小荏子欲熟人採其角食之甚香美蘇荏之屬宜近人種以小鳥好食之禽經曰闕者不上桑櫻活者不下荏言鳥之食含桃者乃不下顧荏耳芥芥似菘而有毛味極辛辣其類甚多似菘者名青芥有紫芥莖葉皆紫作虀食之最美有白芥子粗大色白如梁米舊云從西戎來謂之白胡芥其餘南芥旋芥花芥石芥皆菜茹之美者梁周興嗣次千文云菜重芥薑左傳季郈之雞鬭季氏介其雞謂以芥播其羽大抵南土多芥嶺表録異曰廣州地熱種麥則苗而不實北人將蔓菁子就彼種者出土即變為芥嶺南異物志曰南土芥高者五六尺子如雞卵廣州人以巨芥為鹹菹埋地中有三十年者貴尚親賔以相餉遺音釋蘦來丁切芐音户鈃通作鉶鑊黃郭切膷音香牛臛也臐許云切羊臛也膮許堯切豕臛也菋音未荎藸音遲除參椵音賈薚蓫抽六切詩言采其蓫薚爾雅音他羊切廣韻吐郎切蔏音商蓍韇音牘相去聲螫音釋從音縱烏啄芨音急堇音謹萴音色門冬蘠音牆蘼音美虋音門穬古猛反寖通作浸蘘荷上如章反苴即魚反蒪普各反一匹沃反一作蘘荷一名苴蒪苦以膽和醬也世所謂膽和者也膾音㑹又古外切庶音煮活莌音奪瓤音攘捻奴協反音福蓼薔師力切薅音蒿拔去田草也鴽音如鴿也蘇荏而錦反蔱音殺􅫟外諸切笮音窄壓也芥郈音候魯邑名爾雅翼卷七
