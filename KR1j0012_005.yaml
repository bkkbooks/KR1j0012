body:
  text: 欽定四庫全書爾雅翼卷五宋羅願撰釋草韭葱䪥蒮茖葝葫蒚􅭹莪萍藻荇茒芹韭韭說文云一種而久者故謂之韭象形在一之上一地也諺亦曰韭者懶人菜以其不須嵗種也又利病人可久食大抵高三寸即翦初種之嵗止一翦之一嵗之中不過五翦矣首春色黃未出土時最美故云春初早韭冬末晚菘夏小正曰正月囿有韭豳風四之日獻羔祭韭庶人春亦以薦新詳庶人四時之薦夏及秋冬乃薦麥黍與稻而春乃薦菜茹之物又三時用魚豚鴈為配而韭獨以卵豈春物未成可薦者少故耶而祭祀之牲號亦以稻曰嘉蔬韭曰豐本聯而言之豈古所重歟其見於調和之適則豚春用韭秋用蓼蓋各有宜物久必變故老韭為莧然後秦姚興及後周宣帝大象中葱皆化為韭說者以為戰伐之祥易稽覽圖云政道得則陰物變為陽鄭康成注云若葱變為韭是也葱葱本白而末青青色尤美爾雅曰青謂之葱考古者佩玉有葱珩以玉色如葱色得名馬之青驪稱驄亦取義於葱而望氣者言鬱鬱葱葱言條暢也古作膾春用葱脂亦用葱菹軒辟雞宛脾皆切葱薤實諸醯以柔之物之用葱者多故禮為君子擇葱薤則絶其本末至進食之禮葱㳿處末㳿蒸葱也在豆處醯醬之左言末者殊加也而漢世太官園種冬生葱韭菜茹覆以屋廡晝夜㸐藴火待溫氣乃生召信臣為少府以為此皆不時之物有傷於人不宜以奉供養奏罷之漢孔奮為姑臧長妻子但食葱菜而義熙中太常謝淡坐遣四人還家種葱菜免官人之貪亷不同如此西域有葱嶺河源所自出西河舊事云其山高大上悉生葱故以名焉䪥薤似韭而無實亦不甚葷古禮脂用葱膏用薤脂羊牛麋鹿之屬膏犬豕之屬蓋物各有所宜今薤與牛肉同食令人作㿂瘕是也少儀曰為君子擇葱薤則絶其本末為其本末有萎乾者也麋鹿魚為菹麕為辟雞野豕為軒兔為宛脾切葱若薤實之醯以柔之言此四物其作之狀以醋與葷菜淹之悉皆濡孰殺肉及腥氣蓋雖葷物乃能去腥故古人不棄而用之今人種薤皆以大蒜置硫黃其中久則種别分為薤薤有赤白二種赤者主金瘡及風苦而無味白者補而美又雖有辛不葷五藏養生者服之可以安神養氣夫物英華之美者莫如芝故蓮曰水芝芋曰土芝蜜曰衆口芝薤曰菜芝蓋書之記務光翦薤以入清泠之淵今有薤葉篆傳者以為務光所作潘嶽賦曰䪥負霜蒮蒮者山韭形性與韭相類但根白葉如燈心苗其音羊六切韓詩六月食鬱及蒮謂此物也毛詩蒮作薁以鬱為棣屬薁為櫻薁鄭氏云食鬱薁薁葵菽棗皆以助男功蓋鬱實大如李正赤食之甜五月時孰櫻薁亦是鬱類而小别即薁李是也豳土務農所植皆百榖百蔬有益於民者然七月所述不及一二若果蔬之屬唯瓜足以去時暑棗足以救嵗乏故重而記之鬱薁等果不登於籩不用於贄正爾食之何補饑渴似兒戲爾不若鬱菜及蒮之可以食賤老也然齊韓毛鄭其詩異說故並存著之說文又曰山韭也茖茖山葱釋者引說文云葱生山中者名茖細莖大葉者是也葱有冬葱漢葱胡葱茖葱凡四種冬葱夏衰冬盛莖葉俱軟美山南江左有之漢葱冬枯其莖實硬而味薄胡葱莖葉粗短根若金䔲能已腫茖葱生於山谷不入藥用管子云齊桓公五年北征山戎出冬葱與戎菽布之天下也戎菽胡豆也與冬葱皆得之山戎古者此等通名葷菜西方則以大蒜小蒜興渠慈葱茖葱列為五葷以為熟之則發媱生噉增恚皆有損於性情故絶而不食今北人好生食葷菜雖其天性獷戾亦食性所染致然故梟食桑椹則革暴鳩食之則好淫醍醐發性中藥養性皆其類故為教者因其所甚謹而戒之今道家亦有五葷乃謂韭蒜藝薹胡荽薤也無茖葱等此自隨中國所多者為說故不同焉葝葝與䪥略相似而根長葉差大僅如鹿葱體性亦與薤同釋草云蒮山韭茖山葱葝山䪥蒚山蒜皆謂生山中者别得蒮茖葝蒚之名物類相感志乃稱列仙傳昔有人隱葝山服亢䪥之葉又引孫炎云帝登蒚山遭蕕芋草毒得蒜乃嚙之解毒乃收植之是則以葝蒚為兩山之名出此䪥蒜爾葝蒚既為兩山則蒮茖又為山名古文薜山蘄术山薊獨不可通可知其妄也且古言服䪥者唯商時務光故道家說云務光翦薤以入清泠之淵若云亢䪥則是天地間六氣之名非山中之草也王逸楚辭注言六氣者春食朝霞朝霞日欲出時黃氣也秋食淪陰淪陰者日沒已後赤黃氣也冬食沆瀣沆瀣者北方夜半氣也夏食正陽正陽者南方日中氣也并天𤣥地黃之氣是為六氣又豈䪥之類乎古之仙人往往却食服此六氣中亢䪥因訛為薤既謂之曰薤則不當復稱亢䪥也葝山又當安在乎說文曰䪥菜山中者名藝葫蒜有大小大蒜為葫小蒜為蒜本草所别葫又稱胡蒜陸法言切韻曰張騫使西域得大蒜胡荽則此物漢始有之以自胡中來故名胡蒜爾種宜良軟地三遍熟耕之五寸一株諺曰左右通鋤一萬餘株收條中種者一年為獨瓣種二年者則成大蒜科皆如拳又逾於凡蒜矣今并州無大蒜朝歌取種一嵗之後還成百子蒜其瓣粗細正與條中子同其蔓菁根大如碗口雖種他州子一年亦變然大蒜瓣變小蔓菁根變大二事相反其理難推又八月中方得熟九月子始剛得花子至於五榖蔬果與餘州早晚不殊亦一異也又并州豌豆度井陘以東山東榖子入壺關上黨苗而無實信土地之異也葫性最葷不可食俗人作虀以鱠魚肉久食傷人損目眀嵇叔夜養生論曰薰辛害目謂諸葷菜也此為甚爾說者乃又曰此物煮為羮臑極美葷氣亦微又云初食不利目多食却明久食令人血清似皆好嗜者之辭今北人以大蒜等塗體愛其芳氣又以護寒且生啖之南人所不習效之者無不目腫蒜髮白齊人千金月令蒜多食髮早白蒚釋草蒚山蒜釋曰說文云葷菜也一云菜之美者雲夢之葷菜生山中者名蒚蒿不注其狀今蒜有大蒜小蒜本草蜀本注圖經云小蒜野生小者一名蒚苗葉根子似葫而細數倍然則小蒜即蒚爾小蒜生葉時可煮和食至五月葉枯取根名薍子正爾噉之味甚薰臭食之損人不可長服崔實曰布榖鳴收小蒜六月七月可種小蒜八月可種大蒜蓋皆謂此爾雅則以小蒜為蒜大蒜為葫承俗稱爾孫炎乃云帝登蒚山遭蕕芋草毒將死得蒜乃嚙之解毒乃收植之能殺蟲魚之毒攝諸腥羶則是蒚是山名其上出蒜耳與郭異說也􅭹字書曰􅭹百合蒜也說文則曰􅭹小蒜也小蒜已見蒚說中不與百合蒜類百合蒜近道處有根小者如大蒜大者如碗數十片相纍狀如白蓮花故名百合言百片合成也人亦蒸煮食之味極甘非葷辛類也但以根似大蒜故名蒜爾根上一幹特起葉皆環列幹上至杪則結花花有兩種其一如萱草花紅斑而小故一名連珠其一種白花者極芳香花重常傾側連莖如玉手爐狀亦搗為麵百合一名强瞿今俗人亦呼為强仇聲之訛爾說者云是蚯蚓相纒結變作之南都賦薯蔗薑䪤莪莪蘿蒿也生澤田漸洳之處葉似邪蒿而細科生二月中莖可生食又可蒸香美味頗似蔞蒿詩曰蓼蓼者莪匪莪伊蒿又曰匪莪伊蔚蓋皆蒿類視之不察則不得莪生於水澤詩曰菁菁者莪在彼中阿在彼中沚在彼中陵蓋莪水中所生陵阿亦通有之此雖可食之菜然彼中阿沚陵有在者焉而未采蓋育之而使成也亦地之良者善養物君之仁者善養士故以為能長育人材焉凡莪即古之蘩風有采蘩采蘋其詩曰于以采蘩于沼于沚于以采蘩于澗之中春秋左氏傳曰澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水號之為澗溪沼沚之毛合之以潢汙行潦之水所采者則于沼于沚于澗所列者則有蘋有蕰有藻其為水草明矣說者乃曰蘩皤蒿夫皤蒿陸草不妨亦謂之蘩顧非夫人之所采爾釋草曰蘩之醜秋為蒿以醜言之則其類多矣春時雖各有種名至秋老成皆通呼為蒿今莪謂之莪蒿又謂之蘿蒿又謂之䕲蒿然則可謂蘩之醜矣又莪在中沚即與于沼于沚澗溪沼沚之毛所在符合水草之蘩自當謂此爾釋草曰莪蘿釋蟲又曰蛾羅字異而音皆同謂蠶蛾也莪豈有用於蠶故同其兩名耶古蘩皓蒿以為可以生蠶然則此水草之蘩莪亦當爾耳故曰莪即蘩也萍萍水上小浮萍江東謂之薸韓詩說沈者曰蘋浮者曰薸高誘曰蘋大萍水薸也字並同皆從漂蕩之漂音簞瓢之瓢薸之字似薻說者遂以相紊蓋非其類也季春榖雨之日萍始生號為一夕而七子無根但有小鬚垂水中而已說文曰萍無根浮水而生楚辭曰竊傷乎浮萍兮無根然淮南云萍植根於水木植根於地蓋萍以水為地垂根於中則所垂者乃是根今或反根於上為日所暴即死是與失土同也萬畢術曰老血變之謂聚血之精至黃泉止作此物不為徑就水上變之爾今有紫萍直如血色亦復可怪周禮萍氏掌國之水禁幾酒謹酒禁川游者夫萍水物爾而名官以謹酒先儒以其不沈溺於酒如萍之浮然水萍之性勝酒水萍雖非小萍類亦萍之揔名故以戒人幾酒謹酒也小雅鹿鳴食野之蘋毛氏以為此鄭氏以為非野所生非鹿所食易之曰藾蕭然古人以水草之交為麋則麋鹿亦食水草今鹿豕多就水傍食又人家養豕皆以萍食之何嫌於鹿不食乎下章食蕭自陸草爾藻藻水草也生水底橫陳於水若自澡濯然若流水之中隨波衍漾莖葉條暢尤為可喜故采藻於行潦也有二種其一種葉如雞蘇莖大如箸長五六尺其一種莖大如叉股葉如蓬蒿謂之聚藻橫被水下有自然之文故古者象服有藻火之屬乂畫於梲以為飾亦以厭火魚藻之詩言萬物不得其性王居鎬京不能以自樂蓋察見淵魚者則魚無所逃有所自蔽蓋魚之潛於藻若鳥之集於林一章曰魚在在藻有頒其首魚樂而出游於藻之外也二章曰魚在在藻有莘其尾言魚樂復樂而反戲於藻之內也三章曰魚在在藻依于其蒲樂既極而止于蒲蓋樂而不知反則樂有窮故有靜而止息之地則時出而樂有餘矣惟王亦然自樂豈出而飲酒自飲酒入而樂豈終而那其居以休息皆若魚之得所矣今鳬雁屬亦樂於藻故曰鳬藻楚辭曰鳬鴈皆唼夫梁藻是也荇莕接余其葉苻陸璣云白莖葉紫赤色正圓徑寸餘浮在水上根在水底與水深淺等大如叉股上青下白鬻其白莖以苦酒浸之脆美可案酒本草别本注云荇菜生水中葉似蓴莖澀根極長江南人多食唐本云是猪蓴全為誤也猪蓴與絲蓴並一種以春夏細長肥滑為絲蓴至冬短為猪蓴亦呼龜蓴此與鳬葵殊不相似案荇菜今陂澤多有今人猶止謂之荇菜非難識也葉亦卷漸開雖圓而稍羡不若蓴之極圓也葉皆隨水高低平浮水上花則出水黃色六出今宛陵陂湖中彌覆頃畝日出照之如金俗名金蓮子狀既似蓴又猪亦好食民皆以小舟載取以飼猪又可糞田或因是亦得猪蓴之名顧但非蓴菜耳唐本注萍云水中萍有三種大者名蘋水中又有荇菜亦相似而葉圓并水上小浮萍為三以蘋喻之蓋似之耳詩參差荇菜左右流之已而采之已而芼之流者並流而取之也采者導擇之也芼者芼以為羮也禮曰牲用魚芼之以蘋藻荇亦可以為芼爾陸德明曰天官醢人陳四豆之實無荇菜者以商禮詩詠時事故有之案風有采蘩采蘋又有采藻采苑采芹之屬水草甚多而醢人所薦止於昌本苑芹深蒲而已物之為菹蓋自有所宜餘或為芼羮之用豈可四物之外便謂商禮耶顔之推云荇先儒解釋皆云水草圓葉細莖隨水淺深今是水悉有之黃花似蓴江南俗亦呼為猪蓴或呼為荇菜而河北俗人多不識之博士皆以參差者是莧菜呼人莧為人荇亦可笑矣苑苑杜子春讀為卯說文作力久切以泮宫詩讀之思樂泮水薄采其苑魯侯戾止在泮飲酒說文音為叶陸璣云苑與荇葉相似葉大如手赤圓有肥者著手中滑不得停莖大如匕柄葉可以生食又可鬻滑美江南人謂之蓴菜或謂之水葵諸陂澤水中皆有鄭小同亦云江南名之蓴菜生陂澤水中但今蓴小於荇陸璣所說蓴則大於荇今蓴菜自三月至八月莖細如叉股黃赤色短長隨水深淺名為絲蓴九月十月漸粗硬十一月萌在泥中粗短名瑰蓴味苦體澀取以為羮猶勝雜菜冝雜鮒鯉為羮又宜老人又今吳人呼蓴菜鱸魚蓋魚之美者復因水菜以芼之兩物相宜獨為珍味然以鱓鱉為之更足生病古人云俗無良醫枉死者半拙醫療病不如不療喻如宰夫以鱔鱉為蓴羮食之更足成病豈充饑之可望乎周禮有苑菹用此物為菹鄭大夫讀苑為茅謂茅初生者故杜音鄭義並不從然苑既為蓴後鄭及許叔重皆云鳬葵而蜀本圖經稱蓴葉似鳬葵則有異同本草有蓴又有鳬葵者蓋本草以荇為鳬葵也干寶又解苑云今之􅝶蹗草堪為菹江東有之何承天云此菜出東海堪為菹醬益不可用芹水芹二月三月作英時可作菹及熟爚食之葉似芎藭花白色而無實根赤白色周禮醢人加豆之實用水草則有芹菹深蒲其朝事之豆則有昌本苑菹禮記曰常豆之菹水草之和氣也其醢陸産之品也加豆陸産也其醢水物也水草之和氣則芹苑深蒲昌本之屬然亦或在加豆耳魯詩頌僖公能修泮宫一章采芹二章采藻三章采苑三者水物泮水之所生泮水備則宫之備可知鄭氏云辟雍則築土雍水之外圓如璧泮之言半也蓋東西門以南通水北無也許叔重說泮諸侯鄉射之宫西南為水東北為牆蓋始入學者必釋奠于先師又有釋菜以菜為摯故即水中采三品之水草以薦之采菽之詩刺幽王於諸侯之至不能錫命以禮故首章采菽者大豆之葉可以為臛乃牛爼之鉶羮次章采檻泉中之芹蓋微物矣然古人不以微薄廢禮使王能修之猶愈於無禮也此與瓠葉同意今釋奠先聖猶用之或曰不如高田者宜人高田者多白芹今舒蘄多有之故蘄蛇用於世者體皆作此物香蓋所嗜云土人名為水白芷或曰蘄之為蘄以有芹也蘄即芹亦有祈音音釋葱軒辟雞宛脾皆葅類也肉腥細者為膾大者為軒軒讀為憲藿葉切也膾者必先軒之所謂聶而切之也葅軒聶而不切辟雞宛脾聶而切之聶之涉反辟必益反宛于晚反脾婢支反㳿以制反㸐音然陸佐公石闕銘云刑酷㸐炭䪥胡戒反㿂知陵切腹內㿂結病也瘕公遐公詐二切腹病本音遐蒮音育薁於六切櫻於盈切息亷切茖音格䔲音登草名恚於避切獷音穬醍醐音提胡葝居政其聲二切蒚音力亢䪥上合浪切下胡戒切薜音百山蘄爾雅注引廣雅曰山蘄當歸當歸今似蘄而粗大蘄音芹薊古麗切葫荽音綏軟音軟瓣皮莧切臑乃到切蒚音力薍魚患切蕕與周切􅭹扶袁切注薯之餘切注䪤音煩小蒜也莪漸洳上平聲下人恕切蕰於粉切一音溫錡冝綺反有足曰錡無足曰釡䕲爾雅作廩萍薻音早幾酒幾與譏同苛察沽買過多及非時者藻梲音拙厭益涉切頒符云切大首貌唼色卑切荇莕音杏苻輔俱切脆此芮切並蒲浪切芼莫報切深韻書作藻醢人注蒲蒻入水深故名深蒲苑音卯又力久切苑􅝶晉語音押王篇􅝶與鴨同蹗力谷切芹雍音壅臛音壑說文肉羮也王逸注楚詞有菜曰羮無菜曰臛檻與攬同爾雅翼卷五
