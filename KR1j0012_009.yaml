body:
  text: 欽定四庫全書爾雅翼卷九宋羅願撰釋木檜樅榛楛檿柳桐棘椇梧梓楝榖六駮並閭檜檜一名栝禹貢荆州貢杶幹栝柏幹柘也栝檜也故檜兼有栝音柏葉而松身性能耐寒其材大可為舟及棺槨左傳稱棺有翰檜而淇水檜楫松舟也衛詩之託興以為物各有偶檜之與松其生固已相類至其刳剡而為濟川之用則又相須使女之適異國者每如此則何有不見答者哉唯其不能然是以有思歸之作是詩與泉水皆衛女所以寓其思泉水則思出同歸異之肥泉竹竿則思出同歸同之松檜也檜今人亦謂之圓柏以别於側柏又有一種别名檜柏不甚長其枝葉乍檜乍柏一枝之間屢變人家庭宇植之以為玩樅樅松葉柏身檜柏葉松身從者合異而為同會者聚兩以為一故二木合松柏之體而取合從胥會之義猶淮南子云槐榆與橘柚合而為兄弟也樅大木千仞無枝利以為夏屋郭璞曰今大廟梁用此木是誠木之可貴者也尸子曰松柏之鼠不知堂密之有美樅今貂鼠好在松上食松皮人謂之松狗所謂松柏之鼠當謂此耳樅松葉柏身其味當美而鼠不知也字説曰檜柏葉松身則葉與身皆曲樅松葉柏身則葉與身皆直樅以直而從之檜以曲而會之以直而從之故音從容之從以曲而會之故音會計之會榛榛枝莖如木蓼葉如牛李色高丈餘子如小栗其核中悉如李生則胡桃味膏燭又美亦可食噉漁陽遼代上黨皆饒鄭注禮曰榛似栗而小關中鄜坊甚多然則其字從秦蓋此意也邶詩曰山有榛云誰之思西方美人旱麓之詩曰瞻彼旱麓榛楛濟濟説者曰旱山名也麓山足也旱山之足林木茂盛者得山雲雨之潤澤也又説者以榛可為贄為文事楛可為矢為武事是蓋不然夫榛楛皆用之武事説文榛木也一曰菆也菆蓋矢之善者春秋傳所謂致師者左射以菆是也若楛則為矢甚明周世修后稷公劉之業而申以百福干祿皆文事也然不可無武備故瑟彼玉瓚以下述文治之美而首章言武備也周語曰夫旱麓之榛楛殖故君子得以易樂干祿焉若夫山林匱竭林鹿散亡藪澤肆既民力雕盡田疇荒蕪資用乏匱君子將險哀之不暇而何易樂之有是先有險哀之備而後可以及易樂也又女贄用榛者左傳曰女贄不過榛栗棗修以告虔也稱告虔者榛有臻至之義栗有戰栗之義棗有早作之義修有修飭之義皆以其名告已之虔恭也又一種大小枝葉皆如栗其子形如杼子味亦如栗所謂樹之榛栗者其下云爰伐琴瑟是大木非榛楛之榛至女贄則宜兩者皆可用蜀都賦樼栗罅發榛與樼同楛楛堪為矢其莖似荆而赤其葉如耆古者楛矢則石為之砮仲尼在陳有隼集於陳庭而死楛矢貫之石砮其長尺有咫問諸仲尼仲尼曰隼來逺矣此肅愼氏之矢也昔武王伐商封異姓以逺方之職貢使無忘服故以楛矢封陳使求諸故府果得之夏書荆州之貢礪砥砮丹惟箘簵楛則夫楛矢石砮者中州職貢之常也今仲尼獨以逺方之貢為驗豈三代之際職貢不同或者不妨中國自有之特其長尺有咫者為肅愼之物歟是貢既分於陳而隼又適集其庭以死豈陳人竊以射隼耶然仲尼言隼來之逺則是自海外負矢而至也先公之分器受之王室子孫宜相與誦而寶之魯之寶玉大弓出入必書而晉文之受彤弓范丐詫之於諸侯陳之所受於周以鎮撫其社稷者獨有此耳今隼以矢來君臣相顧乃無識反質之於客抑與數典忘祖者類矣陸璣云上黨人織以為斗筥箱器又屈以為叉故上黨人調問婦人欲買赭否曰竈中自有黃土買叉否曰山中自有楛言其俗朴也顔監曰楛木堪為箭笴今豳以北皆用之土俗呼其木為楛子又禹貢惟箘簵楛顔監曰皆可為矢檿檿山桑顔師古以為山桑之有點文者其葉可以食蠶而材尤有用古者青州以絲為貢以檿絲為篚蓋食檿之蠶其絲中琴瑟絃盛之箱篚貴之也其材可以為車轅又可以為弓弓人取幹之道七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下周幽王之亂檿弧箕服之謡兆於宣王之時竟取棄女以亡周國先王之制戎器不鬻於市而至於夫婦鬻是器則已異矣檿之為弓見於此時箕草似荻而細織以為矢服説者以為近射妖管子五粟之土其檿其桑周詩言文王之事攘之剔之其檿其柘柳柳河柳郭璞以為河旁赤莖小楊也其皮正赤如絳而葉細如絲婀娜可愛天之將雨柳先起氣以應之故一名雨師而字從聖字説曰知雨而應與於天道木性雖仁聖矣猶未離夫木也小木既聖矣仁不足以名之音赬則赤之貞也神降而為赤云柳非獨能知雨亦能負霜雪大寒不雕有異餘柳蓋莊子以松柏獨受命於地冬夏青青比舜之受命於天柳之從聖亦以此歟詩皇矣云作之屏之其災其翳修之平之其灌其栵啓之辟之其柳其椐攘之剔之其檿其柘蓋文王之養才於山林日就繁茂故其始而屏除之也始於已死之災翳而及於厖雜之灌栵乂及於柳椐之小材又不得已而及於檿柘之良木以明草木逾茂則始之所愛者不能並育以漸去焉故其卒至於柞棫斯拔松柏斯兊也然則柳亦良木矣漢書鄯善國多柳柳段成式云赤白柳出涼州大者為炭復入灰汁可以煮銅南都賦注柳似柏而香今柳中有脂號柳乳桐榮桐木物之榮者多矣獨桐名榮者桐以三月華蓋自春首東風解凍蟄蟲魚獺鴻鴈皆應陽而作惟桃桐之作華乃在衆木之先其榮可紀故名桐為榮也周書時訓曰清明之日桐始華桐不華歲有大寒蓋不華則陽氣微陽氣微則寒可知已又易緯曰桐枝濡毳而空中難成易傷須盛氣而後華蓋以經言始華有遲之之義桐與梧既異而桐之中又有數種有其子可以取油者蓋即詩所謂其桐其椅其實離離者也有華而不實堪作琴瑟者若生石間其聲則鳴書嶧陽孤桐是也雲南牂牁人亦績以為布其葉飼豕肥大三倍至秋後亦用以飼魚鄉人養鯇魚者每春以草養之頓能肥大秋後食以桐葉以封魚腹則不復食亦不復瘦以待春復食也晉武帝時嘗得一石鼓擊之無聲張華請用蜀桐材刻魚形扣之音聞數里而董仲舒請雨秋以桐魚九枚莫曉其義王逸子曰木有扶桑梧桐松柏皆受氣淳矣異於羣類者松柏冬茂陰木也梧桐春榮陽木也扶桑日所出陰陽之中也管子五粟五沃之土宜桐又漢西域鄯善國有胡桐亦似桐蟲食其木則沫出其下流者俗名為胡桐淚言如目中淚也可以汗金銀流俗語訛呼淚為律棘棘心赤而外有刺故朝位植之左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後蓋槐取懷來棘欲其赤心而留意於三刺也又釋木云槐棘醜喬蓋言枝皆翹竦有奉上之義亦藉其繁茂以為蔽外屏之義也棘有赤白二種其刺亦有直者鈎者補益用直療腫用鈎古人所謂造沐猴於棘刺言其難也春秋繁露曰美惡之類各以類應故以龍致雨以扇逐暑軍之所處生以棘楚蓋棘者刺人之物楚者撻人之物皆能傷人故緣類而生亦戟棘也越棘大弓取象於棘又棘可以為失昔者楚之先祖桃弧棘矢以共禦王事蓋氷之將出桃弧棘矢以除其災桃能去厲棘植於花外則花不被霜所謂除災豈此之謂耶詩曰凱風自南吹彼棘心又曰吹彼棘薪凱南風也八風以生殺萬物東北曰條風物至是而條鬯也東曰明庶風東方日所出以明庶物也東南曰清明風宅東與南之交故明且清也南曰景風明之極而有景也西南曰涼風暑至西南而薄也西曰昌盍風昌盍天之門所以戒藏也西北曰不周風天傾西北故其風不周遍也北曰廣莫風有北廣莫之野也凱風既云自南乃當景風白虎通曰景風至棘造實蓋吹彼棘心者將以趣其造實萬物之難生者棘而造實又欲其應候南風雖能生物亦已勞矣八風謂之景衛詩謂之凱以強教之也以棘為凱風之候則母氏之劬勞甚矣老子曰師之所處荆棘生焉以荆棘惡木有兵刑之象皇覽曰孔子塋中不生荆棘及刺人草管子五沃之土其棘其棠椇椇枳椇也其木徑尺葉如桑柘以為屋材則室中酒味皆敗其子作房似珊瑚核在其端其味甚甘小兒食之江東謂之木蜜崔豹古今注云枳椇子一名木蜜一名木餳實如形意是枅字卷曲核在實外味甘美如餳蜜一名白石一名木實白木實名枳椇古者人君燕食所加庶羞凡三十一物其果則有菱椇棗栗榛柿瓜桃李梅杏楂梨又婦人之贄椇榛棗栗荆楚之俗亦鹽藏荷裏以為冬儲今不以為重賤者食之而已古語云枳椇來巢言其味甘故飛鳥慕而巢之或云枳句如枳木之勾曲今枳椇亦自勾曲故四代之爼有虞氏以梡夏后氏以嶡商以椇周以房爼梡斷木為四足而已嶡之言蹶也謂中足為橫距之象椇之言枳椇也謂曲撓之房謂足下跗也上下兩間有似於堂房孔氏以為枳椇之木其枝多曲撓亦引陸璣草木疏椇曲來巢以證曲撓之義蓋商爼似椇之曲耳椇今人謂之枅狗又謂之蜜曲録梧梧者植物之多陰最可玩者青皮而白骨似青桐而多子蓋桐有青赤白而青桐又有有實無實之辨今人以梧之青亦曰青桐云其生莢如箕子相對綴箕上多者至五六成材之後樹可得實一石食之味如芡古今方書稱丸藥如梧桐子者蓋倣此也考莊子曰空閲來風桐乳致巢蓋子生纍然似乳鳥悅於得食因巢其上亦猶枳椇之來巢以味致之也此木易生鳥銜墜者輒隨生殖其畦種者是歲可高一丈古稱鳳凰集于朝陽梧桐之上豈亦食其實耶或曰梧桐以知日至正南生十二葉一邉有六葉從下數一葉為一月至上十二葉有閏十三小餘者視之則知閏何月也遁甲梧桐不生則九州異梧亦良木孟子所謂場師舍梧檟而養樲棘則為賤場師明梧者場中所貴也此木雖不中樂器然堪車板盤合木等用釋木稱櫬梧櫬者棺之别名豈古下卿之罰所謂桐棺三寸者亦有取此耶其皮今人亦剝用之然葉春晚乃生望秋輒稿惠子所以據之而瞑也或者稿梧即琴古者梧桐之名亦通齊地記曰城北十五里有桐臺即梧宫賈誼新書懸弧之禮東方之弧以梧梧者東方之草春木也南方之弧以柳柳者南方之草夏木也中央之弧以桑桑者中央之木也西方之弧以棘棘者西方之草秋木也北方之弧以棗棗者北方之草冬木也梓梓為百木長故古者名制器之工為梓人商人尚梓用此故也郭氏解椅梓云即楸又解楸檟云大而皵楸小而皵檟説文亦曰椅梓也梓楸也楸梓也檟楸也然則椅梓楸檟一物而四名然定之方中既言椅又言梓故詩義疏曰楸之疏理色白而生子者為梓梓實桐皮曰椅而齊民要術稱白色有角者為梓或名角楸又名子楸黃色無子者為椅楸世呼黃荆楸云然則是數者又以有子為辨耳管子五沃之土宜白梓楚地尤多此木故尸子曰荆有長松文梓而聲子亦曰把梓皮革自楚往也屈原九章望長楸而太息室屋之間有此木則餘材皆不復震其葉可以飼豕肥碩三倍詩曰維桑與梓必恭敬止靡瞻匪父靡依匪母古者見喬木必下而趨所以廣孝桑者母之所事以供蠶繅梓者父之所植以伐琴瑟故見之而恭敬之心惕然生焉不必待於口澤手澤之所漸也又梓之為木有子之道昔者伯禽康叔見周公三見而三笞遂見商子商子使觀于南山之陽見橋木高而仰又使之觀乎北山之陰見梓焉晉然實而俯商子曰橋者父道也梓者子道也於是二子再見乎周公入門而趨登堂而跪周公拂其首勞而食之則以能子道焉耳雜五行書曰舍西種梓楸五令子孫順孝蓋亦此義莢細如箸其長僅尺冬後葉落而莢猶在樹總總然其實一名豫章崔豹古今注曰棘實曰棗梓實曰豫章桑實曰椹柘實曰佳魯季孫植六檟於蒲圃東門之外子胥曰植吾墓檟任昉云中山有楸户掌楸木者楸可為什器貨殖傳山居千章之萩即楸字淮北滎南河濟之間千樹萩其人與千户侯等楝楝木高丈餘葉密如槐而尖三四月開花紅紫色芬香滿庭其實如小鈴至熟則黃俗謂之苦楝子亦曰金鈴子可以練故名楝淮南子記十二月之木正月其木楊許叔重以為陽於春為先二月其木杏杏有竅在中象陰布散在上三月李四月桃李桃有核與杏同顧先後熟爾五月榆六月梓其説未聞七月其木楝楝實秋熟故也八月其木柘亦未聞九月槐槐懷也可以懷來逺人十月檀檀陰木也十一月棗取其赤心也十二月櫟可以為車轂木不出火唯櫟為然亦應陰氣也然則古以楝實應七月之氣管子五位之土種楝又鳳皇非梧桐不棲非楝實不食荆楚之俗五月五日民並斷新竹筍為筒棕楝葉插頭纒五絲縷江水中以為辟水厄士女或楝葉插頭五絲纒臂謂為長命縷俗言屈原以此日投水百姓競以食祭之漢建武中長沙人有見人自稱三閭大夫者謂之曰所祭甚善常苦為蛟龍所竊蛟龍畏楝葉五色絲自今見祭宜以五色絲合楝葉縛之所以俗並事之宗懍引風俗通以為獬豸食楝原將以信其志也然則鳳凰獬豸皆食楝而蛟龍特畏之是亦異矣榖榖惡木也易生之物一説榖田久廢則生榖此聲所以通於榖其音又近御名或曰葉有瓣曰楮無曰構其實正赤如楊梅而無核鶴鳴之詩園之所有木不同而其下皆榖則以榖易生故也伊陟相太戊亳有祥桑榖共生于朝傳曰俱生于朝七日而大拱伊陟戒以修德而木枯劉向以為桑猶喪也榖猶生也殺生之柄失而在下則是以桑榖為二物也而陸璣以為榖幽州謂之榖桑或曰楮桑然則蓋一物也論衡曰楓桐之木生而速長故其皮肌不能堅剛樹檀以五月生葉後彼春榮之木其材強徑車以為軸商之桑榖七日大拱長速大暴故為變怪榖雖易生至於七日而拱則已速矣而宋人刻玉為楮葉三年乃成列子曰使地三年而成一葉則物之有葉者寡矣江南人績其皮以為布又搗以為紙長數丈潔白光澤甚好其葉初生可茹又取班榖之皮以為冠裴淵廣州記曰蠻夷取榖皮熟槌為揭裹布鋪以擬氊然則雖惡木用亦博矣管子五位之土其槐其楝其柞其榖南山經曰招搖之山有木焉其狀如榖而黑理其華四照其名曰迷榖佩之不迷六駮六駮木名其皮青白駮犖逺而望之似六駮之獸因以為名其木則梓榆也秦風曰山有苞櫟隰有六駮又曰山有苞棣隰有樹檖毛氏直以為獸之六駮則與苞櫟棣檖不相類故陸璣不從也六駮鋸牙之獸能食虎豹者其狀如馬亦名駮馬此木既以六駮為號故亦兼駮馬之名又曰馬梓今之檀木皮正青而澤與莢蒾及此木相似故里語曰斫檀不諦得莢蒾莢蒾尚可得駮馬夫鳥獸草木之類特為難窮其形之相似者雖山澤之人朝夕從事有不能别其名之相亂者雖博物君子習於風雅有不能周故野人伐檀而得駮先儒訓駮而為獸其去本逺矣崔豹古今注曰山中有木葉似豫樟皮多癬駮者名曰六駮蘇子由曰其皮青白如駮言六未詳并閭張揖解上林賦曰并閭棕也木高一二丈傍更無枝葉大而圓有如車輪皆萃於木杪其下有皮重疊裹之每皮一匝為一節其花黃白結實作房如魚狀山海經曰石翠之山其木多棕嶺南西川江南皆有之其皮為用最廣二旬一割則葉轉復生皮作繩入土號為千嵗不爛孫權討黃祖祖橫兩蒙衝保守沔口以并閭大紲繫石為矴又齊高帝時軍容寡少乃編棕皮為馬具裝此蓋軍旅所須故晉令夷民守護棕皮者一身不輸而唐書訶陵國在南海洲上立木為城作大屋重閣以棕皮覆之王坐其中此皮堅韌不受雨故可以冒馬覆屋也一名蒲葵晉人稱蒲葵扇扇自柄上攢衆骨如棕葉之狀今宣歙衢信間扇是也梁張孝秀性通率常冠榖皮巾躡蒲履執栟櫚皮麈尾唐世以為拂今人遊山者作棕鞋如淳解甘泉賦謂并閭其葉隨時政政平則平政不平則傾顔師古曰如氏所説自是平慮耳并閭謂棕也周書王會云白州並閭其葉若羽伐其木以為車又郭璞解上林賦曰胥邪似并閭皮可作索南都賦曰楈丫栟櫚蜀都賦曰棕丫音釋檜杶音春勑倫反栝古活反柘章夜反翰侯旰反成二年注疏楨幹也樅子庸七恭二切榛鄜音桴菆音鄒通作騶朝錯傳材官騶發矢道同的肆既國語注肆極也既盡也杼時渚切橡也楛石砮音奴鏃也砥音脂一音旨砥細於礪皆磨石也箘簵音窘路美竹隼音笋分去聲數所矩切筥音莒赭音者赤土笴古我切箭莖又公旱切檿於簞切檍於力切服與箙通柳災側吏反又音緇翳於計反屏必領反除也灌古亂反栵音例辟婢亦反攘如羊反剔他歷反椐音居匱去愧反草木疏節中腫以扶老即今靈壽是也柭方貝反兊徒外反柞才各子各二反桐獺他達切椅於宜切牂牁上音臧下居何切鯇胡管切沫音末棘槐棘醜喬爾雅注醜類也喬高也槐棘之類枝皆翹竦三刺秋官大司寇之職一曰訊羣臣二曰訊羣吏三曰訊萬民注刺殺也三訊罪連則殺之趣音促椇俱甫反枳居紙諸紙二反餳除盈切枅結奚賢二切方木也卷音拳枳句古侯切宋玉風賦枳句來巢梡音款斷丁亂反又下管反嶡居衛切跗方于反曲撓禮記注音擾橫距上古曠反又音光又華育反明堂位注空閲宋玉賦作空穴司馬彪曰門户孔空風善從之木齊民要術作屧音燮屐也櫬初覲切瞑莊子注音眠稿苦老切梓椅爾雅於寄切檟音賈楸音秋皵音鵲爾雅注措皮也老乃皮粗皵者為楸小而皮粗皵者為檟廣韻注皵謂木皮甲錯措音錯勞食皆去聲楝音練轂音谷糭作弄切穀共音拱六駁音剝駁犖采黦也犖洽角切檖力醉切并閭并南都賦作栟蒙衝上謨蓬切下昌容切字本作艨艟戰船也大紲音薜系也謂以大綆繫矴丁定切錘舟石韌音刃楈音胥丫音邪爾雅翼卷九
