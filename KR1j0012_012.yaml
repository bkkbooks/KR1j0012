body:
  text: 欽定四庫全書爾雅翼卷十二宋羅願撰釋木柞櫟豫章櫧檆木蘭樺茶椐棎楊梅若榴漆桂盧橘離支仁頻椰竹箭柞柞生南方葉細而密今人為梳用之詩雅道柞為尤多方周之興大姒夢商之庭産棘小子發取周庭之梓植之于闕間梓化為松栢柞棫覺驚以告文王文王曰勿言冬日之陽夏日之陰不召而物自來以為宗周興王之兆故詩曰帝省其山柞棫斯抜松栢斯兑帝作邦作對自大伯王季未必不謂此也又述文王之事曰柞棫拔矣行道兑矣山木多矣而獨言柞棫盖柞薪者民之所燎且至於聳拔則其餘從可知也齊民要術稱柞斫去尋生料理還復盖良木之易成者然亦非人力料理有不可復此以見大王之勤也又言柞冝種於山阜之曲十年中椽二十年中屋槫薪樵不在此數然則為利亦博矣管子五粟五沃之土冝柞風土記舜所耕多柞又漢有五柞之宮櫟管子五粟之土其柘其櫟條直以長淮南時則訓十二月之木正月其木楊楊蒲栁也楊木春先二月其木杏有竅在中象陰布散在上三月其木李李亦有核李後杏熟故主三月四月其木桃説與杏同桃後李熟故主四月五月其木榆六月其木梓説未聞七月其木楝楝實鳯皇所食今雒城旁有樹楝實秋熟八月其木柘未聞九月其木槐槐懷也可以懷來逺人十月其木檀檀陰木也十一月其木棗取其赤心也十二月其木櫟櫟可以為車轂木不出火唯櫟為然亦應陰氣也秦風山有苞櫟草木疏云秦人謂柞櫟為櫟河内人謂木蓼為櫟此秦詩也冝從其方土之言柞櫟是也徐州人謂櫟為杼或謂之為栩其子為皁或言皁斗莊子匠石見櫟社樹其大蔽牛絜之百圍上林賦注應劭曰櫟棌木也顔師古以為木蓼葉辛初生可食本草圖經曰柞櫟也杼也栩也皆橡櫟之通名豫章豫章大木生七年乃可知漢官曰凡郡或以所出金城城下得金酒泉泉味如酒豫章樟木生庭鴈門鴈之所育是也楚子期抉豫章以殺人吳都賦曰櫲樟尸子曰水積則生吞舟之魚土積則生楩楠豫章漢上林有豫章觀西京賦豫章珍館薛綜謂豫章木為臺館櫧櫧似柃葉冬不落上林賦沙棠櫟櫧郭璞曰櫧似采柔檆檆木類松而勁直葉附枝生若刺針俗作杉非是名山志曰華子崗上紫杉千仭被在崖側木蘭木蘭葉似長生冬夏榮常以冬華其實如小柿甘美一名林蘭一名杜蘭皮似桂而香生零陵山谷及泰山狀如楠樹髙數仞任昉述異記云木蘭洲在尋陽江中多木蘭又七里洲中有魯班刻木蘭舟今詩家云木蘭舟出於此離騷云朝搴阰之木蘭王逸謂木蘭去皮不死以喻讒人雖欲困已已受天性終不可變易又云朝飲木蘭之墜露子虚賦云桂椒木蘭洛陽宮殿簿顯陽殿前有之樺樺木似山桃上林賦華楓枰櫨華即今之皮貼弓者鉢室韋國用樺皮盖屋又隋大業中汾州起汾陽宮宮南外平林率是大樺木髙百餘尺行從文武皆剥取皮覆卷舍又堪為燭取脂燒辟鬼枰即平仲木也實白如銀櫨黄櫨木也茶今人飲茶未知所始釋木云檟苦茶郭璞云樹小似梔子冬生葉可煑作羮飲今呼早采者為茶晚采者為茗一名荈蜀人名之苦茶然則古盖用之矣埤蒼作􅖗今通謂之茶茶荼聲近春秋齊君茶漢地理志茶陵陸顔皆入茶音茶經曰茶者南方嘉木木如𤓰蘆葉如梔子花如白薔薇實如栟櫚蔕如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈又曰茶之别者有枳殻枸把枇杷皂莢槐栁芽上春摘其芽和茶作之故今南人輸官茶往往雜以衆葉山中草木芽葉皆可入椿柿尤竒唐風山有栲陸璣疏云山樗吳人以其葉為茗南越志龍川縣有臯蘆葉似茗南人煑為飲一名𤓰蘆椐椐樻也草木疏云節中腫似扶老即今靈壽是也今人以為馬鞭及杖𢎞農郡北山甚有之孔光傳賜靈壽杖孟康曰扶老杖也顔師古曰木似竹有枝節長不過八九尺圍三四寸自然有合杖制不須削治也陳藏器云生劔南山谷圓長皮紫作杖令人延年益壽王粲靈壽杖頌云竒幹堅正不待矯輮棎棎子木生山中實似棃冬熟味酸薛瑩異物志云丹陽諸郡皆有之吳都賦棎榴禦霜楊梅楊梅木若荔支葉細陰青實如榖子而有核其味酢出江南五月中熟江淹頌云懷蘂挺實涵黄糅丹鏡日繡壑炤霞綺巒張司空云地瘴無不生楊梅者若榴按石榴或云本生西域張騫使外國得之一名丹若廣雅謂之若榴木不甚髙大枝柯附幹自地便生作叢種極易息折其條盤土中便生花有黄赤二色實亦有甘酸二種甘者可飡酢者入藥段成式云甜者謂之天漿南都賦梬棗若榴漆漆木汁可以髤物象形桼如水滴而下木髙三二丈葉如椿樗皮白而心黄六七月間以斧斫其皮開以竹管承之汁滴則為漆古者以為貢職方氏豫州其利林漆傳稱舜造漆器諫者數百人考以為奢侈從此興然三代盛王相繼以為器皿以示制度盖備物致用聖人之事也後世用之既博故周家漆林之征至二十而五衛文公徙居楚丘則樹榛栗椅桐梓漆伐琴瑟焉盖其逺慮如此而後漢壽張侯樊重欲作器物先種梓漆時人嗤之然積以嵗月皆得其用向之笑者咸求假焉貨殖傳陳夏千畝漆與千户侯等莊子曰桂可食故伐之漆可用故割之桂桂江南木百藥之長屈原逺遊曰嘉南州之炎徳兮麗桂樹之冬榮周書王會自深桂山海經桂林八樹在畨隅東招摇臯塗之山多桂本草桂有三種菌桂生交趾桂林正圓如竹有二三重者葉似柿花白蘂黄四月開五月結實離騷雜申椒與菌桂矯菌桂以紉蕙是也今有筒桂筒菌字近或傳寫之誤或云即肉桂也牡桂生南海葉似枇杷皮薄色黄少脂肉氣如木蘭削去皮名桂心所謂官桂也桂生桂陽是半卷多脂者所謂板桂也陳藏器云同是一物爾雅但言梫木桂郭璞云南人呼桂厚皮者為木桂蘇恭謂牡桂即木桂及單名桂者是也廣志曰桂出合浦而生必於髙山之巔冬夏常青尸子乃云春華秋英曰桂吳都賦云丹桂灌叢古者薑桂為燕食庶羞和之美者招搖之桂切桂置酒中謂之桂酒列仙有桂父服桂葉以龜腦和之呂氏春秋云桂枝之下無雜木辛螫故也南越有桂蠧此蟲食桂味辛漬以蜜食之漢常以獻陵廟載以赤轂小車春秋運斗樞曰椒桂連名士起盧橘盧橘伊尹曰果之美者箕山之東青鳬之所有焉考而司馬相如賦上林引盧橘夏熟故左思譏之張勃吴録以為建安郡中有橘冬月於樹上覆裹之至明年春夏色變青黑味尤絶美以為相如所引盧橘盧黒色也盖近是乎説文作櫨郭璞曰蜀中有紿客橙即盧橘也離支上林賦離支晉灼注大如雞子皮麤剥去皮肌如雞子中黄味甘多酢少離蜀都賦旁挺龍目側生荔支廣志曰木髙五六丈大如桂緑葉冬夏榮茂青華朱實後漢南海獻龍眼荔支十里一置五里一候奔馳險阻道路為患孝和時唐𦍑為臨武長縣接南海上書言狀詔太官勿受獻龍眼木髙二丈許似荔支而葉㣲小凌冬不凋春末夏初生細白花七月實成仁頻上林賦仁頻顔師古注即賔桹也陶隠居云出交州形小而味甘廣州以南者形大而味澀小者名蒳子向陽曰㯽榔向陰曰大腹圖經云生南海大如桄桹髙五七丈正直無枝皮似青桐節如桂竹葉生木顛大如楯其實作房從葉中出傍有刺若棘針一房數百實如雞子皆有殻肉滿殻中尖長而有紫文者名㯽圓而矮者名榔吳都賦㯽榔無柯椰葉無陰椰椰木似㯽榔無枝條髙十餘尋葉在其末如束蒲實大如瓠繋在樹頭實外有皮如胡桃核裏有膚白如雪厚半寸如猪膏味美如胡桃膚裏有汁升餘清如水美如蜜飲之可以愈渇核作飲器竹説文冬生艸也象形下垂者箁箬也竹譜别類有六十一山海經岳山尋竹生焉衛丘山南帝俊竹林在焉大可為舟闕箭箭篠也東南之美者有㑹稽之竹箭焉禹貢揚州篠簜既敷職方氏揚州其利竹箭箭一名篠是竹之小者可為箭幹箭萌謂之箈一作䈚月令日短至則取竹箭説文簜可為幹筱可為矢筱箭屬小竹也異物志箭竹細小勁實可為箭通竿無節竹譜云節間三尺堅勁中為矢箘簵亦堪為矢箭大者為筆書垂之竹矢淮南云淇衛箘簵冦恂伐淇園之竹為矢考工記妢胡之笴謂箭槀矢人相笴欲生而摶音釋柞音昨又音作櫟來的反杼神呂反橡也栩吁委反絜奚結反圍而量之豫章抉於决切櫧音諸柃音零采柔采本作採應劭曰櫟榇木也檆所䘖反搴音蹇阰音皮山名在楚南樺胡化切枰皮兵反櫨來都反茶荈尺兖切蔎舒列切椐樻丘貴反棎市瞻切楊梅炤音灼漆髤音休桂畨隅上普官切舊本作賁誤山海經注八樹而成林言其大也今畨隅縣菌渠隕反梫音寢盧橘注紿徒亥切相欺離支上力智反仁頻蒳奴荅切楯食尹切干盾椰音耶竹箁蒲侯切竹箬别名也箬音弱箭䈚從改切又音臺筱先烏切與篠同箘簵上竒隕切下音路妢胡之笴考工記注妢胡胡子之國在楚旁妢音焚書或為邠笴矢幹也讀為槀生而摶周禮矢人注相猶擇也生謂無瑕蠹也摶讀如摶黍之摶謂圎也爾雅翼卷十二
