body:
  text: 欽定四庫全書爾雅翼卷十三宋羅願撰釋鳥鵬鳯鸞孔雀鶴雞雉鷩烏鵲鵬萬物之在宇中者其小大皆可識惟夏革所稱鯤化為鵬莊子引以冠其書頗為難信按說文鳯神鳥也其字又為云古文鳯象形鳯飛羣鳥從以萬數故以為朋黨字又字云亦古文鳯然則以𨽻書之正是鵬爾夫羽蟲三百鳯為之長舜文王之時嘗來儀以鳴而仲尼嘆其不至冝無偉於是者矣宋玉對楚襄王亦稱鳥有鳯而魚有鯤鳯皇上擊九千里絶雲霓負青天翺翔乎杳冥之上夫藩籬之鷃豈能與之料天地之髙哉鯤魚朝發崑崙之墟暴鬐於碣石暮宿於孟諸夫尺澤之鯢豈能與之量江海之大哉宋玉莊周皆楚人所言鵬鳯俱以鯤配又其言絶雲負天詞㫖亦相類明鵬即鳯也但齊諧主於怪故以九千為九萬耳鳯鳯神鳥也韓詩外傳曰黃帝即位字內和平惟思鳯象召天老而問之天老對曰夫鳯象鴻前而麟後蛇頸而魚尾鸛顙而鴛思龍文而龜背燕頷而雞喙又說者曰五色具揚出東方君子之國翺翔四海之外過崑崙飲底柱濯羽弱水暮宿風穴見則天下大安寧又有六像九苞之說蓋鳯生南方去中國甚逺而又不妄飛鳴飲啄其至蓋罕故孔子稱之而世好事者喜為之傳道務竒怪其章紬繹其聲列於神聖故千世而不合焉蓋鴻前者軒也麟後者豐也蛇頸者宛也魚尾者岐也鸛顙者椎也鴛思者張也龍文者緻也龜背者隆也燕頷者方也雞喙者鈎也六像頭像天者圎也目像日者明也背像月者偃也翼像風者舒也足像地者方也尾像緯者五色具也九苞口包命者不妄鳴也心合度者進退精也耳聽達者居髙明也舌詘伸者能變聲也彩色光者文采呈也冠矩朱者南方行也距鋭鈎者武可稱也音激揚者聲逺聞也腹文户者不妄納也行鳴曰歸嬉止鳴曰提扶夜鳴曰善哉晨鳴白賀世飛鳴曰即都知我唯黃持竹實來譯者即其音而附之聲也黃帝使泠綸制十二筒聽鳯鳴則雄鳴為六雌鳴亦六比黃鐘之宮而皆可以生之是為律本少皥氏以其鳴合十二律故設鳯鳥氏之官以為歷正及帝舜之時作簫以象之故簫韶九成鳯皇來儀儀者蓋馴擾相狎久而不去非特為羽儀而已禽經曰䍿以鳴鳴鳯鳯以儀儀䍿儀匹也如衛詩實維我儀周語丹朱馮身以儀之是也覆巢擲卵則鳯皇不至故孟舒國人首鳥身其先世為霅氏訓百禽夏后之世始食卵孟舒去之鳯皇隨焉梧桐楝實乃所在有之竹實則竹之將死者先花而為實如小米顧不至爾南恩州北甘山壁立千仭有瀑水飛下猿狖不能至鳯皇巢其上彼人呼為鳯皇山所食亦蟲魚遇大風雨或飄墮其雛小者猶如鶴而足差短南人截取其觜謂之鳯皇杯古稱鳯生丹穴丹穴南方也顧出則為異爾蔡衡對光武凡鳯有五多赤色者乃鳯多黃色者鵷雛多青色者鸞多紫色者鸑鷟多白色者鵠禽經亦曰青鳯謂之鶡赤鳯謂之鶉黃鳯謂之鸞白鳯謂之鷫紫鳯謂之鷟說文亦曰五方神鳥東方曰發明南方曰焦明西方曰鷫鷞北方曰幽昌中央曰鳯皇則此五者皆鳯類使不足道不至為怪祥矣而樂協圖徴說五鳯皆五色為瑞者一為孽者四鷫鷞旱疫之感發明喪之感焦明水之感幽昌旱之感且其稱四鳯身背嬰膺負皆合五常豈應為孽蓋漢儒既夸大其辭推鳯為希世之瑞夸而無驗極而必反則又推之以為孽大抵日新其說競為可喜以動人之耳目故既鳯矣而又孽之雖孽之矣則又不廢身文義仁智禮信之說反覆無所據皆不足取也至若漢書云凡五色大鳥似鳯者多羽蟲之孽是則異鳥之不知名者也遽可鳯之耶周書王㑹西中以鳯鳥方煬以皇鳥淮南子曰二皇鳯至於庭三代鳯至於澤德彌澆所至彌逺德彌精所至彌近鸞鸞赤色五采雞形鳴中五音古者職方氏之職揚荆二州其畜冝鳥獸先儒以為孔鸞鵁鶄犀象之屬然則蓋常有之物非若麟鳯為畜鳥獸不獝狘也孔雀鵁鶄後世稔識而鸞在緯書已為瑞物故瑞應圖稱鸞赤神之精鳯皇之佐說文以為頌聲作則至引周成王時氐羌獻之以為驗而山海經亦言生於女牀見則天下太平也鸞入夜則歌好自歌自舞或曰鸞甚好其類見則鳴舞西域之國嘗有得之者金樊珍羞三年不一鳴乃懸鏡照之覩影悲鳴中宵一奮而絶蓋以為其類而感也昔有虞氏之輅謂之鸞車亦曰鸞輅明堂月令春則乘之蔡雍稱以金為鸞鳥懸鈴其中施於衡為遲速之節崔豹古今注亦以為五輅衡上金雀者朱鳥也口銜鈴鈴謂之鑾禮云衡前朱雀或謂朱雀者鸞鳥以前有鸞鳥故謂之鸞鸞口有鈴故謂之鑾事一而義異然則鳥之鸞主形鈴之鑾主聲鈴之為鑾亦以象鸞鳥之聲為名耳然杜預又以為錫鸞和鈴者錫在馬額鸞在鑣和在衡鈴在旗動皆有鳴聲則與前說異按鸞和皆鈴也韓詩外傳大戴禮及鄭氏解周官大馭禮記玉藻經解之篇皆云鸞在衡和在軾唯毛氏蓼蕭傳稱在軾曰和在鑣曰鸞鄭氏解烈祖復兼取之以詩輶車鸞鑣及四牡八鸞考之鑣謂馬口兩旁四馬故八鸞則言在鑣者亦不為無據然此乃謂輶車及仲山甫人臣所乘耳若乃天子之路既特以此為名不當止如常車置馬口傍故秦風箋亦以為輶車者置鸞於鑣異於乘車是則天子之乘車鸞不在鑣而在衡明也然說者又以衡之所容唯兩服馬安能置八鸞夫八鸞既不主謂天子之車則施一鸞於衡上有何不可豈必欲置服馬間而後為在衡耶蓋鸞路之說如此至常鸞則所在施之如庭燎之鸞則謂旗之鈴蓋旌旗有鈴為旗夜未盡則聞其聲夜鄉晨則見其旗而所謂鸞刀者又特以有鐶為鸞亦不特鈴也凡此皆以鸞善為聲故取之禽經有鸞鳴噰噰鳯鳴喈喈又以為君子之車也然鸞赤色五彩古又以應朱雀至後漢光武時華陰有大鳥髙五尺雞頭燕頷蛇頸魚尾五色備舉而多青詔問百僚咸以為鳯唯太史令蔡衡對以為凡象鳯者五多赤色者鳯多青色者鸞今此鳥多青乃鸞非鳯也與說文端應圖之說異淮南子曰羽嘉生飛龍飛龍生鳯皇鳯皇生鸞鳥孔雀孔雀生南海蓋鸞鳯之亞尾凡五年而後成長六七尺展開如車輪金翠燁然始春而生至三四月復凋與花蕚俱榮衰羽屬之最華耀者故元命包言火離為孔雀然尤自珍愛遇芳時好景聞弦歌必舒張翅尾眄睞而舞蓋物之能自愛者如鸞自歌鳯自舞也羣飛數十為偶南人收其雛養之使極馴擾置山間以物絆足旁施羅網伺野孔雀至則倒網掩之無遺者其雌尾短略無文彩孔雀不必匹偶但音影相接便有孕如白鶂相視雄鳴上風雌鳴下風之類或曰與蛇為偶蛇盤結其上今野雉亦有與蛇交者理或有之或云聞雷聲而孕周成王時方人常獻列於王㑹及漢文帝時趙他亦以為獻九歌稱孔蓋兮翠旍以為神明之飾魏文帝亦嘗詔以于闐所上尾萬枚為金根車蓋南越人以珥門户鶴鶴一起千里古謂之仙禽以其於物為壽淮南曰鶴夀千嵗以極其游狀大如鵝腳青黑髙三尺餘喙長四寸常夜半鳴其聲揚聞八九里雌者聲差下繁露曰鶴知夜半鶴水鳥也夜半水位感其生氣則喜而鳴所以壽者無死氣於中也又性絶警八月白露降則警而鳴性好在陰故謂其羽為陰羽周書曰陰羽鳬旌解者曰鶴鳬羽為旌也相鶴經曰鶴陽鳥也而游於陰因金氣依火精以自養金數九火數七故七年小變十六年大變禽經亦曰鶴愛陰而惡陽鴈愛陽而惡陰故易有鳴鶴在陰之文然詩稱鶴鳴于九臯聲聞于天與易之鳴鶴在陰其子和之若不同者蓋鳴于九臯鶴之俊者以喻士之及時而未仕者至其老則聲不能揚和者獨其子而已禽經又曰鶴老則聲下而不能髙近而不能遼此之謂也書又言鶴體無青黃二色者木土之氣內養故不表於外然本草云鶴有𤣥有黃有白有蒼蒼者今人謂之赤頰𤣥則鶴之老者百六十年則有純白純黑之異若黃鶴則古人常言之古書又多言鵠鵠即是鶴音之轉後人以鵠名頗著謂鶴之外别有所謂鵠故埤雅既有鶴又有鵠蓋古之言鵠不日浴而白白即鶴也鵠名哠哠哠哠鶴也以龜龍鴻鵠為壽壽亦鶴也故漢昭時黃鵠下建章宫太液池而歌則名黃鶴神異經鶴國有海鵠衛懿公好鶴齊王使獻鵠于楚亦列國之君皆以為玩其餘諸書文如蕙帳空兮夜鶴怨楚辭黃鵠一舉及田饒說魯哀公言黃鵠或為鶴或為鵠者甚多以此知鶴之外無别有所謂鵠也鶴好延頸以望故稱鶴以怨望鴟以貪顧怨者必望故以望為怨不意君之望臣深是也貪者必顧故以顧為貪數招權顧金錢是也古以鶴為祥故立之華表說文相亭郵表也一說漢法亭部四角建大木貫以方表名曰相表又鶴之膝特隆故吳矛骹大者名鶴膝又作詩者以中字平為鶴膝雞雞司時之畜鳴必三度故禮有初鳴而衣服者又能自守不為風雨止故詩人以比不改度之君子古有雞人掌共雞牲大祭祀夜漏未盡則呼旦以嘂百官以其畜雞則知時故也春秋說題辭雞為積陽南方之象火陽精物炎上故陽出雞鳴以類感也春秋運斗樞曰玉衡星散為雞括地圖則言度朔山𤣥中記曰桃都山有大桃木盤屈三千里上有金雞日照則鳴於是晨雞悉鳴矣古稱雞之德五頭戴冠者文也足傅距者武也敵在前敢鬬者勇也見食相告者仁也鳴不失時者信也雞有五德猶日瀹而食之何也以其所從來者近也然雞老遇嵗晏則有怯寒至曉方鳴者又雞或乙丙夜輒鳴者俗謂之盜啼云行且有赦蓋海中星占云天雞星動為有赦故後魏北齊赦日皆設金雞揭于竿至今猶然亦曰盜啼為有火古稱牝雞之晨惟家之索以喻商王之用婦言至漢世乃有雌雞化為雄冠距鳴將與雄不殊將者謂能率領其羣也說者曰雞有冠距文武之貌不為威儀貌氣毁故有雞禍風俗通云呼雞曰朱朱相傳雞本朱氏翁化為之按漢祝雞翁居尸鄉山下養雞百餘年皆有名字呼名則種别而至則朱乃祝之轉也又崔豹古今注雞名燭夜爾雅雞大者蜀其音豈又本於此耶郭璞既解蜀為今之蜀雞廣志又稱大者蜀小者荆而莊子别稱越雞不能伏鵠卵魯雞固能則荆與越為小蜀與魯為大荆越相近若蜀者非巴蜀蓋魯成公㑹于蜀者亦魯地云爾說文魯郊以丹雞祝曰以斯鶾音赤羽去魯侯之咎又禽經曰鷹雞多秋生雉雞多冬死蓋魯雞則今鬬雞自周宣王時已有紀渻子為王養鬭雞之事其後魯季郈雞鬭季氏介其雞蓋以膠沙播其羽或曰搗芥汁播之郈氏則為之金距距者雞附足骨鬭時所用刺也後世則又私取狸膏塗其頭輒鬭無敵此非有厭勝特是狸能捕雞異雞聞狸之氣則畏而走不若養之至於木雞者之全也今南方蓄蠱之家雞輒飛去莊子謂惠子曰羊溝之雞三嵗為株相者視之則非良雞也然而數以勝人者以狸膏塗其頭雉雉有十四種春秋運斗樞曰璣星散為雉澤雉十步一啄百步一飲因地之墳衍以為疆界分而護之不相侵越一界之內要以一雄為主餘者雖衆莫敢鳴其雋者不特一雌雉耿介之禽應義氣十一月雷在地中雉先知而鳴說文雊雄雌鳴也雷始動雉鳴而雊其頸蓋雊鵒以足相勾雉以頸相勾故雊鵒從句雉雊亦從句髙宗祭成湯有飛雉升鼎耳而雊非特鳴而已然聞聲似雷者亦從而應齊景公作為路寢之臺族鑄大鐘撞之庭下郊雉皆詬許氏曰大鐘聲似雷震雉應而詬鳴也又天水冀南山有石鼓長丈三尺廣厚略等漢成帝時有聲如雷聞二百四十里野雞皆鳴蓋以為雷也夏小正曰正月雉震詬雉以媒取媒者少養雉子至長狎人能招引野雉因名曰媒以翳隱身而射之媒江淮間謂之游言可與游按說文囮譯也率鳥者繫生鳥以來之名曰囮讀若訛囮或從繇為㘥又音由然則游乃㘥也至若周官翨氏攻猛鳥各以其物為媒而掎之乃謂用其所食之物世以鳩鴿置羂中以媒鷹隼而掎其腳其為媒之名雖同而實則異禮六摯士執雉取其守介而死不失節也漢五行志雉者聽察先聞雷聲故月令以紀氣鷩鷩似山雞而小冠背毛黃腹下赤項緑色鮮明山海經曰小華之山其鳥多赤鷩可以禦火一謂之􅨧蛦又謂之鵔鸃說文鷩赤雉也鵔鸃鷩也昔者趙武靈王貝帶鵕翿而朝趙國化之漢初閎孺籍孺以佞幸故孝惠時侍中皆冠鵔鸃冠貝帶傅脂粉化閎籍之屬也鵔鸃冠者以此鳥羽飾冠古有鷩冕既同一物豈亦類此耶周禮王之吉服享先公饗射則鷩冕而侯伯之服自鷩冕而下如公之服說者但解衣之九章以為鷩者畫以雉謂自次三華蟲以降然既以冕為名安知冠無此飾不然漢之鵔鸃何所本哉此鳥雅好髙故曰􅨧蛦山棲又曰仰攀鵔鸃然此但云似山雞而南越志稱鵔鸃即山雞利距善鬭人以家雞鬭之則可禽光色鮮明五采眩耀劉淵林解吳都賦亦以山雞如雞而黑色木棲晨鳴今所謂山雞者鷩蛦也合浦有之然則山雞自黑絶不與此類郭景純特以比其大小耳至於凡言華采者皆此鷩也博物志曰山雞有美毛自愛其色終日映水目眩則溺死翟雉長毛雨雪惜其尾栖髙木杪不敢下食往往餓死蓋雉輕死之物故或眩以死或餓以死而其它又鬭以死亦其性然也畨禺諸郡往往取山雉為筆五色可愛烏烏孝鳥也始生母哺之六十日至子稍長則母處而子反哺其日如母哺子之數故烏一名哺公而束晳補亡詩云嗷嗷林烏受哺于子也孔子曰烏盱呼也取其助氣故以為烏呼蓋烏之呼如人之歎聲故古者記人之歎輒書烏呼以記之又謂之於戲於即古烏字穆天子傳曰於鵲與處是也戲即呼也古者言日中有烏堯時十日並出羿射落九烏蓋日以比人主傳曰天無二日土無二王少皥之衰九黎亂德堯出而平之故以喻射九烏焉日中之烏有三足故說者以為烏三㸃者法三足然說文鳥烏之足似匕皆從匕無三足之義且舄焉皆烏名從烏之類豈必皆三足耶此與數馬足者類矣烏好下麥田中拾麥食之既飽則啄土藏之已而忘其處往往疆畔之上麥種十為叢者烏所種也其智足以通禍福故所在則人忌之而西南人事烏為鬼以為能知未然也太公曰愛人者愛其屋上烏憎人者憎其儲須蓋儲峙以侍所須人之所冝愛也而憎人者併憎之烏集為不祥人所憎也而愛人者併愛之以言憎愛因情而遷有如此者淮南曰烏力勝日而服於隼禮能有修短也烏本黑之稱故瑞應圖以白烏為太陽之精至孝之應孝經援神契曰德至鳥獸則白烏下先君尚書守新定日有烏生四子於郡之南山二黑二白日集于黃堂相間飛止若奕州人請奏瑞不許是亦異矣鵲鵲者烏之屬故周禮總謂之烏鳥又以其色駁名之為駁鳥淮南曰若魚之躍若鵲之駁此自然者不可損益古鵲之字作舄蓋象形文則作能知氣候疾徐陰陽向背風水髙下嵗必一營巢其孳生比它物最早故自小寒五日而始巢巢常背太嵗而向天一淮南曰太陰所建蟄蟲首穴而處鵲巢嚮而為户又曰夫蟄蟲鵲巢皆嚮天乙者至和在焉爾又知嵗之多風則去髙木而巢扶枝或曰水大則巢髙水小則巢卑巢皆取木之枝梢不取墜枝巢中亦塗飾橫梁其中相傳見其上梁者貴云於是傳枝而生子春二月而有乳鵲矣已則捨去而他鳥居之故召南稱鳩居鵲巢周書時訓曰鵲不始巢國不寧則以巢比國蓋舊說也始則一鳩居之而已尋則呼其偶併居焉所謂方之者也至其後則生子盈之家道成矣今烏之類亦逐鵲而居其巢鵲能知人之吉凶故自啄其足則行人至或曰其聲接接令接來者也南人以其聲為吉以烏為凶北人反之崑崙之下以玉璞抵鵲蓋惡之也鵲雖能知來及其避風而巢卑也大人過之則探其鷇嬰兒過之則挑其卵故號知來而不知往涉秋七日首無故皆髠相傳以為是日河鼓與織女㑹於漢東役烏鵲為梁以渡故毛皆脫去按秋鳥獸毛毨之時又山海經羣鳥有解羽之所此豈解羽類耶其尾尤長故漢世髙祖所為劉氏冠民間謂之鵲尾冠又熏爐之有柄者謂之鵲尾爐鵲能制蝟鵲之所在蝟必反腹而受啄焉或在木上鳴蝟伏不能行淮南曰鵲矢中蝟此類之不推者也音釋鵬步登反夏革下音棘列子湯問篇注夏革字子棘為湯大夫鷃於諫反亦作鴳司馬云鴳鴳雀也碣石其謁反海中山名鬐渠脂切暴步卜切鯢音倪說文刺魚也郭璞曰似鮎四足一曰雄鯨雌鯢鳯麟道作麟鴛思說苑作鴛鴦思顙音桑額也又養韻椎直追切椎鈍不曲撓也緻音稚密也緯宋均曰五元也户宋均曰所由出入也知我唯黃宋均曰黃中通理也按初學記扶竹實來之下又有一句云故子欲居九夷從鳯嬉䍿胡光切馮身上音慿周語注房后之行有似丹朱丹朱慿依其身而匹偶焉生穆王也覆音福擲與擲字同霅氏猿狖上于緯切或作猿下余救切鼠屬善旋鸑鷟上五角切下七角切鷫鷞上息逐切下所莊切鸞鵁音交鶄音精畜音嗅獝音橘驚遽貌又休必切狘許月切獸走貌女牀山名錫音揚鑣甫驕切馬銜輶音由孔雀眄睞上莫見反下力代反鶂倪歷切說文引春秋傳鶂退飛博物志雄雌相視則孕與旌同珥音餌飾也鶴哠哠胡告切骹音敲脛骨近足細處雞呼火吳反又作呼􅑧古弔反渻所景反徐所幸反郈音后魯孫氏邑名在東平無鹽縣雉雊音遘翳於計反訛音訛翨氏上音趐鳥翮掎之居綺反周禮注猛鳥鷹隼之屬置其所食之物於羂中鳥來下則掎其腳羂古泫切罔張獸也鷩音龞雉屬􅨧亦作龞蛦音啼鵔思俊切鸃牛竒切翿徙到切翳也翟音狄烏休俱切匕卑履切隼禮上朱惟切許注烏在日中而見故曰勝日服猶畏隼禮爾雅謂呼笠秦人謂之祀祝間蠶時晨鳩入舍者鴻鳥皆畏之故曰能有修短也鵲舄古鵲字首冗首去聲扶枝淮南注扶旁也鷇音冦鳥子髠音坤去髮挑徒了切弄也爾雅翼卷十三
