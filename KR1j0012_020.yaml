body:
  text: 欽定四庫全書爾雅翼卷二十宋羅願撰釋獸三鹿麋麕麈􅕱麝麢猴猿玃􅛊蜼鹿六為律律主鹿故鹿六月而生鹿雖應律然非辰屬八卦無主故陶隱居云古稱馬之似鹿者直百金今荆楚之地其鹿絶似馬當解角時望之無辨土人謂之馬鹿以是知趙髙指鹿為馬蓋以類爾鹿角無枝曰角有枝曰觡又獵者云鹿自有無角者名為麀鹿凡鹿夏則解角而易毛冬則角長而毛深故喪車鹿淺䄙説者謂以鹿夏皮為覆笭也古者伏犧之世麗皮為禮按説文集韻云麗旅行也鹿之性見食急則必旅行禮麗皮納聘蓋鹿皮也皮辨以白鹿皮為冠益州人取鹿殺而埋地中令臭乃出食之名鹿􅖖鄭康成説曲禮云國君春田不圍澤大夫不掩羣士不取麛卵又月令孟春云毋麛毋卵以春時先乳特禁之也然周官迹人掌邦田之政令禁麛卵者説者曰此謂四時常禁也注云為其夭物且害生多里革曰獸長麑䴠孟孫獵而得麑使秦西巴持歸烹之麑毋隨之而啼秦西巴弗忍縱而豫之論語稱孔子素衣麑裘孔叢子曰孔子為司冦攝朝事人歌之曰麛裘之芾投之無戾芾之麛裘投之無郵鹿麛也黃帝時南夷乘白鹿來獻鬯成周黑齒貢白鹿漢武以白鹿皮為幣宋符瑞志白鹿王者明惠及下則至麋麋與鹿相反鹿是陽獸情淫而逰山夏至得隂氣而解角從陽退之象麋是隂獸情淫而逰澤冬至得陽氣而解角從隂退之象今海陵最多千百為羣多牝少牡人言一牡輒交十餘牝又與鹿交魯莊公十七年冬多麋劉向以為麋色青近青祥也麋之為言迷也蓋牝獸之淫者是時莊公將取齊之淫女其象先見京房易傳曰廢正作淫大不明國多麋又曰震遂泥厥咎國多麋古者獸人冬獻狼夏獻麋麋之性黠戰國䇿陳軫曰今山澤之獸無黠於麋麋知獵者張網而驅已也因還走而冒人至數獵者知其詐偽提網而進之麋因得矣淮南子曰孕婦見而子缺唇見麋而子四目武帝天漢四年令諸侯王大國朱輪特虎居前左兕右麋小國朱輪畫特熊居前寢麋居左右卿車者也古天子燕射熊侯白質諸侯麋侯赤質又許慎云古禮執羔麋鹿取其跪乳羣而不黨按鹿子曰麛麋子曰䴠羊既用羔則麋鹿亦當用麛䴠為物既小可得而擾也後漢志廣陵東陽縣多麋注博物志曰十千為羣掘食草根其處成泥名曰麋畯民人隨此畯種稻不耕而穫然則古謂水澤之地如孟諸之麇者豈此地類也左傳迹人來告曰逢澤有介麇焉説文麔麋牡者麎牝麋也麕麕之性怯又謂之麞章者張皇也俗謂之白肉言其白膽易驚怯道家以麕鹿不在十二屬非腥膩之物羞為白脯其飲水見影驚奔粗豪之人食其心肝者便即小膽若素懦者則轉怯不知所為麞乃極能走然未及鹿淮南子曰鹿之上山獐不能跂也及其下牧竪能追之才有所修短也古者畫繢之事山以章水以龍説者以為章讀為獐獐山物也在衣齊人讀䴠為麞馬氏以為獐山物畫山者并畫獐龍水物畫水者并畫龍鄭氏謂以獐表山以龍見水也有有牙者有無牙者崔豹古今注曰麞有牙而不能噬鹿有角而不能觸大者不過三二十斤老則牙見於外淮人謂之牙麞穆天子傳天子賜曹奴之人黃金之鹿銀麕注云今有在地中得玉豚金狗之屬此皆古賂夷狄之竒貨也蓋古嘗有此瑞物故以金銀倣而作之宋符瑞志曰白麞王者刑罰理則至晉咸寧三年見魏郡春秋運斗樞曰樞星散為麞麈麈大鹿也其字從主若鹿之主焉麈之所在衆從之其尾可用為拂談者執之以揮言其談論所指衆不能易也上林賦沈牛麈麋漢書粵地山多麈麖麈似鹿而大麖似鹿而小其尾能留紅色婦人以置蒨帛中經十餘年色不退以拂氊則氊不蠧周書王會篇稷謹貢大麈稷謹謂肅謹又世俘篇武王狩禽麈十有六􅕱􅕱大麕旄毛狗足能上木好作聲字説曰麂虎所在必鳴以告鹿屬馮而安者亦其聲几几然出東南山谷今有山林處皆有而均房襄漢間尤多實麞類也大麞毛長狗足者名􅕱南人往往食其肉然堅韌不及麞味美多食之能動痼疾其皮作履舄勝於衆皮又有一種類􅕱而更大名麖山海經曰女几之山其獸多麖􅕱宋書符瑞志銀麂刑罰得中民不為非則至麝麝如小麋臍有香釋獸謂之麝父字書謂之周書武王狩禽麝五十冬食柏葉夏食諸蟲尤噉蛇至寒則香滿入春急痛自以爪剔去之落處逺近草木皆焦黃此為生香若人帶過園中者瓜果皆不實范􅖙云麝性多忌今亦未知其所以為多忌者然楊文公常言商汝山多羣麝所遺糞常就一處雖逺逐食必還走之不敢遺迹他所慮為人獲人反以是求得必掩羣而獲之此當是多疑忌之義亦佩其香者經逰園囿多所避忌故以比刺當時之人其毛可以為筆鄭虔云麝毛筆一管寫書直行四十張狸毛筆一管界行寫書八百張又有水麝臍中唯水瀝一滴於斗水中用灑衣衣至弊而香不歇唐天寶初養於囿中麝獸之香者故物之香者比之今有麝香鳥又有麝香木又靈貓似麝生南海山谷如狸自為牝牡亦云蛉狸異物志云靈貓其氣如麝麢麢大羊似羊而大角圓鋭説文大羊而細角好在山崖間夜宿以角挂木不著地其角多節蹙蹙圓繞彎中深鋭緊小猶有挂痕耳邊聽之集集鳴者良慢無痕者非也其角號為有神故能辟去不祥今之金剛者出西域狀若紫石英百鍊不消切玉如泥置之山頂亦陷石而入及金處同類相見而止可謂堅矣惟此角能壞之麢雖大羊而性與羊異故字從鹿而釋獸敘在麞􅕱之前今人只作羚北人多食南人食之免為蛇蟲所侵上林賦足壄羊張揖曰麢羊也似羊而青説文麙山羊而大者細角猴猴一物而五名説文猴也貪獸也一曰母猴似人玃母猴也爾雅云玃父善顧玃持人也為母猴也其為禽好爪爪母猴象也下腹為母猴形王育曰爪象形也古文為象兩母猴相對形母猴屬頭似鬼甶者鬼頭也然則猴玃為蓋一物又有沐猴母猴之稱母非牝也沐音之轉耳然但是其屬乃是狨玃又大皆猴之類而非猴也猴狀似愁胡而手足如人其聲嗝嗝若咳今大林中有猴多處一大猴在木輒纍纍以手相援下飲好象人所為生子輒效人浴之山澗中鷹鳶過其上以一手按之仰視不轉子往往死水中輒相率哭泣埋之鄉人設果菽以取之者羣猴皆入惟老猴獨憑髙而望終不入至食欲盡四顧無人乃前猶復倣徨大抵以老猴至而後發機也每食輒置之兩嗛稍出而食之好行未嘗暫止或曰猴無脾故行以消所食猶象然停則有病然王延夀賦稱儲糧食於兩頰稍委輸於胃脾乃是有脾也蓋猴之性躁動今教擾之者皆先植杙地中使坐其上大抵旬月而後性定既能定矣技藝乃復易成今廏中多畜之以為令馬不畏辟惡消百病也猴性躁見物輒鬬故稱沐猴與狗鬭又好殘毁器物尤工捕蝨論衡曰鹿制於犬猴伏於鼠爪不利也王延夀賦有王孫之狡獸形陋觀而醜儀顔狀類乎老公軀體似乎小兒説文為母猴也楚辭曰獼猴兮熊羆慕類兮以悲老子曰為者敗之猴之性好詐故稱狙詐狙擊説文狙玃屬莊子稱狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆説説者以為狙公典狙之官三四者以升計也或又曰狙公者老狙自賦其徒耳按漢有祝雞翁此狙公蓋亦養狙者朝四暮三以枚計之爾獑胡似獼猴頭上有髮腰以後黑或云猴老者為獑猢猿猿與沐猴相類靜躁不同耳柳子贈王孫文云惡者王孫兮善者猿猿性仁不貪食多羣行雄者黑雌者黃雄者善啼啼數聲則衆猿呌嘯騰擲如相和焉其音凄入肝脾韻含宫商故巴峽諺曰巴東三峽巫峽長哀猿三聲斷人腸猿音清者象萬物之數五主音音主猿故猿五月而生音清切也其臂甚長人有此相者則以善射名淮南子曰羿左修臂而善射漢李廣猿臂其善射亦天性也然猿以臂長身不便於行舊或言其臂相通其實未見然猿所以夀者以長臂好引其氣也尤好攀援其飲水輒自髙崖或大木上纍纍相接下飲飲畢復相收而上在猴亦然漢書西域之國有烏秅者山居纍石為室民接手飲説者以為自髙山下溪澗中飲水故接連其手如猿之為是亦異矣舊説其色多青白玄黃段公路北户録言有緋猿絶大越處子論劒術乃有老翁試之相與周旋以林竹刺之騰上為猿故劒術號曰猿翁山海經堂庭發爽之山其上多白猿鬲山多猿蜼吳都賦猿父哀吟玃玃父善顧郭氏曰貑玃也似獼猴而大色蒼黑能玃持人好顧盻博物志云蜀山南髙山上有物如猴長七尺人行健走名曰猴玃或曰猳玃又名馬化伺行道婦女有好者輒盜之以去行者過其傍皆以長繩相引不然不免取去為室家其生子者終身不得還久亦迷惑不復思歸生子皆如人以楊為姓故蜀西界中多楊皆猳玃之種時時猶有玃爪者也古稱善顧顧是雄顧雌如顧兔之類江賦云狐玃登危而雍容又贊寧説生西方深山中面目如獼猴體大如驢善緣木皆雌無雄俗云大須三合而有子羣相隨要路上強牽男子而三合之十月而生據此則亦玃之類但所取男女為不同或各據所傳或别一種耳抱朴子云猿夀五百嵗則變為玃説文猶玃屬􅛊猓􅛊猿類也黑頰青身南方異物志曰交州以南有之其鳴自呼身如猿大面通闕白色其體不過三尺而尾長四尺餘反尾度身過其頭視其鼻仍見兩孔其毛長柔細滑澤色以白為質黑為文視如蒼頭鴨脅邊斑文案此則以尾塞鼻有同於蜼然吳都賦曰狖鼯猓然騰趠飛超蓋二物歟李肇曰舊説劒南人之采猓然者獲一猓然則數十猓然可盡得矣何也猓然性仁不忍傷其類見被獲者聚族而啼雖殺之終不忍去也然則謂之果然者以其來之可必歟猶常山之蛇擊首而尾即至故謂之率然此亦古制名之義也周禮巾車然􅍜注云然果然也今人亦用作裀褥鍾育賦似猴象猿黑頰青身肉非嘉肴唯皮為珍元微之詩果然皮勝錦吳録云猿狖類也色青赤有文居木上九真日南有之蜼蜼狖也似獼猴而大黃黑色尾長數尺似獺尾末有岐鼻露向上雨則自挂於木以尾塞鼻或以兩指江東人亦取養之為物捷健江賦曰迅蜼臨虛以騁巧是也蜼讀如贈遺之遺又讀如橘柚之柚其作柚音者或為狖音義皆同孫愐不審乃於一音中分之云蜼獸名似猿狖似獼猴不知似猿者即此獼猴淮南子曰猿狖失木而禽於狐貍非其所也其招隱曰猿狖羣嘯兮虎豹嗥古者有蜼彛畫蜼於彛謂之宗彛又施之象服夫服器必取象此等者非特以其智而已蓋皆有所表焉夫八卦六子之中日月星辰可以象指者也雲雷風雨難以象指者也故畫龍以表雲畫雉以表雷畫虎以表風畫蜼以表雨凡此皆形著於此而義表於彼非為是物也考工記曰土以黃其象方天時變火以圜山以章水以龍鳥獸蛇蓋水為難畫故以龍表之然所以畫者在水不在龍也智者由此觀之思過半矣上林賦玄猿素雌蜼玃飛蠝廣成頌尾蒼蜼周禮注蜼禺屬卭鼻而長尾音釋鹿觡音格􅍜莫歷反笭音靈􅖖內則注於偽反迹人迹子亦反主知禽獸之處里革下音棘芾音弗通作韠也麋泥去聲寢麋如輿服志倚龍伏虎寢兕之類䴠於兆反注介麇左傳注介大也麇力倫反逢澤在滎陽開封縣東北麔音咎麎音辰麕音君與麇同豚與豚同麈之庾切麖與麠同音京注稷謹即肅慎􅕱音几旄爾雅注㺜長毛也音蝎通志略音冒玉篇蝐音妹馮皮沐反韌音刃麝麝父通志略父音甫麢音零注足壄羊壄音野足踏也麙五咸切猴奴刀切玃九縳反為干偽切音若危好爪好去聲謂好用爪牛具反甶甫勿反嗝嗝古厄反纍纍與纍通嗛胡簟善簟二反銜也杙音弋莊子稱狙猴之杙狙音疽獑胡上音巉猿音袁秺宅加反蜼惟季切又音袖玃居縳反猳占瑕反音帚􅛊音然猓音果狖羊就反鼯音吾趠田角反跳也然䄙莫歷反蜼惟季切又音柚注飛音壘飛生鳥名飛且乳注卭鼻上疑岡切爾雅翼卷二十
