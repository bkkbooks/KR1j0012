body:
  text: 欽定四庫全書爾雅翼卷二十八宋羅願撰釋魚龍鯉鱣鮪魴鱮鮒鱒鱧鰷鯊龍龍春分而登天秋分而潛淵物之至靈者也淮南子言萬物羽毛鱗介皆祖於龍羽嘉生飛龍飛龍生鳳皇而後鸞鳥庶鳥凡羽者以次生焉毛犢生應龍應龍生建馬而後麒麟庶獸凡毛者以次生焉介鱗生蛟龍蛟龍生鯤鯾而後建邪庶魚凡鱗者以次生焉介潭生先龍先龍生𤣥黿而後靈龜庶龜凡介者以次生焉王符稱世俗畵龍之狀馬首蛇尾又有三停九似之説謂自首至膊膊至腰腰至尾皆相停也九似者角似鹿頭似駝眼似鬼項似蛇腹似蜃鱗似魚爪似鷹掌似虎耳似牛頭上有物如博山名尺木龍無尺木不能升天其為性麤猛而畏鐵愛玉及空青而嗜燒燕肉故嘗食燕者不可渡海又言蛟龍畏楝葉五色絲故漢以來祭屈原者以五色絲合楝葉縛之古者有豢龍御龍氏徒以知其欲惡而節制之耳將雨則吟其聲如戞銅盤涎能𤼵衆香其嘘氣成雲反因雲以蔽其身故不可見今江湖間時有見其一爪與尾者唯頭不可得見自夏四月之後龍乃分方各有區域故兩畆之間而雨𤾉異焉又多暴雨說者云細潤者天雨猛暴者龍雨也龍火與人火相反得濕而焰遇水而燔以火逐之則燔熄而焰滅養魚及三百六十則蛟龍將魚飛去龍以變化無方物不能制故在人比君在卦比乾之七爻象天蒼龍七宿乾七爻以龍為用天七宿以龍為體盖自下數之其第一爻潛龍則未見也故蒼龍第一宿不取龍之象第二爻為見龍在田則或見其尾矣故龍之宿其二為尾第六爻為亢龍有悔故龍之宿其六為亢第七爻為見羣龍无首吉故其七為角今易讀亢龍與角亢之字異音然其義實相通葢順則降升則逆龍之亢有逆鱗一尺而不可膺也則為能升而不及反故曰亢龍有悔然則乾之亢龍雖以角亢之亢讀之可也鯉鯉者魚之主形既可愛又能神變乃至飛越江湖孟春之月應陽而動上負氷獺於是時取而四面陳之謂之祭魚故淮南子時則訓孟春之月魚上負氷獺祭魚許慎皆曰鯉也今人但謂之赤鯉然案之古種類至多崔豹云兖州人謂赤鯉為赤驥青鯉為青馬黒鯉為黒駒白鯉為白騏黄鯉為黄騅皆取馬之名以其靈仙所乗能飛越江湖故也其種易繁陶朱公養魚以六畆地為池求懷子鯉魚長三尺者二十頭牡鯉魚長三尺者四頭以二月上庚納池中令水無聲魚必生所以養鯉者鯉不相食易長至來年二月得鯉魚長一尺者萬五千枚三尺者四萬五千枚二尺者萬枚按此二十魚一歳之間生七萬枚計每頭生三千五百枚不盈尺者盖不道此有以見其繁息也故魚麗美萬物盛多終之以鯉盛之極也必言尺者盖古者之制淮南子曰魚不長尺不得取彘不朞年不得食也唐律取鯉魚即宜放號赤鯶公賣者杖六十以國氏李諱其同音也故用魚符盖取象於鯉至武后革李氏則代之以龜古云鯉脊中鱗一道每鱗有小黒㸃文大小皆三十六鱗案是脇正中一道爾非脊也鱣鱣大如五斗奩長丈口在頷下長鼻輭骨常三月中從河上常於孟津捕之淮水亦有之肉黄唯以作鮓而骨可啖盖䲋屬也鱣盖鮪之類但鱣肉黄鮪肉白以此為别今江東呼鱣為黄魚大者曰王鱣孔子曰食水者善游而耐寒謂魚類也鱣鮪之類雖食於水而不正食水淮南子曰鵜胡飲水數斗而不足鱣鮪入口若露而死故鱣鮪不善游冬乃岫居入河而眩浮亦其類也許慎云鮪魚三月遡河而上能度龍門之限則得為龍盖鱣亦其類酈元注水經曰漢水東經西城縣胡城為鱣湍洪波漭盪漰浪雲頽耆舊言有鱣魚奮鬛望濤直上至此曓鰓因以名湍焉鮪鮪以季春來形似鱣而青黒頭小而尖似鐵兠鍪其口亦在頷下其甲可以摩薑大者不過七八尺肉色白味不如鱣然周禮䱷人春獻王鮪周頌季冬薦魚春獻鮪月令季春薦鮪于寢廟皆特獻之者以其及時可貴也東京賦稱王鮪岫居山有穴曰岫其穴在河南小平山長老言王鮪之魚由南方來出此穴中入河水見日目眩浮水上流行七八十里釣人見之取以獻天子用祭或曰鮪魚出海三月從河上來今鞏縣東洛度北崖上山腹穴舊説此穴與江湖通鱣鮪從此穴而來入河或曰鮪魚三月遡河而上能度龍門之限則得為龍東萊遼東人謂之尉魚或謂之仲明仲明者樂浪尉溺死海中化為此魚案尉盖鮪聲之訛仲明之說又相沿而生然萬物變化亦不可知也周洛曰鮪蜀曰䱴䲛唐韻崶山一名龍門山在封州大魚上化為龍上不得㸃額流血水為丹色也淮南子曰河魚不得明目穉稼不得育時其所生者然也説文鮪鮥也一曰水名鞏縣西北臨河有周武山武王伐紂使膠鬲禦之鮪水上盖其處也相𫝊山下有穴通江穴有黄魚春則赴龍門故曰鮪岫今為河所侵不知穴之所在集韻云交州記交趾封谿縣有隄防龍門水深百尋大魚登此門化成龍不得過曝鰓㸃額血流此水常如丹池後漢志注即唐韻封州魴魴縮頭穹脊博腹色青白而味美今之鯿魚也漢水中者尤美常以槎斷水用禁人捕謂之槎頭鯿宋張敬兒為刺史獻齊髙帝一千八百頭即此也說苑陽晝曰夫投綸錯餌迎而吸之者陽鱎也其為魚也薄而不美若亡若存若食若不食者魴也其為魚也博而厚味今網罟者乃以魴為易取豈難於釣而易於網耶詩稱魴魚赬尾說者以為魚勞則尾赤左𫝊曰如魚竀尾衡流而方羊裔焉鄭氏以為魚肥則尾赤二説雖不同然魚肥則不耐勞不耐勞則尾易赤以魴言之其體愽大而肥不能運其尾加之以衡流則其勞甚矣宜其尾之赬也盖詩之赬尾以喻宗周臣下之勞左氏之赬尾則有志大心勞之象故以衡流竀尾為言也鱮鱮鱅鰱魚也大頭而細鱗魚之不美者故語曰買魚得鱮不如噉茹盖魚雖一類而所食不同今鯇惟食草鱒食螺蚌鱮乃食鯇矢則宜其味之不美爾今人亦不珍此族往往以為鮑魚詩稱孔樂韓土川澤訏訏魴鱮甫甫夫鱮不美魚也而何足特稱以為韓土之樂盖言川澤之善者以其美惡之並畜魴美而鱮不美今皆甫甫然則其土之樂可知矣猶之稱周原之膴膴者必以董荼如飴言之也鱮性羣故從與又徐人謂之鰱從連敝笱之詩曰敝笱在梁其魚魴鰥又曰其魚魴鱮其魚唯唯盖笱之守魚猶禮之守國也説文曰池魚滿三千六百蛟來為之長能率魚飛置笱水中即蛟去夫蛟隂類難制之物欲率魚而去笱雖敝而能制之使其在水者有魴鰥焉有魴鱮焉有唯唯之衆焉不以蛟而徙也今魯桓公㣲弱無守國之器使從文姜者如雲如雨如水而不能少為之制則曽敝笱之不若也言魴鱮者亦美惡兼存之義言魴鰥者則又大小兼畜之義孔叢子曰吾視下釣垂一魴之餌鰥過而弗視也更以豚之半體則吞之矣此魴鰥大小之辨也郭璞曰鰫似鰱而黒鮒鮒似鯉色黒而體促肚大而脊隆今謂之鯽魚其味最美呉人以菰首為羮以鯉鯽為鱠謂之金羮玉鱠古者謂鮒為鰿其字從責今之鯽字乃烏鰂之鰂後世借用為鮒之别名爾魚小而耐寒大者止二三斤所在有之莊子稱車轍中有鮒得升斗之水而活易井卦九二曰井谷射鮒甕敝漏井以上出為用者也九二上無其應反下比於初若谷中之水下注轍鮒又若甕之漏而水下流皆反養下而不與上交失井之道故其象曰无與也然子夏易𫝊云井中蝦蟇呼為鮒魚案莊子稱埳井之鼃則井者鼃所宜集然又言還虷蟹與科斗皆以為井中之物則亦應有小魚故羊舌鮒樂王鮒皆以魚為字今井谷中亦自往往有魚不特蝦蟇也說者又云有䲙魚與鯽狀同而味殊䲙是節化鯽是稷米化之其魚腹尚有米色寛大者是鯽背髙腹狹小者是䲙未知其審山海經綸魚黒文狀如鮒鱒鱒魚目中赤色一道横貫瞳魚之美者今俗人謂之赤眼鱒其音乃如蹲踞之蹲食螺蚌多秖獨行亦有兩三頭同行者極難取見網輙遁詩稱九罭之魚鱒魴鱒既如此魴則説苑所謂若存若亡若食若不食者也周公有聖徳遭時之未信退避于東有難進易退之操故以鱒魴言之鱧鱧魚圓長而斑㸃有七㸃作北斗之象夜則仰首向北而拱焉有自然之禮故從禮膽獨甘也故从醴魚麗于霤有鱨鯊魴鯉鰋鱧鱧者古人所重今道家忌之以其首戴斗也又指為厭故有天厭鴈地厭犬水厭鱧之説皆禁不食又是公礪蛇所變然亦有相生者至難死猶有蛇性故今人亦畏焉郭氏解釋魚稱為鮦然今鮦又别一種鱧比他魚為最鮏説文鱧鱯也􅫛鱧也鰷鰷白鰷也其形纎長而白故曰白鰷又謂白鯈江東呼為鮂釋魚鮂里鰦是也此魚好游水上故莊子觀於濠梁稱鯈魚出游從容以為魚樂明遂其性也淮南子曰不得其道若觀鯈魚望之可見即之不可得此魚好游也而詩潛有多魚有鱣有鮪鰷鱨鰋鯉潛者糝也積柴水中令魚依之止息因而取之爾雅曰魚之所息謂之橬盖潛之詩謂季冬及春寒氣方盛故魚止槮中因而薦之非其出游之時今人謂鰷為參魚參音近於槮或以其伏槮中得名耶去其腸作䱹謂參魚䱹又謂其魚為肉條魚山海經鯈魚食之已憂鯊鯊魚狹而小甞張口吹沙故曰吹沙非特吹沙亦止食細沙郭氏所謂吹沙小魚者是也其味甚美大者不過二斤然不若小者之佳毛氏解魚麗于罶鱨鯊之義曰太平然後微物衆多則鯊是物之微者孔氏正義乃曰此寡婦笱而得鱨鯊之大魚是衆多也盖鯊雖小魚在笱中為大耳今人呼為重脣脣厚特甚有若鼃黽故以為名今江南小谿中每春鯊至甚多土人珍之夏則随水下自是以後時亦有之然亦罕矣來春復來大抵正月輙至魚之最先至者次則鯉至次則鱖至桃花水至而鱖肥則三月矣此魚生流水之中非畜於人又其至而多以明萬物自然繁育亦其先至故鱨鯊魴鯉鰋鱧或其序爾杜父魚色黒斑如吹沙而短音釋龍鯁古杏切膊浦各切亢音抗角亢之亢者周禮記仲夏昏亢中注東方星九度方氏曰亢喉也以揔攝聼訟有出納之象或作吭鯉鯶胡本切鱣知連切輭乳兖切柔也子林反鮪為鬼反漰普朋反曓步卜反鮪䱷人語居切捕魚也䱴公登公贈二反䲛武登武亘二切崶音封鮥音洛大魚也鰓相來切魚頰也魴槎鉏加切水中浮木也竀勑呈反衡華育反又如字方蒲郎反裔以制反横流方羊不能自安裔水邊言衛侯將若此魚哀十七年鱮似吕反鱅與恭市恭二反鰱里然反鯇華板反鱒慈損反訏訏况甫反訏訏甫甫大也鮑部巧切説文饐魚也饐陳臭也周禮注鮑者於楅室中糗乾之楅皮逼反鰥古頑反魴鰥大魚也唯唯唯癸反行出入之貌笱音耉説文曲竹捕魚也注鰫弋恭切鮒扶句切鯽子亦切與􅠧字同鰿子亦切與􅠧字同鰂疾得切與鱡字同説文鰂或从即埳井音坎郭音陷壞井也鼃本亦作蛙户媧反還虷還音旋顧視也虷音寒井中赤蟲也䲙廣韻音節鱒才本反鱧音禮魚麗力馳反罶音柳鱨音嘗鯊音沙鰋音偃鮦直壟反與䱰音義同鮏音腥注鱯乎化切佀鮎而大􅫛乎瓦切鱧也鰷音條鯈徒堯切又直流切鮂音囚鰦音兹橬與槮同糝素感切槮通作糝小爾雅聚柴木水中魚寒入其裏因以箔圍捕之䱹仄下切藏魚也爾雅翼卷二十八
