body:
  text: 欽定四庫全書爾雅翼卷十一宋羅願撰釋木楙椒榝欓槐柟楚楓樞栘楙楙木𤓰實如小𤓰而酢衛詩有木𤓰之篇毛氏以為衛人思齊桓公之徳欲厚報之而孔子謂吾於木𤓰見苞苴之禮行焉盖以果實問遺人者必苴裹之則厥包橘柚之屬是也陶隠居云山陰蘭亭尤多今處處有之而宣城者佳彼州種蒔尤謹徧滿山谷始實成則鏃􅑚作花傅其上重霧之夜露諸沙上旦暴之日則紙所不覆處皆紅文采如生以充上貢古以為苞苴亦以此歟魚復縣地多木𤓰大者如甒又其木可以為材故取幹之道木𤓰次之今人取木𤓰大枝作杖策之云利筋膝根葉煑湯淋足脛可以已蹷又截其木乾之作桶以濯足齊孝昭北伐庫莫奚至天池以木𤓰灰毒魚又别木𤓰者云木𤓰與和圓子蔓木土伏子相似其皮薄㣲赤黄香甘酸不澁瓤中子尖一面方者為真木𤓰椒椒實多而香故唐詩以椒聊喻曲沃之蕃衍盛大聊語助也陳詩貽我握椒周頌有椒其馨離騷云雜申椒與菌桂懷椒糈而要之九歌云奠桂酒兮椒漿播芳椒兮成堂漢世皇后稱椒房取其實蔓延盈升以椒塗屋亦取其温煖故長樂宮有椒房殿其後董賢女弟為昭儀居舎與后相擬號曰椒風及晉世石崇王愷之徒相矜以富於是崇以椒為泥泥其屋而愷以赤石脂泥其壁云荆楚之俗正月一日長幼悉正衣冠以次拜賀進椒酒崔寔月令云過臘一日謂之小嵗拜賀君親進椒酒從小起成公綏椒花銘云肇惟嵗首月正元日是知小嵗則用之漢朝元正則行之後世率以正月一日以盤進椒飲酒則撮寘酒中號椒盤焉然椒亦能殺人故漢李咸欲争竇后配桓帝擣椒自隨而齊建武中欲併誅髙武子孫令太醫煑椒二斛椒熟則一時賜死此其事春秋運斗樞曰玉衡星散為椒山海經曰琴鼓之山其木多椒孝經援神契曰椒薑禦濕菖蒲益聦蜀都賦丹椒爾雅以檓為大椒謂叢生實大者又曰椒榝醜莍莍萸子聚生成房貌今江東亦呼莍云樹有針刺葉堅而滑澤每葉中亦有刺蜀人作茶吳人作茗皆煑其葉以為香又東海諸島上有椒子長而不圓其味如橘皮島上麞鹿食此葉者其肉自然作椒橘香范子計然曰蜀椒出武都赤色者善秦椒出天水隴西細者善榝榝一名藙今之茱茰也其味苦辛置之食中能去臭南都賦所謂蘇榝紫薑拂徹羶腥者也古者膾春用葱秋用芥豚春用韭秋用蓼脂用葱膏用葅三牲用藙和用醯獸用梅盖皆薫辛之物所用各有冝爾漢律㑹稽獻􅱣一斗賀氏云今蜀郡作之九月九日取茱茰折其枝連其實廣長四五寸一升實可和十升膏然鄭氏及説文皆以煎茱茰為藙盖藙必煎乃用爾今蜀人猶呼其實為艾子盖藙之訛也風土記曰俗尚九月九日謂為上九茱茰至此日氣烈熟色赤可折其房以揷頭云辟惡氣禦冬西京雜記云漢武帝宮人九月九日佩茱茰食蓬餌飲菊花酒云令人長壽至宗懔記荆楚嵗時云漢費長房教桓景令家人各作絳囊九月九日盛茱茰繫臂上登山飲菊酒消厄盖至今用是日以榝雜菊花寘酒中飲古之遺俗也尤妙於辟毒破氣故云嶺南多毒足解毒之物即金蛇白藥之屬是也江湖多氣足破氣之物薑橘呉茱茰之類是也乃天生萬物以與人亦人窮急以致物楚辭稱椒專佞以慢慆兮榝又欲充夫佩幃椒以比上官之屬榝其黨也曹植樂府歌曰茱茰自用芳不如桂與蘭而郭璞射覆云子如赤鈴含𤣥珠乃是椒耳欓風土記曰三香椒欓薑欓出閩中江東其木似椿莖間有刺子辛辣如椒南人淹藏以為果品或以寄逺吳越春秋曰越以甘蜜丸欓執吳増封之禮則欓之相贈尚矣宋義熈八年太杜欓木生於壇側欓尚黒也宋水徳忽生此一木槐槐者虚星之精其葉尤可翫古者朝位樹之私家之朝皆植焉晉鉏麑觸趙宣子庭之槐董叔紡於范氏庭之槐又齊景公有所愛槐使人守之皆植於庭之騐也釋木曰櫰槐大葉而黒守宫槐葉晝聶宵炕郭璞以為晝日聶合而夜炕布者名為守宫槐按説文木葉摇白从木聶聲則聶乃開之義又炕乾也木葉近火而乾則當相合然則郭氏之説正反之耳今江東有槐晝開夜合者謂之合昬槐盖啟閉以時有守之義説者以為此槐與雅説相反不知郭氏誤解之也槐花可以染黄其子上房可以染皂其根可作神燭淮南子曰老槐生火久血為燐人不怪考莊子曰水中有火乃焚大槐老槐當夏間其上忽自起火焚燒枝葉所謂極陰生陽者也古者冬取槐檀之火槐檀色黑北方之行也淮南子槐之生也季春五日而兎目十日而鼠耳更旬而始規二旬而葉成管子五粟五沃之土其槐其楊柟柟大木也可以為舟又可以為棺故古稱楩柟豫章以為良木之類任昉述異記曰黄金山有柟木一年東邊榮西邊枯一年西邊榮東邊枯張華云交讓木宋子京云讓木即柟也其木直上柯葉不相妨蜀人號讓木南史陸慧曉傳亦云此木便是交讓顔師古曰柟今楠木楚楚者楚地所出其一名荆故楚國人春秋稱荆其後稱楚而荆州亦以此木得名也今人牡荆作樹生者實細黄色而莖甚勁生子細如麻子比蔓荆實而小故稱小荆又牡亦對蔓為名非無實之謂也禮弓矢圖楚弴以荆為之必以荆者凡木心圓荆心方蓍之徳圓而神卦之徳方以知以其徳方故以方木灼龜也漢書郊祀志以牡荆為幡竿又古者收威用榎與楚亦榎形圓楚形方互相備也廣州記曰白荆堪為履紫荆堪為牀牡荆節間不相當者月暈時刻之為劵以畏病者春秋運斗樞曰玉衡星散為荆戰國䇿董子治晉陽公宮之垣以荻蒿苫楚廧之其髙至丈餘趙襄子以為矢楓楓似白楊甚髙大厚葉弱枝而善摇葉圓而歧霜後丹色可愛字从風又釋木楓欇欇説者曰天風則鳴故曰欇欇或云無風自動有風則止按説文木葉摇白謂之則欇與風同義矣招魂云湛湛江水兮上有楓目極千里兮傷春心至漢宮殿中多植之魏景福殿賦猶稱槐楓被宸考漢故事也有寄生枝髙三四尺生毛一名楓子天旱以泥泥之即雨或云樹老有癭瘤忽遇暴雷驟雨癭上聳出一枝一夜暗出三五尺形如人鬼口眼備南中謂之楓人亦謂之靈楓越人以計取為神事之舊説云黄帝殺蚩尤於黎山之上擲其械於大荒之中朱山之上化為楓木之林此猶夸父之杖棄為鄧林也其子可以為式式局以楓木為天棗心為地其脂甚香謂之楓香脂一名白膠香入地千嵗則為琥珀楓上有菌食之令人善笑不止樞詩山有樞隰有榆樞荎盖榆之類今之刺榆也爾雅疏榆之類有十種葉皆相似皮及木理異爾而刺榆有針刺如柘其葉如榆卄瀹為蔬美滑於白榆内則曰菫荁枌榆免薧滫瀡以滑之盖榆之類皆滑免讀若問孫愐唐類莬新生草則薧乃是久者以上四物新舊之名皆滑利之名也嵇康謂榆令人瞑齊民要術稱梜榆刺榆凡榆三種色别種之勿令雜以為梜榆莢葉味苦凡榆莢味甘甘者春時將煑賣是以須别也廣志曰有姑榆有郎榆郎榆無莢管子曰五粟五沃之土其榆條直以長按陳藏器云江南有刺榆無大榆盖大榆北方有之秦漢故塞其地皆榆塞榆北方之木也淮南子曰槐榆與橘柚合而為兄弟有苗與三危通而為一家言槐榆北方橘柚南方也是以江南無榆但有樞耳若晉風則山隰兼有之然而有材不能用則不如其亡也汜勝之書曰三月榆莢雨時髙地強土可種木漢鑄莢錢如榆莢也又豐有枌榆社崔寔四民月令曰榆莢成者收乾以為㫖蓄色變白將落收為醤河平元年旱傷麥民食榆皮萬畢術曰八月榆檽令人不饑栘唐棣栘郭璞曰似白楊江東呼夫移逸詩曰唐棣之華偏其反而豈不爾思室是逺而孔子取而論之移生江南山谷其大十數圍無風葉動華反而後合所謂偏其反而者也夫人之情反而欲其合豈欲其常相逺哉是詩也其㫖與角弓之詩同角弓之詩曰騂騂角弓翩其反矣兄弟昬姻無胥逺矣夫角弓有時而反也然反者所以為適唐棣有時而反也然反者所以為合然則兄弟昬姻與此室之逺豈逺也哉亦猶二物之暫反而終合耳故孔子曰未之思也夫何逺之有又何彼穠矣之詩亦言唐棣之華此詩以王姬車服不繋其夫築館于外亦有反而後合之道至於執婦道以成肅雝則若桃李之相輝蔽不終反而已也崔豹古今注曰栘楊圓葉弱蔕微風大摇一名髙飛一名獨摇又曰栘楊一曰栘栁亦曰蒲栘而齊民要術以髙飛獨摇為白楊之别名又本草白楊注云取葉圓大蔕小無風自動者故説者云葉無風自動此是栘楊非白楊也盖白楊多悲風又與此相類故相雜耳栘皮焚為灰置酒中令味正經時不敗而枳椇木以為屋屋中酒則味薄物之相反有如此者音釋楙音茂酢與醋同鏃作木切甒音武甖甒蹷音蹶椒菌渠隕反糈音所精末要之於遥反檓欣詭切莍音求榝音殺藙魚氣反内則三牲用藙注煎茱萸也􅱣與藙同費音翡慆吐刀反幃音暉欓多朗切丸欓按吳越春秋越使大夫種索葛布十萬甘蜜九党文笥七枚狐皮五雙晉竹十廋以復封禮而此書無丸欓二字詳下文文笥之類皆以數計則甘蜜當作九党豈九党訛為丸欓耶玉篇瓽丁盎切盆也党字疑誤槐紡音髣晉語范獻子執董叔紡於庭之槐注縣也聶音輒炕口浪切欇時葉切燐音吝鬼火水中有火莊子音義謂電也焚槐謂霹靂時燒大樹也柟奴含切焞他昆切灼龜炬榎音賈楓欇欇音輙爾雅音涉癭於郢切瘤力周切樞音歐荎大結切菫音謹荁音桓免音問薧苦老切滫思酒反瀡音髓枌音汾榆之皮色白名枌梜榆上古洽反注檽而兖反栘音移爾雅翼卷十一
