body:
  text: 欽定四庫全書爾雅翼卷十八宋羅願撰釋獸一麟狻麑騶虞廌夔貘騊駼六駮馼犀兕象麟麐麕身牛尾一角春秋之書麟亦曰有麕而角者耳蓋古之所謂麐者止於此是以其物可得而有而其性能避患不妄食集故其㳺於郊藪也則以為萬物得其性太平之驗是不亦簡易而自然乎至其後世論麐者始曰馬足黃色圓蹄五角角端有肉有翼能飛含仁懐義音中律吕行步中規折還中矩㳺必擇土翔而後處不履生蟲不折生草不羣居不旅行不犯䧟穽不罹罘罔牡鳴曰逰聖牝鳴曰歸和夏鳴曰扶幼秋鳴曰養綏嗚呼何取於麐之備也若是則閱千歳而不得麐蓋無怪矣夫麐野物也其為性又善鬭釋獸載之蓋若麕䴥麋鹿之屬焉不之異也叔孫氏之車子不涉於學不能多識故以為不祥仲尼適見而别之然非必待仲尼而後識也後世既已神夫麟故史穪漢武帝獲一角獸蓋麟云曰蓋而云有不足之辭也然麟與萬物並生雖善避害極獸之所在而畋之則雖麟亦何逃焉然則又未必非真得麟也世之儒者欲神夫麟之形狀性情使千歳必不復得以是為麟之靈而吾則欲直從古說簡易而言之雖並世而得不足為異夫並世而得者蓋皆極獸之所在而取之如西狩之云者非麟之貪餒而就死焉則固不害為麟之善避患而有智也蜀之禮殿門有漢世所圖麟鳳亦只一角獸爾烏得五角有翼之說乎詩稱麟之角之趾之定蓋麟麕類麕之跡解則麟趾不妄集矣角端有肉則角不妄觸矣其鬭有時則定不妄鬭矣若羊之屬以定鬭者也此以比衰世信厚之公子而已周書王㑹規規以麟說文麒仁獸麐牝麒也淮南子曰麒麟鬭而日月蝕蓋嵗星散為麟嵗失其序則麟鬭麟鬭則日月蝕矣麒麟善走故良馬因之亦名為騏驎也郭璞曰麒似麟而無角狻麑狻麑如虦貓食虎豹即獅子也蓋虎竊毛謂之虦貓而西域𫝊注稱獅子似虎正黃有􅏋耏尾端茸毛大如斗又詩稱韓土之樂有貓有虎周書記武王之狩禽虎二十有二貓二則是虎之類也穆天子𫝊狻猊日走五百里其為物最猛雖虎豹猶畏之象至以鼻卷泥自塗數尺數數噴鼻隅立獅子直摶而殺之宋宗慤伐林邑以其陣中象多乃制獅子形與象相禦象果驚奔衆潰遂勝之魏武嘗經白狼山得獅子兒以歸未至洛陽三十里雞犬皆伏無鳴吠者其聲聞數十里産子月餘則教之摶攫遇其吼時百獸率走其子隨吼裂聲旋加驕勇故西域樂工或得其筋紐以為琴絃混之樂部適一鼔而衆樂絲絃皆絶又謂之虓說文曰虓獅子也騶虞騶虞珍獸出林氏山海經云大若虎五采畢具尾長於身名騶吾乗之日行千里劉芳詩義疏曰騶虞或作吾然則騶吾蓋騶虞也今詩之騶虞解者類以為此獸歐陽公著詩本義獨引賈生說以為騶者文王之囿虞其官也然騶虞從古以為獸司馬相如云囿騶虞之珍羣史之說有得獸而莫知其名者東方朔識之曰此所謂騶牙者也則漢武時嘗有獸號騶牙者矣古者音聲之假借以牙為吾故九辯曰左朱雀之苃苃兮右蒼龍之躍躍屬雷師之闐闐兮通飛亷之衙衙讀者曰衙猶吾也故朔稱所謂騶牙即詩之所謂騶虞者爾豈可謂虞官也哉然以詩為直指此獸又大謬蓋此物自獸之俊逸者以其俊逸故馬之健者比之予於騊駼章中極其說又西京賦曰圉林氏之騶虞擾澤馬與騰黃是亦以其似馬而稱之也淮南子曰屈商拘文王於羑里於是散宜生乃以千金求天下之珍怪得騶虞雞斯之乗以獻於紂則文王之馬有名騶虞者可見於此是馬也文王必嘗駕習之以從田其智足以知御者之情其才能左右赴趣之使其進退周旋莫不如欲故曰彼茁者葭一𤼵五豝彼茁者蓬一𤼵五豵夫五御以逐禽為難今其馬能與人相應使獲禽之多如此蓋可歎矣此所以申言之曰于嗟乎騶虞也夫騶虞之馬工於逐禽如此而詩言其仁何也蓋一𤼵而得五則庶類蕃殖矣當葭蓬茁茁之時則蒐田以時矣有以見文王於平時不妄殺如此此其一時之義仁如此詩則王道成矣不必指騶虞二字以求其說也且詩之言仁如騶虞猶禮記言好賢如緇衣惡惡如巷伯皆取其一篇之義不然則所謂緇衣者安知賢而好之後之學者不得其說乃以騶虞不踐生草又曰義獸許叔重解淮南子亦云食自死之獸夫騶虞虎也摶殺援噬之類又其修且碩如此安能日得夫獸之自死者而食之且詩方矜一𤼵五豵之敏而顧嗟美禽獸為能不踐食生物是義安所措此皆因詩之序不知其為馬而増為之說也許又云白虎黒文日行千里與五采畢具者異故併著之雞斯云神馬也薦廌似山羊一角一名神羊一名解東北荒中獸也見人鬬則觸不直者聞人論則咋不正者古者神人以廌遺黃帝帝曰何食何處曰食薦夏處水澤冬處松栢薦者澤草之名司馬彪云美草也崔云甘草也王蒼云六畜所食曰薦莊子亦云麋鹿食薦故薦從艸從廌也荆楚嵗時記穪屈原以夏至日赴湘流百姓競以食祭之常苦為蛟龍所竊以五色絲合棟葉縳之又以為獬廌食棟将以信其志然則所食又不止薦爾說者以為人君刑罰得中則生於朝廷主觸不直者說文亦云古者决訟令觸不直故又名任法論衡曰皐陶欽平任坐以明至公所在任法而不任人也古法字作灋從水以言其平之如水從廌去者廌之所去法之所取後世灋去廌豈時不及古不可常得從而闕之耶而廌冠之制則𫝊於今淮南子曰楚文王好服解冠楚國效之以廌角安冠上漢之法冠所謂柱後恵文者是也史氏以為楚王嘗獲之故以為冠春秋𫝊所謂南冠者也秦滅楚以其君服賜執法近臣御史服之異志以為解廌一角今冠兩角非象也然漢史氏特云法冠或謂解廌冠不正决之則亦不全取象於廌若貂若鶡亦兩植之爾太平廣記曰安南有象能知人曲直有鬭訟者行立而齅之有理者則過無理者以鼻卷之擲空數丈以牙接而刺之亦廌之類論衡曰觟䚦者一角之羊也性知有罪皐陶治獄其罪疑者令羊觸之有罪則觸無罪則不觸獬之字或作觟廌之字或作䚦通作豸唐開元二十年有一角獸肉角當頂白毛上捧識者以為獬豸夔夔一足之獸狀如牛蒼身無角生東海中流波之山出入水必以風雨其音如雷黃帝得之以其皮冒皷撅以雷獸之骨聲聞五百里舜之諸臣龍虎熊羆皆取於猛獸其樂正名夔魯哀公與孔子論舜樂后夔一足有異於人孔子以舜語告之以為唯聖人為能和六律均五聲知樂之本以通八風夔能若此一而足矣故曰一足非一足也至子貢論夔不逹於禮疑其窮孔子以為古人之逹於禮而不逹於樂謂之素達於樂而不達於禮謂之偏夫夔達於樂而不達於禮是以傳於此名也蓋禮樂皆得然後可以為成人而不學禮者則無以立夔自以達樂而不達於禮若夔獸一足然蓋有所不備是故以為名謙之至也此獸一足故立則嶷然書所謂衹載見瞽瞍夔夔齋慄者蓋其莊立不倚如此行亦不減它獸故莊子稱夔踸踔而行則憐蚿蚿多足則憐蛇蛇動脊脇而行則憐風風蓬蓬而起則憐目目則憐心考以明萬物各適其適而不能相為用夔不常見故以為木石之怪薛綜解東京賦稱夔如龍有角鱗甲光如日月見則其邑大旱是誠怪矣博物志則言形如鼓而知禮豈亦以其立齋慄故謂知禮耶此與禮記后夔所取達樂而不達禮者義又異矣山海經云岷山多犀象夔郭璞曰今蜀山中有大牛重數千斤曰夔貘貘白豹似熊小頭一云銳鬌庳脚黒白駮能䑛食銅鐵及竹骨節強直中實少髓皮辟濕寢其皮可以驅瘟癘貘今出建寧郡毛黒白臆似熊而小能食蛇以舌䑛鐵可頓進數十斤溺能消鐵為水有誤食針鐵在腹者服其溺則化取其糞為刀可以切玉夫玉乃陽氣之精瑩物無能勝焉鐵為至剛能斷制萬物然與之相磨則玉無所損而鐵之磨者屑屑然今以貘化鐵則玉可切鐵不可挫此類之不可推者也詳此物之性舌能䑛鐵溺能消鐵則一體之間疑皆勝鐵兵疑無所投其刃蜀都賦乃云㦸食鐵之獸不應有是㦸蓋若㦸褚師聲子手之㦸摘而取之或者其腸自能制鐵其理間亦可以兵刺也神異經曰南有獸曰齧鐵大如水牛色如漆食鐵飲水其糞可作兵器其利如鎠王子年拾遺記曰見吾山有獸大如兔毛色如金雌者如銀食丹石銅鐵昔吳國武庫兵鐵食盡檢庫穴得雙兔一白一黃殺之開其腹而有鐵膽腎乃鑄膽腎以為劒雄號干將雌號鏌鎁可以切玉斷犀古稱周之時昆吾氏獻切玉刀蓋用其山之石若銅鐵不必皆以兔也此二獸大小與貘異而其勁健蓋亦貘之類故附著之上林賦其獸則庸旄貘犛郭氏又云或曰豹白色者别名貘說文曰貘似熊而黃黒色出蜀中今蜀人云峩眉山多有之其上浮屠所居往往有懸釡而炊者懼鐵器為所食皮略如虎其色深黒能折酲唐世多畫貘作屏白居易有賛序之今黔蜀中時有之象鼻犀目牛尾虎足土人鼎釡多為所食頗為山居之患亦捕以為藥其齒骨極堅以刀斧椎鍜鐵皆碎落火不能燒人得之詐為佛牙佛骨以誑俚俗唐永徽元年吐火羅獻大獸如駞髙七尺日行三百里食銅鐵周書王會不令支𤣥獏騊駼釋畜曰騊駼馬山海經曰北海内獸狀如馬騊駼獸之善走者既如馬而又善走故馬之良者取以為名古之命馬者大抵皆如是既取獸之狡輕者而又參以其毛物唯夫馬之良者既著稱於世而獸不常見後之博物者又鮮能考名實所從起象類所從附故往往但存良馬之名而沒野獸之實蓋古之名馬有曰六駮者曰騶虞者曰騰黃者曰飛兔者曰騏驎者六駮者必其白身黒尾如獸之六駮者也騶虞者必其白質黒文如獸之騶虞者也騰黃者必其縞身朱鬛如獸之騰黃者也飛兔者必其龎然而蒼者也騏驎者必其粹然而黃者也又子虚賦曰案節未舒即陵狡獸蹵蛩蛩轔距虚軼野馬􅗗騊駼乗遺風射㳺騏張揖曰蛩蛩青獸狀如馬距虚似驘而小野馬似馬而小騊駼北海内獸狀如馬遺風千里馬巂如馬一角不角者騏此輩皆輕狡之獸不可服乗而古之良馬其名往往與此相類以是知其取稱於此也如使古之駕者必求此獸而乗之則六駮鋸牙虎爪迺食虎豹之物騶虞大如虎尾長於身騰黃神物夀且千嵗飛兔如兔而䑕首以其背飛麟麕而一角與夫蛩蛩距虚之負蟨見人而疾走者此豈可乘之物哉郭璞騊駼贊曰騊駼野駿産自北域交頸相摩分背翹陸雖有孫陽終不在服此蓋似馬而不可乘之驗也漢書所謂匈奴竒畜騊駼者即馬之似焉者也周書伊尹請令正北空同大夏之屬以橐駞白玉野馬騊駼駃騠良弓為獻至成周時禺氏獻騊駼淮南子曰伊尹賢相也而不能與胡人乘騵而服騊駼六駮駮如馬白身黒尾一角牙虎爪其音如鼓喜食虎豹山海經中曲之山有獸焉云云可以禦兵蓋駮毛物既可觀又似馬故馬之色相類者以駮名之子虚賦曰楚王乃駕馴駮之駟西京曰六駿駮吳都曰驀六駮駕乘也驀上馬之名也說者謂取六駮之獸馴而擾之以當駟馬夫駮牙爪如此安可馴擾唯薛綜解西京以為六駿駮者白馬而黒畫以文如虎者解駮為馬是也駮用黒畫即與文馬朱其鬛者相類特不知馬之類蓋有自然似駮者耳管子稱桓公乘馬虎望見之而伏以問管仲管仲曰意者君乘駮馬而洀栢迎日而馳乎公曰然曰此駮象也駮食虎豹故虎疑焉說苑亦稱晉平公出畋見乳虎伏而不動以問師曠曠曰鵲食蝟蝟食鵔鸃鵔鸃食豹豹食駮駮食虎夫駮之狀有似駮馬今者君之出必驂駮馬而出畋乎公曰然二說相似是馬有自然似駮之獸者因以駮名也顧或言駮食虎豹或言豹食駮為稍異耳一名兹白周書王㑹篇曰正北方義渠以兹白兹白者若白馬鋸牙食虎豹即此物又大夏以兹白牛不知何物也劉原父奉使契丹時順州山中有異獸如馬而食虎豹遼人不識以問之曰此所謂駮也為言其形状聲音皆是遼人歎服馼馼說文曰馬赤鬛縞身目若黃金名曰馼吉皇之乘或作古皇周文王時犬戎獻之見周書王㑹篇春秋𫝊曰馼馬百駟畫馬也西伯獻紂以全其身尚書大𫝊散宜生之犬戎氏取美馬􅍡身朱髦雞目者取九六焉陳於紂之庭按馼一曰文馬又曰吉良山海經大封國有之乗之夀千歳一作吉彊瑞應圖曰騰黃神馬一名吉光李善曰吉良騰黃一馬而異名也禮說云文王得白馬朱鬛案此則文馬難得之獸而後世相賂遺文馬百駟盖取其白馬畫其鬛使赤耳春秋時宋公子地有馬公取而朱其尾鬛以與向魋言五行者以為妖此則文馬之遺象其大封所産曠世不復見矣唐正觀二年甘州獻白馬朱鬛又乘黃龍翼而馬身黃帝乘之而仙犀犀南徼外牛而似豕一角在鼻一角在頂其形已詳見埤雅多生南中周書伊尹令正南以文犀為獻今徼外所送有山犀有水犀水犀之皮則有珠甲山犀無之今通天犀長且銳皆腦上角千歳者長且銳有一白縷直上徹端名曰通天或以為白理徹端則能出氣通天故曰通天或曰赤理蓋水犀之角也通天則能通神可以破水駭雞大霧重露之夜以置中庭終不沾濡得三寸以上刻為魚而衘之以入水水常開方三尺又以角盛米置羣雞中雞欲往啄未至數寸輙驚退置屋上則鳥烏不敢集置積榖上亦然援神契曰神靈滋液則犀駭雞戰國䇿楚獻雞駭之犀於秦王九歌曰棄駭雞於箱簏此之謂也能殺鈎吻鴆羽蛇毒以此角為箸攪毒藥中皆生白沫湧起則了無復勢以攪無毒物則無沫起若行異域有蠱毒之鄉常先以試之趙后所謂文犀辟毒者謂此也中毒箭將死者以刺瘡中即沬出而愈通天犀所以能辟毒者其獸專食百草之毒者及衆木之有刺棘者不妄食柔滑之草木也其在山中晦冥之夕光正赫然如炬温嶠燬犀以照水怪蓋謂此歳一解角於山石間得之者刻木色理形狀相肖以代之犀不能覺輙復解角其處古所謂梁山之美非特其角兼取其甲函人犀甲七屬夀百年言其久而不壊也吳王夫差衣水犀之甲者億有三千人又奉文犀之渠物之利如此昔周公驅虎豹犀象而逺之以去民害又此物輩有皮革齒角之用故古帝王不逐而去之則因而利之其逐而去之者管子所謂黃帝之王謹逃其爪牙不利其器焚破林藪驅逐禽獸以利人者是也其因而利之者則堯舜之王令諸侯子卿大夫委質者皆以虎豹皮飾使散財粟以市虎豹之皮山林之人刺猛獸若從親戚之仇此君冕服於朝而猛獸朦於外者是也至其言五家之數則又曰黃帝之王謹逃其爪牙有虞之王枯澤童山夏后之王燒林焚藪沛澤不益民之利殷人之王諸侯無牛馬之牢不利其器周人之王官能以備物然則周公之驅虎豹犀象蓋天下初定未暇其他故且行黃帝夏后之政至其後乃官能以備物虎豹之皮為侯與其裘犀兕為甲象以飾路而為笏物無不備又服不氏掌養猛獸而阜蕃教擾之不唯驅之而已也兕兕似牛一角青色重千斤或曰即犀之牸者蓋牯犀之角能辟邪惡寧心神散風熱故良於藥餌牸犀之角文理細膩斑白分明俗謂班犀故美於服飾牸犀古人或但謂之牸蓋即兕也猶羖音近牯以其為牂之牯熊音近雄以為羆之雄而兕音近牸云爾雅曰兕似牛犀似豕郭氏稱犀似水牛而豕首然則犀亦似牛與兕同但首如豕耳兕青而犀黒兕一角而犀二角以此為異然郭又云犀亦有一角者也但古人多言兕今人多言犀北人多言兕南人多言犀為不同耳漢武帝時西域獻赤兕裘入水不濡上時服以聽朝即水犀甲之類犀既有之兕亦宜然兕之革最堅故犀甲只夀百年而兕甲夀二百年射以得兕為雋故周詩美宣王殪此大兕唐叔虞射兕于徒林殪以為大甲為是武也以享晉封其後世之臣相與𫝊道之以愧其君而楚人招魂稱君王親𤼵兮憚青兕以為物之偉觀可以娛魂而來之云爾角尤善觸故曰兕無所投其角古以為觥容七升或曰無則刻木為之以戒酒過而抵觸人者故曰觵其不敬者周南曰我姑酌彼兕觥蓋爵一升觚二升觶三升角四升散五升因多寡以明尊卑觥在五爵之外所受最多而猶曰姑酌云者則其念勤勞可知亦觥愈大而愈卑則惠及賤者矣詩曰匪兕匪虎率彼曠野論語曰虎兕出於柙者蓋周之初驅猛獸至其後養而阜蕃教擾之說見犀章中象南方之美者有梁山之犀象焉象長鼻牙南越之大獸獸之最大者形體特詭或曰身有百獸肉皆自有分叚唯鼻是其本肉鼻肉為炙肥脆小類豬而含滑吕氏春秋曰肉之美者髦象之約三嵗一乳其身倍數牛而目不踰豕鼻長六七尺大如臂所食物皆以鼻取之或食芻必再三整齊乃食能别道之虚實稍虚輙不肯過故晉時帝行則以象車導引以試橋梁故象難獲者以其陷阱不能試也其鼻端有爪形得之可以拾鍼若磁石肉有十二屬其膽不附肝隨身轉諸獸肉中正月建寅在虎肉上之類其牙長一尺毎雷震必倉卒間似花暴出逡巡隱沒仙方合丹忌雷震驚以象牙夾丹竈得雷聲乃能𤼵光其齒歳脫猶愛惜之掘地而藏焉削木為偽齒潜往易之覺則不藏故處馴者教能拜起周章從人意聽言則跪古者軍旅有象以其牙足恃也身毒國人乘象以戰王尋等圍昆陽亦驅虎豹犀象之屬楚昭王奔隨使子期執燧象以奔吳師蓋周有服不氏掌養猛獸而阜蕃教擾之古者軍旅皆有猛獸為備顧後世不能擾而用之爾燧象者繋燧於象尾視敵所嚮而縱之象迫於火肆其力奔突以犯吳師齊田單之火牛其遺意也象性妬有别不畜淫子嶺南羣象行人不甚畏尤畏孤象蓋孤象是象中之敗羣者衆所不容無所𤼵其怒故尤可畏按世言物象蓋取於象凡有數義夫物之形有首有尾若象者望頭如尾迎之不見其首隨之不見其後有混成之象一曰象感雷而齒文生有象焉一曰象有進止威儀之象浮屠取之一曰斧象者見星月而沒亦合於天象如韓非則以為世人不識生象得死象而髣象之耳蓋象之合於物象不一而足也春秋運斗樞曰瑶光之精散為象南蕃船上多以象皮鞔鼓鼓長而頭尖狀如棗核謂之㯽榔鼓說文豫象之大者賈侍中說不害於物或作舒余音釋麟麐爾雅通作麟麕音君罘音浮䴥古牙切定都佞切狻麑上音酸虦貓上昨閑切爾雅虎竊毛謂之虦貓竊淺也耏說文作而如之切頰毛也虓許交切騶虞苃苃音斾飛揚貌躣躣其俱反行貌闐闐音田鼓聲衙衙五呼反亦行貌圉林氏文選注圉牢養也林氏山名又山海經有林氏國擾澤馬應劭漢書注擾音柔馴也隂嬉䜟曰聖人為政澤出馬騰黃神馬一名吉光廌又蟹切解音蟹咋鋤陌切齧也齅許救切以鼻取氣夔求龜切撅其月切擊也雷獸山海經注即雷神也人面龍身鼔其腹也嶷魚力切踸踔上勅甚切下勅角切蚿音賢又音𤣥蓬蓬步東反又扶公反貘音貊庳音婢又音卑駮音剥馬色不純舐神紙切溺奴弔切掎居蟻切褚師上張吕反哀公二十五年鎠音剛堅鐵㺎音容郭璞曰㺎似牛頷有肉堆旄張揖曰旄牛也其狀如牛而四節毛犛莫交反犛牛黒色出西南徼外又力之切令支音零岐騊駼音逃塗蹵七六反蹋也轔音吝軼音迭􅗗音衛車軸頭軼􅗗言車之疾案節未舒案節行得節未舒馬足未舒嶲音携驘力戈切蛩蛩渠容切蟨音厥禺音遇又音虞六駮音剥驀音陌洀古盤字鵔思俊切馼音文鬛力輙反馬鬉也向魋司馬桓魋也地宋景公弟辰之兄也定十年犀徼吉弔切簏音禄蠱音古七屬讀如灌注之注謂上旅下旅札續之數也革堅者札長沛澤上音斾服不下逋骨切服不服之獸者也兕殪音翳憚青兕憚丁曷切觵通作觥觶之鼓切觚古胡切散先肝切孔氏曰散者訕也飲不自節為人謗訕象脆音毳小耎易斷也身毒乾篤國在大夏東南鞔音瞞覆也爾雅翼卷十八
