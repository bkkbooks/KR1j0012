body:
  text: 欽定四庫全書爾雅翼卷二十四宋羅願撰釋蟲一蠶蠢春原蟓蜀蝤蠐尺蠖蛅蟖蟫蚰蜒蚓蠶蠶倉庚鳴則生故詩曰倉庚喈喈采蘩祁祁蘩白蒿也所以生蠶夏小正曰三月妾子始蠶蠶之狀喙呥呥類馬色斑斑似虎初拂謂之蚝以毛掃之蠶尚小不欲見露氣桑葉著懷中令暖然後切之得人氣則衆惡除也古者三宫夫人桑于公桑風戾以食之謂及早涼脆采之風戾之使露氣燥乃以飼蠶蠶生惡濕故也比至再眠常須三箔虛上下二箔以隔土氣障塵埃也飼必卷窗褰幃飼訖還下蓋蠶昆蟲之類昆者明也蠶見明則食食多則生長其旋生駒皆與母同老食而不飲三十六日而化淮南曰二十二日而化嵇康養生論曰火蠶十八日寒蠶三十餘日仲長子昌言亦曰寒而餓之則引日多溫而飽之則用日少此寒溫飢飽之為修短驗之於物者也荀卿賦曰三俯三起事乃大已俯謂之眠亦有四眠者既老將績其口含絲春秋文耀鈎曰商弦絶蠶含絲言弦將絶蠶含絲以待用也淮南子曰蠶珥絲而商弦絶謂新絲出故絲脆五音之中商弦最急故先絶亦蠶午火也商金音也火壯金因應之而絶珥絲或為餌絲或曰上下絲於口故曰咡絲其獨成繭者謂之獨繭自二以上謂之同功繭獨繭絲細而有緒詹何以之為綸引盈車之魚也顔氏家訓曰胡人見錦不信有蟲食木吐絲所成養蠶之室欲明而溫漢法犯腐刑者下未央蠶室取其溫爾古者后妃享先蠶而後躬桑先蠶天駟也漢舊儀曰今蠶神曰苑窳婦人寓氏公主凡二神蠢春原蠢春原再蠶也原即再之義或曰蠶不交而生者往往為原蠶原蠶一名魏蠶莫知其説按方言魏細也自關而西秦晉之間凡細而有容謂之魏又古者魏地狹隘其君民有儉嗇趨利之譏以葛屨而至於履霜以女手而至於縫裳豈原蠶亦魏之俗耶今人又謂之二蠶音之轉爾周禮養馬禁原蠶者説者以為天文辰為馬而蠶書蠶為龍精月直大火浴其種是蠶與馬同氣物莫能兩大禁原蠶者為傷馬也今農家下種以原蠶矢雜禾種之以辟蝗否則鬻馬骨汁和蠶矢溲之又蠶殭者塗馬齒則馬不食草以桑葉拭去乃還食此則蠶為馬類明矣淮南曰螈蠶一嵗再收非不利也然而王法禁之者為其殘桑也離先稻熟而農夫耨之不以小利傷大獲也至於後世國稅再熟之稻鄉貢八蠶之綿吳人且以為美談吳録曰南陽郡一嵗蠶八績林邑記曰九真郡蠶年八熟繭小輕薄絲弱綿細荆楚嵗時記曰八蠶繭出日南至秋猶飼以柘荆楚則早晚二蠶則五月而已永嘉郡記曰永嘉有八輩蠶􅮤珍蠶三月績柘蠶四月初績􅮤蠶四月績愛珍五月績愛蠶六月末績寒珍七月末績四出蠶九月初績寒蠶十月績其説云凡蠶再養者前輩皆謂之珍少養之而􅮤蠶與愛珍二色候􅮤珍三月既績出蛾取卵七八月便割蠶生多養之是為􅮤蠶若取藏甕中亦可十紙百紙蓋覆器口安冷水使冷氣析其出勢僅得三七日然後劄生養之為愛珍然則蓋一類耳隋書曰江湖之南一年蠶四五熟唐天寶中益州獻三熟蠶繭緊厚白淨與常蠶不殊大厯中太原府清源人唐景暉養冬蠶成繭詔給復終身而海物異名記乃云八蠶綿者八蠶共作一大繭非也蟓蟓桑繭野蠶不養於人就桑食葉作繭者比家蠶小而行疾其作繭長半寸以來亦撱而長其一面平多則嵗宜蠶野人嘗以卜蠶之熟否楚俗於上春以麵裹肉或糖蒸之亦平其一面謂之繭子食之蓋取象此古者稱野蠶成繭以為瑞若蟓者嵗未嘗無但成繭者言其成熟如家繭漢自王莽以來田疇蕪廢杼柚其空至光武之初野榖旅生野蠶成繭人獲其利蓋地力久曠而有餘故榖易生樹力久蘇而有餘故繭易成唐武德中梁州亦言野蠶成繭百姓採而用之亦其類耳又古今注元帝永元四年東萊郡東牟山有野蠶為繭收得萬餘石民人以為絲絮此最有數者野繭又有雔由樗繭棘欒繭蚖蕭繭皆桑繭之類各以所食葉為名廣志云有柞蠶食柞葉可以作錦今桑繭所包裹甚薄不堪用古人稱以野繭之絲為琴絃者自當各有所在也今人亦呼此為桑蠶郭氏乃云即今蠶非也蜀蜀葵中蠶也從蟲上目象蜀頭形中象其身蜎蜎葵者菜之甘者也古人有言蓼蟲不知徙乎葵菜今蜀食葵之甘故其體肥大亦食於藿廣志曰藿蠋有五色者槐香蠋五采有角甚臭庚桑子曰奔蜂不能化藿蠋言大小不同量也蠋雖蠶類而不食桑詩乃稱蒸在桑野者葵藿之下亦桑野之地也蠶致養於人萬百為族蜀則獨行故以比敦然獨宿者箋云蠋蜎蜎然特行久處桑野有似勞苦者又蜀亦或作鳥名師曠禽經曰蜀不獨宿不知何物也蜀不獨宿故以歎獨宿者於文獨字從蜀則蜀當獨處爾韓子曰鱓似蛇而蠶似蠋人見蛇則驚駭見蠋則毛起漁者持鱓婦人拾蠶利之所在皆為賁育淮南曰蠶之與蠋狀相類而愛憎異蠋一名蚅狀雖可畏然古人以金作此而綴之車上以為飾故曰鞗革金厄蝤蠐爾雅蟦蠐螬糞土中蟲又云蝤蠐蝎謂在木中者二物大抵相似以所處為異大者如足大指而蝤蠐在腐栁中者內外潔白故詩人以比碩人之領其所謂蝎非蠆尾之蝎也至於蠐螬食李之半於陵子嘗匍匐而食之三咽然後耳有聞目有見仲子之亷不忍受人一餐而甘餔蠐螬之餘腐以此而發皇視聽則其節之苦甚矣淮南萬畢術曰黍成蠐螬言以秋冬穫黍置溝中即生蠐螬也説者以為齊人曹氏之子所化論衡曰蠐螬化為復育復育化為蟬言萬物變禪如此楊雄方言乃云或謂之喧􅕪或謂之蝎或謂之蛭或謂之天螻此其為物多矣非止一蠐螬也説文尺蠖尺蠖屈申蟲也狀如蠶而絶小行則促其腰使首尾相就乃能進步屈中有伸故曰屈申鄭康成謂之屈蟲郭景純謂之步屈皆此義又如人以手度物移後指就前指之狀古所謂布指知尺者故謂之尺蠖漢書律厯志曰寸者忖也尺者蒦也則蒦亦自有尺之義矣易曰尺蠖之屈以求信也龍蛇之蟄以存身也聖人於物稱名小而取義大不以龍蠖巨細而有所遺晏子春秋曰尺蠖食黃則身黃食蒼則身蒼然郭璞注方言以為尺蠖步屈色青而細小為蜾螺所負為子者按蜾螺所負乃螟蛉毛詩義疏云螟蛉似步屈此説是矣正以為步屈則非也蠖亦作繭而小甘泉賦曰天子穆然珍臺間館琁題玉英蜵蜎蠖濩之中解者以蜵蜎蠖濩為刻鏤之形豫按釋魚有蜎蠉水中小赤蟲莊子所謂還虷者藏沙中穴如針孔而蠖亦吐絲作繭有所布濩以此况帝居者蓋白藏於密精義入神之至也張協七命曰焦螟飛而生風尺蠖動而成響此以微蟲表帝居之淵默亦此義耳尺又作斥考工記弓人之職合灂若手背文角環灂牛筋蕡灂麋筋斥蠖灂此説弓表裏灂漆相合之處若人手背文理相應隈裏灂文如環弓背用牛筋者文如麻子用麋筋者文如斥蠖云假成式稱尺蠖之繭為蝶今蝶蓋青蟲所化非行步屈伸者蠖或為蛾未可知也蛅嘶蛅嘶蠔蟲也蠔千志切身扁緑色似蠶而短背有毒毛能螫人今俗呼楊瘌蟲説文楚人謂藥毒曰痛瘌一曰傷也音如辛辣之辣楚辭以喻讒人九思所謂蠔緣兮我裳是也今牡丹上尤多常在葉背不知者輒遇其毒欲老則吐汁自裹久漸堅凝如巴菽大紫白間理可愛就其中作蛹謂之蛅嘶房一名躁舍一名雀甕俗謂之雀兒飯甕言雀所喜食也又謂之雀癰既久出而為蛾復孚子於葉間或者乃謂雀甕為蛅嘶之卵非也陶𢎞景云多在石榴木上今石榴上復有一種聚短梗半寸以來周圍植之以自裹行則負以自隨亦化蛹其中俗呼避債蟲蟫蟫白魚衣書中蟲也始則黃色既老則身有粉視之如銀故名白魚荆楚之俗七月曝經書及衣裳以為卷軸久則有白魚穆天子傳蠧書于羽陵周官翦氏掌除蠧物鄭氏謂器物生蟲魚韓文公詩曰豈殊蠧書蟲生死文字間謂是也毛詩草木疏曰天子賜諸侯茞蘭可著藏衣書中古者祕書之藏置藝以辟之藝亦香草也後世書勑用黃紙味既苦而蟲不生王充論衡曰變復之家謂蟲食榖者吏貪狼所致也書卷不舒衣襞不懸皆生蟲也此復關何吏耶一名蛃魚又名壁魚又名衣魚齊明帝疾勑臺省府署求白魚為藥外始知之蟫有談尋淫三音淫或訛為經籍之經故又有經音蚰蜒蚓􅨪入耳郭氏曰蚰蜒自關而東謂之蚓􅣓方家説蚰蜒大者如叉股色正黃其足無數如蜈蚣狀此蟲好脂油香入人耳及諸竅中故因以為名使人戒焉古稱昌羊去蚤蝨而來蛉窮蛉窮蚰蜒入耳之蟲昌羊今昌蒲是其氣芬芳所召爾梓人謂此為卻行之屬今蝸牛之無殼者俗呼蜒蚰又呼蝸牛為蜒蚰螺蝸牛驚則退縮似應卻行之義然蝸牛要不能入耳當以多足者為是楚辭以此物比讒賊王逸九思云升車兮命僕將馳兮四荒下堂兮見蠆出門兮觸蜂巷有兮蚰蜒邑多兮螳蜋睹斯兮嫉賊心為兮切傷蓋蠆之螫人也在下蜂之逐人也自上蚰蜒則自側螳螂則當前是則上下左右與夫在前者皆嫉賊矣欲馳四荒其可得耶夫楚辭之人既不容於內而出出又不容故君子怨焉蚓蚓無爪牙之利筋骨之強上食稿壤下飲黃泉勸學者取之以為其用心之一孟子又以比陳仲子以為徒有飲水食土之操而已是雖微物其啓閉有時故月令孟夏螻蟈鳴後五日而蚯蚓出冬至之日蚯蚓結皆以紀候結猶屈也其始穴則首下向至是陽動則穴而上首故其身結屈也周書曰蚯蚓不出嬖奪后蚯蚓不結君政不行一名土蟺又名曲蟺夏夜好鳴於草底故江東謂為歌女或曰鳴砌周南詩曰喓喓草蟲躍躍阜螽説草蟲固多端按張衡云土蟺鳴則阜螽跳考是以蚓為草蟲也贊寧物類相感志亦云阜螽如蝗江東人呼名蚱蜢與蚯蚓異類而為雌雄蓋合詩人之説故郭璞贊曰蚯蚓土精無心之蟲交不以分淫於阜螽觸而感物乃無常雄蚓亦龍屬故星禽龍四物而此居其一焉漢書黃帝得土德黃龍地蚓見帝王世紀曰黃帝時蚓大如虹或曰地蚓大五六圍長十餘丈也抱朴子軍術曰蚯蚓見軍中尤多者軍罷又冝備反叛音釋蠶呥呥仁亷切蚝七吏反風戾音麗祭義注風戾之使露氣燥方氏曰風至則乾珥餌咡音同窳音愈蠢春原音原鬻音煮溲音搜殭音疆離髙誘曰水稗齊民要術作蘺􅮤音尹蟓音象撱音妥狹長雔由樗雔音讎爾雅注食樗葉者名雔由棘欒食棘葉食欒葉蚢蕭上音杭食蕭葉繭者名爾雅疏蜀蜎蜎詩朱傳鳥玄切動貌蠋音蜀奔蜂小蜂也一名土蜂藿蠋豆藿中大青蟲敦都回反獨處不移之貌鱓音善蚅於革反鞗徒雕反轡也金厄爾雅疏厄作蚅一名鳥蠋形似蠶而大如指蝤蠐上音囚下音齊蟦音費蝎爾雅音曷郭云即蛣􅔒疏云蟦蠐也蠐螬蝤蠐也蛣􅔒也桑蠧也蝎也一蟲而六名也􅔒音屈發皇視聽枚乘匕發分決狐疑發皇耳目注發明也􅕪音斛蛭之日反尺蠖上爾雅作蚇下於郭切蒦音約蜾古火反螺郎果反説文蜾螺蒲盧細要土蜂也螟音冥蛉音零蜵音淵濩音護布濩散也蜎狂兖反間音間蠉香兖切爾雅注還虷上音旋司馬云顧視也下音寒井中赤蟲也又名蛣蟩音吉厥合灂音捉又音醮考工記疏合灂者謂弓表裏灂漆相合之處若人合手背上文理相應皆補內反角環灂環如字又户串反疏謂隈裏灂文如環然牛筋蕡灂此説弓背用牛筋之漆如麻子文蕡扶云反麋筋斥蠖灂若用麋其灂文如斥蠖文蛅蟖上而占反下音斯蠔千志切瘌力達反辛痛也蛹烏種切蟫音淫卷音捲襞音辟蛃兵永反蚰蜒上音由下音延蚓音引􅨪以淺反音演蜈音吳蚣音公蠆且介反蚓音引與蚓同蟺是演反蚱蜢上莊額切下莫梗反説文虴蜢草上蟲也虴陟格反爾雅翼卷二十四
