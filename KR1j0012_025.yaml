body:
  text: 欽定四庫全書爾雅翼卷二十五宋羅願撰釋蟲二莎雞蜉蝣蟋蟀螳螂蜱蜎青蛉蜣蜋蜘蛛蠨蛸胡蝶莎雞莎雞振羽作聲其狀頭小而羽大有青褐兩種率以六月振羽作聲連夜札札不止其聲如紡絲之聲故一名梭雞一名絡緯今俗人謂之絡絲娘盖其鳴時又正當絡絲之候故豳詩云六月莎雞振羽七月在野八月在宇九月在戸也寒則漸近人今小兒夜亦養之聴其聲能食𤓰莧之屬崔豹古今注曰莎雞一名促織一名絡緯一名蟋蟀促織謂鳴聲如急織也絡緯謂其鳴聲如紡緯也又曰促織一名促機絡緯一名紡緯其言促織如急織絡緯如紡緯是矣但蟋蟀與促織是一物莎雞與絡緯是一物不當合而言之爾詩稱六月莎雞振羽以至九月在戸十月蟋蟀入我牀下一章而别言莎雞與蟋蟀可知其非一物也盖二蟲皆似機杼之聲可以趣婦功故易以紊亂孫炎解螒天雞以為小蟲黑身赤頭一名莎雞郭氏又云一名樗雞陸璣則云莎雞如蝗而斑色毛翅數重下翅正赤或謂之天雞六月中飛而振羽索索作聲幽州人謂之蒲錯廣志云莎雞似蠶蛾而五色亦曰犨雞盖皆非其類今莎雞之鳴乃止而振羽不待飛也一名馬􅝺蜉蝣蜉蝣朝生而暮死郭氏云似蛣蜣身狹而長有角黄黑色聚生糞土中豬好啖之陸璣云似甲蟲有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出樊光曰是糞中蝎蟲隨雨而出朝生而夕死盖蜉蝣者速死之物故以刺曹共公之好奢言雖衣服楚楚安能久也淮南子曰蠶食而不飲二十二日而化蟬飲而不食三十日而蛻蜉蝣不食不飲三日而死又曰鶴壽千嵗以極其游蜉蝣朝生而暮死盡其樂盖以旦暮為期逺不過三日爾蜉蝣出有時故王褒頌聖主得賢臣云蟋蟀俟秋唫蜉蝣出以隂言知時也又許叔重注淮南子言朝菌者朝生暮死之蟲也生水上狀似蠶蛾一名孳母海南謂之蟲邪則亦蜉蝣之類按今水上有蟲羽甚整白露節後即羣浮水上隨水而去以千百計宛陵人謂之白露蟲夏小正五月浮游有殷蟋蟀蟋蟀似蝗而小正黒有光澤一名蛬一名蜻蛚一名促織以夏生秋始鳴周書小暑之日温風至又五日而蟋蟀居壁易通卦系曰蟋蟀之蟲隨隂迎陽居壁向外趨婦女織績女工之象今失節不居壁似女事不成有淫佚之行因夜為姦故為門戸夜開淮南則云蟋蟀居奥奥者西南隅也比寒則漸近人易通卦驗曰立秋蜻蛚鳴白露下蜻蛚上堂詩曰蟋蟀在堂嵗聿其莫又曰七月在野八月在宇九月在戸十月蟋蟀入我牀下自七月至十月入牀下皆謂蟋蟀也言將寒有漸非卒來也而說者解蟋蟀居壁引詩七月在野以為不合然今蟋蟀有生野中及生人家者至嵗晚則同爾好吟於土石塼甓之下尤好鬭勝輙矜鳴其聲如急織故幽州謂之促織又其鳴時正織之候故以戒婦功春秋說題辭曰趣織為言趣織也織興事遽故趣織鳴女作縑又里語曰趣織鳴懶婦驚而崔豹云濟南人謂蟋蟀為懶婦非也古稱騰蛇游霧而殆於即且即且乃蜈蚣耳許叔重謂蟋蟀為即且上蛇蛇不敢動亦非也說文作蟋􅢊梓人以注鳴者精列屬方言南楚之間或謂之王孫螗蜋螗蜋有斧蟲有不過蟷蠰莫貈蛑石蜋巨斧等名許叔重又云世謂之天馬蓋驤首奮臂頸長而身輕其行如飛有馬之象故贊八駿圖者以為其狀如麟鳯螳蜋然周書曰芒種之日螳蜋生不生是謂隂息易通卦驗曰螳蜋捕蟬之蟲乘寒而殺物自隱蔽而有所害捕摶之象也尤工捕蟬五六月蟬得美䕃奮翼而鳴螗蜋超枝縁條埶翳自蔽竦腰舉刃摶而取之昔之鼓琴者見螳蜋方向鳴蟬將飛未去螳蜋為之一前一却絃者聳然恐螳蜋失之也殺心見於聲故螳蜋隂殺之蟲也翳木葉也或曰得其翳者可以隱形此蟲惟捕蟬時有進退之勢餘則知進而已齊莊公出獵有蟲舉足將摶其輪問其御對曰此謂螳蜋者也其為蟲也知進而不知却不量力而輕敵莊公曰此為人必為天下武勇矣迴車而避之莊公避一螳蜋而勇武歸之勾踐禮蝦蟇其遺意也莊子曰螳蜋怒臂以當車轍不知其不勝任也是才之美者也言非不有美才顧不勝任耳或曰回車者勾踐故郭璞贊曰螳螂氣蟲揮斧奮臂當轍不迴勾踐是避勇士致死勵之以義說文螳蜋一名蚚父蜱蛸不過蟷蠰其子蜱蛸蟷蠰卵也螳蜋逢樹輙産其卵皆相連綴多在小桑上及叢棘間三月四月中每枝出小螳蜋數百螳蜋應殺之蟲故小暑至後五日而生所應者微隂故螳蜋司殺之小者也蜱蛸所在有之以桑上者為佳是兼得桑皮之津氣耳市之偽者以膠著桑枝之上則無益矣一名􅡯蟭本草則謂之桑螵蛸主於藥而言也范子計然曰螵蛸出三輔上價三百又海中有烏賊魚背如樗蒱形亦有螵蛸之名故方家謂此為桑螵蛸謂彼為海螵蛸說文蛸青蛉青蛉好飛集水上有青赤黄三種色青而大者曰青蛉一曰青亭小而黄者曰胡黎一曰胡離小而赤者曰赤卒一曰絳騶一名赤衣使者亦名赤弁丈人好集水上赤卒絳騶者漢制導卒之服也故以比之然摠曰青蛉則以大者為主呂氏春秋曰海上有人好蜻蛉者每朝居海上從遊有蜻蛉至者數萬前後左右盡蜻蛉也終日翫之不去其父使取來翫之明日徃之海上而蜻蛉無至者言機心存則物不附又莊辛對楚襄王曰君王獨不見蜻蛉乎六足四翼蜚翔乎天地之間求蚊虻而食之待甘露而飲之自以為無患與民無争也不知五尺之童子膠絲竿加之乎四仭之上而下為蟲蟻食也此其情狀荆莊王命養由基射蜻蛉曰吾願生得之養由基援弓射之拂左翼一名䗓淮南子稱蝦蟇為鶉水蠆為􅩜莣皆生非其類唯聖人知其化又稱水蠆為􅩜孑子為蟁􅊵齧為螚物之所為出於不意弗知者驚知者不怪詳此類變易固不足驚又人皆習知不待聖人也彼將因衆人耳目之所見以極視聴之所不接盖發端於此耳水蠆既化青蛉青蛉相交還於水上附物散卵出復為水蠆水蠆復化焉交相禪無已郭璞稱江東名為狐黎淮南人呼䗧蛜今鄱陽人呼江雞盖䗧蛜之轉說文蜻蛉一名桑根蜣蜋蜣蜋黑甲蟲能以土包糞轉而成丸圓正無斜角莊子曰蛣蜣之智在於轉丸陶𢎞景云取糞丸而却推之今按其類似有雌雄以足撥取糞頃之成丸相與遷之其一前行以後兩足曳之其一自後而推致焉乃掘地為坎納丸其中覆之而去不數日而丸中若有動者又一二日則有蜣蜋自其中出而飛去盖是孚乳氣其中以此覆裹之藉之以生抱朴子曰𤣥蟬絜飢不羡蜣蜋穢飽然世或言蜣蜋能化為蟬所為轉丸者藉以變化也未知孰是崔豹古今注曰一名弄丸一名轉丸俗名推丸其鼻高目深者名胡蜣蜋蜘蛛䵹鼄布網於簷四隅狀如罾自處其中飛蟲有觸網者輙以足頓網使不得解其力大有甲翅者纒縳甚急已乃食之春秋二時得煖風而生旋吐游絲飛颺其身故春月游絲有長數丈許者皆䵹鼄所為也古人稱太昊師䵹鼄而結網故張望賦云吐自然之纎緒先皇羲以結網新序曰湯見祝網者置四面而祝湯乃解其三面置其一面更教之祝曰昔蜘蛛作網今之人循序欲左者左欲右者右欲高者高欲下者下吾取其犯命者然則網罟之設雖取諸離亦有象於此也焦贑易林曰蜘蛛作網以司行旅又曰蜘蛛南北巡行罔罟字說曰設一面之網蟲至而獲焉知誅義者也考陶𢎞景云䵹鼄類數十種爾雅載七八種今草䵹鼄有五色長脚者作網畢以大絲向四隅各絡數十折或云以厭勝諸蟲云又有土䵹鼄大𤣥曰蜘蛛之務不如蠶之緰蠨蛸蠨蛸小䵹鼄長脚者俗呼為喜子陸璣疏云蠨蛸長踦一名長脚荆州河内人謂之喜母此蟲來著人衣當有親客至亦如䵹鼄為羅網居之詩曰蠨蛸在戸言為網於戸也陸賈曰目瞤得酒食燈花得錢財乾鵲噪行人至蜘蛛集百事喜劉子曰今野人晝見蟢子者以為有喜樂之端夜夢見雀者爵位之象然見喜子者未必有喜夢雀者未必彈冠而人恱之者以其利人也今人以早見為喜晚見為常又云在頭則有喜事蠨蛸既主有喜而豳詩以在戸言憂思感傷者蓋果臝伊威蠨蛸鹿場熠燿此五物者家無人則集所以令人感思此自以著衣為有喜各以為義爾荆楚之俗七月七日設𤓰果於庭中以乞巧有喜子網於𤓰上則以為得巧胡蝶胡蝶以芳時飛集花間翩翩相逐物之適意者故莊周夢為胡蝶栩栩然胡蝶也不知周也俄而覺則蘧蘧然周也明人之精神開闔不能自知故有夢為鳥而麗乎天夢為魚而麗乎淵考以極其升沉至於此則又不抑不亢徜徉兩間有俯仰自足之意以極物之化盖必有所寤矣蝶物之善化者今菜中青蟲當春時行縁屋壁或草木上以絲自固一夕視之有圭角六七日其背罅裂蛻為蝶出矣其大蝶散卵於甘橘上為蟲青緑既久則去為大蝶崔豹古今注曰蛺蝶一名野蛾一名風蝶江東人謂之撻末色白背青者是也其有大如蝙蝠者或黑或青班名曰鳯子一曰鳯車亦曰鬼車生江南甘橘園中而唐滕王圖畫蛺蝶有江夏班大海眼小海眼村裏來菜花子之目北齊魏収輕薄時人號云魏収驚蛺蝶說文作蛺蜨徐鉉曰俗作蝶非是列子鳥足之葉為胡蝶音釋莎雞螒爾雅音汗又曰樗雞犨赤周反􅝺音節蜉蝣浮遊蛣起吉反蜣音羌蟋蟀蛬音拱趨音促即且即莊子作即且或作蛆子徐反注鳴注周禮陟豆反螗蜋音唐郎有斧蟲爾雅疏有臂若斧奮之當輙不避一名不過一名蟷蠰一名蛑一名巨斧其子蜱蛸蟷丁即反蠰音箱莫貈下音鶴蛑音牟注蚚音祈蜱蛸音毗消螗螂一名而有六名其十則有三名􅡯蟭蜱蛸螵蛸也􅡯布莫反蟭音焦螵音瓢蒱通作蒲說文匹慓反青蛉力丁反騶音鄒䗓千公反􅩜莣上音予下音務淮南注青蛉也孑子上音吉下音厥或作蛣蟩字異而音義同俗名釘倒虫螚乃多奴來二反齧注􅊵所齧草靈在其心中化為螚一說􅊵齧虫名䗧蛜音康伊蜣蜋音羌郎蛣音吉却推他回反曳餘制反牽引也蜘蛛注緰音須蠨蛸上音蕭下音所交反踦去奇切瞤如倫切目動也伊威鼠婦也果臝力果反括樓也熠以敕反燿以照反胡蝶蝙布𤣥反蝠方六反蜨說文臣鉉等曰今俗作蝶疌徒叶切爾雅翼卷二十五
