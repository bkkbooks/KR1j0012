body:
  text: 欽定四庫全書爾雅翼卷二十一宋羅願撰釋獸四犛羱豪獺鯪鯉兔貂蟨彚貓貍狐貉窮奇檮杌叨餮犛犛西南夷長髦牛也似牛而四節腹下及肘皆有赤毛長尺餘而尾尤佳其大如斗天子之車左纛以此尾為之繫之左騑馬軛上蓋馬在中曰服在外曰騑騑即驂也安最外左騑馬頭上以亂馬目不令相見也東京賦注置騑馬貫中故輿服志曰山車金根飾黃屋左纛以副其德章其功也漢安帝時青衣道夷與徼外夷齎旄牛眊以獻眊者結毛為飾即今馬及弓槊上纓眊也又可以充耳故楚語曰巴浦之犀犛兕象其可盡乎其又以規為瑱也然氂牛甚自愛其尾凡萬物之類其皮革齒牙骨角毛羽有異於物為人所利者亦皆自知珍之豹養其文犀象藏其齒角麝保其臍孔雀護其尾然而時有緩急故麝遇逐決其臍以自免蚺蛇之膽嘗為人取者則舉其瘡示人唯氂牛護尾特甚性至粗梗難制然草木鈎其尾則止不動解乃得去故西方之書言人為情欲所繫不能自拔者喻之今欲取其尾者使人歌於前弭然乃可取矣周書武王狩擒氂七百二十有一然則不特西南夷乃有也又莊子稱斄牛其大若垂天之雲者司馬彪亦以為旄牛然上林賦庸旄貘犛犛牛黑色亦出西南徼外然非此屬字書犛莫支反氂犛牛尾也里之反􅘭強曲尾可以箸起衣也洛哀反顔監曰庸牛即今犎牛也旄牛今偏牛也犛牛今貓牛也王會篇樓煩星旄荀子西海有文旄羱羱者西方野羊似吳羊而大角故曰羱如羊也狀若驢而羣行其角甚大受斗餘夏天塵露在其角上生草載行愛玩之獨寢餘者不敢近也代都賦云羱羊養草以盤旋切詳萬物之生皆依於物故魚依水草依土鸛巢有水則能畜魚羱角有土則能養草皆生非其類此羱乃與麢羊不同故釋獸羱如羊麢大羊陶隱居稱羚羊多兩角一角者為勝角甚多節蹙蹙圓繞别有山羊角極長惟一邊有節節亦疏大爾雅名羱羊而羌夷云只此名羚羊唐本乃云羚羊如牛大其角堪為鞍橇一名羱羊俗名山羊或名野羊善鬭至死而陳藏器稱山羊山驢羚羊三種相似則唐本之説似非矣顔監解上林賦云壄羊今所謂山羊也豪豕號為剛鬣而豪之毛尤異夾髀粗毫至長數尺能以頸上毫射物其毫大如笄白而黑端入肉處才一二分中間白處常隱不見但見其黑端爾見人則怒白色盡露已而激去蓋是怒氣所發未必以射人也凡萬物變化蓋不可以類推今嶺南海魚變化之異者黃魚化為鸚鵡沙魚之班者化為鹿泡魚大者如斗身有刺乃復化而為此説易者以巽為魚魚之為龍為鹿震巽相易者也化為鸚鵡巽變離也化而為豪巽變坎也又豪矢屬屬於坎坎弓也乾為圜矢取巽離弓取巽坎豪彘激毫短狐射影無非坎離之變物之變化動作合於象數有如此者列子稱亶爰之獸有自孕而生者惟豪亦然郭璞贊曰剛鬣之族號曰豪豨毛如攢錐中有激矢厥體兼資自為牝牡長楊賦云拖豪豬一名帚獂獺獺如小狗水居食魚率以正月取魚於水傍四面陳之謂之祭魚獺不祭魚國多盜賊蔡雍月令章句曰獺毛蟲西方白虎之屬水居而殺魚者也春之時乙以柔配庚剛故金得殺於木毛蟲害魚於春陽自然之氣不為妖異故以為候祭者陳之陸地進而弗食獺歲常兩祭古者漁人候此而入澤梁故先儒言漁人之職歲五取魚則以孟春獺祭為一季春薦鮪為二秋獻龜魚為三孟冬獺復祭為四季冬始漁為五説者以其祭為祭天魏蔣濟則云豺獺自祭其先是皆不可知者也其所陳之魚許叔重注淮南子則以為用鯉束晳補南陔詩曰有獺有獺在河之涘凌波赴汨噬魴捕鯉嗷嗷林烏受哺於子養隆敬薄惟禽之似以獺能祭烏能養故孝子以相戒則又魴鯉兼祭矣又古稱獺嗜鯔魚乃不避死魏徐邈畫板作鯔懸洛水岸以誘白獺羣獺盡來一時執得性能知水之髙下其為穴必預度水所不至鄉人以是為潦水之候又有一種名獱陶隱居云獱獺形大頭如馬身似蝙蝠不入藥用藥用當取以魚祭天者三蒼解語云獱似青狐居水中食魚説文亦云猵獺屬或從賓然則獱蓋莊子所謂猿猵狙以為雌者以其能水能陸故與禺屬為雄雌桑大夫曰水有猵獺而池魚勞國有強禦而齊民消淮南曰養池魚者不畜獱獺謂是物也今人以一種小者為􅎲鰌言能抓鰌魚食之又有水鼠能入水伺大魚騎之而齧其尾魚以故不蕃然非獺類舊説諸畜肝葉數皆定惟獺肝一月一葉十二月則十二葉吳孫和嘗醉舞如意誤傷鄧夫人頰以百金求白獺髓為膏以滅瘢一名水狗每旦率以五更初出飲水知人欲取之則入石洞伺其祭魚則有鬭死者穴中有祐骨山海經曰釐山滽山之水出焉有獸名曰獺其狀如鱬其毛如彘鬣鯪鯉鯪鯉四足似鼉而短小狀如獺遍身鱗甲居土穴中蓋獸之類非魚之屬也特其鱗色若鯉故謂之鯪鯉又謂之鯪豸野人又謂之穿山甲以其尾大能穿穴故也能陸能水出岸開鱗甲不動如死令蟻得入蟻滿便閉甲入水開之蟻皆浮出因接而食之故能治蟻瘻吳都賦曰陵鯉若獸其字從陵以其居陸也後魏髙宗時兖州東郡吏獲此獸京師無識者唯高祐識之以為三吳所出餘城所無時謂博識考天問曰鯪魚何所王逸以為鯉一云陵鯉也有四足出南方蓋以為此獸故釋吳都賦者亦引以為證至栁宗元天對乃云鯪魚人貌邇列姑射則是用山海經所謂西海中近列姑射山有陵魚人面人手魚身見則風濤起者爾非此物兔兔視月而有子其目尤瞭故牲號謂之明視天問稱夜光何德死則又育厥類惟何而顧兔在腹蓋月唯望一日滿餘時常缺兔口亦缺以類相致説者以為天下之兔皆雌惟顧兔為雄故皆望之以稟氣古稱日烏月兔相傳已久傳曰日無光則烏不現烏不現則飛烏隱竄漢元帝永光元年日中無光其日長安無烏而今世卜兔之多寡者以八月之望是夜深山大林中百十為列延首月影中月明則一歲兔多月暗則兔少是稟顧兔之氣以孕也然兔亦自有雌雄不專視月古樂府亦云雄兔腳撲朔雌兔眼迷離兩兔逐地走安能知我是雄雌蓋雌雄之難辨者云爾論衡云舐雄毫而孕及其生子從口中吐出冬月唯齕木皮至春草長麥繁而肉反不美凡野獸鮮有氂唯兔足底皆毛號建毛性狡以善走齊之良兔曰東郭㕙蓋一旦而走五百里與齊之良狗韓盧同足其居號三窟馮諼以此導田文今兔之所處其穴常為三竅獵者攻之常顯然自其正穴躍出而顧循其背自後竅入坐穴中獵者反以是得之嶽陽人以兔為地神無敢獵者又巴陵烏絶多無敢弋不知何故也其毫利為筆韓愈傳毛穎稱蒙恬取兔毫為筆乃不其然蒙恬所造即秦筆耳以枯木為管鹿毛為柱羊毛為皮所謂蒼毫非兔毫竹管也兔毫自漢以來有之耳崔豹説之甚詳又淮南鴻烈曰昔蒼頡作書而天雨粟鬼夜哭以為鬼恐為書所劾故哭而悲之許叔重乃云鬼或作兔兔恐見取毫作筆害及其軀故夜哭夫自黃帝蒼頡至于秦蓋二千餘年考蒙恬乃始作秦筆而兔毫竹管又出於鹿毛木管之後彼之哭者骨朽久矣許説非也宋符瑞志白兔王者敬耆老則見赤兔王者德盛則至春秋運斗樞曰玉衡星散為兔貂貂鼠屬大而黃黑好在木上亦謂之栗鼠其尾特大漢之侍中中常侍武冠加黃金璫附蟬為文貂尾為飾謂之惠文冠起於趙武靈王效胡服以金璫飾首前插貂尾為貴職秦滅趙以其君冠賜近臣應劭以為金取堅剛百鍊不耗蟬居高飲潔口在腋下貂內徑悍而外溫潤此因物生義也徐廣以為蟬取清高飲露而不食貂紫蔚采潤而文采不彰灼而胡廣以謂北方寒涼本以貂皮暖額附施於冠遂成首飾則廣之説是也今高麗有貂帽貂裘冬溫夏涼利以入水才出岸振迅之則乾雪著其上則消又北方往往黃塵眯人眼以袖拭目則塵去古亦以為裘趙王資蘇秦貂裘黃金使説秦王破關中之橫書十上而説不行黑貂之裘敝黃金百斤盡是亦起於趙也傳曰貂不足狗尾續言貴賤之不同貂實鼠類故其字又作鼦作説文云出胡丁零國今人謂之貂零恐以此廣志曰貂出扶餘挹婁王莽更漢家黑貂著黃貂唐正觀五年東室韋貢豐貂蟨蟨鼠前而兔後趨則頓走則顛故常與卭卭距虛比為卭卭距虛齧甘草即有難卭卭距虛負之走故號比肩獸然蟨世所希見漢雁門廣武縣夏屋山中有獸形如兔而大相負共行土俗名之為蟨鼠先朝沈括使遼稱契丹北境慶州之地大漠中有跳兔形皆兔也但前足才寸許後則幾一尺行則用後足跳一躍數尺止則蹶然仆地捕得數頭持歸此則蟨也蓋蟨自能跳躍亦能與同類相負共行特假於卭卭距虛以走卭卭距虛蓋二獸子虛賦曰蹴蛩蛩轔距虛張揖以為卭卭青獸其狀如馬距虛似騾而小説苑孔子曰蛩蛩距虛見人將來必負蟨以走二獸者非性愛蟨也為得甘草而貴之故也然則負蟨者或卭卭或距虛二物不相須也郭氏又以蟨鼠前而兔後意卭卭距虛當鼠後而兔前前高不得取甘草故須蟨取之按卭卭距虛相如賦以為狡獸與野馬騊駼遺風遊騏槖駝驒騱駃騠槩言之又本草稱距虛食菴䕡子而仙則是物之至駿者故昔之言駿馬前類飛鳥後類距虛以其前軒而後輊也豈冝後足若鼠耶且蟨惟前短而後長故不能走而有待於物然猶獸之常理若長前而短後豈直不能負物而已哉直便無是理也又狼亦負狽狽前足短而狼後足自如卭卭距虛不當短其後也周書王會獨鹿國獻卭卭距虛孤竹獻距虛釋者以為卭卭似鼠距虛負而走距虛者野獸驢騾之屬則是以卭卭為蟨也與爾雅説苑及詞人之説異今不取郭璞曰距虛即蛩蛩變文互言耳彚彚之為獸小小耳其狀似鼠而毛刺大者如小豚小者如瓜腳短刺尾長寸餘蒼白色見人則藏面腹下圓輥如栗房攢毛外刺不可摶執漢元封二年大雪深數尺牛馬踡縮如蝟蓋似此也淮南曰鵲矢中蝟此類之不可推者蝟獨畏鵲緯書曰火爍金故鵲啄蝟宋均曰蝟有兵刺故謂金鵲處高得火氣也蝟見鵲便自仰腹受喙或曰蝟極獰鈍或惡鵲聲故反腹令啄欲掩取之猶蚌鷸耳非有畏也今人以彚皮理素之紕類者其皮與山枳鼠皮相似但枳鼠毛端兩岐為别彚有毛刺故通為品彚之彚易曰拔茅連茹以其彚征吉萬彚之雜然皆生如彚毛矣至於豪者其毫特達出於其類故才出人曰豪亦謂此爾傳曰盜賊如蝟毛而起彚可以治胃疾故又從蟲從胃又從豸則為從大則為猬西京賦摣狒猬貓貓小畜之猛者性隂而畏寒雖盛暑臥日中不憚鼻端四時冷濕惟夏至即溫目睛早晚員日中如線就隂則復員其耳經捕鼠之後則有缺如鋸如虎食人而鋸耳也洗面過耳則有勝客至其色有似貍者通謂之貍説苑曰騏驥騄駬倚衡負軛一日千里此至疾也然使捕鼠曽不如百錢之貍古者蠟禮迎而祭之故説者曰蠟蓋三代之戲禮也祭必有尸無尸曰奠蠟謂之祭則有尸貓虎之尸誰當為之致鹿與女誰當為之非倡優而誰是其説起於先儒欲滿八蠟之數故兼貓虎而列焉夫貓虎雖能食田豕田鼠然所以主此者蓋必有神於此詩曰去其螟螣及其蟊賊無害我田稚田祖有神秉畀炎火夫去螟螣蟊賊而畀之炎火者人也然必曰田祖有神相之耳今去田鼠田豕者雖貓虎也然所以使鼠豕得去者豈無神以掌之耶迎貓虎以祭其所主之神固自有尸矣孟子曰食而弗愛豕交之也愛而弗敬獸畜之也故所以接神者不可同於人所以遇人者不可同於畜豕獸尚不以人道遇况當以人道接耶故祭不宜及貓虎祭不及貓虎蓋以物享之則不為戲禮矣然則貓虎所主者何神曰自田而言之當屬田祖自禽而言之則當祀祊貍貍者狐之類狐口鋭而尾大貍口方而身文黃黑彬彬蓋次於豹故稱大人虎别君子豹别辨人貍别山鬼乘赤豹從文貍也貍善摶者也為小步以擬度焉其發必獲謂之貍步量侯道者法之古者王大射則射人以貍步張三侯夫射力有大小故射侯有近逺自士大夫卿以至諸侯其德大者其威宜逺其德小者其威宜近故其張侯之法意皆可以丈引度而設也王者威行無外而射力則有限焉大射之際又所以威冒天下四方之諸侯必將有在庭者茍按而設之是測量天威損天子之體者也故為小步若貍者焉詳密而進既善為頌義取必中而又數在其中此神道設教所以尊皇極者也貍好伏故稱伏獸又鱉蜃之類謂之貍物蟅蠱之類謂之貍蟲字皆取於貍而音為埋則貍亦埋藏之獸矣狐狐妖獸鬼所乘也其狀鋭口而大尾説者以為先古淫婦所化其名曰紫其怪多自稱阿紫善為魅惑人故稱狐媚聞為媚者以小口器盛肉置之狐所常處狐見肉欲之爪不能入徘徊不捨涎皆入器中取以為媚藥蓋妖祥之禽故古有以篝火狐鳴以惑衆者狐之色赤詩曰莫赤匪狐莫黑匪烏言其上下並為威虐莫適擇也今狐所在烏輒羣而噪之蓋皆妖祥之禽人之所去也又師曠以為東方有鳥文身朱足憎烏而愛狐然則狐可好烏可惡今並為威虐則莫適求愛憎之正矣狐既淫媚之物故詩人以比齊襄公求妃偶於南山之上綏綏然其行人皆惡之詩人之義寓物以顯其人雄狐者君之象也春秋秦穆公伐晉筮之吉曰獲其雄狐釋者曰夫狐蠱必其君也既而獲晉惠公詩人但言齊子之歸而説者知其為齊襄公而來蓋亦以此狐性善疑方河氷合時狐聽氷下水無聲乃行人每則之皆須狐已行乃度易未濟稱小狐汔濟濡其尾蓋狐小尾大則有未濟之象以之為戒亦狐是執心不定者故春秋外傳曰狐埋之而狐搰之是以無成功既自埋藏又自搰發皆執心不定之貌又漢敦煌郡杜林以為古瓜州顔師古曰即春秋傳允姓之戎居于瓜州者也其地今猶出大瓜長者狐入瓜中食之首尾不出説文云狐有三德其色中和小前大後死則丘首管子云代出狐白之皮狐白應隂陽之變六月而一見九尾狐文王得之東夷歸焉山海經青丘之國有之貉貉善睡之獸似狐畜而養之扣之則寤已而復寐豳詩曰一之日于貉取彼狐貍為公子裘夫所取狐貍爾而謂之于貉者周人將獵則先祭貉故謂獵為貉周禮曰祭表貉則為位蓋貛之將出貉為先導表貉之所在知獸之所聚故祭而取之穆天子傳曰天子獵於漆澤於是得白狐玄狢焉以祭于河宗此周禮獵祭貉之驗也亦方物所生各有所主貉之踰汶則死豈主於河耶孔子狐貉之厚以居蓋居者所以利用安身也先事而慮有若狐者焉所以為利用無事而息有若貉者焉所以為安身又聖人之居所以致其辨狐孤也貉各也狐一羣不二雄狢與貛同穴而異處可以致其辨矣貈子貊其雌者名貔今江東呼貉為􅧯􅤘詩義問曰狐之類貉貒貍也貉子曰貊貊形狀與貉類異世人皆名𩢷貉子似貍然則貉之為各又取於此説文狐貈從豸從舟而謂貉為北方豸種其字從各為蠻貉之貉此但據論語説之爾貉亦善捕説苑曰猿猴失木禽於狐貉者非其處也北囂山有獸名獨狢行止無伴窮竒窮奇神異之獸能食人上林賦窮奇象犀蓋獬豸觸邪撓之人窮奇食忠信之士其性相反故其名曰窮奇昔堯時四凶族有渾敦窮奇檮扤叨餮之名而世莫能盡其説説者謂渾敦不開通之貌耳案海內東北經曰三危山西曰天山莫水出焉而西流注于陽谷有神狀如黃囊赤如丹火六足四翼渾敦無面目是識歌舞實惟帝江莊子以無竅為混沌歡兜比周頑嚚目無辨别故以渾敦比之窮奇之名説者特謂其行窮其好奇耳案神異經曰窮奇狀如牛而色貍尾長曳地其聲如狗狗頭人形鈎爪鋸牙逢忠信之人齧而食之逢姦邪之人則捕禽獸而飼之亦食禽獸之肉海內西北經亦曰窮奇狀如虎有翼食人從首始在蜪犬北又東北經曰邽山上有獸狀如牛蝟毛名曰窮奇注云或云似虎蝟毛有翼海上所謂窮奇者千嵗𣆀耳虎一名神狗也共工專誣害盛德故以窮奇比之檮杌之名説者特謂頑凶無儔匹之貌耳按物類相感志曰檮杌西荒中獸如虎豪長三尺人面虎爪口牙一丈八尺人或食之獸鬭終不退却唯死而已荒中張捕之復黠逆知一名倒壽伯鯀傲狠忘身故以檮杌比之叨餮之名説者謂貪財為叨貪食為餮耳北山經曰鈞玉之山有獸羊身人面目在腋虎齒人爪音如嬰兒名曰狍梟食人為物注云貪婪食人未盡遂害其身像在夏后鼎左傳所謂叨餮者也三苗飲食貪冒故以叨餮比之由此四物言之則窫窳大風封豕鑿齒長蛇之類皆以物比人不能詳其説然皆可以類通之也淮南子窮奇廣莫之所生也注云天神檮杌檮杌好鬭至死不却西荒中獸也狀如虎豪長三尺人面虎爪口牙一丈八尺神異經云毫長二尺人面虎足豬牙尾長丈八尺人或食之獸鬭終不退却唯死而已荒中張捕之復黠逆知之一名倒壽商之興也嘗次于丕山故內史過答虢公神降于莘之問以為或有神以興亦有以亡也或曰檮杌即鯀據左氏顓頊氏有不才子謂之檮杌蓋指伯鯀又鯀為夏郊三代祀之夏之祀鯀乃其先祖商不應祀或以次于丕山因祭之爾周則封杞鄫以祀之又諸國之史晉謂之乘魯謂之春秋楚謂之檮杌乘以載丘乘之數春秋以備四時之事又史者所以數往知來者也檮杌之為物能逆知來事故以此目之叨餮叨餮羊身而人面其目在腋下虎齒人爪音如嬰兒食人為物釣玉之山有之山海經謂之狗梟郭氏以為貪婪食人未盡遂害其身像在夏后鼎以夏鼎言之昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦是則夏鼎之上無所不象今獨稱叨餮者叨餮食而不戒以自殘其身鼎食器也欲使食者知以為鑒故尤别而異之其圖在足呂氏春秋曰周鼎著叨餮有首無身食人未咽害及其身以言報速也今鼎鬲之類凡三足者每足皆作獸狀瞋目屯牙自銜其足此則叨餮象也其事自夏鼎來矣音釋犛莫交反纛音盜騑音非眊音二瑱他甸切以玉充耳也楚靈王虐白公子張驟諫王病之曰子復語不榖雖不能用吾憖置之於耳對曰云云注規諫也瑱所以塞耳言四獸之牙角可以為瑱不盡而又以規諫為之乎蚺如占切􅘭吕之反徐李音來犎甫容切野牛也羱音元麢音零亦作羚豪鬣音獵髀音俾股也又步米切笄音雞簪也泡披交切豨火豈切拖説文曰拖曳也徒可切獺音撻鯔音緇獱婢賓切猵普年切又篇面反音遇抓側交切鰌音秋瘢薄官切滽滽音容水名鱬而朱切鯪鯉豸他爾切瘻音樓列姑射射音夜山海經列姑射在海河州中瞭音了目精明也撲蒲各切舐神紙切齕音紇齧也㕙音俊又音逡貂丁聊切璫音當充耳珠也侍中中常侍後漢百官志侍中比二千石掌侍左右贊導衆事顧問應對中常侍千石後增秩比二千石掌侍左右從入內宮贊導內衆事顧問應對眯音米物入目中蟨音厥鼠前後淮南注鼠前足短􅊵後足長故謂之蟨蛩蛩巨虛前足長後定短故能乘虛而走不能上也蹴七六切轔音吝騾騾驒騱上音顛下音奚駃古穴切騠音提菴䕡音淹閭通志略狀如蒿艾輊音致車前重也彚通作蝟輥音衮踡音權踡局不伸紕篇夷切繒欲壞也纇虛對切粗絲也注摣子加切謂戟撮之貍别彼列切揚子注虎别如虎之别於百獸炳然殊異别辨别也辨人辭辨之人其文萃然有文采異於貒貉三侯儀禮注謂熊侯糝侯犴侯也量侯道謂去堂逺近也侯道五十弓弓制六尺貍步貍之伺物每舉足者止視逺近茍發必中也是以量侯道取象焉頌容蜃大蛤也市軫反蟅音柘亦作蟅説文蟲也一曰蝗類一曰鼠婦周禮赤犮氏注貍蟲蟅肌蛷之屬狐篝音溝薰蘢搰苦骨切貉音鶴亦作狢本作貈貛火丸切野豚踰汶毛晃韻注汶與岫同謂汶江也考工記貉踰汶則死陸德明音問誤詳見列子釋文貆音丸玉篇無之疑當作音殍貒他丸切􅧯乙郎切􅤘山吏切窮奇渾戶本切敦徒本切檮徒刀切杌五匆切叨他刀切餮他結切歡呼端切兜都侯切行下孟反好呼報反蜪犬音陶蜪犬如犬青色食人從首始邽山山海經音圭狍音庖梟于驕反窫窳上音軋下音愈獸名狀若龍首亦作猰㺄大風風伯也能壞人屋舍羿射殺之鑿齒齒長三尺其狀如鑿不徹頷下而持戈者封豕大豕也長蛇大蛇吞象三年而出其骨檮杌鯀古本反鄫疾陵反左傳注鄫國今琅琊鄫縣叨餮鬲都的切又音革爾雅翼卷二十一
